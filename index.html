{ name:"Couroupita — Cannonball Tree", country:"French Guiana", lat:3.8, lng:-53.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Couroupita_guianensis.jpg/640px-Couroupita_guianensis.jpg", description:"Couroupita guianensis produces spectacular fragrant flowers and enormous spherical fruits directly from its trunk. The cannonball-sized fruits — up to 25cm across — fall with a loud crash. Sacred in Hindu tradition as the Shiva lingam tree, it is one of French Guiana's most dramatic and extraordinary native trees." },
{ name:"Greenheart", country:"French Guiana", lat:4.8, lng:-52.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Chlorocardium_rodiei.jpg/640px-Chlorocardium_rodiei.jpg", description:"Chlorocardium rodiei produces one of the world's densest and most durable timbers — so heavy it sinks in water. Its alkaloid-rich wood is naturally resistant to marine borers, making it the historic timber of choice for harbour pilings, lock gates and ship building across the Caribbean and South America." },

// 🇬🇪 GEORGIA
{ name:"Caucasian Wingnut", country:"Georgia", lat:41.7, lng:44.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Pterocarya_fraxinifolia.jpg/640px-Pterocarya_fraxinifolia.jpg", description:"Pterocarya fraxinifolia grows in Georgia's Colchic rainforests along the Black Sea coast — a UNESCO-listed biodiversity hotspot. These ancient relict forests have survived unchanged since the Tertiary period, 25 million years ago, sheltering plant species that disappeared from the rest of Europe during the Ice Ages." },
{ name:"Georgian Oak", country:"Georgia", lat:41.5, lng:44.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Quercus_macranthera.jpg/640px-Quercus_macranthera.jpg", description:"Quercus macranthera forms the backbone of Georgia's mountain forests between 1,200 and 2,400m. Georgia is considered one of the world's primary centres of oak diversity. Ancient Georgians revered the oak as sacred — the hero Amirani, Georgia's Prometheus, was chained to an oak tree in Caucasian mythology." },
{ name:"Caucasian Rhododendron", country:"Georgia", lat:42.5, lng:44.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Rhododendron_arboreum_flowers.jpg/640px-Rhododendron_arboreum_flowers.jpg", description:"Rhododendron caucasicum carpets Georgia's Caucasian subalpine zone in white and pink blooms each June. Its honey — produced by bees feeding on its nectar — contains grayanotoxin and causes temporary paralysis. Ancient Pontic armies used this mad honey to incapacitate Roman soldiers in 65 BC." },
{ name:"Georgian Grape — Rkatsiteli", country:"Georgia", lat:41.6, lng:45.0, type:"Vine", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Vitis_vinifera_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-277.jpg/640px-Vitis_vinifera_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-277.jpg", description:"Georgia is considered the birthplace of wine — archaeological evidence from 6000 BC shows the world's oldest winemaking in Georgian clay qvevri vessels. Over 500 indigenous grape varieties grow in Georgia, more than any other country. UNESCO recognised Georgia's qvevri wine tradition as Intangible Cultural Heritage." },
{ name:"Colchic Box", country:"Georgia", lat:42.0, lng:42.5, type:"Shrub", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Buxus_colchica.jpg/640px-Buxus_colchica.jpg", description:"Buxus colchica forms ancient box forests in Georgia's Colchic region — some of the last intact box groves in the Caucasus. Georgian boxwood is among the densest timbers in Europe, sinking in water. It has been used for musical instruments, chess pieces and fine carving for over 2,000 years." },

// 🇩🇪 GERMANY
{ name:"Cornflower", country:"Germany", lat:52.5, lng:13.4, type:"Wildflower", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Centaurea_cyanus_LC0084.jpg/640px-Centaurea_cyanus_LC0084.jpg", description:"Centaurea cyanus was once Germany's most beloved wildflower — Kaiser Wilhelm II kept one in his buttonhole daily in memory of his mother. Now nearly extinct in German grain fields due to herbicides, it has become a symbol of biodiversity loss. Germany has launched major programs to restore cornflower meadows." },
{ name:"Silver Fir", country:"Germany", lat:47.9, lng:7.9, type:"Conifer", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Abies_alba_-_Schwarzwald.jpg/640px-Abies_alba_-_Schwarzwald.jpg", description:"Abies alba defines the Black Forest — Schwarzwald — Germany's most iconic landscape. The Brothers Grimm set their fairy tales in silver fir forests. Climate change is devastating German silver fir populations through drought and bark beetle outbreaks, transforming the landscape of an entire cultural region." },
{ name:"Linden — Tilia", country:"Germany", lat:51.5, lng:10.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tilia_cordata.jpg/640px-Tilia_cordata.jpg", description:"Tilia cordata is Germany's most culturally significant tree — village lindens called Tanzlinden were gathering points for community life for centuries. The Goethe Linden in Weimar was planted in 1815. Linden blossom tea is Germany's most consumed herbal tea and its honey is the finest in European beekeeping." },
{ name:"Gentian", country:"Germany", lat:47.5, lng:11.0, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gentiana_acaulis.jpg/640px-Gentiana_acaulis.jpg", description:"Gentiana acaulis blazes intense electric blue across Germany's Bavarian Alps each spring. Strictly protected by German law — picking or digging wild gentian carries heavy fines. The bitter root of yellow gentian was used to flavour Enzian schnapps, still produced in Bavaria using legally harvested roots." },
{ name:"Black Forest Blueberry", country:"Germany", lat:48.0, lng:8.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Vaccinium_myrtillus.jpg/640px-Vaccinium_myrtillus.jpg", description:"Vaccinium myrtillus carpets the floor of Germany's Black Forest in dense low shrubs, producing intensely flavoured dark berries. Schwarzwälder Kirschtorte — Black Forest cake — may be Germany's most famous export, but blueberry Streuselkuchen is what Schwarzwald locals actually eat. Germany harvests millions of kilograms of wild blueberries annually." },

// 🇬🇭 GHANA
{ name:"Shea Tree", country:"Ghana", lat:9.0, lng:-1.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Vitellaria_paradoxa.jpg/640px-Vitellaria_paradoxa.jpg", description:"Vitellaria paradoxa is Ghana's most economically important wild tree. Ghana is the world's second largest shea exporter — over 900,000 tonnes of shea nuts are harvested annually by rural women. Shea butter is found in half of all European chocolate as a cocoa butter substitute and in countless cosmetic products." },
{ name:"Cacao Tree", country:"Ghana", lat:6.5, lng:-1.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao defines Ghana's economy — the country is the world's second largest cocoa producer. Ghana's Ashanti region grows some of the world's most flavourful cacao. Cocoa was introduced to Ghana in 1878 by Tetteh Quarshie who smuggled seeds from Fernando Poo, transforming the country's entire economic destiny." },
{ name:"Odum — African Teak", country:"Ghana", lat:7.5, lng:-1.8, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Milicia_excelsa.jpg/640px-Milicia_excelsa.jpg", description:"Milicia excelsa, called odum in Ghana, is the country's most valued timber tree. Its golden interlocked grain timber has been used for centuries in Ghanaian royal palace construction. The Ashanti Golden Stool — Ghana's most sacred object — is kept on a throne of odum wood in Kumasi." },
{ name:"Moringa", country:"Ghana", lat:10.5, lng:-0.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Moringa_oleifera_Blanco1.jpg/640px-Moringa_oleifera_Blanco1.jpg", description:"Moringa oleifera is increasingly cultivated across Ghana's northern savanna as a nutritional intervention. Called the miracle tree, its leaves are dried and added to soups and sauces across northern Ghana. Ghana's government promotes moringa cultivation as a key strategy against childhood malnutrition in the Sahel zone." },
{ name:"Kente Silk Cotton", country:"Ghana", lat:6.0, lng:-0.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra, the silk cotton tree, is sacred across Ghana and features prominently in Akan spiritual traditions. Ghanaian fetish priests conduct ceremonies beneath ancient ceibas. Its seed fibre was traditionally used to stuff mattresses and the trunk is carved into the ceremonial drums used in Ghanaian royal courts." },

// 🇬🇷 GREECE
{ name:"Olive Tree", country:"Greece", lat:37.9, lng:23.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"Olea europaea has been cultivated in Greece for over 5,000 years — the olive is inseparable from Greek civilisation. Athens takes its name from Athena who gave the city its first olive tree. A tree on the Acropolis is said to be a direct descendant of that original tree. Greece produces the world's finest extra-virgin olive oil." },
{ name:"Cretan Dittany", country:"Greece", lat:35.2, lng:24.9, type:"Herb", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Origanum_dictamnus.jpg/640px-Origanum_dictamnus.jpg", description:"Origanum dictamnus is endemic to the mountains of Crete, growing only on steep rocky cliff faces. Ancient Greeks considered it the most powerful medicinal plant — Aristotle noted that wounded deer sought it out to heal themselves. It has been harvested for centuries for herbal tea and is now cultivated to protect wild populations." },
{ name:"Mastic Tree", country:"Greece", lat:38.3, lng:26.1, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pistacia_lentiscus_var_chia.jpg/640px-Pistacia_lentiscus_var_chia.jpg", description:"Pistacia lentiscus var. chia produces mastic — a resin that only weeps from trees on the Greek island of Chios. Used for 2,500 years as the world's first chewing gum, in liqueur, cooking and medicine, Chios mastic has EU Protected Designation of Origin status. The Ottoman sultans reserved it exclusively for the royal harem." },
{ name:"Greek Fir — Cephalonian Fir", country:"Greece", lat:38.1, lng:20.6, type:"Conifer", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Abies_cephalonica.jpg/640px-Abies_cephalonica.jpg", description:"Abies cephalonica is endemic to Greece, forming magnificent mountain forests on the Peloponnese and Ionian islands. Its silver-grey trunks and upswept branches create cathedral-like forests above 1,000m. Climate change-driven wildfires are devastating Greek fir forests at an accelerating rate." },
{ name:"Saffron Crocus", country:"Greece", lat:40.9, lng:21.4, type:"Bulb", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Crocus_sativus_closeup.jpg/640px-Crocus_sativus_closeup.jpg", description:"Crocus sativus has been cultivated in Kozani, northern Greece, for over 3,000 years. Greek saffron — krokos Kozanis — holds EU Protected Designation of Origin and is considered among the world's finest. Minoan frescoes at Akrotiri on Santorini show women harvesting saffron 3,600 years ago." },

// 🇬🇩 GRENADA
{ name:"Bois Canot — Trumpet Tree", country:"Grenada", lat:12.1, lng:-61.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cecropia_peltata.jpg/640px-Cecropia_peltata.jpg", description:"Cecropia peltata is one of Grenada's most recognisable trees, its large silver-backed leaves shimmering in the Caribbean breeze. A pioneer species that rapidly colonises disturbed land, it played a crucial role in reforesting Grenada after Hurricane Ivan devastated the island in 2004." },
{ name:"Nutmeg Tree", country:"Grenada", lat:12.0, lng:-61.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Myristica_fragrans.jpg/640px-Myristica_fragrans.jpg", description:"Myristica fragrans made Grenada famous as the Spice Isle — nutmeg appears on the Grenadian flag. Grenada was once the world's second largest nutmeg producer. A single fruit yields two spices — nutmeg from the seed and mace from the red lacy aril surrounding it. The nutmeg trade once caused wars between European colonial powers." },
{ name:"Cocoa Tree", country:"Grenada", lat:12.2, lng:-61.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao thrives in Grenada's volcanic soils producing some of the Caribbean's finest cacao. Grenada's Trinitario cacao is prized by artisan chocolatiers worldwide for its complex flavour. The Grenada Chocolate Company pioneered the world's first bean-to-bar cooperative chocolate production entirely on the island." },
{ name:"Balisier — Heliconia", country:"Grenada", lat:12.05, lng:-61.65, type:"Tropical Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Heliconia_caribaea.jpg/640px-Heliconia_caribaea.jpg", description:"Heliconia caribaea grows wild across Grenada's lush interior rainforests, its dramatic red and yellow bracts providing nectar for hummingbirds year-round. Grenada has the highest density of hummingbird species per square kilometre in the Caribbean — a direct result of its rich heliconia diversity." },
{ name:"Immortelle Tree", country:"Grenada", lat:12.15, lng:-61.72, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Erythrina_poeppigiana.jpg/640px-Erythrina_poeppigiana.jpg", description:"Erythrina poeppigiana blazes orange-red across Grenada's hillsides each February before any leaves appear. Traditionally planted as shade trees over cocoa and nutmeg plantations, immortelle trees simultaneously protect crops from sun, fix nitrogen in the soil and create one of the Caribbean's most spectacular seasonal displays." },

// 🇬🇹 GUATEMALA
{ name:"White Nun Orchid", country:"Guatemala", lat:14.6, lng:-90.5, type:"Orchid", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Lycaste_skinneri.jpg/640px-Lycaste_skinneri.jpg", description:"Lycaste skinneri alba is Guatemala's national flower — a magnificent white orchid with a delicate pink centre found in cloud forests above 1,500m. So heavily collected by Victorian orchid hunters that it nearly went extinct in the wild. Guatemala made it the national flower in 1934 to protect it from further exploitation." },
{ name:"Ceiba", country:"Guatemala", lat:15.5, lng:-90.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra is Guatemala's national tree, sacred to the ancient Maya as Yaxche — the green tree at the centre of the universe connecting the underworld, Earth and heavens. The great ceibas of Tikal and other Maya cities are living monuments to a 3,000-year civilisation built in their shade." },
{ name:"Cacao", country:"Guatemala", lat:15.0, lng:-89.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao was first cultivated by the Maya of Guatemala over 3,500 years ago. The Maya word kakaw gave us the word cacao. Guatemala's Alta Verapaz region produces extraordinary Criollo cacao — the rarest and most flavourful variety. The Maya used cacao beans as currency and the drink as a royal privilege." },
{ name:"Quetzal's Food — Aguacatillo", country:"Guatemala", lat:15.3, lng:-91.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Persea_schiedeana.jpg/640px-Persea_schiedeana.jpg", description:"Persea schiedeana, the aguacatillo, produces wild avocado-like fruits that are the primary food of the resplendent quetzal — Guatemala's national bird. Without this cloud forest tree, the quetzal cannot survive. The Maya considered both the quetzal and its food tree sacred symbols of freedom and nature's abundance." },
{ name:"Cardamom", country:"Guatemala", lat:15.8, lng:-89.5, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Elettaria_cardamomum.jpg/640px-Elettaria_cardamomum.jpg", description:"Guatemala is the world's largest cardamom producer, growing Elettaria cardamomum in the cloud forests of Alta Verapaz. Introduced in 1914 by a German coffee planter, it now generates over $1 billion annually. Guatemalan cardamom flavours coffee across the Arab world — Saudi Arabia and UAE are the largest buyers." },

// 🇬🇳 GUINEA
{ name:"African Teak — Doussié", country:"Guinea", lat:10.5, lng:-13.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Afzelia_bipindensis.jpg/640px-Afzelia_bipindensis.jpg", description:"Afzelia africana grows in Guinea's Fouta Djallon highlands — the water tower of West Africa. Its extremely durable timber is used for heavy construction across the region. Guinea's highland forests, fed by the highest rainfall in West Africa, are the source of the Niger, Senegal and Gambia rivers." },
{ name:"Shea Tree", country:"Guinea", lat:11.0, lng:-12.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Vitellaria_paradoxa.jpg/640px-Vitellaria_paradoxa.jpg", description:"Vitellaria paradoxa grows across Guinea's savanna zone and is a cornerstone of rural women's livelihoods. Guinea's shea is prized for its high oleic acid content making it particularly stable for cosmetic use. The Fouta Djallon Fula women's shea cooperatives have won international recognition for quality and sustainable harvesting." },
{ name:"Baobab", country:"Guinea", lat:11.5, lng:-13.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata grows across Guinea's coastal plains and savanna. In Guinean Susu and Mandinka traditions, the baobab is a sacred meeting tree where village elders gather to resolve disputes. Its leaves are cooked as a vegetable, its fruit pulp dissolved in water as a refreshing drink, and its bark made into rope." },
{ name:"Kola Tree", country:"Guinea", lat:9.5, lng:-13.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cola_nitida.jpg/640px-Cola_nitida.jpg", description:"Cola nitida grows in Guinea's coastal rainforests and kola nuts are central to Guinean social ceremonies — offered to guests, exchanged at weddings and used in traditional medicine. Guinea was a major kola nut trading hub in the trans-Saharan trade network for over 1,000 years before European contact." },
{ name:"Guinea Pepper — Grains of Paradise", country:"Guinea", lat:9.8, lng:-13.2, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Aframomum_melegueta.jpg/640px-Aframomum_melegueta.jpg", description:"Aframomum melegueta, grains of paradise, is native to Guinea's coastal wetlands. Its peppery aromatic seeds were the most valuable spice traded from West Africa to medieval Europe — so prized that the Guinean coast was called the Grain Coast. Today it flavours craft gins, Belgian ales and West African cuisine." },

// 🇬🇼 GUINEA-BISSAU
{ name:"African Oil Palm", country:"Guinea-Bissau", lat:11.8, lng:-15.2, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Elaeis_guineensis.jpg/640px-Elaeis_guineensis.jpg", description:"Elaeis guineensis dominates Guinea-Bissau's landscape — the country has one of the highest densities of wild oil palms in Africa. Palm oil and palm wine are fundamental to Guinean-Bissauan cuisine and culture. The Bijagó archipelago's sacred forests contain ancient wild oil palms that have never been harvested." },
{ name:"Cashew Tree", country:"Guinea-Bissau", lat:12.0, lng:-14.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Anacardium_occidentale.jpg/640px-Anacardium_occidentale.jpg", description:"Anacardium occidentale is Guinea-Bissau's most important export — the country is Africa's largest cashew producer and one of the top five globally. Introduced by the Portuguese in the 16th century, cashew now covers over 40% of the country's agricultural land. The sweet cashew apple is fermented into wine locally." },
{ name:"Fromager — Kapok", country:"Guinea-Bissau", lat:11.5, lng:-15.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra is sacred in Guinea-Bissau's animist traditions — the spiritual home of ancestors and nature spirits. The Bijagó people's elaborate initiation ceremonies take place in sacred groves dominated by kapok trees. Its massive buttressed trunk is carved into the great dugout canoes used across the Bijagó archipelago." },
{ name:"Rhun Palm — Borassus", country:"Guinea-Bissau", lat:12.2, lng:-14.8, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Borassus_flabellifer.jpg/640px-Borassus_flabellifer.jpg", description:"Borassus aethiopum, the African fan palm, towers over Guinea-Bissau's savanna with its massive black trunk and enormous fan-shaped leaves. Its sap is tapped for palm wine, its young shoots eaten as a vegetable, its leaves used for weaving and thatching, and its hard seeds carved into buttons and ornaments." },
{ name:"Mangrove", country:"Guinea-Bissau", lat:11.3, lng:-15.7, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Mangrove_trees.jpg/640px-Mangrove_trees.jpg", description:"Guinea-Bissau has one of West Africa's most extensive mangrove systems — over 250,000 hectares lining its ria coastline and the Bijagó archipelago. These forests are nurseries for West Africa's most important fish stocks, protection against coastal erosion and critical nesting habitat for saltwater hippos and manatees." },

// 🇬🇾 GUYANA
{ name:"Victoria Amazonica", country:"Guyana", lat:6.8, lng:-58.2, type:"Water Lily", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Victoria_amazonica2.jpg/640px-Victoria_amazonica2.jpg", description:"Victoria amazonica was first scientifically described from Guyana's Berbice River by British botanist Robert Schomburgk in 1837. Named after Queen Victoria, its circular pads reaching 3m across float on Guyana's blackwater rivers. Guyana's vast intact Amazon rainforest is one of the last strongholds of this magnificent plant." },
{ name:"Greenheart", country:"Guyana", lat:5.5, lng:-59.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Chlorocardium_rodiei.jpg/640px-Chlorocardium_rodiei.jpg", description:"Chlorocardium rodiei is endemic to Guyana and Suriname, producing one of the world's hardest and most durable timbers. London's original Thames riverbank piling and the old Panama Canal lock gates were built from Guyanese greenheart. Its alkaloid-rich wood is naturally resistant to marine borers for centuries underwater." },
{ name:"Crabwood — Andiroba", country:"Guyana", lat:5.0, lng:-59.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Carapa_guianensis.jpg/640px-Carapa_guianensis.jpg", description:"Carapa guianensis produces crabwood oil from its seeds — one of Amazonia's most important natural insect repellents. Guyana's Amerindian communities have used andiroba oil for centuries to protect against mosquitoes, treat skin conditions and preserve wood. It is now marketed globally as a natural alternative to DEET." },
{ name:"Mora", country:"Guyana", lat:6.0, lng:-58.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mora_excelsa.jpg/640px-Mora_excelsa.jpg", description:"Mora excelsa forms vast single-species forests along Guyana's coastal plain — a phenomenon called mora forests unique to the Guiana Shield. Its enormous seeds, up to 15cm long, are among the largest in the Americas. Mora timber was the foundation of Guyana's colonial economy for over 200 years." },
{ name:"Wallaba", country:"Guyana", lat:5.8, lng:-59.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Eperua_falcata.jpg/640px-Eperua_falcata.jpg", description:"Eperua falcata dominates Guyana's white sand forests on the Guiana Shield — ancient geological formations over 1.7 billion years old. Wallaba produces an extraordinarily resinous timber used for railway sleepers and shingles. Its hard seeds are a critical food source for Guyana's endangered giant armadillos and tapirs." },

// 🇭🇹 HAITI
{ name:"Bayahonde — Mesquite", country:"Haiti", lat:18.9, lng:-72.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Prosopis_juliflora.jpg/640px-Prosopis_juliflora.jpg", description:"Prosopis juliflora is one of Haiti's most resilient trees, surviving on the severely deforested limestone hillsides where little else grows. Its seed pods provide fodder for livestock and its wood is the primary charcoal source. Haiti has lost over 98% of its original forest cover — bayahonde holds what remains together." },
{ name:"Hispaniolan Pine", country:"Haiti", lat:18.7, lng:-71.9, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_occidentalis.jpg/640px-Pinus_occidentalis.jpg", description:"Pinus occidentalis is endemic to Hispaniola and forms Haiti's last remaining mountain forests in the Massif de la Selle above 1,500m. Critically threatened by charcoal production and agricultural encroachment, these forests are Haiti's most important watershed protecting millions of people from catastrophic flooding." },
{ name:"Ronier Palm", country:"Haiti", lat:18.5, lng:-72.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Borassus_flabellifer.jpg/640px-Borassus_flabellifer.jpg", description:"Borassus flabellifer grows across Haiti's coastal plains, its enormous fan leaves providing thatch for homes and its sap fermented into taffia rum. In Haiti's severely deforested landscape, ronier palms are often the only large trees remaining in entire regions, providing critical shade and habitat for birds." },
{ name:"Mahogany", country:"Haiti", lat:19.0, lng:-72.0, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Swietenia_mahagoni.jpg/640px-Swietenia_mahagoni.jpg", description:"Swietenia mahagoni was once Haiti's most valuable export — Haitian mahogany furnished the palaces of Versailles and the great houses of colonial America. Now virtually extinct in the wild due to centuries of exploitation, Haiti's government is working with international partners to reintroduce mahogany to reforested hillsides." },
{ name:"Vetivert — Vetiver", country:"Haiti", lat:18.3, lng:-73.5, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Chrysopogon_zizanioides.jpg/640px-Chrysopogon_zizanioides.jpg", description:"Chrysopogon zizanioides roots grow straight down up to 3m — making it the world's most effective erosion control plant. Haiti supplies over 70% of the world's vetiver essential oil used in luxury perfumes including Chanel and Guerlain. Its deep roots hold Haiti's fragile hillside soils together against tropical rains." },

// 🇭🇳 HONDURAS
{ name:"Orchid — Rhyncholaelia digbyana", country:"Honduras", lat:14.1, lng:-87.2, type:"Orchid", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rhyncholaelia_digbyana.jpg/640px-Rhyncholaelia_digbyana.jpg", description:"Rhyncholaelia digbyana is Honduras's national flower — a spectacular orchid producing enormous white flowers with a dramatically fringed lip. Found in Honduras's dry forest canopies, it has been used extensively in orchid breeding to create the fringed lip of modern Cattleya hybrids. Its night fragrance is extraordinary." },
{ name:"Honduran Mahogany", country:"Honduras", lat:15.5, lng:-86.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Swietenia_macrophylla.jpg/640px-Swietenia_macrophylla.jpg", description:"Swietenia macrophylla built colonial Honduras — mahogany logging dominated the economy for 300 years. Honduras's Río Plátano Biosphere Reserve protects the largest remaining mahogany population in Central America. CITES Appendix II listing has slowed but not stopped illegal logging of this iconic timber tree." },
{ name:"Ceiba", country:"Honduras", lat:15.0, lng:-87.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra is Honduras's national tree, sacred to the Maya Chortí people as the cosmic axis connecting all worlds. Ancient ceibas mark the sites of pre-Columbian settlements across Honduras. The ruins of Copán — one of the Maya world's greatest cities — are surrounded by ancient ceiba groves." },
{ name:"Guanacaste", country:"Honduras", lat:13.8, lng:-87.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Enterolobium_cyclocarpum.jpg/640px-Enterolobium_cyclocarpum.jpg", description:"Enterolobium cyclocarpum, the ear pod tree, produces distinctive ear-shaped seed pods and a massive spreading canopy up to 50m wide — the largest canopy of any Central American tree. Honduras's Pacific dry forests once rang with the sound of falling guanacaste pods. Its timber is used for dugout canoes." },
{ name:"Honduras Rosewood", country:"Honduras", lat:15.8, lng:-84.5, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dalbergia_stevensonii.jpg/640px-Dalbergia_stevensonii.jpg", description:"Dalbergia stevensonii produces one of the world's most prized tonewoods — used for marimba keys and guitar backs. Honduras rosewood produces notes of extraordinary clarity and resonance. Now critically endangered from over-harvesting, it is protected under CITES Appendix II and its export is strictly controlled." },

// 🇭🇰 HONG KONG SAR, CHINA
{ name:"Bauhinia — Hong Kong Orchid Tree", country:"Hong Kong SAR, China", lat:22.3, lng:114.2, type:"Tree", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Bauhinia_blakeana.jpg/640px-Bauhinia_blakeana.jpg", description:"Bauhinia blakeana is Hong Kong's most iconic symbol — its magenta flower appears on the city's flag and coins. Discovered on the shores of Hong Kong Island in 1880, this hybrid tree is sterile and all specimens worldwide are clones of the original. It blooms from November through March filling Hong Kong's streets with colour." },
{ name:"Hong Kong Camellia", country:"Hong Kong SAR, China", lat:22.4, lng:114.1, type:"Shrub", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Camellia_hongkongensis.jpg/640px-Camellia_hongkongensis.jpg", description:"Camellia hongkongensis is endemic to Hong Kong, found only in a handful of hillside forest patches in the New Territories. Its scarlet flowers are unique among camellias. With fewer than 300 wild plants remaining, it is one of Hong Kong's rarest plants and the subject of an intensive conservation breeding program." },
{ name:"Hong Kong Gordonia", country:"Hong Kong SAR, China", lat:22.5, lng:114.0, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Gordonia_axillaris.jpg/640px-Gordonia_axillaris.jpg", description:"Gordonia axillaris blooms in Hong Kong's country parks each winter with large white camellia-like flowers. Hong Kong's country parks — covering 40% of its land area — protect extraordinary biodiversity surprising for such a dense metropolis. This tree is a symbol of Hong Kong's commitment to preserving natural landscapes." },
{ name:"Incense Tree — Aquilaria", country:"Hong Kong SAR, China", lat:22.2, lng:114.3, type:"Tree", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Aquilaria_sinensis.jpg/640px-Aquilaria_sinensis.jpg", description:"Aquilaria sinensis gave Hong Kong — Heung Gong, Fragrant Harbour — its very name. The tree produces agarwood when infected by fungi — one of the world's most expensive natural substances, worth more than gold by weight. Wild trees were poached to near-extinction but Hong Kong's country parks now protect significant populations." },
{ name:"Fan Palm — Livistona", country:"Hong Kong SAR, China", lat:22.4, lng:114.2, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Livistona_chinensis.jpg/640px-Livistona_chinensis.jpg", description:"Livistona chinensis, the Chinese fan palm, grows wild in Hong Kong's Fung Yuen and Lam Tsuen valleys. Its enormous fan-shaped leaves were used to make the traditional Chinese handheld fans exported globally for centuries. Hong Kong's wild fan palm valleys are now protected nature reserves open to hikers." },

// 🇭🇺 HUNGARY
{ name:"Hungarian Meadow Sage", country:"Hungary", lat:47.5, lng:19.0, type:"Wildflower", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Salvia_nemorosa.jpg/640px-Salvia_nemorosa.jpg", description:"Salvia nemorosa turns Hungary's remaining steppe grasslands — puszta — vivid violet-blue each June. Hungary's ancient alkaline grasslands are among Europe's most threatened ecosystems. These flower-rich steppes inspired the Hungarian composer Liszt and are the spiritual heartland of Magyar cultural identity." },
{ name:"Hungarian Oak", country:"Hungary", lat:47.0, lng:18.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Quercus_frainetto.jpg/640px-Quercus_frainetto.jpg", description:"Quercus frainetto, the Hungarian or Italian oak, forms magnificent forests across Hungary's hills. Its deeply lobed leaves are among the most distinctive of any European oak. Hungary's Zemplén Hills host ancient Hungarian oak forests where rural communities have collected truffles beneath the trees for generations." },
{ name:"Tulip", country:"Hungary", lat:47.8, lng:18.2, type:"Bulb", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tulipa_gesneriana.jpg/640px-Tulipa_gesneriana.jpg", description:"Tulipa gesneriana was introduced to Western Europe via the Ottoman Empire through Hungary in the 16th century — sparking Tulipmania, history's first recorded speculative financial bubble. Hungarian folk art features tulips on virtually every painted chest, embroidered textile and ceramic piece as the quintessential Hungarian decorative motif." },
{ name:"Pulsatilla — Pasque Flower", country:"Hungary", lat:47.3, lng:19.5, type:"Wildflower", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Anemone_patens.jpg/640px-Anemone_patens.jpg", description:"Pulsatilla grandis is one of Hungary's most legally protected wildflowers, blooming on sandy grasslands each March in vivid violet. Hungary's Kiskunság National Park hosts one of Central Europe's last great pasque flower meadows. Hungarian botanists conduct annual population counts as the species declines across its range." },
{ name:"Tokaj Grape — Furmint", country:"Hungary", lat:48.1, lng:21.4, type:"Vine", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Vitis_vinifera_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-277.jpg/640px-Vitis_vinifera_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-277.jpg", description:"Furmint is the primary grape of Tokaj — Hungary's legendary wine region and UNESCO World Heritage Site. Tokaji Aszú, made from botrytised furmint grapes, was called the wine of kings and the king of wines by Louis XIV. Peter the Great of Russia stationed Cossacks in Tokaj permanently to ensure his supply." },

// 🇮🇸 ICELAND
{ name:"Arctic Poppy", country:"Iceland", lat:65.0, lng:-18.0, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Papaver_radicatum.jpg/640px-Papaver_radicatum.jpg", description:"Papaver radicatum is one of Iceland's hardiest wildflowers, blooming in vivid yellow on volcanic lava fields and glacial moraines. Its cup-shaped flowers track the sun throughout Iceland's 24-hour summer days — a behaviour called solar tracking that maximises warmth for pollinating insects in the cold Arctic climate." },
{ name:"Arctic Thyme", country:"Iceland", lat:64.5, lng:-19.5, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Thymus_praecox.jpg/640px-Thymus_praecox.jpg", description:"Thymus praecox carpets Iceland's lava fields and heathlands in fragrant pink-purple mats each summer. Icelanders have used arctic thyme — blóðberg — medicinally for centuries and it is brewed as a traditional tea. Its essential oils are exceptionally potent due to Iceland's extreme UV radiation and cold temperatures." },
{ name:"Crowberry", country:"Iceland", lat:65.5, lng:-20.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Empetrum_nigrum.jpg/640px-Empetrum_nigrum.jpg", description:"Empetrum nigrum is Iceland's most abundant berry plant, covering vast heathlands in glossy black berries. Called krækiber in Icelandic, they were a vital food source for early Norse settlers. Viking sagas mention crowberries as trail food. Today they are used in Icelandic schnapps and jam production." },
{ name:"Angelica", country:"Iceland", lat:64.1, lng:-21.9, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Angelica_archangelica.jpg/640px-Angelica_archangelica.jpg", description:"Angelica archangelica grows in lush stands across Iceland's river valleys and was one of the most important plants for Norse settlers — eaten raw, cooked and used medicinally. Medieval Icelandic law codes specifically protected angelica patches as common property. It remains a beloved Icelandic wild food today." },
{ name:"Birch — Icelandic Birch", country:"Iceland", lat:65.3, lng:-17.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Betula_pendula_Moscow.jpg/640px-Betula_pendula_Moscow.jpg", description:"Betula pubescens is Iceland's only native tree — forming low scrubby woodland in sheltered valleys. When Vikings arrived in 874 AD they found Iceland covered in birch forest. Within 200 years of settlement, over 95% was cleared for fuel and grazing. Iceland is now replanting birch forests as a national carbon sequestration project." },

// 🇮🇳 INDIA
{ name:"Sacred Lotus", country:"India", lat:28.6, lng:77.2, type:"Aquatic Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Nelumbo_nucifera_MS_4967.jpg/640px-Nelumbo_nucifera_MS_4967.jpg", description:"Nelumbo nucifera is India's national flower — sacred in both Hinduism and Buddhism as a symbol of divine beauty emerging from muddy water. The goddess Lakshmi sits on a lotus. India's parliament building is shaped like a lotus. Every part is used — seeds eaten, roots cooked, leaves used as plates and flowers offered at temples." },
{ name:"Banyan Tree", country:"India", lat:22.6, lng:88.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Banyan_tree.jpg/640px-Banyan_tree.jpg", description:"Ficus benghalensis is India's national tree — a single banyan can spread over several hectares through its aerial roots that become new trunks. The Great Banyan in Kolkata's botanical garden covers 1.5 hectares and is considered the world's largest tree by canopy area. The name banyan comes from Gujarati traders who sheltered beneath them." },
{ name:"Teak", country:"India", lat:11.0, lng:76.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tectona_grandis.jpg/640px-Tectona_grandis.jpg", description:"Tectona grandis is native to India's Western Ghats and central Indian forests. India has been the world's primary source of teak for centuries — used for shipbuilding, furniture and construction across Asia and Europe. Its oily timber is so durable that Indian teak beams in 2,000-year-old temples remain perfectly sound today." },
{ name:"Sandalwood", country:"India", lat:12.3, lng:76.7, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Santalum_album.jpg/640px-Santalum_album.jpg", description:"Santalum album from Karnataka's Mysore region produces the world's finest sandalwood — its heartwood more valuable than most precious metals. Used for 4,000 years in Indian religious ceremonies, Ayurvedic medicine and perfumery. All sandalwood trees in Karnataka are legally owned by the state government." },
{ name:"Indian Tulip Tree", country:"India", lat:13.1, lng:80.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Thespesia_populnea.jpg/640px-Thespesia_populnea.jpg", description:"Thespesia populnea lines India's tropical coastlines from Gujarat to Bengal. Sacred to Vishnu, its flowers are offered at temples across southern India. Gandhi spun cloth under a portia tree during the independence movement. Its timber was used to build traditional Indian fishing boats called kattumaram — the original catamaran." },

// 🇮🇩 INDONESIA
{ name:"Rafflesia arnoldii", country:"Indonesia", lat:3.1, lng:101.7, type:"Holoparasite", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rafflesia_arnoldii.jpg/640px-Rafflesia_arnoldii.jpg", description:"The world's largest individual flower, measuring up to 1m across and weighing 11kg. It has no roots, stems or leaves — a complete internal parasite of Tetrastigma vines, only visible when blooming. Its carrion odour attracts flies as pollinators. Indonesia has the highest Rafflesia diversity of any country on Earth." },
{ name:"Titan Arum", country:"Indonesia", lat:-0.5, lng:101.3, type:"Aroid", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c4/Amorphophallus_titanum.jpg/640px-Amorphophallus_titanum.jpg", description:"Produces the world's largest unbranched inflorescence — up to 3m tall — emitting the odour of rotting flesh to attract pollinators. Endemic to Sumatra's lowland rainforest, it blooms unpredictably, sometimes only once per decade. Each blooming event draws thousands of visitors to botanical gardens worldwide." },
{ name:"Pitcher Plant — Nepenthes rajah", country:"Indonesia", lat:5.0, lng:117.0, type:"Carnivorous Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Nepenthes_rajah1.jpg/640px-Nepenthes_rajah1.jpg", description:"The world's largest carnivorous plant, with pitchers holding up to 3.5 litres of digestive fluid. Found on Borneo's Mount Kinabalu, large pitchers regularly trap and digest rats, frogs and small lizards. Its relationship with tree shrews — which defecate into the pitchers for nutrients — is one of nature's most extraordinary partnerships." },
{ name:"Jati — Teak", country:"Indonesia", lat:-7.5, lng:110.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tectona_grandis.jpg/640px-Tectona_grandis.jpg", description:"Tectona grandis has been cultivated in Java for over 400 years — Indonesia is the world's largest teak producer. Javanese teak furniture is exported globally. The Dutch colonial teak plantations of Java established in the 17th century are still productive today, making them the world's oldest continuously managed tropical timber forests." },
{ name:"Meranti", country:"Indonesia", lat:0.5, lng:111.5, type:"Tree", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Shorea_robusta.jpg/640px-Shorea_robusta.jpg", description:"Shorea species — collectively called meranti — are the dominant trees of Indonesia's Borneo and Sumatra rainforests. Their mass synchronised flowering events — called mast fruiting — occur every 2–10 years and feed orangutans, hornbills and sun bears. Meranti forests store more carbon per hectare than virtually any ecosystem on Earth." },

// 🇮🇷 IRAN
{ name:"Persian Silk Tree", country:"Iran", lat:35.7, lng:51.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Albizia_julibrissin.jpg/640px-Albizia_julibrissin.jpg", description:"Albizia julibrissin, the Persian silk tree, is native to Iran's Caspian forests. Its feathery pink pompom flowers and delicate fernlike leaves inspired Persian garden design for millennia. The Persian chahar bagh — four-part garden — tradition that spread across the Islamic world always featured the silk tree as a focal point." },
{ name:"Saffron Crocus", country:"Iran", lat:36.3, lng:59.6, type:"Bulb", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Crocus_sativus_closeup.jpg/640px-Crocus_sativus_closeup.jpg", description:"Iran produces over 90% of the world's saffron in the Khorasan region around Mashhad. Crocus sativus has been cultivated in Persia for over 3,000 years — ancient Persian kings carpeted their chambers with saffron. Iranian saffron's deep red threads and extraordinary aroma make it the global benchmark for quality." },
{ name:"Persian Oak", country:"Iran", lat:33.5, lng:48.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Quercus_brantii.jpg/640px-Quercus_brantii.jpg", description:"Quercus brantii forms the vast Zagros oak forests of western Iran — one of the Middle East's most important ecosystems. These ancient forests were the cradle of early human agriculture. Iranian Zagros oaks produce huge acorn crops eaten by brown bears, wild boar and Persian squirrels in one of Asia's last great wildwood landscapes." },
{ name:"Damask Rose", country:"Iran", lat:30.0, lng:55.0, type:"Shrub", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_damascena.jpg/640px-Rosa_damascena.jpg", description:"Rosa damascena has been cultivated in Iran's Kashan region for over 2,000 years. Iran is the world's largest producer of rose water — used in Persian cuisine, medicine and religious ceremonies. The annual rose harvest festival in Kashan draws thousands of visitors to watch the predawn picking of millions of pink blooms." },
{ name:"Pomegranate", country:"Iran", lat:32.5, lng:53.7, type:"Fruit Tree", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Pomegranate_fruit.jpg/640px-Pomegranate_fruit.jpg", description:"Punica granatum is believed to have originated in Iran and has been cultivated there for over 4,000 years. The pomegranate appears throughout Persian art, poetry and mythology as a symbol of fertility and eternal life. Iran has over 760 named pomegranate varieties — more genetic diversity than any other country on Earth." },

// 🇮🇶 IRAQ
{ name:"Date Palm", country:"Iraq", lat:33.3, lng:44.4, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Phoenix_dactylifera_2.jpg/640px-Phoenix_dactylifera_2.jpg", description:"Phoenix dactylifera is Iraq's most sacred and ancient tree — Mesopotamia was called the land of date palms for 5,000 years. Iraq once had 30 million date palms producing two thirds of the world's dates. Wars and salinization reduced this to 3 million trees. Iraq is now replanting millions of palms to restore its ancient groves." },
{ name:"Mesopotamian Poplar", country:"Iraq", lat:31.5, lng:47.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Populus_euphratica.jpg/640px-Populus_euphratica.jpg", description:"Populus euphratica is the only poplar adapted to desert conditions, growing along the Tigris and Euphrates rivers. Its leaves change shape dramatically as the tree ages — narrow on young shoots, broadly oval on mature branches. Ancient Sumerian texts mention this tree and it appears in the world's oldest written story — the Epic of Gilgamesh." },
{ name:"Oriental Plane", country:"Iraq", lat:36.0, lng:43.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Platanus_orientalis.jpg/640px-Platanus_orientalis.jpg", description:"Platanus orientalis grows along Iraq's northern mountain streams in the Kurdistan region. Ancient Persian kings planted plane tree avenues across their empire. Hippocrates is said to have taught medicine under a plane tree on Kos. Some specimens in the Zagros foothills of Iraqi Kurdistan are estimated at over 2,000 years old." },
{ name:"Liquorice", country:"Iraq", lat:32.5, lng:44.0, type:"Herb", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Glycyrrhiza_glabra.jpg/640px-Glycyrrhiza_glabra.jpg", description:"Glycyrrhiza glabra grows wild along Iraq's Tigris and Euphrates floodplains. Iraq was historically the world's largest liquorice exporter — its root 50 times sweeter than sugar. Ancient Assyrian and Babylonian medical texts prescribed liquorice root for dozens of conditions. Iraq's marshland liquorice is now threatened by drainage and drought." },
{ name:"Tamarisk", country:"Iraq", lat:31.0, lng:46.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tamarix_ramosissima.jpg/640px-Tamarix_ramosissima.jpg", description:"Tamarix species line Iraq's rivers and marshes in feathery pink-flowered thickets. In the Iraqi marshes — the biblical Garden of Eden — tamarisk provided building material and fuel for the Marsh Arabs for millennia. Some species exude salt from their leaves, creating white crystalline crusts that ancient Mesopotamians harvested as seasoning." },

// 🇮🇪 IRELAND
{ name:"Shamrock", country:"Ireland", lat:53.3, lng:-6.3, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Trifolium_repens.jpg/640px-Trifolium_repens.jpg", description:"Trifolium repens, white clover, is Ireland's national emblem — St Patrick used its three leaves to explain the Holy Trinity to pagan Irish chiefs. The tradition of wearing shamrock on St Patrick's Day has been observed since the 17th century. Ireland's President sends shamrock to world leaders every March 17th." },
{ name:"Sessile Oak", country:"Ireland", lat:52.0, lng:-9.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Quercus_robur_27_09_2011_Ls.jpg/640px-Quercus_robur_27_09_2011_Ls.jpg", description:"Quercus petraea once covered Ireland in ancient oakwood — Derry means oak grove in Irish. Ireland's ancient oak forests inspired Celtic spirituality and Druidic tradition. The last fragments at Killarney and Glengarriff are now National Nature Reserves. Irish bog oak preserved underground for thousands of years is carved into jewellery." },
{ name:"Bog Cotton", country:"Ireland", lat:53.8, lng:-8.5, type:"Sedge", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Eriophorum_angustifolium.jpg/640px-Eriophorum_angustifolium.jpg", description:"Eriophorum angustifolium turns Ireland's vast blanket bogs white with its fluffy cotton heads each spring — one of the island's most evocative landscapes. Ireland has 20% of Europe's remaining blanket bog. Bog cotton's white seed heads were used to stuff pillows and dress wounds in Irish folk medicine." },
{ name:"Strawberry Tree", country:"Ireland", lat:51.9, lng:-9.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Arbutus_unedo.jpg/640px-Arbutus_unedo.jpg", description:"Arbutus unedo grows wild only in Ireland's Kerry and west Cork — one of the most botanically mysterious distributions in Europe. A Mediterranean species whose Irish population is an Ice Age relict. Its simultaneous white flowers and strawberry-like red fruits make it unique among European trees. Kerry locals make arbutus berry wine." },
{ name:"Fuchsia", country:"Ireland", lat:52.1, lng:-9.7, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Fuchsia_magellanica.jpg/640px-Fuchsia_magellanica.jpg", description:"Fuchsia magellanica — originally from Chile — has naturalised so thoroughly along Ireland's west coast hedgerows that most Irish people consider it native. The mild Gulf Stream climate allows it to grow into 3m hedges dripping with crimson and purple flowers all summer. It is the unofficial flower of County Kerry." },

// 🇮🇹 ITALY
{ name:"Olive Tree", country:"Italy", lat:40.8, lng:17.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"Olea europaea has been cultivated in Italy for over 3,000 years. Puglia's ancient olive groves contain trees over 4,000 years old — the oldest living organisms in Europe. Italy produces the world's second largest olive oil harvest. The Puglia Xylella fastidiosa epidemic has killed millions of ancient olive trees in a devastating ongoing crisis." },
{ name:"Italian Stone Pine", country:"Italy", lat:41.9, lng:12.5, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_pinea.jpg/640px-Pinus_pinea.jpg", description:"Pinus pinea defines the Roman landscape — its unmistakable umbrella canopy silhouetted against Mediterranean skies inspired Respighi's Pines of Rome. Romans harvested its pine nuts for cooking 2,000 years ago — the same recipes survive in modern Italian cuisine. Pine nut pesto from Liguria is made from this tree's seeds." },
{ name:"Edelweiss", country:"Italy", lat:45.8, lng:7.0, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Leontopodium_alpinum_-_edelweiss.jpg/640px-Leontopodium_alpinum_-_edelweiss.jpg", description:"Leontopodium alpinum grows on Italy's highest Alpine ridges in the Aosta Valley and Dolomites above 1,800m. The Italian Alpine troops — Alpini — wear edelweiss on their famous felt hats as their regimental symbol. Strictly protected by Italian law, it is the emblem of Gran Paradiso National Park." },
{ name:"Bergamot Orange", country:"Italy", lat:38.1, lng:15.7, type:"Citrus Tree", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Citrus_bergamia.jpg/640px-Citrus_bergamia.jpg", description:"Citrus bergamia grows almost exclusively in a narrow coastal strip around Reggio Calabria in Italy's toe. Its fragrant rind produces bergamot oil — the essential ingredient of Earl Grey tea and one of perfumery's most important raw materials. 90% of the world's bergamot comes from this single small Italian region." },
{ name:"Gentian", country:"Italy", lat:46.5, lng:10.5, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gentiana_lutea.jpg/640px-Gentiana_lutea.jpg", description:"Gentiana lutea grows across Italy's Alpine and Apennine meadows. Its intensely bitter root is the basis of Aperol, Campari and dozens of Italian digestivi that have shaped global cocktail culture. Harvesting wild gentian in Italy requires a licence and strict quotas to prevent the overextraction that devastated populations in past centuries." },

// 🇯🇲 JAMAICA
{ name:"Lignum Vitae", country:"Jamaica", lat:18.1, lng:-77.3, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Guaiacum_officinale.jpg/640px-Guaiacum_officinale.jpg", description:"Guaiacum officinale is Jamaica's national flower and one of the world's hardest and densest woods — so heavy it sinks in water. Its stunning blue flowers bloom year-round. Jamaica's coat of arms features lignum vitae. The wood was used for ship propeller shafts, bowling balls and self-lubricating bearings in industrial machinery." },
{ name:"Blue Mahoe", country:"Jamaica", lat:18.0, lng:-76.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hibiscus_elatus.jpg/640px-Hibiscus_elatus.jpg", description:"Hibiscus elatus is Jamaica's national tree, endemic to the island. Its flowers change colour dramatically throughout the day — opening yellow at dawn, turning orange by midday and deep crimson by evening. Its timber has striking blue-green streaks making it one of the Caribbean's most beautiful cabinet woods." },
{ name:"Ackee", country:"Jamaica", lat:18.0, lng:-76.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Blighia_sapida.jpg/640px-Blighia_sapida.jpg", description:"Blighia sapida is Jamaica's national fruit, brought from West Africa on slave ships in the 18th century. Ackee and saltfish is Jamaica's national dish. The fruit must be naturally opened before eating — unripe ackee contains hypoglycin A, a toxin that causes Jamaican vomiting sickness. Named after Captain Bligh of the Bounty." },
{ name:"Jamaican Orchid", country:"Jamaica", lat:18.2, lng:-77.5, type:"Orchid", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Broughtonia_sanguinea.jpg/640px-Broughtonia_sanguinea.jpg", description:"Broughtonia sanguinea is endemic to Jamaica, producing brilliant crimson flowers on rocky limestone cliffs and tree branches across the island. Used extensively in orchid hybridisation to create compact bright-flowered hybrids. Jamaica's limestone forests host over 200 native orchid species — extraordinary diversity for a single island." },
{ name:"Pimento — Allspice", country:"Jamaica", lat:18.3, lng:-77.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pimenta_dioica.jpg/640px-Pimenta_dioica.jpg", description:"Pimenta dioica is native to Jamaica and the Caribbean — its berries taste simultaneously of cloves, cinnamon, nutmeg and pepper, giving it the name allspice. Jamaica produces over 90% of the world's allspice. The wood is burned to smoke jerk chicken — Jamaica's most iconic dish — imparting an irreplaceable flavour." },

// 🇯🇵 JAPAN
{ name:"Cherry Blossom — Sakura", country:"Japan", lat:35.7, lng:139.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Sakura_-_Ueno_Park.jpg/640px-Sakura_-_Ueno_Park.jpg", description:"Prunus serrulata is Japan's national flower, blooming for only two weeks each spring in one of nature's most celebrated events. The tradition of hanami — flower viewing — has been practiced since the 8th century. Japan's meteorological agency issues daily sakura front forecasts. Over 200 cultivated varieties exist across the archipelago." },
{ name:"Japanese Cedar — Sugi", country:"Japan", lat:35.4, lng:136.8, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cryptomeria_japonica.jpg/640px-Cryptomeria_japonica.jpg", description:"Cryptomeria japonica is Japan's national tree, forming magnificent ancient forests on Yakushima Island — some trees over 7,200 years old, among the oldest living organisms on Earth. Its aromatic timber has been used for Japanese temple construction for 1,400 years. Jomon Sugi on Yakushima is a UNESCO World Heritage tree." },
{ name:"Wisteria — Fuji", country:"Japan", lat:36.3, lng:139.5, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/Wisteria_sinensis_at_Giverny.jpg/640px-Wisteria_sinensis_at_Giverny.jpg", description:"Wisteria floribunda is one of Japan's most beloved flowering plants. The 150-year-old wisteria at Ashikaga Flower Park creates a cascading violet canopy over 1,000m² each April. Japanese wisteria can live for centuries — some temple specimens are over 1,200 years old. Its flowers are eaten as tempura across Japan." },
{ name:"Bamboo — Moso", country:"Japan", lat:35.0, lng:135.5, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Bamboo_garden.jpg/640px-Bamboo_garden.jpg", description:"Phyllostachys edulis is Japan's most important bamboo species, its shoots eaten as a spring delicacy and its timber used for everything from chopsticks to building scaffolding. Japan's ancient bamboo groves — like Arashiyama in Kyoto — are among the most photographed landscapes in Asia." },
{ name:"Japanese Maple — Momiji", country:"Japan", lat:35.0, lng:135.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Acer_palmatum.jpg/640px-Acer_palmatum.jpg", description:"Acer palmatum turns Japan's autumn into a spectacle of crimson, orange and gold — the tradition of momiji-gari, autumn leaf viewing, is as important to Japanese culture as cherry blossom season. Over 1,000 cultivated varieties exist. Japanese maple has become one of the world's most popular ornamental trees, grown in gardens globally." },

// 🇯🇴 JORDAN
{ name:"Black Iris", country:"Jordan", lat:31.9, lng:35.9, type:"Iris", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Iris_nigricans.jpg/640px-Iris_nigricans.jpg", description:"Iris nigricans is Jordan's national flower — a striking deep purple-black iris blooming across Jordan's northern highlands each spring. Found in the hills around Ajloun and Jerash, it grows among the ruins of ancient Roman cities. Jordan declared it the national flower to raise awareness of its declining wild populations." },
{ name:"Jordanian Oak", country:"Jordan", lat:32.5, lng:35.7, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Quercus_ithaburensis.jpg/640px-Quercus_ithaburensis.jpg", description:"Quercus ithaburensis, the Tabor oak, forms Jordan's most important remaining natural forests in Ajloun — the green lung of an otherwise arid country. These oak forests are mentioned in the Bible and have been sacred gathering places for Jordanian communities for millennia. They shelter one of the Middle East's last wild wolf populations." },
{ name:"Atlantic Pistachio", country:"Jordan", lat:30.5, lng:35.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pistacia_atlantica.jpg/640px-Pistacia_atlantica.jpg", description:"Pistacia atlantica grows across Jordan's highlands and Wadi Rum desert margins. Ancient Nabataean traders harvested its resin along the incense route that passed through Petra. Jordan's Dana Biosphere Reserve protects significant pistachio woodland in one of the Middle East's most important conservation areas." },
{ name:"Oleander", country:"Jordan", lat:31.5, lng:35.8, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Nerium_oleander.jpg/640px-Nerium_oleander.jpg", description:"Nerium oleander lines Jordan's wadis and riverbeds in spectacular pink and white blooms. Despite being one of the most toxic plants in the world — every part deadly if consumed — it is planted throughout Jordan's cities for its drought tolerance and beauty. Ancient Romans used oleander in warfare, poisoning enemy water supplies." },
{ name:"Rockrose", country:"Jordan", lat:32.0, lng:36.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cistus_creticus.jpg/640px-Cistus_creticus.jpg", description:"Cistus creticus covers Jordan's northern hillsides in pink papery flowers each spring. Its resin — labdanum — has been harvested since ancient times as one of the oldest perfume ingredients in the world. Ancient Egyptians imported Jordanian labdanum for incense and embalming. It remains a key ingredient in modern oriental perfumes." },

// 🇰🇿 KAZAKHSTAN
{ name:"Wild Apple — Malus sieversii", country:"Kazakhstan", lat:43.0, lng:76.9, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Malus_sieversii.jpg/640px-Malus_sieversii.jpg", description:"Malus sieversii is the wild ancestor of every apple on Earth — all 7,500 cultivated varieties descended from this single Kazakh forest tree. The Tian Shan mountains of southeastern Kazakhstan are the original homeland of the apple. Almaty — Kazakhstan's largest city — means Father of Apples in Kazakh." },
{ name:"Tulip — Greig's Tulip", country:"Kazakhstan", lat:42.5, lng:69.5, type:"Bulb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tulipa_greigii.jpg/640px-Tulipa_greigii.jpg", description:"Tulipa greigii is one of Kazakhstan's most spectacular wild tulips, carpeting the Tian Shan foothills in brilliant red each spring. Kazakhstan is the primary centre of wild tulip diversity — over 35 species grow here. All modern garden tulips trace their ancestry to Central Asian wild species like this one." },
{ name:"Saxaul Tree", country:"Kazakhstan", lat:44.0, lng:59.0, type:"Tree", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Haloxylon_ammodendron.jpg/640px-Haloxylon_ammodendron.jpg", description:"Haloxylon ammodendron is the primary tree of Kazakhstan's vast Kyzylkum and Karakum deserts. Its twisted, leafless branches photosynthesize through green bark. Saxaul forests stabilise desert sands and their dense wood — which burns like coal — has been the primary fuel for Central Asian nomads for millennia." },
{ name:"Feather Grass", country:"Kazakhstan", lat:49.5, lng:61.0, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Stipa_pennata.jpg/640px-Stipa_pennata.jpg", description:"Stipa pennata waves across Kazakhstan's vast steppe in silver-white plumes — one of Earth's most dramatic grassland landscapes. Kazakhstan's Eurasian steppe is the world's largest grassland ecosystem. Feather grass seeds have a remarkable self-planting mechanism — their twisted awns drill the seed into the soil as humidity changes." },
{ name:"Licorice — Wild Glycyrrhiza", country:"Kazakhstan", lat:45.0, lng:63.0, type:"Herb", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Glycyrrhiza_glabra.jpg/640px-Glycyrrhiza_glabra.jpg", description:"Glycyrrhiza uralensis grows wild across Kazakhstan's steppes and river valleys. Kazakhstan has the world's largest wild licorice reserves. Its root — 50 times sweeter than sugar — has been used in Central Asian medicine for 5,000 years. Kazakhstan exports wild licorice root to pharmaceutical and confectionery industries globally." },

// 🇰🇪 KENYA
{ name:"African Violet", country:"Kenya", lat:-0.5, lng:37.0, type:"Wildflower", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Saintpaulia_ionantha.jpg/640px-Saintpaulia_ionantha.jpg", description:"Saintpaulia species are native to Kenya's and Tanzania's Eastern Arc Mountains. The African violet — one of the world's most popular houseplants with over 2 billion sold annually — was discovered on Kenya's Taita Hills in 1892. Wild populations are critically threatened by deforestation of their cloud forest habitat." },
{ name:"Whistling Thorn Acacia", country:"Kenya", lat:-1.3, lng:36.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Vachellia_drepanolobium.jpg/640px-Vachellia_drepanolobium.jpg", description:"Vachellia drepanolobium dominates Kenya's black cotton soils in the Laikipia plateau. Its hollow thorns are inhabited by four competing ant species that fiercely defend the tree. When wind blows through the thorns it creates an eerie whistling. Giraffes feed exclusively on this tree's leaves, their long tongues navigating the fierce spines." },
{ name:"Leleshwa", country:"Kenya", lat:-1.0, lng:36.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tarchonanthus_camphoratus.jpg/640px-Tarchonanthus_camphoratus.jpg", description:"Tarchonanthus camphoratus, the leleshwa or camphor bush, fills Kenya's Rift Valley with its distinctive medicinal scent. Maasai warriors use its aromatic leaves to cleanse wounds and repel insects. The fluffy white seed heads inspired the Maasai name — leleshwa means 'that which floats in the wind.'" },
{ name:"Giant Lobelia", country:"Kenya", lat:0.1, lng:37.3, type:"Alpine Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Lobelia_deckenii.jpg/640px-Lobelia_deckenii.jpg", description:"Lobelia telekii grows on Mount Kenya's afroalpine zone above 4,000m, its towering flower spike rising up to 6m. The water trapped in its rosette leaves stays several degrees warmer than the surrounding air — a built-in antifreeze system. Mount Kenya's giant lobelias are found nowhere else on Earth." },
{ name:"Baobab", country:"Kenya", lat:-3.5, lng:39.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata grows along Kenya's Coast Province, some trees over 1,000 years old. The famous Shimba Hills baobabs were landmarks for Arab traders navigating the East African coast for centuries. Kenya's coastal Mijikenda communities consider ancient baobabs sacred — burial sites of ancestors and homes of protective spirits." },

// 🇰🇮 KIRIBATI
{ name:"Te Kai — Breadfruit", country:"Kiribati", lat:1.4, lng:173.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis, called te kai in Gilbertese, is the dietary cornerstone of Kiribati. On low-lying atolls with minimal agricultural land, breadfruit trees provide essential carbohydrates year-round. As climate change threatens to inundate Kiribati's islands, breadfruit preservation programs are critical to the nation's food sovereignty." },
{ name:"Coconut Palm — Te Ni", country:"Kiribati", lat:1.3, lng:172.9, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is the foundation of I-Kiribati civilisation — providing food, drink, building material, rope and cooking fuel on atolls where almost nothing else grows. Copra — dried coconut flesh — is Kiribati's only significant export. Rising sea levels are salinating the freshwater lens that coconut palms depend on." },
{ name:"Pandanus — Te Bero", country:"Kiribati", lat:1.5, lng:173.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pandanus_tectorius.jpg/640px-Pandanus_tectorius.jpg", description:"Pandanus tectorius is essential to I-Kiribati life — its leaves woven into mats, baskets, fans and the traditional te bwai headwear. Its prop roots stabilise atoll soils against wave erosion. The starchy fruit is eaten in times of food scarcity. As Kiribati faces inundation, pandanus is among the last trees left standing." },
{ name:"Mangrove — Te Tongo", country:"Kiribati", lat:1.2, lng:172.8, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Mangrove_trees.jpg/640px-Mangrove_trees.jpg", description:"Mangrove forests on Kiribati's larger islands provide critical coastal protection, fish nurseries and building timber. As the world's most climate-threatened nation — with a mean elevation of just 2m above sea level — Kiribati's mangroves are its last natural defence against the rising Pacific Ocean." },
{ name:"Calophyllum — Te Itai", country:"Kiribati", lat:1.4, lng:173.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Calophyllum_inophyllum.jpg/640px-Calophyllum_inophyllum.jpg", description:"Calophyllum inophyllum is one of the few large native trees of Kiribati's atolls. Its extremely durable timber was used to build the great I-Kiribati canoes — te wa — that navigated thousands of kilometres of open Pacific. Its seed oil was burned in traditional lamps before electricity reached the remote outer islands." },

// 🇽🇰 KOSOVO
{ name:"Kosovo Peony", country:"Kosovo", lat:42.6, lng:21.2, type:"Wildflower", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Paeonia_officinalis.jpg/640px-Paeonia_officinalis.jpg", description:"Paeonia officinalis grows in Kosovo's Šar Mountains and Rugova canyon in magnificent crimson blooms each May. Kosovo's mountain meadows host extraordinary Balkan endemic plant diversity. The peony has been a symbol of healing and protection in Albanian and Serbian folk traditions across the western Balkans for centuries." },
{ name:"Balkan Pine", country:"Kosovo", lat:42.1, lng:20.8, type:"Conifer", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Pinus_heldreichii.jpg/640px-Pinus_heldreichii.jpg", description:"Pinus heldreichii grows on Kosovo's highest limestone peaks in the Šar Mountains. Some specimens are over 1,000 years old. Kosovo's Šar Mountain National Park protects extraordinary Balkan endemic biodiversity including these ancient pines that have survived Ottoman, Habsburg and Yugoslav rule alike." },
{ name:"Silver Linden", country:"Kosovo", lat:42.7, lng:21.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tilia_tomentosa.jpg/640px-Tilia_tomentosa.jpg", description:"Tilia tomentosa, the silver linden, grows across Kosovo's valleys and is deeply embedded in Kosovo Albanian culture. Its fragrant midsummer flowers fill entire villages with honey scent. Linden flower tea — çaj i blirit — is Kosovo's most consumed herbal drink, drunk for relaxation and as a cold remedy." },
{ name:"Wild Rose — Trëndafili", country:"Kosovo", lat:42.8, lng:20.9, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_canina.jpg/640px-Rosa_canina.jpg", description:"Rosa canina grows across Kosovo's hillsides and hedgerows in pink and white blooms each June. The wild rose — trëndafili in Albanian — is a deeply romantic symbol in Kosovo's folk poetry and song. Its brilliant red rose hips, harvested each autumn, are made into syrup and jam rich in vitamin C." },
{ name:"Gentian", country:"Kosovo", lat:42.2, lng:20.7, type:"Alpine Flower", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gentiana_acaulis.jpg/640px-Gentiana_acaulis.jpg", description:"Gentiana dinarica grows on Kosovo's Šar and Prokletije mountain meadows in intense blue trumpet flowers. The Prokletije — Accursed Mountains — on Kosovo's Albanian border host some of the Western Balkans' most spectacular wildflower meadows. Kosovo's alpine gentians are harvested for traditional herbal medicine across the region." },

// 🇰🇼 KUWAIT
{ name:"Arfaj — Rhanterium", country:"Kuwait", lat:29.4, lng:47.6, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rhanterium_epapposum.jpg/640px-Rhanterium_epapposum.jpg", description:"Rhanterium epapposum is Kuwait's national plant and the most beloved wildflower of the Arabian desert. Each spring it transforms Kuwait's desert into a carpet of yellow. Kuwaitis celebrate the arfaj season with family picnics in the desert. Its aromatic branches are used to make traditional camel saddle padding." },
{ name:"Desert Hyacinth", country:"Kuwait", lat:29.0, lng:47.9, type:"Parasite", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Cistanche_tubulosa.jpg/640px-Cistanche_tubulosa.jpg", description:"Cistanche tubulosa erupts from Kuwait's desert sands each spring as spectacular yellow flower spikes. This holoparasitic plant has no chlorophyll — it attaches to saltbush roots and absorbs all nutrients from its host. Used in Gulf traditional medicine for centuries and now researched as a treatment for Alzheimer's disease." },
{ name:"Sodom Apple", country:"Kuwait", lat:29.3, lng:48.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Calotropis_procera_flowers.jpg/640px-Calotropis_procera_flowers.jpg", description:"Calotropis procera is one of Kuwait's most resilient desert plants, its inflated apple-like fruits visible across barren terrain. Its toxic milky latex deters all grazing animals. Bedouin traditionally used its fibre to make rope and its bark as a fish poison. Despite its toxicity it provides critical habitat for desert insects." },
{ name:"Date Palm", country:"Kuwait", lat:29.4, lng:47.9, type:"Palm", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Phoenix_dactylifera_2.jpg/640px-Phoenix_dactylifera_2.jpg", description:"Phoenix dactylifera has been cultivated in Kuwait for over 5,000 years. Dates are offered to guests at every Kuwaiti home as a symbol of hospitality — breaking the Ramadan fast with dates and water is a religious obligation. Kuwait's rulers historically measured their wealth partly in the number of productive date palms they owned." },
{ name:"Ghaf Tree", country:"Kuwait", lat:29.5, lng:48.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Prosopis_cineraria.jpg/640px-Prosopis_cineraria.jpg", description:"Prosopis cineraria, the ghaf tree, survives Kuwait's extreme desert conditions by sending roots down 30m to reach groundwater. Sacred across the Arabian Peninsula as the tree of life, its pods feed camels and goats during desert droughts. The ghaf is the national tree of the UAE and deeply revered across Gulf cultures." },

// 🇰🇬 KYRGYZSTAN
