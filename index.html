{ name:"Saffron Crocus", country:"Spain", lat:39.5, lng:-3.0, type:"Bulb", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Crocus_sativus_closeup.jpg/640px-Crocus_sativus_closeup.jpg", description:"Crocus sativus has been cultivated in La Mancha since Moorish times — Spanish azafrán with its DO La Mancha protection is the world's second finest saffron. Every autumn La Mancha's fields turn purple with crocus flowers picked by hand before dawn. Saffron colours and flavours paella — Spain's most internationally recognised dish." },
{ name:"Holm Oak — Encina", country:"Spain", lat:40.0, lng:-4.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Quercus_ilex.jpg/640px-Quercus_ilex.jpg", description:"Quercus ilex dominates Spain's central meseta in vast ancient woodlands — the encinar. Spain has more ancient holm oak woodland than any country in Europe. The encina's acorns — bellotas — feed the free-ranging Iberian pigs that produce jamón ibérico. Some Spanish holm oaks are over 1,000 years old — living through the Reconquista, the Inquisition and the Civil War." },
{ name:"Dragon Tree — Drago", country:"Spain", lat:28.3, lng:-16.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Dragon_blood_tree_Socotra.jpg/640px-Dragon_blood_tree_Socotra.jpg", description:"Dracaena draco grows on Spain's Canary Islands — the ancient Drago Milenario of Icod de los Vinos on Tenerife is estimated at over 1,000 years old and is one of Spain's most visited natural monuments. The Guanche people — the Canaries' original inhabitants — used its red dragon's blood resin in mummification ceremonies. Each tree blooms only once in its lifetime." },

// 🇱🇰 SRI LANKA
{ name:"Blue Lotus — Nil Manel", country:"Sri Lanka", lat:7.8, lng:80.7, type:"Aquatic Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Nymphaea_nouchali.jpg/640px-Nymphaea_nouchali.jpg", description:"Nymphaea nouchali is Sri Lanka's national flower — the blue lotus blooming in the island's ancient tanks and wetlands. Sacred in both Buddhism and Hinduism, it appears in ancient Sigiriya frescoes painted 1,600 years ago. Sri Lanka's intricate network of ancient irrigation tanks — built over 2,500 years — sustains the blue lotus populations that define the island's sacred landscape." },
{ name:"Cinnamon — Kurundu", country:"Sri Lanka", lat:6.9, lng:79.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cinnamomum_verum.jpg/640px-Cinnamomum_verum.jpg", description:"Cinnamomum verum is endemic to Sri Lanka — the only source of true Ceylon cinnamon, the world's finest. Sri Lanka produces 90% of the world's true cinnamon. Arab traders kept Ceylon cinnamon's origin secret for centuries — claiming it came from dangerous birds' nests — to maintain their monopoly. Portuguese, Dutch and British colonial powers fought wars to control Sri Lanka's cinnamon trade." },
{ name:"Ceylon Ebony — Calamander", country:"Sri Lanka", lat:7.5, lng:80.5, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Diospyros_quaesita.jpg/640px-Diospyros_quaesita.jpg", description:"Diospyros quaesita is endemic to Sri Lanka — its distinctive striped black and brown heartwood is one of the world's most valuable cabinet timbers. British colonial furniture from Ceylon calamander commanded extraordinary prices in Victorian London. Now critically endangered, Sri Lanka's remaining calamander trees are protected in Sinharaja Forest — the island's last primary rainforest." },
{ name:"Ironwood — Na", country:"Sri Lanka", lat:6.5, lng:80.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mesua_ferrea.jpg/640px-Mesua_ferrea.jpg", description:"Mesua ferrea is Sri Lanka's national tree — sacred in Buddhism as the tree beneath which the next Buddha will achieve enlightenment. Its extraordinarily dense timber sinks in water. Every Sri Lankan Buddhist temple has a na tree in its garden. The fragrant white flowers with golden stamens are offered at shrines across Sri Lanka daily." },
{ name:"Sri Lanka Clove — Karabu", country:"Sri Lanka", lat:6.8, lng:80.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Syzygium_aromaticum.jpg/640px-Syzygium_aromaticum.jpg", description:"Syzygium aromaticum was introduced to Sri Lanka from the Moluccas and has been cultivated in the Kandy hills for centuries. Sri Lankan cloves are used in the island's distinctive cuisine — rice and curry — and in Ayurvedic medicine. Sri Lanka's spice gardens in the Kandy valley — nutmeg, cinnamon, clove and pepper growing together — were the wonder of every colonial traveller." },

// 🇸🇩 SUDAN
{ name:"Gum Arabic — Hashab", country:"Sudan", lat:13.5, lng:30.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Acacia_senegal_MS_4724.jpg/640px-Acacia_senegal_MS_4724.jpg", description:"Senegalia senegal — hashab — is Sudan's most important tree. Sudan produces over 70% of the world's gum arabic — used in soft drinks, confectionery, pharmaceuticals and inks globally. Without Sudanese hashab, Coca-Cola, M&Ms and hundreds of medications could not be manufactured. Sudan's gum belt stretching across the Sahel from Darfur to Kassala is one of Africa's most important ecosystems." },
{ name:"Date Palm — Nagal", country:"Sudan", lat:19.5, lng:32.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Phoenix_dactylifera_2.jpg/640px-Phoenix_dactylifera_2.jpg", description:"Phoenix dactylifera has been cultivated in Sudan for over 5,000 years — ancient Nubian date palm gardens sustained the Kushite and Meroitic civilisations that built Sudan's extraordinary pyramids. Sudan has more ancient pyramids than Egypt. The date palm groves of Karima and Dongola along the Nile are living connections to one of Africa's greatest ancient civilisations." },
{ name:"Nile Papyrus", country:"Sudan", lat:9.5, lng:31.5, type:"Aquatic Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cyperus_papyrus.jpg/640px-Cyperus_papyrus.jpg", description:"Cyperus papyrus lines Sudan's White Nile and Sudd margins. Ancient Sudanese Nubian civilisations harvested papyrus for writing material — Meroitic script was written on Sudanese papyrus. Sudan's extraordinary archaeological sites along the Nile — Meroe, Naqa, Musawwarat — are surrounded by papyrus-lined riverbanks unchanged since the time of the Pharaohs." },
{ name:"Doum Palm — Argun", country:"Sudan", lat:17.0, lng:33.5, type:"Palm", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Hyphaene_thebaica.jpg/640px-Hyphaene_thebaica.jpg", description:"Hyphaene thebaica lines Sudan's Nile valley in elegant forked-trunk groves. Its sweet gingerbread-flavoured fruit was eaten by ancient Nubians — doum palm fruits have been found in Egyptian and Sudanese tombs. The argun palm — Medemia argun — was believed extinct until rediscovered in Sudan's Nubian Desert in 1963, making it one of botany's most remarkable rediscoveries." },
{ name:"Neem — Neem Tree", country:"Sudan", lat:15.5, lng:32.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Azadirachta_indica.jpg/640px-Azadirachta_indica.jpg", description:"Azadirachta indica lines Sudan's cities and villages providing critical shade in temperatures exceeding 45°C. Called the village pharmacy, every part is medicinal — neem twigs are used as toothbrushes across Sudan, its oil treats skin conditions and its leaves repel insects. Sudan's reforestation programs use neem as the primary street tree across Khartoum and other cities." },

// 🇸🇷 SURINAME
{ name:"Greenheart", country:"Suriname", lat:4.0, lng:-56.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Chlorocardium_rodiei.jpg/640px-Chlorocardium_rodiei.jpg", description:"Chlorocardium rodiei is endemic to Suriname and Guyana — producing one of the world's hardest and most durable timbers. Suriname's vast Amazon rainforest covers over 93% of the country — one of the highest forest cover percentages on Earth. Suriname's constitution guarantees the rights of indigenous and Maroon communities to their forest lands and traditional knowledge." },
{ name:"Cacao — Theobroma", country:"Suriname", lat:4.5, lng:-55.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Wild Theobroma cacao grows in Suriname's Amazon forests. Suriname's Saramaccan and Aluku Maroon communities — descendants of escaped enslaved Africans who established free communities in the rainforest 300 years ago — have developed extraordinary knowledge of Suriname's forest plants including wild cacao. Their ethnobotanical knowledge is among the most extensive in the Americas." },
{ name:"Mora", country:"Suriname", lat:5.5, lng:-55.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mora_excelsa.jpg/640px-Mora_excelsa.jpg", description:"Mora excelsa forms vast single-species forests along Suriname's coastal plain. Suriname's interior remains one of the most intact Amazon rainforest landscapes in South America. The Central Suriname Nature Reserve — a UNESCO World Heritage Site covering 1.6 million hectares — protects pristine mora forest sheltering jaguars, giant anteaters and harpy eagles." },
{ name:"Victoria Amazonica", country:"Suriname", lat:4.8, lng:-55.8, type:"Water Lily", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Victoria_amazonica2.jpg/640px-Victoria_amazonica2.jpg", description:"Victoria amazonica grows in Suriname's Amazonian rivers and oxbow lakes. Suriname's extraordinary biodiversity — over 5,000 plant species — reflects its position on the ancient Guiana Shield, one of Earth's oldest geological formations. New plant species are still being discovered in Suriname's unexplored interior at a rate of dozens per year." },
{ name:"Tonka Bean — Kumaru", country:"Suriname", lat:4.2, lng:-55.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dipteryx_odorata.jpg/640px-Dipteryx_odorata.jpg", description:"Dipteryx odorata grows in Suriname's rainforest — its seeds containing coumarin, one of the world's most important fragrance ingredients. Surinamese tonka beans are used by the world's finest pastry chefs as a vanilla substitute and by perfumers in luxury fragrances. Maroon communities of Suriname harvest tonka beans from ancient forest trees using traditional climbing techniques." },

// 🇸🇪 SWEDEN
{ name:"Linnaea — Twinflower", country:"Sweden", lat:63.0, lng:18.0, type:"Wildflower", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Linnaea_borealis.jpg/640px-Linnaea_borealis.jpg", description:"Linnaea borealis was the personal favourite flower of Carl Linnaeus — the Swedish botanist who created the scientific naming system for all life on Earth. He named it after himself and is portrayed holding it in his most famous portrait. The twinflower's paired pink bells carpet Sweden's boreal forests — a living monument to the man who organised the natural world." },
{ name:"Norway Spruce — Gran", country:"Sweden", lat:62.0, lng:16.0, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Picea_abies.jpg/640px-Picea_abies.jpg", description:"Picea abies dominates Sweden's vast boreal forest — the largest forest in Europe. Old Tjikko in Sweden's Dalarna province is a Norway spruce with roots dated at 9,550 years — the world's oldest known living individual tree. Sweden's forest industry is the backbone of the economy — paper, timber and furniture exports built Sweden's extraordinary welfare state." },
{ name:"Cloudberry — Hjortron", country:"Sweden", lat:68.0, lng:18.0, type:"Berry", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rubus_chamaemorus.jpg/640px-Rubus_chamaemorus.jpg", description:"Rubus chamaemorus is Sweden's most prized wild berry — hjortron jam served with waffles and cream is a Swedish national institution. Growing only in Arctic and subarctic bogs, cloudberries cannot be commercially cultivated — every berry is wild-picked. Sweden's allemansrätten — every person's right to roam freely and pick wild berries — is a constitutional freedom." },
{ name:"Common Bilberry — Blåbär", country:"Sweden", lat:60.0, lng:15.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Vaccinium_myrtillus.jpg/640px-Vaccinium_myrtillus.jpg", description:"Vaccinium myrtillus carpets Sweden's forest floors in dense low shrubs producing intensely flavoured dark berries. Sweden harvests millions of tonnes of wild bilberries annually — blåbärssoppa, warm bilberry soup, is the traditional Swedish hiking and skiing energy drink. Swedish children learn to identify bilberries before they start school — wild berry picking is a fundamental Swedish cultural experience." },
{ name:"Birch — Björk", country:"Sweden", lat:59.3, lng:18.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Betula_pendula_Moscow.jpg/640px-Betula_pendula_Moscow.jpg", description:"Betula pendula is Sweden's most beloved tree — its white trunks and trembling leaves defining the Swedish landscape in poetry, painting and song. Swedish Midsommar celebrations are built around birch — birch branches and wildflowers decorate the maypole, homes and churches. Swedish birch furniture design — clean, light and functional — shaped the entire global Scandinavian design movement." },

// 🇨🇭 SWITZERLAND
{ name:"Edelweiss", country:"Switzerland", lat:46.8, lng:8.2, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Leontopodium_alpinum_-_edelweiss.jpg/640px-Leontopodium_alpinum_-_edelweiss.jpg", description:"Leontopodium alpinum is Switzerland's most iconic symbol — appearing on the 5-centime coin, Swiss Army knives and countless products worldwide. Growing on Switzerland's highest Alpine ridges above 2,000m, it was once picked nearly to extinction by Victorian tourists. Switzerland was the first country to legally protect edelweiss — in 1878 — making it one of the world's earliest conservation laws." },
{ name:"Swiss Stone Pine — Arve", country:"Switzerland", lat:46.5, lng:9.8, type:"Conifer", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_cembra.jpg/640px-Pinus_cembra.jpg", description:"Pinus cembra grows on Switzerland's highest Alpine ridges in ancient wind-sculpted forms. Its fragrant wood is carved into the elaborate decorated furniture and clocks of Swiss Alpine folk art. The nutcracker bird — Clark's nutcracker — is the arve's sole seed disperser, burying thousands of seeds in hidden caches each autumn. Without nutcrackers, Swiss stone pine forests could not regenerate." },
{ name:"Gentian — Enzian", country:"Switzerland", lat:46.6, lng:8.5, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gentiana_acaulis.jpg/640px-Gentiana_acaulis.jpg", description:"Gentiana acaulis blazes electric blue across Switzerland's alpine meadows each spring. Switzerland has extraordinary gentian diversity — over 30 species grow in Swiss alpine habitats. The bitter root of yellow gentian is the basis of Enzian schnapps produced in Switzerland for centuries. Swiss mountain gentian meadows are precisely monitored as climate change indicators." },
{ name:"Alpenrose — Alpine Rose", country:"Switzerland", lat:46.4, lng:7.8, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rhododendron_ferrugineum.jpg/640px-Rhododendron_ferrugineum.jpg", description:"Rhododendron ferrugineum carpets Switzerland's subalpine slopes in brilliant crimson each June — one of the Alps' most spectacular wildflower displays. Called alpenrose, its toxic leaves were used in Swiss Alpine folk medicine to repel insects and treat rheumatism. The Swiss tourism industry uses alpenrose imagery as extensively as edelweiss to represent Alpine Switzerland." },
{ name:"Silver Fir — Tanne", country:"Switzerland", lat:47.0, lng:8.5, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Abies_alba_-_Schwarzwald.jpg/640px-Abies_alba_-_Schwarzwald.jpg", description:"Abies alba forms Switzerland's Jura and pre-Alpine forests in magnificent silver-grey stands. Swiss silver fir timber — resonant, straight-grained and lightweight — is used for the soundboards of violins, cellos and guitars made in the workshops of Mittenwald and Cremona. Stradivarius violins were made from Swiss and Italian Alpine fir — the same forests still produce tonewoods today." },

// 🇸🇾 SYRIA
{ name:"Jasmine — Yasmine", country:"Syria", lat:33.5, lng:36.3, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Jasminum_officinale.jpg/640px-Jasminum_officinale.jpg", description:"Jasminum officinale is Damascus's most beloved plant — the city is called the City of Jasmine. Damascus jasmine is considered among the world's finest — its intense nocturnal fragrance has inspired Arabic poetry for over 1,000 years. Syrian jasmine absolute is a prized ingredient in luxury perfumery. Despite years of devastating conflict, Damascus jasmine still blooms in the old city's courtyards." },
{ name:"Damask Rose", country:"Syria", lat:33.5, lng:36.2, type:"Shrub", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_damascena.jpg/640px-Rosa_damascena.jpg", description:"Rosa damascena takes its name from Damascus — the rose was first brought to Europe by Crusaders from Syria. Syrian rose water has been distilled in Damascus since the 9th century. Syria's Ghouta oasis — the ancient garden of Damascus, once one of the most productive agricultural landscapes in the world — was famous for its rose gardens for over 1,000 years." },
{ name:"Syrian Cedar", country:"Syria", lat:35.0, lng:36.5, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cedrus_libani.jpg/640px-Cedrus_libani.jpg", description:"Cedrus libani once covered Syria's Alawite Mountains and Jebel Ansariyah in magnificent forest. Syria's cedar forests were heavily logged by Ottoman and French colonial authorities. Only scattered remnant groves survive in Slinfah Nature Reserve — Syria's most important botanical reserve, protecting one of the last cedar populations between Lebanon and Turkey." },
{ name:"Pistachio — Fustuq", country:"Syria", lat:36.2, lng:37.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pistacia_vera.jpg/640px-Pistacia_vera.jpg", description:"Pistacia vera is native to Syria — Aleppo was the world's primary pistachio trading hub for centuries. Syrian Aleppo pistachios are considered the world's finest — smaller, sweeter and more intensely flavoured than Iranian or Californian varieties. Syria's pistachio orchards in the Aleppo region have been cultivated continuously for over 3,000 years." },
{ name:"Aleppo Pine — Pinus halepensis", country:"Syria", lat:35.5, lng:36.8, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Pinus_halepensis_cones.jpg/640px-Pinus_halepensis_cones.jpg", description:"Pinus halepensis takes its name from Aleppo — Syria's ancient capital of trade and culture. Syria's coastal mountains are covered in Aleppo pine forest. Pine resin was used to seal wine amphorae in ancient Syria — the flavour preserved in Greek retsina wine. Syria's Aleppo pine forests survived ancient civilisations, the Crusades and Ottoman rule but face new threats from conflict and climate change." },

// 🇹🇼 TAIWAN
{ name:"Plum Blossom — Meihua", country:"Taiwan", lat:25.0, lng:121.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Prunus_mume.jpg/640px-Prunus_mume.jpg", description:"Prunus mume is Taiwan's national flower — the plum blossom blooming on Taiwan's high mountains each January through the cold and snow. Taiwan chose it as the national flower in 1964 as a symbol of resilience and perseverance. The three stamens represent Sun Yat-sen's Three Principles of the People. Taiwan's Alishan and Yangmingshan mountains are famous plum blossom viewing destinations." },
{ name:"Taiwan Cypress — Hinoki", country:"Taiwan", lat:23.5, lng:121.0, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Chamaecyparis_obtusa.jpg/640px-Chamaecyparis_obtusa.jpg", description:"Chamaecyparis obtusa var. formosana is endemic to Taiwan's Central Mountain Range above 1,800m. Japanese colonists logged over 90% of Taiwan's ancient hinoki forests between 1895 and 1945 — the fragrant timber used in Japanese temples and imperial buildings. Taiwan's Alishan forest railway was built specifically to extract hinoki. Surviving ancient trees in Taipingshan are now protected national monuments." },
{ name:"Taiwan Sassafras", country:"Taiwan", lat:24.0, lng:121.3, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Sassafras_randaiense.jpg/640px-Sassafras_randaiense.jpg", description:"Sassafras randaiense is endemic to Taiwan's montane forests — a relict species unchanged since the Tertiary period 25 million years ago. Taiwan's mountain forests contain extraordinary plant endemism — over 1,000 endemic plant species on an island of just 36,000km². Taiwan's Taroko Gorge National Park protects magnificent sassafras forest in one of Asia's most dramatic landscapes." },
{ name:"Formosan Lily", country:"Taiwan", lat:23.8, lng:121.5, type:"Bulb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Lilium_formosanum.jpg/640px-Lilium_formosanum.jpg", description:"Lilium formosanum is endemic to Taiwan — its pure white trumpet flowers blooming from sea level to 3,500m on Taiwan's mountains. Taiwan's indigenous Amis and Paiwan peoples use the Formosan lily in traditional ceremonies and decorations. The lily's extraordinary altitudinal range reflects Taiwan's dramatic topography — from tropical lowlands to alpine peaks within just 50km." },
{ name:"Red Cypress — Taiwan Red Pine", country:"Taiwan", lat:24.5, lng:121.0, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Chamaecyparis_formosensis.jpg/640px-Chamaecyparis_formosensis.jpg", description:"Chamaecyparis formosensis is the world's largest cypress species — ancient trees in Taiwan's Shimen and Lalashan reserves exceed 2,000 years old and 20m in circumference. Taiwan's red cypress forests were considered among the natural wonders of Asia before Japanese colonial logging devastated them. The surviving giant trees are now Taiwan's most visited natural heritage sites." },

// 🇹🇯 TAJIKISTAN
{ name:"Wild Tulip — Tulipa kaufmanniana", country:"Tajikistan", lat:38.9, lng:71.1, type:"Bulb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tulipa_kaufmanniana.jpg/640px-Tulipa_kaufmanniana.jpg", description:"Tajikistan is one of the world's primary centres of wild tulip diversity — over 30 species grow in its Pamir and Tian Shan mountains. Tulipa kaufmanniana carpets Tajikistan's mountain slopes in white, yellow and red each spring. All garden tulips worldwide ultimately descend from Central Asian wild species like these. Tajikistan's tulip season draws botanists from around the world." },
{ name:"Walnut — Juglans regia", country:"Tajikistan", lat:39.5, lng:70.5, type:"Tree", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Juglans_regia.jpg/640px-Juglans_regia.jpg", description:"Juglans regia forms ancient walnut forests in Tajikistan's Gorno-Badakhshan region. Tajikistan's Pamir Mountains contain wild walnut populations of enormous genetic importance. Alexander the Great is said to have discovered walnut forests in Central Asia and brought them westward — the walnut's Latin name juglans regia means Jupiter's royal acorn." },
{ name:"Saffron Crocus", country:"Tajikistan", lat:38.5, lng:68.8, type:"Bulb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Crocus_sativus_closeup.jpg/640px-Crocus_sativus_closeup.jpg", description:"Crocus sativus has been cultivated in Tajikistan's Khatlon region for centuries. Tajik saffron colours and flavours osh — the national rice pilaf dish eaten at every celebration. Tajikistan's saffron cultivation is part of a broader Central Asian tradition stretching back over 3,000 years. The annual saffron harvest in October is one of Tajikistan's most important agricultural events." },
{ name:"Ferula — Giant Fennel", country:"Tajikistan", lat:38.0, lng:69.5, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Ferula_assa-foetida.jpg/640px-Ferula_assa-foetida.jpg", description:"Ferula species dominate Tajikistan's dry southern valleys and Pamir foothills. Tajikistan's extraordinary Ferula diversity includes the source of asafoetida — one of the most pungent and important spices in Central and South Asian cooking. Ancient Silk Road traders carried Tajik ferula resin across the known world as a medicinal and culinary commodity of enormous value." },
{ name:"Pomegranate — Anor", country:"Tajikistan", lat:37.8, lng:69.8, type:"Fruit Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Pomegranate_fruit.jpg/640px-Pomegranate_fruit.jpg", description:"Punica granatum has been cultivated in Tajikistan for over 3,000 years — the Vakhsh valley produces pomegranates of extraordinary size and sweetness. Tajikistan's anor festivals celebrate the harvest each autumn. In Tajik Zoroastrian tradition the pomegranate was a sacred symbol of fertility and eternal life — its image appears throughout ancient Tajik architectural decoration." },

// 🇹🇿 TANZANIA
{ name:"African Violet — Saintpaulia", country:"Tanzania", lat:-6.3, lng:37.0, type:"Wildflower", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Saintpaulia_ionantha.jpg/640px-Saintpaulia_ionantha.jpg", description:"Saintpaulia species were first discovered in Tanzania's Usambara Mountains in 1892 — these cliff-dwelling wildflowers became the world's most popular houseplant. Over 2 billion African violets are sold globally each year, all descended from Tanzanian wild species. Wild Saintpaulia populations in the Usambara, Uluguru and Udzungwa mountains are now critically endangered by deforestation." },
{ name:"Baobab", country:"Tanzania", lat:-6.0, lng:35.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata grows across Tanzania's western plateau and coastal regions. The famous baobabs of Zanzibar's Jozani Forest witnessed the island's spice trade for centuries. Tanzania's Ruaha National Park contains magnificent ancient baobabs sheltering elephant herds. Tanzanian baobab fruit pulp is now exported globally as a superfood ingredient worth millions in foreign exchange." },
{ name:"Clove Tree — Karafuu", country:"Tanzania", lat:-6.2, lng:39.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Syzygium_aromaticum.jpg/640px-Syzygium_aromaticum.jpg", description:"Syzygium aromaticum was introduced to Zanzibar from the Moluccas in the 19th century and transformed the island. Zanzibar was the world's largest clove producer for over a century — the entire economy revolved around clove. Tanzania's Pemba island still produces the world's finest cloves. The air above Zanzibar's clove-drying floors is heavy with one of history's most valuable fragrances." },
{ name:"Kilimanjaro Lobelia", country:"Tanzania", lat:-3.1, lng:37.4, type:"Alpine Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Lobelia_deckenii.jpg/640px-Lobelia_deckenii.jpg", description:"Lobelia deckenii grows on Mount Kilimanjaro's afroalpine zone above 3,500m — Africa's highest mountain creates a unique vertical ecosystem from tropical forest to arctic summit. Kilimanjaro's giant lobelias and senecios create an otherworldly landscape unlike anywhere else on Earth. Tanzania's Kilimanjaro National Park protects this extraordinary vertical biodiversity gradient." },
{ name:"Coconut Palm — Mnazi", country:"Tanzania", lat:-6.8, lng:39.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera lines Tanzania's Indian Ocean coastline and Zanzibar's beaches in swaying groves. Coconut palm toddy — tembo — is tapped and drunk across coastal Tanzania. Zanzibar's Stone Town — a UNESCO World Heritage Site — was built on the wealth of the spice and coconut trade. Tanzanian coconut cream is the base of the island's extraordinary Swahili coastal cuisine." },

// 🇹🇭 THAILAND
{ name:"Ratchaphruek — Golden Shower", country:"Thailand", lat:18.8, lng:99.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cassia_fistula.jpg/640px-Cassia_fistula.jpg", description:"Cassia fistula is Thailand's national flower — ratchaphruek — its cascading golden blooms transforming Thai streets and parks each April during Songkran New Year. Thailand planted 2 million golden shower trees to celebrate King Bhumibol's 60th anniversary. The flower's yellow represents Thai Buddhism. Thailand's national holiday — National Day — is called Ratchaphruek Day." },
{ name:"Teak — Sak", country:"Thailand", lat:18.0, lng:98.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tectona_grandis.jpg/640px-Tectona_grandis.jpg", description:"Tectona grandis built Thailand — teak logging dominated the northern Thai economy for centuries. Thailand's magnificent teak houses of Chiang Mai and Lampang survive as architectural treasures. Thailand banned teak logging in 1989 after catastrophic floods blamed on deforestation. Thai teak workers — mainly Karen and Shan communities — developed extraordinary forest management systems over generations." },
{ name:"Lotus — Bua", country:"Thailand", lat:13.8, lng:100.5, type:"Aquatic Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Nelumbo_nucifera_MS_4967.jpg/640px-Nelumbo_nucifera_MS_4967.jpg", description:"Nelumbo nucifera is sacred throughout Thailand — Buddhist monks offer lotus flowers at every temple. Thailand's lotus weaving tradition — practised only in Inle Lake Myanmar and Thailand's Chiang Mai region — produces the world's finest and rarest textile from lotus stem fibres. A single lotus silk scarf requires hand-pulling fibres from thousands of stems." },
{ name:"Orchid — Rhynchostylis", country:"Thailand", lat:15.0, lng:101.0, type:"Orchid", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rhynchostylis_gigantea.jpg/640px-Rhynchostylis_gigantea.jpg", description:"Thailand has over 1,000 native orchid species — the highest diversity in mainland Southeast Asia. Rhynchostylis gigantea blooms in spectacular cascading sprays of pink-spotted white flowers in Thailand's deciduous forests. Thailand's orchid export industry — cut flowers, potted plants and breeding stock — generates over $100 million annually making it Asia's most important orchid exporting nation." },
{ name:"Durian — Thurian", country:"Thailand", lat:12.5, lng:101.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Durian_DSCN0870_crop.jpg/640px-Durian_DSCN0870_crop.jpg", description:"Durio zibethinus — the king of fruits — is central to Thai culture and economy. Thailand is the world's largest durian exporter — Monthong variety fetches extraordinary prices in China. The durian season in Chanthaburi and Rayong is Thailand's most anticipated culinary event. Thai durian orchards are precisely managed for decades to produce fruit of consistent quality and flavour." },

// 🇹🇬 TOGO
{ name:"Shea Tree", country:"Togo", lat:9.5, lng:0.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Vitellaria_paradoxa.jpg/640px-Vitellaria_paradoxa.jpg", description:"Vitellaria paradoxa dominates Togo's northern savanna and is exclusively managed by Togolese women. Shea butter is fundamental to Togolese cooking and cosmetics. Togo's Kabiyé and Tem women's shea cooperatives have developed internationally recognised quality standards. Togolese shea trees are sacred — they cannot be cut without community permission and are passed down through generations as family property." },
{ name:"Néré — African Locust Bean", country:"Togo", lat:9.0, lng:1.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Parkia_biglobosa.jpg/640px-Parkia_biglobosa.jpg", description:"Parkia biglobosa is central to Togolese cuisine — its fermented seeds called dawadawa provide the umami base of virtually every Togolese sauce. The tree's spectacular red pompom flowers bloom at night, pollinated exclusively by bats. Togo's Ewe and Mina people have processed locust beans for over 3,000 years in traditions passed exclusively through female lineages." },
{ name:"Teak — Bois de Teck", country:"Togo", lat:8.5, lng:1.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tectona_grandis.jpg/640px-Tectona_grandis.jpg", description:"Tectona grandis was planted in vast colonial plantations across central Togo and remains the country's most important timber resource. Togo's Fazao-Malfakassa National Park contains both planted teak forests and remnant natural savanna woodland. Togolese teak furniture is exported across West Africa — Lomé's craftsmen produce distinctive carved teak pieces sold throughout the region." },
{ name:"Oil Palm", country:"Togo", lat:6.8, lng:1.2, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Elaeis_guineensis.jpg/640px-Elaeis_guineensis.jpg", description:"Elaeis guineensis lines Togo's coastal zone and is fundamental to southern Togolese cuisine and culture. Palm oil colours and flavours every dish in Lomé's extraordinary street food scene. Palm wine — sodabi — distilled into Togo's national spirit is consumed at every ceremony. Togo's Mina and Ewe women process palm oil in traditional presses unchanged for centuries." },
{ name:"Baobab", country:"Togo", lat:10.5, lng:0.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata grows across Togo's northern Sahel zone — ancient trees marking the sites of traditional Konkomba and Chokossi villages. Togolese voodoo ceremonies — Togo has the highest density of voodoo practitioners of any country — frequently incorporate baobab bark and fruit in ritual preparations. The baobab's longevity makes it a sacred ancestor tree across northern Togo." },

// 🇹🇴 TONGA
{ name:"Heilala — Tonga's National Flower", country:"Tonga", lat:-21.2, lng:-175.2, type:"Shrub", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Garcinia_sessilis.jpg/640px-Garcinia_sessilis.jpg", description:"Garcinia sessilis — heilala — is Tonga's national flower, its small red flowers used in the finest Tongan garlands and presented to royalty. Tonga is the Pacific's last remaining kingdom — the royal family's connection to heilala is ancient and ceremonial. The Heilala Festival each July is Tonga's most important cultural celebration, coinciding with the king's birthday." },
{ name:"Coconut Palm — Niu", country:"Tonga", lat:-21.1, lng:-175.1, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is the foundation of Tongan civilisation — its Tongan name niu appears throughout the oldest oral traditions of the Polynesian kingdom. Copra was Tonga's primary export for over a century. The 2022 Hunga Tonga volcanic eruption — the largest in the modern era — devastated Tonga's coconut groves, creating an ongoing food and economic recovery challenge." },
{ name:"Pandanus — Fala", country:"Tonga", lat:-21.3, lng:-175.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pandanus_tectorius.jpg/640px-Pandanus_tectorius.jpg", description:"Pandanus tectorius leaves are woven into the finest Tongan ngatu — bark cloth — and ta'ovala waist mats worn at every formal occasion. Tongan weaving using pandanus leaves is a UNESCO-recognised craft tradition. The ability to weave fine pandanus mats is still considered a fundamental accomplishment for Tongan women and a measure of cultural pride." },
{ name:"Breadfruit — Mei", country:"Tonga", lat:-21.15, lng:-175.15, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis has sustained Tonga for over 3,000 years. Tongan breadfruit varieties — over 20 traditional cultivars — were carefully selected by generations of farmers. The 2022 Hunga Tonga eruption destroyed many breadfruit trees with volcanic ash. Tonga's recovery programs prioritise replanting breadfruit as the cornerstone of the island kingdom's food sovereignty." },
{ name:"Kava — Ava", country:"Tonga", lat:-21.2, lng:-175.2, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Piper_methysticum.jpg/640px-Piper_methysticum.jpg", description:"Piper methysticum is central to Tongan royal and social ceremony — no important event occurs without kava. The Tongan king presides over elaborate kava ceremonies that establish social hierarchy and political authority. Tonga is considered the original homeland of kava culture — the plant was carried eastward across the Pacific by Tongan voyagers over 3,000 years ago." },

// 🇹🇹 TRINIDAD AND TOBAGO
{ name:"Chaconia — Wild Poinsettia", country:"Trinidad and Tobago", lat:10.7, lng:-61.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Warszewiczia_coccinea.jpg/640px-Warszewiczia_coccinea.jpg", description:"Warszewiczia coccinea is Trinidad and Tobago's national flower — chaconia — named after the last Spanish governor Don José María Chacón. Its brilliant scarlet flower heads bloom each August 31st — Trinidad's Independence Day — with extraordinary regularity. The chaconia grows in Trinidad's Northern Range rainforest, one of the most biodiverse forests in the Caribbean." },
{ name:"Immortelle Tree", country:"Trinidad and Tobago", lat:10.6, lng:-61.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Erythrina_poeppigiana.jpg/640px-Erythrina_poeppigiana.jpg", description:"Erythrina poeppigiana blazes orange-red across Trinidad's Northern Range each February before any leaves appear. Planted as shade trees over Trinidad's famous cocoa and coffee estates, immortelle trees defined the island's agricultural landscape. Trinidad's cocoa — some of the world's finest Trinitario variety — still grows beneath immortelle shade on century-old estates." },
{ name:"Cacao", country:"Trinidad and Tobago", lat:10.5, lng:-61.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao has been cultivated in Trinidad since the 17th century — Trinidad developed the Trinitario hybrid that now forms the basis of most fine-flavour chocolate worldwide. The International Cocoa Genebank in Trinidad holds the world's most important collection of cacao genetic diversity — over 2,500 varieties safeguarding the future of global chocolate production." },
{ name:"Poui Tree", country:"Trinidad and Tobago", lat:10.65, lng:-61.52, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tabebuia_rosea.jpg/640px-Tabebuia_rosea.jpg", description:"Tabebuia rosea — the pink poui — blooms spectacularly in Trinidad each spring, its bare branches covered in pink trumpets before any leaves appear. Trinidadians say when the poui blooms, examinations are near — its flowering coincides precisely with the school exam season each year. Maracas Bay's pink poui-lined road is one of Trinidad's most photographed landscapes." },
{ name:"Pitch Lakeshore Plant — Humus Fern", country:"Trinidad and Tobago", lat:10.2, lng:-61.6, type:"Fern", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Thelypteris_palustris.jpg/640px-Thelypteris_palustris.jpg", description:"Thelypteris species grow around Trinidad's extraordinary La Brea Pitch Lake — the world's largest natural asphalt deposit. Plants growing on the lake's edges have adapted to the sulphurous hydrocarbon-rich environment. Trinidad's extraordinary geological and biological diversity — including the only wild scarlet ibis nesting colony in the Caribbean — makes it one of the most remarkable islands on Earth." },

// 🇹🇳 TUNISIA
{ name:"Olive Tree", country:"Tunisia", lat:34.0, lng:9.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"Tunisia has 100 million olive trees — more per capita than any country on Earth. The Sfax region's ancient olive groves were planted during the Roman Empire and have been continuously harvested for 2,000 years. Tunisia is the world's fourth largest olive oil producer. The Chemlali and Chetoui varieties produce distinctively peppery Tunisian oil prized globally." },
{ name:"Date Palm — Deglet Nour", country:"Tunisia", lat:33.9, lng:9.0, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Phoenix_dactylifera_2.jpg/640px-Phoenix_dactylifera_2.jpg", description:"Phoenix dactylifera produces Tunisia's most famous export — the Deglet Nour translucent golden date called the queen of dates. Tunisia's Djerid oases — the largest date palm ecosystem in North Africa — contain over 4 million palms in the Saharan borderlands. The oasis towns of Tozeur and Nefta have cultivated Deglet Nour dates for over 2,000 years." },
{ name:"Esparto Grass — Halfa", country:"Tunisia", lat:33.5, lng:9.3, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Stipa_tenacissima.jpg/640px-Stipa_tenacissima.jpg", description:"Stipa tenacissima covers vast areas of Tunisia's semi-arid steppe in dense tussocks. Tunisia was the world's primary esparto grass exporter to Britain in the 19th century for high-quality paper. Tunisian Berber and Arab communities weave esparto into baskets, mats and the iconic béchir — decorative esparto panels used in traditional Tunisian interiors." },
{ name:"Aleppo Pine — Ktoun", country:"Tunisia", lat:36.5, lng:9.0, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Pinus_halepensis_cones.jpg/640px-Pinus_halepensis_cones.jpg", description:"Pinus halepensis covers Tunisia's northern Tell Atlas mountains in fragrant forests. Tunisia's Kroumirie region — the wettest part of North Africa — supports extraordinary Aleppo pine and cork oak forest sheltering Barbary deer and wildcats. Tunisia's Aïn Draham pine forests are the source of the pine honey that flavours Tunisian pastries." },
{ name:"Thyme — Zaâtar", country:"Tunisia", lat:35.5, lng:9.5, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Thymus_vulgaris.jpg/640px-Thymus_vulgaris.jpg", description:"Thymus species cover Tunisia's rocky hillsides and Cap Bon peninsula in fragrant purple-flowered mats. Tunisian thyme honey is the most prized in North Africa — its intense medicinal fragrance reflects the extraordinary aromatic diversity of Tunisia's maquis. Zaâtar — thyme mixed with sumac and sesame — is the fundamental spice blend of Tunisian and Levantine cooking." },

// 🇹🇷 TURKEY
{ name:"Tulip — Lale", country:"Turkey", lat:39.9, lng:32.8, type:"Bulb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tulipa_gesneriana.jpg/640px-Tulipa_gesneriana.jpg", description:"Turkey is the original home of the cultivated tulip — wild Tulipa species bloom across Anatolia's mountains each spring. Ottoman Sultan Suleiman the Magnificent sent tulip bulbs to European courts in the 16th century, sparking Tulipmania. Istanbul celebrates its annual Tulip Festival each April planting 30 million flowers. The tulip — lale — remains Turkey's most powerful cultural symbol." },
{ name:"Oriental Plane — Çınar", country:"Turkey", lat:40.9, lng:29.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Platanus_orientalis.jpg/640px-Platanus_orientalis.jpg", description:"Platanus orientalis is Turkey's most culturally significant tree — ancient çınar trees shade the central squares of every Anatolian town. Some specimens exceed 2,000 years of age. Turkey's most famous çınar — the Hippocrates Plane Tree on Kos — is said to be where medicine was taught 2,400 years ago. Istanbul's Emirgan Park contains ancient plane trees planted by Ottoman sultans." },
{ name:"Rose — Isparta Gülü", country:"Turkey", lat:37.8, lng:30.5, type:"Shrub", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_damascena.jpg/640px-Rosa_damascena.jpg", description:"Rosa damascena has been cultivated in Turkey's Isparta region for centuries — Turkey is the world's second largest producer of rose oil after Bulgaria. Every May the Valley of Roses near Isparta fills with millions of pink blooms picked before dawn by families following traditions unchanged for centuries. Turkish rose absolute is an essential ingredient in the world's finest perfumes." },
{ name:"Cedar of Lebanon — Toros Sediri", country:"Turkey", lat:37.0, lng:32.5, type:"Conifer", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cedrus_libani.jpg/640px-Cedrus_libani.jpg", description:"Cedrus libani forms magnificent ancient forests in Turkey's Taurus Mountains — the largest remaining cedar forests in the Middle East. Turkey's Tahtali Mountain cedar forest contains trees over 1,000 years old. The Hittite Empire, ancient Greeks and Romans all harvested Taurus cedar for shipbuilding and construction. Turkey now strictly protects its ancient cedar forests as national monuments." },
{ name:"Hazel — Fındık", country:"Turkey", lat:41.0, lng:37.9, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Corylus_avellana.jpg/640px-Corylus_avellana.jpg", description:"Corylus avellana is native to Turkey's Black Sea coast — Turkey produces 70% of the world's hazelnuts. The entire global chocolate industry depends on Turkish hazelnuts — Ferrero Rocher alone uses 25% of Turkey's annual hazelnut harvest. Trabzon and Giresun's terraced hazelnut orchards climbing coastal mountains are among the world's most dramatic agricultural landscapes." },

// 🇹🇲 TURKMENISTAN
{ name:"Saxaul Tree", country:"Turkmenistan", lat:39.0, lng:59.5, type:"Tree", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Haloxylon_ammodendron.jpg/640px-Haloxylon_ammodendron.jpg", description:"Haloxylon ammodendron is Turkmenistan's most important desert tree, stabilising the vast Karakum Desert — one of the world's largest sand deserts covering 80% of the country. Turkmenistan has planted millions of saxaul trees to halt advancing sand dunes. The ancient Silk Road cities of Merv and Nisa — UNESCO World Heritage Sites — were sustained by saxaul-stabilised desert landscapes." },
{ name:"Pomegranate — Nar", country:"Turkmenistan", lat:37.9, lng:58.4, type:"Fruit Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Pomegranate_fruit.jpg/640px-Pomegranate_fruit.jpg", description:"Punica granatum has been cultivated in Turkmenistan's Kopetdag Mountains for over 4,000 years. Turkmenistan has extraordinary pomegranate genetic diversity — over 100 named varieties. The ancient city of Merv — once the largest city on Earth — was surrounded by pomegranate orchards. Turkmen traditional embroidery features pomegranate motifs on every garment and carpet." },
{ name:"Sarsazan — Haloxylon", country:"Turkmenistan", lat:38.5, lng:57.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Haloxylon_persicum.jpg/640px-Haloxylon_persicum.jpg", description:"Haloxylon persicum — white saxaul — forms the primary vegetation of Turkmenistan's Karakum Desert. Its photosynthesising green branches replace leaves in the extreme desert heat. Turkmen nomadic communities have used white saxaul as fuel, animal fodder and traditional medicine for millennia. The Repetek Biosphere Reserve protects extraordinary Karakum Desert plant communities." },
{ name:"Astragalus — Geven", country:"Turkmenistan", lat:38.0, lng:59.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Astragalus_gossypinus.jpg/640px-Astragalus_gossypinus.jpg", description:"Astragalus species form the dominant cushion plant communities on Turkmenistan's Kopetdag Mountains. Turkmenistan has extraordinary Astragalus diversity — over 200 species — more than most countries on Earth. Gum tragacanth — from Astragalus roots — was Turkmenistan's most valuable medieval export, used in European pharmaceuticals and food production for centuries." },
{ name:"Wild Grape — Üzüm", country:"Turkmenistan", lat:38.5, lng:57.5, type:"Vine", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Vitis_vinifera_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-277.jpg/640px-Vitis_vinifera_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-277.jpg", description:"Vitis vinifera grows wild in Turkmenistan's Kopetdag Mountain canyons — one of the primary centres of wild grape diversity. Turkmenistan's Gokdepe region has cultivated grapes for over 5,000 years. The country's distinctive green Kara-Üzüm raisin is traded across Central Asia. Ancient Silk Road cities were sustained by the extraordinary grape and wine production of Turkmenistan's mountain valleys." },

// 🇹🇻 TUVALU
{ name:"Coconut Palm — Niu", country:"Tuvalu", lat:-8.5, lng:179.2, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is the foundation of Tuvaluan civilisation — on nine tiny atolls with a maximum elevation of 5m above sea level, the coconut palm provides virtually everything needed for survival. Copra was Tuvalu's only significant export for over a century. Rising sea levels are salinating the freshwater lens that coconut palms depend on — Tuvalu's entire food security is threatened." },
{ name:"Pandanus — Te Fala", country:"Tuvalu", lat:-8.5, lng:179.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pandanus_tectorius.jpg/640px-Pandanus_tectorius.jpg", description:"Pandanus tectorius is essential to Tuvaluan life — its leaves woven into the finest mats, baskets and sleeping mats that furnish every Tuvaluan home. Tuvaluan pandanus weaving is one of the most refined craft traditions in Polynesia. As sea levels rise, pandanus — more salt-tolerant than coconut — is increasingly being planted as a climate adaptation strategy." },
{ name:"Breadfruit — Te Mei", country:"Tuvalu", lat:-8.52, lng:179.19, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis has sustained Tuvalu for over 2,000 years. On atolls with minimal soil and no rivers, breadfruit provides critical carbohydrates from a single tree producing hundreds of fruits annually. Tuvalu faces an existential climate crisis — the UN has recognised Tuvalu citizens as the world's first climate refugees, and breadfruit preservation is central to food sovereignty planning." },
{ name:"Mangrove", country:"Tuvalu", lat:-8.53, lng:179.20, type:"Tree", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Mangrove_trees.jpg/640px-Mangrove_trees.jpg", description:"Small mangrove stands on Tuvalu's Funafuti atoll are the islands' last natural coastal protection. Tuvalu's mangroves are being killed by increasing saltwater intrusion as sea levels rise. Tuvalu has signed a remarkable agreement with Australia — if the islands become uninhabitable, all Tuvaluans will have the right to migrate to Australia while maintaining Tuvalu's sovereignty as a digital nation." },
{ name:"Beach Morning Glory — Te Fue Moana", country:"Tuvalu", lat:-8.51, lng:179.21, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ipomoea_pes-caprae.jpg/640px-Ipomoea_pes-caprae.jpg", description:"Ipomoea pes-caprae — beach morning glory — is one of Tuvalu's most important coastal plants, its deep root system binding atoll sands against wave erosion. Its pink flowers open each morning across Tuvalu's beaches. Tuvaluan traditional medicine uses its leaves to treat stingray wounds. As Tuvalu's coastlines erode, beach morning glory is being planted in emergency coastal stabilisation programs." },

// 🇺🇬 UGANDA
{ name:"African Violet — Saintpaulia", country:"Uganda", lat:1.3, lng:32.3, type:"Wildflower", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Saintpaulia_ionantha.jpg/640px-Saintpaulia_ionantha.jpg", description:"Saintpaulia species grow on Uganda's Rwenzori Mountains and Elgon forest margins. Uganda's extraordinary montane forests shelter plant communities of global significance. The Rwenzori Mountains — the legendary Mountains of the Moon — host afroalpine vegetation found nowhere else on Earth, including giant lobelias, senecios and heathers growing to tree size." },
{ name:"Jackfruit — Ffene", country:"Uganda", lat:0.3, lng:32.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Jackfruit_on_tree.jpg/640px-Jackfruit_on_tree.jpg", description:"Artocarpus heterophyllus was introduced to Uganda centuries ago and has become completely integrated into Ugandan culture. Ffene — jackfruit — is Uganda's most beloved fruit, eaten ripe as a sweet snack and unripe as a vegetable in stews. Uganda's President Museveni promoted jackfruit as a food security crop — a single tree produces hundreds of kilograms of nutritious fruit annually." },
{ name:"Robusta Coffee — Mwenge", country:"Uganda", lat:0.5, lng:32.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Roasted_coffee_beans.jpg/640px-Roasted_coffee_beans.jpg", description:"Coffea canephora — robusta — is native to Uganda's Lake Victoria basin. Uganda is the primary centre of wild robusta diversity — the genetic reservoir for the world's second most important coffee species. Uganda is Africa's largest coffee exporter. Wild Ugandan robusta populations in Mabira Forest and Kibale National Park are studied by scientists developing disease-resistant coffee varieties." },
{ name:"Giant Lobelia — Rwenzori Lobelia", country:"Uganda", lat:0.4, lng:29.9, type:"Alpine Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Lobelia_deckenii.jpg/640px-Lobelia_deckenii.jpg", description:"Lobelia wollastonii grows on Uganda's Rwenzori Mountains above 3,500m alongside mountain gorillas and chimpanzees. The Rwenzoris — permanently cloud-shrouded and glaciated — create a unique afroalpine ecosystem. Uganda's Bwindi Impenetrable Forest and Rwenzori Mountains together shelter more endemic plant species than any comparable area in Africa." },
{ name:"Matoke — Cooking Banana", country:"Uganda", lat:0.8, lng:30.5, type:"Banana", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Musa_acuminata.jpg/640px-Musa_acuminata.jpg", description:"Musa acuminata — matoke — is Uganda's national dish and most important food crop. Uganda has the world's highest banana diversity — over 100 cultivated varieties. Matoke steamed in banana leaves is eaten daily by virtually every Ugandan. The Buganda Kingdom's culture is inseparable from banana cultivation — banana beer, banana juice and matoke stew define Ugandan identity." },

// 🇺🇦 UKRAINE
{ name:"Sunflower — Sonyashnyk", country:"Ukraine", lat:49.0, lng:32.0, type:"Annual Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Sunflower_from_Silesia2.jpg/640px-Sunflower_from_Silesia2.jpg", description:"Helianthus annuus is Ukraine's national flower — its golden head representing the sun that gave Ukraine its name. Ukraine is the world's largest sunflower oil producer and exporter — supplying over 50% of global sunflower oil. Ukraine's black earth steppe turns gold each August in one of the world's most spectacular agricultural landscapes. Sunflower seeds are eaten at every Ukrainian gathering." },
{ name:"Viburnum — Kalyna", country:"Ukraine", lat:50.0, lng:30.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Viburnum_opulus.jpg/640px-Viburnum_opulus.jpg", description:"Viburnum opulus — kalyna — is Ukraine's most beloved plant symbol. Its bright red berry clusters appear in virtually every Ukrainian folk song, poem and embroidery pattern. The kalyna represents the Ukrainian nation, the homeland and the blood of fallen heroes. Ukraine's national anthem references the kalyna. After Russia's invasion in 2022, Ukrainians worldwide planted kalyna as a symbol of resistance." },
{ name:"Oak — Dub", country:"Ukraine", lat:48.5, lng:31.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Quercus_robur_27_09_2011_Ls.jpg/640px-Quercus_robur_27_09_2011_Ls.jpg", description:"Quercus robur is sacred in Ukrainian mythology — the oak was the tree of Perun, the thunder god. Ukraine's Carpathian forests contain magnificent ancient oak groves. The Verkhovna Duba — parliament oak — in Zaporizhia is over 700 years old and witnessed Cossack councils beneath its branches. Ukraine's primeval Carpathian beech and oak forests are UNESCO World Heritage Sites." },
{ name:"Wheat — Pshenytsya", country:"Ukraine", lat:49.5, lng:32.5, type:"Annual Plant", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Wheat_close-up.jpg/640px-Wheat_close-up.jpg", description:"Triticum aestivum — wheat — has been cultivated on Ukraine's black earth steppe for over 7,000 years. Ukraine is the world's fifth largest wheat producer — called the breadbasket of Europe. The 2022 Russian invasion created a global food crisis by blocking Ukrainian wheat exports. Ukraine's chornozem — black earth — is the world's most fertile soil, accumulated over 10,000 years of steppe grassland." },
{ name:"Linden — Lypa", country:"Ukraine", lat:50.5, lng:30.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tilia_cordata.jpg/640px-Tilia_cordata.jpg", description:"Tilia cordata is Ukraine's most beloved tree — Kyiv's famous Lypska Street is named after linden trees that once lined it. Ukrainian linden honey — collected from Carpathian and Polissia forests — is considered among Europe's finest. Linden blossom tea — lypa — is Ukraine's most traditional herbal drink. The linden's midsummer fragrance is one of the most powerful sensory memories of Ukrainian childhood." },

// 🇦🇪 UNITED ARAB EMIRATES
{ name:"Date Palm — Nakhl", country:"United Arab Emirates", lat:24.5, lng:54.4, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Phoenix_dactylifera_2.jpg/640px-Phoenix_dactylifera_2.jpg", description:"Phoenix dactylifera is the UAE's national symbol — appearing on the national emblem alongside a golden falcon. The UAE has over 40 million date palms and produces over 900,000 tonnes of dates annually. Abu Dhabi's Al Ain oasis — a UNESCO World Heritage Site — contains ancient date palm gardens irrigated by falaj channels for 4,000 years." },
{ name:"Ghaf Tree — National Tree", country:"United Arab Emirates", lat:23.5, lng:53.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Prosopis_cineraria.jpg/640px-Prosopis_cineraria.jpg", description:"Prosopis cineraria is the UAE's national tree — called the tree of life for its extraordinary ability to survive the desert. Its roots reach down 30m to groundwater. Ancient ghaf trees mark the sites of traditional Bedouin encampments across the UAE. The UAE plants millions of ghaf trees annually as part of ambitious desert greening programs across the Emirates." },
{ name:"Arfaj — Rhanterium", country:"United Arab Emirates", lat:24.0, lng:53.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rhanterium_epapposum.jpg/640px-Rhanterium_epapposum.jpg", description:"Rhanterium epapposum transforms the UAE's desert each spring in a brief carpet of yellow flowers. Emiratis celebrate the arfaj season with traditional desert camping — al-barr — gathering beneath its blooms. The UAE's extraordinary desert conservation programs — including the rewilding of Arabian oryx — protect arfaj habitats across the Empty Quarter." },
{ name:"Mangrove — Qurm", country:"United Arab Emirates", lat:24.5, lng:54.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Mangrove_trees.jpg/640px-Mangrove_trees.jpg", description:"Avicennia marina forms extraordinary mangrove forests along the UAE's Arabian Gulf coast — the world's most northerly significant mangrove ecosystem. Abu Dhabi's Eastern Mangroves are a national park protecting breeding flamingos, sea turtles and dugongs. The UAE is planting 100 million mangrove trees by 2030 as a blue carbon climate strategy." },
{ name:"Desert Hyacinth", country:"United Arab Emirates", lat:23.8, lng:54.0, type:"Parasite", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Cistanche_tubulosa.jpg/640px-Cistanche_tubulosa.jpg", description:"Cistanche tubulosa erupts from UAE desert sands as spectacular yellow flower spikes each spring — a holoparasitic plant with no chlorophyll attaching to saltbush roots. Used in Gulf traditional medicine for centuries and now intensively researched as a treatment for Alzheimer's disease. The UAE's International Centre for Biosaline Agriculture studies desert plants for pharmaceutical applications." },

// 🇬🇧 UNITED KINGDOM
{ name:"Tudor Rose", country:"United Kingdom", lat:51.5, lng:-0.1, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_canina.jpg/640px-Rosa_canina.jpg", description:"Rosa species are the UK's national flower — the Tudor Rose combining red and white roses symbolised the unification of England after the Wars of the Roses in 1485. Britain has the world's most passionate rose-growing culture — the Royal Horticultural Society was founded in 1804 and the Chelsea Flower Show is the world's most prestigious horticultural event." },
{ name:"English Oak — Pedunculate Oak", country:"United Kingdom", lat:52.0, lng:-1.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Quercus_robur_27_09_2011_Ls.jpg/640px-Quercus_robur_27_09_2011_Ls.jpg", description:"Quercus robur is England's most beloved tree — ancient oaks are living monuments of British history. The Major Oak in Sherwood Forest sheltered Robin Hood according to legend. Nelson's fleet at Trafalgar was built from 6,000 ancient English oaks. Britain's ancient oak trees support more biodiversity — 2,300 species — than any other native tree." },
{ name:"Bluebell", country:"United Kingdom", lat:51.8, lng:-2.5, type:"Bulb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hyacinthoides_non-scripta.jpg/640px-Hyacinthoides_non-scripta.jpg", description:"Hyacinthoides non-scripta is Britain's most beloved wildflower — Britain has 50% of the world's entire bluebell population. Ancient woodland bluebell carpets are among Europe's most spectacular spring sights. British bluebells are legally protected — digging them up carries a £5,000 fine. The Spanish bluebell — an invasive species — threatens to hybridise native bluebells out of existence." },
{ name:"Scots Pine — Caledonian Pine", country:"United Kingdom", lat:57.0, lng:-4.5, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_sylvestris_-_Scots_Pine.jpg/640px-Pinus_sylvestris_-_Scots_Pine.jpg", description:"Pinus sylvestris is Scotland's national tree — the ancient Caledonian pine forest once covered most of Scotland. Only 1% remains — ancient groves at Glen Affric, Rothiemurchus and Beinn Eighe. These primeval forests shelter Scottish wildcats, red squirrels and ospreys. Scotland's ambitious rewilding programs aim to restore Caledonian pine forest across millions of hectares." },
{ name:"Daffodil — Narcissus", country:"United Kingdom", lat:52.1, lng:-3.8, type:"Bulb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Narcissus_pseudonarcissus.jpg/640px-Narcissus_pseudonarcissus.jpg", description:"Narcissus pseudonarcissus is Wales's national flower — worn on St David's Day March 1st across Wales. William Wordsworth's I Wandered Lonely as a Cloud immortalised England's Lake District daffodils in the world's most famous nature poem. Britain is the world's largest producer of daffodil bulbs — the Isles of Scilly grow millions for the cut flower market." },

// 🇺🇸 UNITED STATES
{ name:"Oak — National Tree", country:"United States", lat:38.9, lng:-77.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Quercus_robur_27_09_2011_Ls.jpg/640px-Quercus_robur_27_09_2011_Ls.jpg", description:"Quercus species were chosen as the US national tree in 2004. The Charter Oak of Connecticut sheltered the colony's royal charter from British confiscation in 1687. America has the world's greatest oak diversity with over 90 species. The live oaks of the American South — draped in Spanish moss — are among the most iconic landscapes in the world." },
{ name:"Saguaro Cactus", country:"United States", lat:32.3, lng:-111.0, type:"Cactus", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Saguaro_cactus.jpg/640px-Saguaro_cactus.jpg", description:"Carnegiea gigantea grows only in the Sonoran Desert of Arizona and Mexico — the iconic symbol of the American West. A saguaro lives for 150 years and may weigh 2 tonnes when full of water. The Tohono O'odham people have harvested saguaro fruit for over 4,000 years. Saguaro National Park near Tucson protects the densest concentration of these magnificent cacti on Earth." },
{ name:"Redwood — Giant Sequoia", country:"United States", lat:36.6, lng:-118.7, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/USACE_Redwoods.jpg/640px-USACE_Redwoods.jpg", description:"Sequoiadendron giganteum is the world's largest living organism by volume — General Sherman in Sequoia National Park is 1,385m³ of wood. Coast redwood Sequoia sempervirens grows up to 116m — the world's tallest tree. These ancient forests of California are living witnesses to 3,000 years of American history. Climate change-driven megafires are now killing these seemingly indestructible giants." },
{ name:"Wild Prairie Rose", country:"United States", lat:44.0, lng:-100.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_canina.jpg/640px-Rosa_canina.jpg", description:"Rosa blanda and related species are the state flower of Iowa, North Dakota and other Great Plains states. America's original tallgrass prairie — the most biodiverse grassland on Earth — was dominated by wild roses, blazing stars and coneflowers. Less than 1% of America's original tallgrass prairie survives — one of North America's most devastating ecological losses." },
{ name:"Venus Flytrap", country:"United States", lat:34.3, lng:-78.7, type:"Carnivorous Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Venus_Fly_Trap.jpg/640px-Venus_Fly_Trap.jpg", description:"Dionaea muscipula grows only within a 100-mile radius of Wilmington, North Carolina — the world's most restricted range of any carnivorous plant. Charles Darwin called it the most wonderful plant in the world. Its snap trap closes in 100 milliseconds — one of the fastest movements in the plant kingdom. Poaching for the horticultural trade has made it a felony in North Carolina." },

// 🇻🇮 UNITED STATES VIRGIN ISLANDS
{ name:"Yellow Cedar — Yellow Poui", country:"United States Virgin Islands", lat:18.3, lng:-64.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tabebuia_serratifolia.jpg/640px-Tabebuia_serratifolia.jpg", description:"Tabebuia serratifolia is the US Virgin Islands' national tree — its brilliant yellow trumpet flowers carpeting St. Thomas, St. John and St. Croix each spring before any leaves appear. The yellow cedar's dense durable timber was used by the Danish colonial administration to build the historic structures of Charlotte Amalie — one of the Caribbean's best-preserved colonial towns." },
{ name:"Ginger Thomas — Yellow Elder", country:"United States Virgin Islands", lat:18.35, lng:-64.95, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tecoma_stans.jpg/640px-Tecoma_stans.jpg", description:"Tecoma stans is the US Virgin Islands' national flower — ginger thomas — its bright yellow trumpet flowers blooming year-round across all three main islands. After Hurricanes Irma and Maria devastated the territory in 2017, ginger thomas was among the first plants to rebloom in the devastated landscape — becoming a powerful symbol of Virgin Islands resilience and recovery." },
{ name:"Seagrape", country:"United States Virgin Islands", lat:17.73, lng:-64.73, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Coccoloba_uvifera.jpg/640px-Coccoloba_uvifera.jpg", description:"Coccoloba uvifera lines the Virgin Islands' famous beaches in dense coastal thickets. Its clusters of purple-red fruits are made into seagrape jelly — a beloved Virgin Islands preserve. St John's Virgin Islands National Park — covering 60% of the island — protects extraordinary seagrape forest and coral reef ecosystems. The park was established after Laurance Rockefeller donated land to the US government in 1956." },
{ name:"Turpentine Tree — Copperwood", country:"United States Virgin Islands", lat:18.32, lng:-64.92, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Bursera_simaruba.jpg/640px-Bursera_simaruba.jpg", description:"Bursera simaruba — the tourist tree — is named for its peeling red sunburned-looking bark. Its fragrant resin was used by the Virgin Islands' original Arawak and Carib inhabitants as incense and glue. The turpentine tree's remarkable ability to root from cuttings and tolerate drought makes it the primary tree used in Virgin Islands hurricane reforestation programs." },
{ name:"Manchineel", country:"United States Virgin Islands", lat:17.72, lng:-64.74, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hippomane_mancinella.jpg/640px-Hippomane_mancinella.jpg", description:"Hippomane mancinella — the world's most dangerous tree — grows on Virgin Islands beaches, its apple-like fruits fatally toxic and its sap causing severe chemical burns. Virgin Islands beach warning signs mark manchineel trees. Despite its toxicity, the tree plays an important ecological role — its fruits are eaten only by iguanas whose digestive systems are immune to the toxins." },

// 🇺🇾 URUGUAY
{ name:"Ceibo — Coral Tree", country:"Uruguay", lat:-34.9, lng:-56.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Erythrina_crista-galli.jpg/640px-Erythrina_crista-galli.jpg", description:"Erythrina crista-galli is Uruguay's national flower and national tree — the ceibo blooms scarlet along the Río de la Plata and Uruguay River banks each summer. Uruguay shares this national symbol with Argentina. Uruguayan legend says the ceibo's red flowers grew from the blood of a Charrúa warrior who died defending his people. The flower appears on Uruguay's coat of arms." },
{ name:"Yerba Mate", country:"Uruguay", lat:-33.0, lng:-56.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ilex_paraguariensis.jpg/640px-Ilex_paraguariensis.jpg", description:"Ilex paraguariensis is Uruguay's most culturally important plant — Uruguay consumes more mate per capita than any other country on Earth, including Argentina. Uruguayans carry their mate gourd and thermos everywhere — on buses, to work, to the beach. The sight of a Uruguayan walking with mate is one of the world's most recognisable cultural images." },
{ name:"Ombu Tree", country:"Uruguay", lat:-32.5, lng:-57.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Phytolacca_dioica.jpg/640px-Phytolacca_dioica.jpg", description:"Phytolacca dioica is the iconic tree of Uruguay's open pampa — its enormous spreading canopy providing the only shade across the vast treeless grassland. Technically a giant herb rather than a tree, its spongy trunk contains more water than wood. Uruguayan gauchos sheltered beneath ombú trees for centuries. The ombú is essentially fireproof and poisonous — nothing can kill it." },
{ name:"Espinillo — Acacia caven", country:"Uruguay", lat:-33.5, lng:-56.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Acacia_caven.jpg/640px-Acacia_caven.jpg", description:"Acacia caven covers Uruguay's campo in golden yellow pompom flowers each spring — one of South America's most spectacular wildflower displays. Its intensely fragrant flowers fill the Uruguayan countryside with a honey-like perfume. Gaucho communities have used espinillo thorns as pins and needles, its bark to tan leather and its wood to make traditional mate gourds." },
{ name:"Seibo — Water Hyacinth", country:"Uruguay", lat:-33.2, lng:-58.3, type:"Aquatic Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Eichhornia_crassipes.jpg/640px-Eichhornia_crassipes.jpg", description:"Eichhornia crassipes carpets Uruguay's Río de la Plata tributaries in floating mats of purple flowers each summer. Called camalote in Uruguay, its extraordinary growth rate — doubling in two weeks — creates navigation problems but also provides critical habitat for caimans, capybaras and waterbirds. Uruguay's wetland ecosystems along the Río Negro are among South America's most important." },

// 🇺🇿 UZBEKISTAN
{ name:"Pomegranate — Anor", country:"Uzbekistan", lat:39.7, lng:64.4, type:"Fruit Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Pomegranate_fruit.jpg/640px-Pomegranate_fruit.jpg", description:"Punica granatum has been cultivated in Uzbekistan for over 4,000 years — the Fergana Valley produces pomegranates of legendary sweetness and size. Samarkand's pomegranate festival each autumn celebrates varieties with up to 1,000 seeds per fruit. Ancient Silk Road merchants carried Uzbek pomegranate seeds to Rome, China and India. Uzbek suzani embroidery features pomegranate motifs as its primary design." },
{ name:"Sycamore Fig — Chinar", country:"Uzbekistan", lat:41.3, lng:69.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Platanus_orientalis.jpg/640px-Platanus_orientalis.jpg", description:"Platanus orientalis — the Oriental plane or chinar — shades the ancient silk road cities of Samarkand, Bukhara and Khiva. Some chinars in Uzbekistan's Fergana Valley exceed 2,000 years old. Timur the Great planted chinars along Samarkand's boulevards 600 years ago — their descendants still grow in the Registan. The chinar's dappled shade defined Silk Road urban life for millennia." },
{ name:"Walnut — Juglans regia", country:"Uzbekistan", lat:40.8, lng:72.4, type:"Tree", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Juglans_regia.jpg/640px-Juglans_regia.jpg", description:"Juglans regia forms ancient walnut forests in Uzbekistan's Chatkal and Fergana ranges — among the world's largest wild walnut forests. Uzbekistan's Arslanbob forest contains trees over 1,000 years old. Ancient Silk Road traders carried Uzbek walnuts westward — the walnut spread from Central Asia to become one of the world's most important food crops." },
{ name:"Saffron Crocus", country:"Uzbekistan", lat:39.6, lng:66.9, type:"Bulb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Crocus_sativus_closeup.jpg/640px-Crocus_sativus_closeup.jpg", description:"Crocus sativus has been cultivated in Uzbekistan's Samarkand region for over 2,500 years. Uzbek saffron colours and flavours osh palov — the UNESCO-recognised national rice pilaf. Ancient Persian and Sogdian merchants traded Uzbek saffron along the Silk Road to China, India and Rome. Uzbekistan's saffron traditions predate the Islamic conquest by over a thousand years." },
