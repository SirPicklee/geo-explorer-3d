<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earth Atlas — Nature & Hazards</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --plant:    #22c55e;
      --plant-g:  #4ade80;
      --volcano:  #ef4444;
      --volcano-g:#f87171;
      --tsunami:  #3b82f6;
      --tsunami-g:#60a5fa;
      --bg:       #04040f;
      --panel:    rgba(6,6,22,0.93);
      --border:   rgba(148,163,184,0.09);
      --text:     #e2e8f0;
      --muted:    #64748b;
      --dim:      #334155;
    }

    body {
      background: var(--bg);
      font-family: 'DM Mono', 'Courier New', monospace;
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }

    #canvas-container {
      position: fixed; inset: 0;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 200;
      transition: opacity 0.6s ease;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    .load-globe {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(59,130,246,0.15);
      border-top-color: var(--tsunami);
      border-right-color: var(--plant);
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-text {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ── LEFT PANEL ── */
    #ui {
      position: fixed; top: 0; left: 0;
      width: 268px; height: 100vh;
      background: var(--panel);
      border-right: 1px solid var(--border);
      backdrop-filter: blur(14px);
      padding: 36px 22px 28px;
      z-index: 10;
      display: flex; flex-direction: column;
      gap: 0;
    }

    .logo {
      font-family: 'Syne', Georgia, serif;
      font-weight: 800;
      font-size: 21px;
      letter-spacing: -0.03em;
      color: #f1f5f9;
      line-height: 1;
    }
    .logo span { color: var(--tsunami); }
    .tagline {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: 5px;
      margin-bottom: 36px;
    }

    .section-head {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 10px;
    }

    /* Filter buttons */
    .filters { display: flex; flex-direction: column; gap: 7px; margin-bottom: 32px; }

    .f-btn {
      display: flex; align-items: center; gap: 11px;
      padding: 11px 14px;
      border-radius: 9px;
      border: 1px solid transparent;
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      color: var(--muted);
      text-align: left;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .f-btn::before {
      content: '';
      position: absolute; inset: 0;
      opacity: 0; transition: opacity 0.2s;
    }
    .f-btn:hover { color: var(--text); }

    .f-btn.plants   { border-color: rgba(34,197,94,0.18); }
    .f-btn.plants::before { background: rgba(34,197,94,0.06); }
    .f-btn.plants.on   { border-color: rgba(34,197,94,0.5); color: var(--plant-g); background: rgba(34,197,94,0.07); }
    .f-btn.plants.on::before { opacity: 1; }

    .f-btn.volcanoes { border-color: rgba(239,68,68,0.18); }
    .f-btn.volcanoes::before { background: rgba(239,68,68,0.06); }
    .f-btn.volcanoes.on { border-color: rgba(239,68,68,0.5); color: var(--volcano-g); background: rgba(239,68,68,0.07); }
    .f-btn.volcanoes.on::before { opacity: 1; }

    .f-btn.tsunamis  { border-color: rgba(59,130,246,0.18); }
    .f-btn.tsunamis::before { background: rgba(59,130,246,0.06); }
    .f-btn.tsunamis.on  { border-color: rgba(59,130,246,0.5); color: var(--tsunami-g); background: rgba(59,130,246,0.07); }
    .f-btn.tsunamis.on::before { opacity: 1; }

    .f-dot {
      width: 9px; height: 9px; border-radius: 50%;
      flex-shrink: 0; transition: box-shadow 0.2s;
    }
    .f-btn.plants .f-dot   { background: var(--plant); }
    .f-btn.plants.on .f-dot   { box-shadow: 0 0 8px var(--plant); }
    .f-btn.volcanoes .f-dot { background: var(--volcano); }
    .f-btn.volcanoes.on .f-dot { box-shadow: 0 0 8px var(--volcano); }
    .f-btn.tsunamis .f-dot  { background: var(--tsunami); }
    .f-btn.tsunamis.on .f-dot  { box-shadow: 0 0 8px var(--tsunami); }

    .f-info { flex: 1; }
    .f-name { font-size: 12px; font-weight: 500; display: block; line-height: 1.2; }
    .f-count { font-size: 10px; opacity: 0.5; display: block; margin-top: 2px; }
    .f-check { font-size: 13px; opacity: 0.4; transition: opacity 0.2s; }
    .f-btn.on .f-check { opacity: 1; }

    /* Stats */
    .stats-box {
      margin-top: auto;
      padding-top: 22px;
      border-top: 1px solid var(--border);
    }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 9px;
    }
    .stat-lbl { font-size: 10px; color: var(--muted); }
    .stat-val { font-size: 11px; color: #94a3b8; }

    .hint {
      margin-top: 18px;
      font-size: 10px;
      color: #1e293b;
      line-height: 1.6;
    }
    .hint strong { color: var(--dim); font-weight: 400; }

    /* ── DETAIL PANEL ── */
    #panel {
      position: fixed; top: 0; right: -420px;
      width: 390px; height: 100vh;
      background: linear-gradient(160deg, rgba(4,4,18,0.97) 0%, rgba(6,10,28,0.97) 100%);
      border-left: 1px solid var(--border);
      backdrop-filter: blur(20px);
      z-index: 10;
      transition: right 0.38s cubic-bezier(0.22, 0.61, 0.36, 1);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #panel.open { right: 0; }

    .p-head {
      padding: 34px 28px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; position: relative;
    }
    .p-cat {
      font-size: 9px; letter-spacing: 0.18em;
      text-transform: uppercase; margin-bottom: 12px; font-weight: 500;
    }
    .p-cat.plants   { color: var(--plant-g); }
    .p-cat.volcanoes { color: var(--volcano-g); }
    .p-cat.tsunamis  { color: var(--tsunami-g); }

    .p-name {
      font-family: 'Syne', Georgia, serif;
      font-size: 27px; font-weight: 700;
      color: #f8fafc; line-height: 1.15;
      margin-bottom: 6px;
    }
    .p-country { font-size: 11px; color: var(--muted); }

    .p-close {
      position: absolute; top: 28px; right: 24px;
      width: 30px; height: 30px;
      border: 1px solid rgba(148,163,184,0.18);
      border-radius: 7px; background: transparent;
      color: var(--muted); cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .p-close:hover { background: rgba(148,163,184,0.1); color: var(--text); }

    .p-body {
      padding: 26px 28px;
      overflow-y: auto; flex: 1;
    }

    .p-desc {
      font-size: 12.5px; line-height: 1.75;
      color: #94a3b8; margin-bottom: 26px;
    }

    .meta-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 16px;
    }
    .meta-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 13px;
    }
    .meta-lbl {
      font-size: 8.5px; letter-spacing: 0.14em;
      text-transform: uppercase; color: var(--dim);
      margin-bottom: 5px;
    }
    .meta-val { font-size: 13px; color: var(--text); font-weight: 500; }

    .coords-bar {
      display: flex; gap: 18px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 7px; font-size: 10px; color: var(--dim);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.15); border-radius: 2px; }

    /* Tooltip */
    #tt {
      position: fixed; z-index: 50;
      background: rgba(4,4,18,0.92);
      border: 1px solid rgba(148,163,184,0.12);
      backdrop-filter: blur(10px);
      border-radius: 6px; padding: 7px 12px;
      font-size: 11px; color: var(--text);
      pointer-events: none; display: none;
      white-space: nowrap;
    }

    /* Crosshair cursor on canvas */
    #canvas-container canvas { display: block; }
    .p-img {
  width: 100%; height: 200px;
  object-fit: cover;
  border-radius: 8px;
  margin-bottom: 18px;
  background: rgba(255,255,255,0.04);
  display: block;
}
.p-img-wrap { position: relative; }
.p-img-load {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--dim); letter-spacing: 0.1em;
}
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="load-globe"></div>
  <div class="load-text">Initializing Earth Atlas</div>
</div>

<!-- Tooltip -->
<div id="tt"></div>

<!-- Left Panel -->
<div id="ui">
  <div class="logo">Earth<span>.</span>Atlas</div>
  <div class="tagline">Nature &amp; Hazards · Real Data</div>

  <div class="section-head">Categories</div>
  <div class="filters">
    <button class="f-btn plants on" onclick="toggleFilter('plants')">
      <div class="f-dot"></div>
      <div class="f-info">
        <span class="f-name">Endemic Plants</span>
        <span class="f-count" id="count-plants">-- species worldwide</span>
      </div>
      <span class="f-check">✓</span>
    </button>
    <button class="f-btn volcanoes on" onclick="toggleFilter('volcanoes')">
      <div class="f-dot"></div>
      <div class="f-info">
        <span class="f-name">Active Volcanoes</span>
        <span class="f-count" id="count-volcanoes">-- documented sites</span>
      </div>
      <span class="f-check">✓</span>
    </button>
    <button class="f-btn tsunamis on" onclick="toggleFilter('tsunamis')">
      <div class="f-dot"></div>
      <div class="f-info">
        <span class="f-name">Major Tsunamis</span>
        <span class="f-count" id="count-tsunamis">-- historical events</span>
      </div>
      <span class="f-check">✓</span>
    </button>
  </div>

  <div class="section-head">Overview</div>
  <div class="stat-row"><span class="stat-lbl">Visible Markers</span><span class="stat-val" id="stat-total">75</span></div>
  <div class="stat-row"><span class="stat-lbl">Countries Covered</span><span class="stat-val">50+</span></div>
  <div class="stat-row"><span class="stat-lbl">Data Source</span><span class="stat-val">Verified / Real</span></div>

  <div class="stats-box">
    <div class="hint">
      <strong>Drag</strong> to rotate &nbsp;·&nbsp; <strong>Scroll</strong> to zoom<br>
      <strong>Click</strong> any marker to explore
    </div>
  </div>
</div>

<!-- Country Popup -->
<div id="country-popup" style="display:none;position:fixed;z-index:50;background:rgba(4,4,18,0.97);border:1px solid rgba(148,163,184,0.15);border-radius:12px;padding:14px;min-width:220px;backdrop-filter:blur(14px);">
  <div id="country-popup-title" style="font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:#64748b;margin-bottom:10px;"></div>
  <div id="country-popup-list" style="display:flex;flex-direction:column;gap:6px;"></div>
</div>
<!-- Detail Panel -->
<div id="panel">
  <div class="p-head">
    <div class="p-cat" id="p-cat">—</div>
    <div class="p-name" id="p-name">—</div>
    <div class="p-country" id="p-country">—</div>
    <button class="p-close" onclick="closePanel()">✕</button>
  </div>
  <div class="p-body">
    <div class="p-img-wrap" id="p-img-wrap">
      <div class="p-img-load" id="p-img-load">Loading image...</div>
      <img class="p-img" id="p-img" style="display:none" onload="this.style.display='block';document.getElementById('p-img-load').style.display='none'" onerror="document.getElementById('p-img-wrap').style.display='none'">
    </div>
    <div class="p-desc" id="p-desc"></div>
    <div class="meta-grid" id="p-meta"></div>
    <div class="coords-bar" id="p-coords"></div>
  </div>
</div>

<!-- Canvas -->
<div id="canvas-container"></div>

// 🇦🇬 ANTIGUA AND BARBUDA
{ name:"Whitewood", country:"Antigua and Barbuda", lat:17.1, lng:-61.8, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Bucida_buceras.jpg/640px-Bucida_buceras.jpg", description:"Bucida buceras, the bullet tree or Antigua whitewood, is the national tree of Antigua and Barbuda. Its extremely hard, dense wood was historically used for ship construction during the colonial era when Antigua was a major British naval base." },

{ name:"Frangipani", country:"Antigua and Barbuda", lat:17.15, lng:-61.85, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Plumeria_rubra.jpg/640px-Plumeria_rubra.jpg", description:"Plumeria alba grows wild across Antigua's hillsides and is deeply woven into Caribbean culture. Its intensely fragrant white and yellow flowers bloom year-round and are traditionally used to make leis and offerings at ceremonies." },
{ name:"Agave", country:"Antigua and Barbuda", lat:17.2, lng:-61.7, type:"Succulent", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Agave_americana.jpg/640px-Agave_americana.jpg", description:"Agave karatto is native to Antigua's dry coastal scrubland and was historically one of the island's most important plants. Its fibres were used to make rope, nets and baskets, while its sap was fermented into a traditional beverage." },

// 🇦🇷 ARGENTINA
{ name:"Ceibo", country:"Argentina", lat:-34.6, lng:-58.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Erythrina_crista-galli.jpg/640px-Erythrina_crista-galli.jpg", description:"Erythrina crista-galli is Argentina's national flower and tree, blooming with spectacular crimson flower clusters along riverbanks and wetlands. Its flowers appear before the leaves emerge, creating a stunning display that inspired Argentina's national identity." },

{ name:"Blue Passion Flower", country:"Argentina", lat:-23.5, lng:-46.6, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/Passiflora_caerulea.jpg/640px-Passiflora_caerulea.jpg", description:"Passiflora caerulea is native to Argentina and southern Brazil. Its intricate blue and white flowers were interpreted by Spanish missionaries as symbols of Christ's Passion — the corona representing the crown of thorns." },

// 🇦🇲 ARMENIA
{ name:"Armenian Poppy", country:"Armenia", lat:40.0, lng:44.5, type:"Wildflower", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/01/Papaver_bracteatum.jpg/640px-Papaver_bracteatum.jpg", description:"Papaver bracteatum, the great scarlet poppy, is native to Armenia and the Caucasus. Its brilliant crimson flowers carpet Armenian hillsides in spring. Historically significant as a source of thebaine, it is closely monitored for pharmaceutical research." },

// 🇦🇺 AUSTRALIA
{ name:"Wollemi Pine", country:"Australia", lat:-33.4, lng:150.1, type:"Conifer", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/Wollemi_Pine_Wollemia_nobilis.jpg/640px-Wollemi_Pine_Wollemia_nobilis.jpg", description:"Discovered in 1994 in NSW's Blue Mountains and thought extinct for 200 million years. Fewer than 100 wild trees survive. It is now cultivated globally — one of the most significant botanical discoveries of the 20th century." },

{ name:"Banksia", country:"Australia", lat:-34.0, lng:151.0, type:"Shrub", status:"Varies by species", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Banksia_serrata_flowers.jpg/640px-Banksia_serrata_flowers.jpg", description:"Banksia is one of Australia's most iconic and diverse plant genera, with over 170 species found almost exclusively on the continent. Its cylindrical flower spikes can produce thousands of individual flowers and are a vital food source for honeyeaters and possums." },
{ name:"Cooktown Orchid", country:"Australia", lat:-15.5, lng:145.3, type:"Orchid", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/95/Cooktown_Orchid.jpg/640px-Cooktown_Orchid.jpg", description:"Dendrobium bigibbum, Queensland's floral emblem, is a spectacular orchid producing masses of deep pink to purple flowers in the rainforests of Cape York Peninsula. It grows epiphytically on trees and rocks in one of Australia's most biodiverse regions." },

// 🇦🇹 AUSTRIA
{ name:"Edelweiss", country:"Austria", lat:47.5, lng:12.0, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Leontopodium_alpinum_-_edelweiss.jpg/640px-Leontopodium_alpinum_-_edelweiss.jpg", description:"Austria's most iconic alpine wildflower, growing above 1,800m in the Eastern Alps. Strictly protected by Austrian law, it symbolises alpine purity and was famously immortalised in The Sound of Music. Its woolly white bracts shield it from UV radiation and cold." },

{ name:"Austrian Pine", country:"Austria", lat:47.8, lng:13.0, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Pinus_nigra_subsp._nigra.jpg/640px-Pinus_nigra_subsp._nigra.jpg", description:"Pinus nigra, the Austrian black pine, is native to Austria's limestone Alps and has been planted as a reforestation species across Europe for 200 years. It tolerates extreme drought, poor soils and industrial pollution better than almost any other European conifer." },
{ name:"Arnica", country:"Austria", lat:47.1, lng:11.8, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Arnica_montana_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-168.jpg/640px-Arnica_montana_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-168.jpg", description:"Arnica montana grows across Austria's alpine meadows and has been used in European medicine for 500 years. Its bright yellow flowers produce anti-inflammatory compounds used in creams and gels to treat bruises and muscle pain." },

// 🇧🇸 BAHAMAS

// 🇧🇭 BAHRAIN

{ name:"Sider Tree", country:"Bahrain", lat:26.3, lng:50.4, type:"Tree", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Ziziphus_spina-christi.jpg/640px-Ziziphus_spina-christi.jpg", description:"Ziziphus spina-christi, the Christ's thorn jujube, is one of Bahrain's most culturally significant trees. Mentioned in the Quran as the Sidra tree of Paradise, it produces edible fruits and has been used in Gulf traditional medicine for millennia." },
{ name:"Desert Hyacinth", country:"Bahrain", lat:26.0, lng:50.55, type:"Parasite", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Cistanche_tubulosa.jpg/640px-Cistanche_tubulosa.jpg", description:"Cistanche tubulosa erupts from desert sands across Bahrain each spring — a holoparasitic plant with no chlorophyll that attaches to the roots of salt bushes. Its spectacular yellow flower spikes are used extensively in traditional Gulf and Chinese medicine." },
{ name:"Sodom Apple", country:"Bahrain", lat:26.15, lng:50.48, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Calotropis_procera_flowers.jpg/640px-Calotropis_procera_flowers.jpg", description:"Calotropis procera is one of the most resilient plants in Bahrain's harsh desert environment. Its inflated apple-like fruits look edible but are filled with toxic milky latex. Ancient Egyptian priests used this latex in mummification preparations." },

// 🇧🇩 BANGLADESH

{ name:"Shapla — Water Lily", country:"Bangladesh", lat:23.5, lng:90.2, type:"Water Lily", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Nymphaea_nouchali.jpg/640px-Nymphaea_nouchali.jpg", description:"Nymphaea nouchali, the blue water lily, is Bangladesh's national flower. It blooms across the country's vast wetlands, haors and ponds. In Bengali culture, the shapla symbolises the beauty and resilience of the nation's river-dependent way of life." },
{ name:"Jackfruit Tree", country:"Bangladesh", lat:24.0, lng:90.0, type:"Fruit Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Jackfruit_Bangladesh.jpg/640px-Jackfruit_Bangladesh.jpg", description:"Artocarpus heterophyllus is Bangladesh's national fruit and one of the world's largest tree-borne fruits, weighing up to 55kg. Every part is used — unripe fruit as a meat substitute, seeds boiled as a snack, wood for furniture and musical instruments." },

// 🇧🇧 BARBADOS
{ name:"Pride of Barbados", country:"Barbados", lat:13.1, lng:-59.6, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Caesalpinia_pulcherrima.jpg/640px-Caesalpinia_pulcherrima.jpg", description:"Caesalpinia pulcherrima is Barbados's national flower, blazing with orange and yellow blooms year-round. Despite being called the Pride of Barbados, it is native to tropical America and was brought to the Caribbean during the colonial era." },
{ name:"Bearded Fig Tree", country:"Barbados", lat:13.2, lng:-59.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ficus_citrifolia.jpg/640px-Ficus_citrifolia.jpg", description:"Ficus citrifolia, the shortleaf fig or bearded fig, is believed to have given Barbados its name — Portuguese sailors called the island Los Barbados, 'The Bearded Ones,' for the long aerial roots of this fig hanging from trees along the coast." },
{ name:"Manchineel", country:"Barbados", lat:13.05, lng:-59.62, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Hippomane_mancinella.jpg/640px-Hippomane_mancinella.jpg", description:"Hippomane mancinella is considered the world's most dangerous tree. Its sap causes severe chemical burns, its smoke blinds, and its apple-like fruits are deadly. Found on Barbados's beaches, it was used by the Carib people to poison arrow tips." },
{ name:"Seaside Mahoe", country:"Barbados", lat:13.15, lng:-59.55, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Thespesia_populnea.jpg/640px-Thespesia_populnea.jpg", description:"Thespesia populnea lines Barbados's coastlines with yellow hibiscus-like flowers that turn purple as they age. One of the most salt-tolerant trees in the Caribbean, it was used by indigenous peoples to carve canoes and as a medicinal plant." },
{ name:"Clammy Cherry", country:"Barbados", lat:13.18, lng:-59.58, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Cordia_sulcata.jpg/640px-Cordia_sulcata.jpg", description:"Cordia sulcata is a native hardwood tree of Barbados producing small white flowers and edible fruits. Its sticky fruits were historically used by children as a glue — hence the name clammy cherry — while the wood was prized for furniture and boat-building." },

// 🇧🇾 BELARUS
{ name:"European Bison Grass", country:"Belarus", lat:52.7, lng:24.0, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Hierochloe_odorata.jpg/640px-Hierochloe_odorata.jpg", description:"Hierochloe odorata, sweet grass or bison grass, grows across the Białowieża Forest — the last primeval lowland forest in Europe, straddling Belarus and Poland. It gives Żubrówka vodka its distinctive flavour and was burned as incense in Slavic rituals." },
{ name:"Silver Birch", country:"Belarus", lat:53.9, lng:27.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Betula_pendula_Moscow.jpg/640px-Betula_pendula_Moscow.jpg", description:"Betula pendula is Belarus's national tree, covering over 23% of the country's forests. Its white papery bark glows in winter light and has deep roots in Belarusian folklore. Birch sap, collected each spring, is drunk as a traditional health tonic." },
{ name:"Lily of the Valley", country:"Belarus", lat:53.5, lng:28.0, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Convallaria_majalis_MS_4272.jpg/640px-Convallaria_majalis_MS_4272.jpg", description:"Convallaria majalis carpets Belarus's ancient forest floors each May with delicate white bell-shaped flowers. Belarus's national flower, it is one of the most fragrant wildflowers in European forests and deeply embedded in Slavic spring traditions." },
{ name:"English Oak", country:"Belarus", lat:52.4, lng:31.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Quercus_robur_27_09_2011_Ls.jpg/640px-Quercus_robur_27_09_2011_Ls.jpg", description:"Quercus robur forms majestic stands in Belarus's Białowieża Forest, some over 500 years old. This primeval oak-dominated forest is Europe's most biodiverse temperate woodland and was designated a UNESCO World Heritage Site in 1979." },
{ name:"Marsh Marigold", country:"Belarus", lat:54.0, lng:26.5, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9b/Caltha_palustris_flowers.jpg/640px-Caltha_palustris_flowers.jpg", description:"Caltha palustris explodes in gold across Belarus's vast Polesie marshes each spring — one of Europe's largest remaining wetland complexes. In Belarusian folk tradition, the first marsh marigold bloom signals the true arrival of spring." },

// 🇧🇪 BELGIUM
{ name:"Belgian Endive", country:"Belgium", lat:50.85, lng:4.35, type:"Vegetable Plant", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6c/Witloof.jpg/640px-Witloof.jpg", description:"Cichorium intybus var. foliosum, known as witloof or Belgian endive, was accidentally discovered in Brussels around 1830 when chicory roots stored in a dark cellar sprouted pale crisp leaves. Belgium now exports over 250,000 tonnes annually to 40 countries." },
{ name:"Walloon Spiked Speedwell", country:"Belgium", lat:50.3, lng:5.2, type:"Wildflower", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Veronica_spicata.jpg/640px-Veronica_spicata.jpg", description:"Veronica spicata grows on Belgium's rare calcareous grasslands in the Walloon region, producing striking blue flower spikes. These ancient chalk grasslands, mown for centuries, support extraordinary plant diversity but are critically threatened by agricultural intensification." },
{ name:"Hop", country:"Belgium", lat:50.9, lng:2.9, type:"Vine", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Humulus_lupulus.jpg/640px-Humulus_lupulus.jpg", description:"Humulus lupulus has been cultivated in Belgium's Poperinge region since the 13th century. Belgian beer culture — recognised by UNESCO as Intangible Cultural Heritage — relies on these aromatic climbing plants whose cone-shaped flowers give beer its bitterness and aroma." },
{ name:"Wild Orchid — Bee Orchid", country:"Belgium", lat:50.6, lng:4.9, type:"Orchid", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/46/Ophrys_apifera_flower.jpg/640px-Ophrys_apifera_flower.jpg", description:"Ophrys apifera, the bee orchid, grows on Belgium's chalk grasslands mimicking a female bee so precisely that male bees attempt to mate with it. This extraordinary pollination strategy evolved over millions of years and is now a threatened sight in the Belgian countryside." },
{ name:"Bluebell", country:"Belgium", lat:51.0, lng:4.5, type:"Bulb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Hyacinthoides_non-scripta.jpg/640px-Hyacinthoides_non-scripta.jpg", description:"Hyacinthoides non-scripta creates the famous blue carpet of Hallerbos forest near Brussels each April — one of Europe's most spectacular wildflower displays. Belgium holds some of the world's densest bluebell woodland, a habitat that takes centuries to develop." },

// 🇧🇿 BELIZE
{ name:"Black Orchid", country:"Belize", lat:17.25, lng:-88.77, type:"Orchid", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Prosthechea_cochleata.jpg/640px-Prosthechea_cochleata.jpg", description:"Prosthechea cochleata is Belize's national flower — an epiphytic orchid producing distinctive dark purple and green shell-shaped flowers year-round. Found in Belize's lowland rainforests, it is the only New World orchid with an upside-down flower arrangement." },
{ name:"Mahogany", country:"Belize", lat:17.0, lng:-88.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Swietenia_macrophylla.jpg/640px-Swietenia_macrophylla.jpg", description:"Swietenia macrophylla is Belize's national tree — so central to its history that the country's coat of arms features mahogany logging. For 300 years, British colonial wealth was built on Belizean mahogany, now a CITES-protected species." },
{ name:"Cohune Palm", country:"Belize", lat:16.8, lng:-88.3, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Attalea_cohune.jpg/640px-Attalea_cohune.jpg", description:"Attalea cohune dominates Belize's lowland rainforest and is culturally indispensable to the Maya. Its leaves thatch houses, its nuts produce cooking oil, its trunk resists termites, and its presence indicates deep, fertile soil to Belizean farmers." },
{ name:"Ix Cacao — Cacao Tree", country:"Belize", lat:16.5, lng:-88.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao was domesticated by the ancient Maya of Belize over 3,500 years ago. Cacao beans served as currency, religious offerings and the base of xocolatl — the original chocolate drink. Belize's Toledo District Mayan cacao is world-renowned for its quality." },
{ name:"Ceiba — Sacred Tree", country:"Belize", lat:17.5, lng:-88.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra is the sacred world tree of Maya cosmology — its roots reaching into the underworld, its trunk in the middle world, its canopy touching the heavens. Growing to 70m with a buttressed trunk, it is the largest tree in Central America." },

// 🇧🇯 BENIN
{ name:"African Baobab", country:"Benin", lat:9.3, lng:2.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata, the African baobab, is the most iconic tree of Benin's savanna landscape. Living up to 3,000 years and storing thousands of litres of water, it is called the 'tree of life.' Baobab fruit pulp contains 6 times more vitamin C than oranges." },
{ name:"Shea Tree", country:"Benin", lat:10.5, lng:2.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Vitellaria_paradoxa.jpg/640px-Vitellaria_paradoxa.jpg", description:"Vitellaria paradoxa, the shea tree, grows across Benin's Sudanian savanna and is the backbone of rural women's economies. Shea butter extracted from its nuts has been used for cooking and skin care for thousands of years across West Africa." },
{ name:"Kapok Tree", country:"Benin", lat:8.0, lng:2.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra towers over Benin's traditional villages and holds deep spiritual significance in Vodun religion, which originated in Benin. Many village ceremonies take place beneath the kapok tree, considered a home for spirits and a point of contact with ancestors." },
{ name:"Néré — African Locust Bean", country:"Benin", lat:9.9, lng:2.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Parkia_biglobosa.jpg/640px-Parkia_biglobosa.jpg", description:"Parkia biglobosa produces the fermented seed paste dawadawa, one of West Africa's most important condiments and protein sources. Its large red pompom flowers are pollinated exclusively by bats, and a single tree feeds an entire household for months." },
{ name:"Voacanga", country:"Benin", lat:7.5, lng:2.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Voacanga_africana.jpg/640px-Voacanga_africana.jpg", description:"Voacanga africana grows in Benin's coastal forests and is one of West Africa's most important medicinal trees. Its bark and seeds contain ibogaine-related compounds used in Vodun healing rituals. It is now a primary source material for synthesising pharmaceutical ibogaine." },

// 🇧🇹 BHUTAN
{ name:"Blue Poppy", country:"Bhutan", lat:27.5, lng:90.5, type:"Alpine Flower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/Meconopsis_grandis.jpg/640px-Meconopsis_grandis.jpg", description:"Meconopsis grandis, the Himalayan blue poppy, is Bhutan's national flower and one of the most sought-after plants by alpine gardeners worldwide. Its extraordinary sky-blue petals are unique among poppies and bloom only briefly at altitudes above 3,500m." },
{ name:"Himalayan Cypress", country:"Bhutan", lat:27.3, lng:89.6, type:"Conifer", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cupressus_torulosa.jpg/640px-Cupressus_torulosa.jpg", description:"Cupressus torulosa is sacred in Bhutan and planted around every dzong (fortress monastery) and temple. Its aromatic wood is burned as incense in Buddhist ceremonies and the trees are considered protectors of sacred spaces, never cut." },
{ name:"Rhododendron", country:"Bhutan", lat:27.8, lng:90.2, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Rhododendron_arboreum_flowers.jpg/640px-Rhododendron_arboreum_flowers.jpg", description:"Over 46 rhododendron species grow in Bhutan, carpeting entire mountainsides in crimson, pink, white and purple from March through May. Rhododendron arboreum, the tree rhododendron, is Bhutan's national tree and can grow to 20m tall." },
{ name:"Cordyceps Fungus", country:"Bhutan", lat:28.0, lng:90.7, type:"Fungus", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Ophiocordyceps_sinensis.jpg/640px-Ophiocordyceps_sinensis.jpg", description:"Ophiocordyceps sinensis, the caterpillar fungus, grows above 3,500m in Bhutan and is the country's most valuable natural product. This parasitic fungus infects ghost moth larvae, mummifying them and sprouting from their heads. A single kilogram sells for up to $50,000." },
{ name:"Giant Rhubarb", country:"Bhutan", lat:27.6, lng:91.0, type:"Alpine Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Rheum_nobile.jpg/640px-Rheum_nobile.jpg", description:"Rheum nobile, the noble rhubarb, grows at 4,000–5,000m in Bhutan's high Himalayan meadows. Its translucent cream bracts form a cone-shaped tower to create a greenhouse effect, raising internal temperature by up to 10°C to protect flowers from frost." },

// 🇧🇴 BOLIVIA
{ name:"Puya raimondii", country:"Bolivia", lat:-16.5, lng:-67.5, type:"Bromeliad", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Puya_raimondii_2.jpg/640px-Puya_raimondii_2.jpg", description:"The Queen of the Andes grows on Bolivia's high Andean plateau at 3,200–4,800m, spending up to 100 years as a ground rosette before sending up a 10m flower spike with up to 8,000 individual flowers — then dying. Bolivia has the largest remaining populations." },
{ name:"Totora Reed", country:"Bolivia", lat:-15.8, lng:-69.1, type:"Reed", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Totora_reeds_Lake_Titicaca.jpg/640px-Totora_reeds_Lake_Titicaca.jpg", description:"Schoenoplectus tatora grows in vast beds on Lake Titicaca, the world's highest navigable lake. The Uru people build their floating islands, homes and boats entirely from totora reeds — a civilisation sustained entirely by a single plant for centuries." },
{ name:"Cinchona", country:"Bolivia", lat:-17.0, lng:-65.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Cinchona_officinalis.jpg/640px-Cinchona_officinalis.jpg", description:"Cinchona calisaya, native to Bolivia's Yungas cloud forests, produces quinine — the first effective treatment for malaria. When Spanish colonists introduced it to Europe in the 17th century, it changed the course of world history by enabling tropical colonisation." },
{ name:"Kantuta", country:"Bolivia", lat:-16.0, lng:-68.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Cantua_buxifolia.jpg/640px-Cantua_buxifolia.jpg", description:"Cantua buxifolia is Bolivia's national flower, producing pendant clusters of red, yellow and green flowers — mirroring the colours of the Bolivian flag. Sacred to the Inca as the flower of the gods, it blooms on high Andean slopes between 2,500 and 3,800m." },
{ name:"Rubber Tree", country:"Bolivia", lat:-11.0, lng:-65.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Hevea_brasiliensis_tapping.jpg/640px-Hevea_brasiliensis_tapping.jpg", description:"Hevea brasiliensis originates in the Amazon basin of Bolivia and Brazil. The 19th century rubber boom transformed Bolivia's Amazon lowlands, built the ornate Manaus opera house, and fuelled an era of notorious exploitation — all from the white latex of this single tree." },

// 🇧🇦 BOSNIA AND HERZEGOVINA
{ name:"Bosnian Pine", country:"Bosnia and Herzegovina", lat:43.5, lng:17.5, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Pinus_heldreichii.jpg/640px-Pinus_heldreichii.jpg", description:"Pinus heldreichii grows on Bosnia's highest limestone peaks, including Čvrsnica and Prenj mountains. Some specimens in the Dinaric Alps are over 1,000 years old, making them among the oldest trees in Europe. Their twisted silhouettes dominate the karst skyline." },
{ name:"Bosnian Iris", country:"Bosnia and Herzegovina", lat:43.8, lng:17.9, type:"Iris", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Iris_bosniaca.jpg/640px-Iris_bosniaca.jpg", description:"Iris bosniaca is endemic to Bosnia and Herzegovina's rocky limestone grasslands at 900–1,500m. Its stunning violet-blue flowers bloom briefly in May and June. Threatened by overgrazing and land abandonment, it exists in just a handful of known populations." },
{ name:"Ramonda", country:"Bosnia and Herzegovina", lat:44.0, lng:18.2, type:"Alpine Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/wikipedia/commons/thumb/5/58/Ramonda_serbica.jpg/640px-Ramonda_serbica.jpg", description:"Ramonda serbica grows on shaded north-facing limestone cliffs in Bosnia. A remarkable resurrection plant — it can lose 95% of its water content, appear completely dead, then fully recover after rain. It is a glacial relic from the Tertiary period." },
{ name:"Dinaric Bellflower", country:"Bosnia and Herzegovina", lat:44.2, lng:16.5, type:"Wildflower", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Campanula_hercegovina.jpg/640px-Campanula_hercegovina.jpg", description:"Campanula hercegovina is endemic to the limestone cliffs of the Dinaric Alps in Bosnia. Its large blue-violet bell-shaped flowers emerge from vertical rock faces each June. It is named for Herzegovina and grows nowhere else on Earth." },
{ name:"Black Pine", country:"Bosnia and Herzegovina", lat:43.2, lng:17.8, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Pinus_nigra_subsp._nigra.jpg/640px-Pinus_nigra_subsp._nigra.jpg", description:"Pinus nigra ssp. dalmatica forms dramatic ancient forests across the limestone mountains of Bosnia and Herzegovina. The Black River canyon near Foča contains some of the largest and oldest black pine specimens in the entire Balkans." },

// 🇧🇼 BOTSWANA
{ name:"Mopane Tree", country:"Botswana", lat:-22.0, lng:24.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Colophospermum_mopane.jpg/640px-Colophospermum_mopane.jpg", description:"Colophospermum mopane dominates vast areas of Botswana's Okavango and Chobe regions, its butterfly-shaped leaves folding in the midday heat to reduce water loss. Mopane worms — the caterpillars that feed on its leaves — are a vital protein source for millions of people." },
{ name:"Morula Tree", country:"Botswana", lat:-21.0, lng:25.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Sclerocarya_birrea.jpg/640px-Sclerocarya_birrea.jpg", description:"Sclerocarya birrea, the marula, is sacred in Botswana. Elephants travel great distances to eat its fermented fallen fruits. Its nuts produce an extraordinarily rich oil used in Botswana cosmetics and cooking, and its fruit is the basis of Amarula liqueur." },
{ name:"Baobab", country:"Botswana", lat:-20.5, lng:26.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata reaches mythic proportions in Botswana's northern regions. The famous Chapman's Baobab near Nxai Pan, used as a landmark by early explorers including David Livingstone, collapsed in 2016 after over 1,000 years standing. Its bark can be woven into rope." },
{ name:"Hoodia", country:"Botswana", lat:-23.5, lng:21.5, type:"Succulent", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Hoodia_gordonii_OU.jpg/640px-Hoodia_gordonii_OU.jpg", description:"Hoodia gordonii grows in Botswana's Kalahari and has been used by the San Bushmen for thousands of years to suppress hunger and thirst during long hunts. The active compound P57 became the subject of a major international patent dispute between a pharmaceutical company and San communities." },
{ name:"Wild Melon — Tsamma", country:"Botswana", lat:-23.0, lng:22.0, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Citrullus_lanatus_Crimson_Sweet.jpg/640px-Citrullus_lanatus_Crimson_Sweet.jpg", description:"Citrullus lanatus var. citroides, the tsamma melon, is the wild ancestor of the watermelon and grows across Botswana's Kalahari. For the San Bushmen, tsamma melons are the primary water source during dry seasons — a survival food that made life in the Kalahari possible." },

// 🇧🇷 BRAZIL
{ name:"Victoria Amazonica", country:"Brazil", lat:-3.0, lng:-60.0, type:"Water Lily", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Victoria_amazonica2.jpg/640px-Victoria_amazonica2.jpg", description:"The world's largest water lily, with circular pads up to 3m across growing in Brazil's Amazon tributaries. The leaf's ribbed underside — strong enough to support a child — inspired Joseph Paxton's design for the Crystal Palace in 1851." },
{ name:"Brazil Nut Tree", country:"Brazil", lat:-5.0, lng:-62.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Bertholletia_excelsa_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-022.jpg/640px-Bertholletia_excelsa_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-022.jpg", description:"Bertholletia excelsa grows to 50m in the Amazon and cannot be cultivated — it only reproduces in intact forest. Its cannonball-sized fruits fall from 50m, each containing 8–24 seeds. The tree depends entirely on the agouti rodent to disperse its seeds." },
{ name:"Ipê Amarelo", country:"Brazil", lat:-15.8, lng:-47.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4a/Ipe_amarelo.jpg/640px-Ipe_amarelo.jpg", description:"Handroanthus albus, Brazil's national tree, erupts in pure gold flowers before a single leaf emerges each spring. Entire forests turn yellow simultaneously in one of nature's most spectacular mass-flowering events. Its wood is so dense it is used as a natural alternative to tropical hardwoods." },
{ name:"Passion Flower", country:"Brazil", lat:-12.0, lng:-49.0, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/Passiflora_caerulea.jpg/640px-Passiflora_caerulea.jpg", description:"Brazil is the global centre of Passiflora diversity with over 150 native species. Portuguese missionaries named it Flos Passionis — Flower of the Passion — interpreting its complex corona as the crown of thorns. Brazil is the world's largest producer of passion fruit juice." },
{ name:"Titan Arum", country:"Brazil", lat:-8.0, lng:-35.0, type:"Bromeliad", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Alcantarea_imperialis.jpg/640px-Alcantarea_imperialis.jpg", description:"Alcantarea imperialis, the imperial bromeliad, grows on vertical granite cliff faces in Brazil's Atlantic Forest. Its rosette of silver-green leaves can reach 2m across and it flowers just once in its life after decades of growth — producing a 3m tall inflorescence visible from kilometres away." },

// 🇧🇳 BRUNEI
{ name:"Rafflesia pricei", country:"Brunei", lat:4.5, lng:114.6, type:"Holoparasite", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rafflesia_arnoldii.jpg/640px-Rafflesia_arnoldii.jpg", description:"Rafflesia pricei grows in Brunei's ancient Borneo rainforests as a completely parasitic plant with no roots, stems or leaves — only visible when its enormous foul-smelling flower bursts through a vine. Brunei's remaining old-growth forest is its last significant stronghold." },
{ name:"Pitcher Plant — Nepenthes", country:"Brunei", lat:4.2, lng:114.8, type:"Carnivorous Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Nepenthes_rajah1.jpg/640px-Nepenthes_rajah1.jpg", description:"Brunei's Borneo rainforests harbour extraordinary Nepenthes diversity. Nepenthes lowii and related species produce pitchers that trap not just insects but also tree shrew droppings — an extraordinary nutrient-acquisition strategy unique to Borneo's montane pitcher plants." },
{ name:"Borneo Ironwood", country:"Brunei", lat:4.7, lng:114.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Eusideroxylon_zwageri.jpg/640px-Eusideroxylon_zwageri.jpg", description:"Eusideroxylon zwageri, Borneo ironwood or belian, is one of the world's heaviest and most durable timbers. Traditional Brunei houses, bridges and royal palaces were built from it. A tree takes over 300 years to mature, and Brunei has placed it under strict protection." },
{ name:"Sago Palm", country:"Brunei", lat:4.3, lng:114.4, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/85/Metroxylon_sagu.jpg/640px-Metroxylon_sagu.jpg", description:"Metroxylon sagu grows in Brunei's coastal peat swamp forests and has been the dietary staple of Borneo's indigenous peoples for millennia. A single palm trunk can yield 300kg of starch. Sago palms die after flowering once — typically after 7–15 years." },
{ name:"Wild Durian", country:"Brunei", lat:4.6, lng:114.7, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Durian_DSCN0870_crop.jpg/640px-Durian_DSCN0870_crop.jpg", description:"Brunei's forests contain several wild Durio species, ancestors of the cultivated durian — the king of fruits. Wild durians are pollinated exclusively by cave nectar bats that fly enormous distances each night. Brunei's Durio graveolens produces vivid orange flesh with a milder flavour." },
// 🇧🇬 BULGARIA
{ name:"Bulgarian Rose", country:"Bulgaria", lat:42.7, lng:25.2, type:"Shrub", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_damascena.jpg/640px-Rosa_damascena.jpg", description:"Rosa damascena, the Damask rose, transformed Bulgaria's Rose Valley into the world's most important rose oil producer. Bulgaria produces 70% of the world's rose otto — the most expensive essential oil on Earth. It takes 3,000 kilograms of hand-picked petals to produce just 1 kilogram of oil." },
{ name:"Rila Pine", country:"Bulgaria", lat:42.1, lng:23.3, type:"Conifer", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Pinus_peuce.jpg/640px-Pinus_peuce.jpg", description:"Pinus peuce, the Macedonian or Balkan pine, is native to Bulgaria's Rila and Pirin mountains. Growing at up to 2,400m, some specimens in the Pirin National Park are over 1,300 years old, making them among the oldest living trees in Europe." },
{ name:"Haberlea", country:"Bulgaria", lat:42.5, lng:24.8, type:"Alpine Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Haberlea_rhodopensis.jpg/640px-Haberlea_rhodopensis.jpg", description:"Haberlea rhodopensis, the resurrection plant of the Rhodope Mountains, is endemic to Bulgaria and northern Greece. It can lose virtually all its water and survive for years in a desiccated state, reviving completely within hours of rainfall. A glacial relic with no close living relatives." },
{ name:"Pirin Tulip", country:"Bulgaria", lat:41.7, lng:23.5, type:"Bulb", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tulipa_rhodopaea.jpg/640px-Tulipa_rhodopaea.jpg", description:"Tulipa rhodopaea is a rare endemic tulip found only in Bulgaria's Rhodope and Pirin mountains, blooming briefly in May at elevations above 1,200m. Threatened by collection for the horticultural trade and habitat loss, it is strictly protected under Bulgarian law." },
{ name:"Gentiana bulgarica", country:"Bulgaria", lat:42.3, lng:24.0, type:"Alpine Flower", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gentiana_acaulis.jpg/640px-Gentiana_acaulis.jpg", description:"Gentiana bulgarica is a rare gentian endemic to Bulgaria's highest mountain ranges. Its intensely blue trumpet-shaped flowers bloom above 2,000m in late summer. It is used as the symbol of Bulgaria's Rila National Park and appears on the park's official emblem." },

// 🇧🇫 BURKINA FASO
{ name:"Shea Tree", country:"Burkina Faso", lat:12.4, lng:-1.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Vitellaria_paradoxa.jpg/640px-Vitellaria_paradoxa.jpg", description:"Vitellaria paradoxa is the economic backbone of Burkina Faso — over 3 million women depend on shea for their livelihoods. Burkina Faso is the world's largest shea exporter. The tree grows wild across the Sudanian savanna and takes 20 years to produce its first nuts." },
{ name:"Néré", country:"Burkina Faso", lat:11.8, lng:-1.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Parkia_biglobosa.jpg/640px-Parkia_biglobosa.jpg", description:"Parkia biglobosa is central to Burkinabé cuisine — its fermented seeds produce soumbala, a pungent condiment equivalent to West Africa's soy sauce. Every part of the tree is used: flowers for sugar, pods as cattle feed, bark for medicine and tannin." },
{ name:"African Locust Bean", country:"Burkina Faso", lat:13.1, lng:-2.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata baobabs are community gathering points across Burkina Faso's villages, their enormous trunks hollowed by generations into storage spaces and even temporary shelters. Baobab leaf powder is used to treat malaria and the fruit pulp makes a nutritious porridge." },
{ name:"Roselle", country:"Burkina Faso", lat:12.0, lng:-1.3, type:"Annual Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/49/Hibiscus_sabdariffa.jpg/640px-Hibiscus_sabdariffa.jpg", description:"Hibiscus sabdariffa, known as bissap in Burkina Faso, produces deep crimson calyces used to make the country's most popular drink — a tangy, vivid red hibiscus tea. Rich in vitamin C and antioxidants, bissap is consumed daily and sold at every market." },
{ name:"Moringa", country:"Burkina Faso", lat:11.5, lng:-1.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Moringa_oleifera_Blanco1.jpg/640px-Moringa_oleifera_Blanco1.jpg", description:"Moringa oleifera is increasingly cultivated across Burkina Faso as a nutritional intervention against malnutrition. Called the miracle tree, its leaves contain extraordinary concentrations of vitamins and protein and can be dried and powdered for year-round use in the Sahel." },

// 🇧🇮 BURUNDI
{ name:"Giant Lobelia", country:"Burundi", lat:-3.4, lng:29.9, type:"Alpine Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Lobelia_deckenii.jpg/640px-Lobelia_deckenii.jpg", description:"Lobelia deckenii grows on Burundi's Kibira forest highlands in the Albertine Rift — one of Africa's most biodiverse regions. These extraordinary giant lobelias form rosettes of succulent leaves and send up towering flower spikes exceeding 6m in the afroalpine zone." },
{ name:"African Olive", country:"Burundi", lat:-3.6, lng:29.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Olea_europaea_subsp_africana.jpg/640px-Olea_europaea_subsp_africana.jpg", description:"Olea welwitschii forms montane forests across Burundi's ridge tops, its gnarled trunks draped in mosses. One of the most important timber trees of the Great Lakes region, it is under severe pressure from charcoal production and agricultural land clearing." },
{ name:"Candelabra Euphorbia", country:"Burundi", lat:-3.8, lng:29.7, type:"Succulent Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Euphorbia_candelabrum.jpg/640px-Euphorbia_candelabrum.jpg", description:"Euphorbia candelabrum towers over Burundi's drier hillsides like a giant candelabra, reaching 15m. Its milky toxic latex was used by warriors to poison arrows. Despite resembling cacti, this plant evolved entirely independently in Africa — a classic case of convergent evolution." },
{ name:"Arabica Coffee", country:"Burundi", lat:-3.5, lng:30.0, type:"Shrub", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Roasted_coffee_beans.jpg/640px-Roasted_coffee_beans.jpg", description:"Coffea arabica cultivation defines Burundi's highland landscape and economy — coffee accounts for over 80% of export earnings. Grown at 1,500–2,000m in volcanic soils, Burundian coffee is prized for its complex fruity acidity and is among the most sought-after in specialty coffee markets." },
{ name:"Papyrus", country:"Burundi", lat:-3.3, lng:29.4, type:"Reed", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Papyrus_in_lake_victoria.jpg/640px-Papyrus_in_lake_victoria.jpg", description:"Cyperus papyrus forms vast swamps along Burundi's Lake Tanganyika and Rusizi River. Ancient Egyptians used this plant to make the world's first paper. In Burundi today, papyrus is harvested for basket weaving and mat making, providing income for thousands of lakeside families." },
// 🇨🇻 CABO VERDE
{ name:"Dragoeiro — Dragon Tree", country:"Cabo Verde", lat:15.1, lng:-23.6, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Dragon_blood_tree_Socotra.jpg/640px-Dragon_blood_tree_Socotra.jpg", description:"Dracaena draco grows on Cabo Verde's volcanic cliffs and is one of the archipelago's most iconic trees. Its umbrella-shaped canopy and red sap — known as dragon's blood — have made it a symbol of the islands. Some specimens are believed to be over 1,000 years old." },
{ name:"Tamarind", country:"Cabo Verde", lat:15.0, lng:-23.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tamarindus_indica.jpg/640px-Tamarindus_indica.jpg", description:"Tamarindus indica was brought to Cabo Verde by early Portuguese settlers and has become deeply embedded in the islands' culture and cuisine. Its tangy pods are used in sauces, drinks and traditional medicine across all nine inhabited islands." },
{ name:"Purgueira", country:"Cabo Verde", lat:14.9, lng:-23.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Jatropha_curcas.jpg/640px-Jatropha_curcas.jpg", description:"Jatropha curcas has been cultivated on Cabo Verde's dry hillsides for centuries as a living fence and soil stabiliser. Its seeds produce a non-edible oil that has been used as lamp fuel and is now researched as a biofuel. Every part of the plant is toxic if consumed." },
{ name:"Figueira — Wild Fig", country:"Cabo Verde", lat:15.2, lng:-23.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ficus_citrifolia.jpg/640px-Ficus_citrifolia.jpg", description:"Ficus species grow in the deep ribeiras (ravines) of Cabo Verde's Santiago and Santo Antão islands, their roots gripping volcanic rock. These wild figs provide critical shade, fruit and habitat on islands where tree cover is extremely scarce." },
{ name:"Carqueja — Cabo Verde Wormwood", country:"Cabo Verde", lat:15.05, lng:-23.62, type:"Shrub", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artemisia_gorgonum.jpg/640px-Artemisia_gorgonum.jpg", description:"Artemisia gorgonum is endemic to Cabo Verde and used in the islands' traditional medicine as a treatment for fever, digestive disorders and as a bitter tonic. Its aromatic silver-grey leaves are a distinctive feature of the highland vegetation of Santo Antão." },

// 🇰🇭 CAMBODIA
{ name:"Rumdul", country:"Cambodia", lat:11.6, lng:104.9, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Sphaerocoryne_affinis.jpg/640px-Sphaerocoryne_affinis.jpg", description:"Mitrella mesnyi, the rumdul, is Cambodia's national flower. Its small, intensely fragrant cream-yellow flowers are said to smell like a beautiful Khmer woman. Blooming at night, the scent carries far through the evening air of Cambodia's forests and gardens." },
{ name:"Sugar Palm", country:"Cambodia", lat:12.0, lng:105.0, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Borassus_flabellifer.jpg/640px-Borassus_flabellifer.jpg", description:"Borassus flabellifer is Cambodia's national tree and appears on the country's coat of arms. Every part is useful — sap fermented into palm wine or boiled into sugar, leaves for weaving and thatching, fruit eaten fresh or preserved. A single palm can produce 200 litres of sap per year." },
{ name:"Lotus", country:"Cambodia", lat:11.5, lng:104.8, type:"Aquatic Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Nelumbo_nucifera_MS_4967.jpg/640px-Nelumbo_nucifera_MS_4967.jpg", description:"Nelumbo nucifera blooms across Cambodia's Tonle Sap Lake and rice paddies in pink and white clouds. Sacred in Buddhism as a symbol of spiritual enlightenment rising from muddy water, lotus petals, seeds, roots and stems are all eaten in Khmer cuisine." },
{ name:"Giant Bamboo", country:"Cambodia", lat:13.0, lng:103.8, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Bamboo_garden.jpg/640px-Bamboo_garden.jpg", description:"Dendrocalamus giganteus grows in Cambodia's forests with culms reaching 30m — among the tallest bamboo on Earth. Cambodian traditional construction relies heavily on bamboo, and the instrument tro khmer — Cambodia's traditional fiddle — is made from its internodes." },
{ name:"Cardamom", country:"Cambodia", lat:11.3, lng:103.5, type:"Herb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Elettaria_cardamomum.jpg/640px-Elettaria_cardamomum.jpg", description:"Amomum kravanh, Cambodian cardamom, grows wild in the Cardamom Mountains — one of Southeast Asia's most biodiverse and least explored rainforests. Cambodia was once the world's largest cardamom exporter. Wild cardamom harvest provides critical income for forest communities." },
// 🇨🇲 CAMEROON
{ name:"Prunus africana", country:"Cameroon", lat:4.0, lng:9.7, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Prunus_africana.jpg/640px-Prunus_africana.jpg", description:"Prunus africana grows on Cameroon's Mount Cameroon and Bamenda Highlands. Its bark is harvested to treat prostate enlargement and is one of Africa's most commercially exploited medicinal plants. Over-harvesting has pushed it to endangered status across its range." },
{ name:"Iroko Tree", country:"Cameroon", lat:3.8, lng:11.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Milicia_excelsa.jpg/640px-Milicia_excelsa.jpg", description:"Milicia excelsa, the iroko or African teak, towers up to 50m in Cameroon's Congo Basin rainforest. Its durable golden-brown timber is used worldwide as a mahogany substitute. In Cameroonian tradition, the iroko is considered sacred — home to spirits that must be appeased before felling." },
{ name:"Raffia Palm", country:"Cameroon", lat:5.5, lng:10.4, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Raffia_farinifera.jpg/640px-Raffia_farinifera.jpg", description:"Raphia regalis, the royal raffia palm, grows in Cameroon's Western Highlands and produces the world's largest leaves — up to 25m long. Its sap is tapped to make palm wine, its fibres woven into baskets and cloth, and Cameroon's Bamum Kingdom used raffia as currency." },
{ name:"Baillonella — Moabi", country:"Cameroon", lat:2.5, lng:12.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Baillonella_toxisperma.jpg/640px-Baillonella_toxisperma.jpg", description:"Baillonella toxisperma is one of the Congo Basin's most valuable and threatened trees. Its seeds produce moabi oil, used in cosmetics and cooking, while its fruit feeds forest elephants and gorillas. Trees take 100+ years to mature and are systematically logged for their prized timber." },
{ name:"Gnetum africanum — Eru", country:"Cameroon", lat:3.5, lng:11.0, type:"Vine", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Gnetum_africanum.jpg/640px-Gnetum_africanum.jpg", description:"Gnetum africanum is Cameroon's most important wild vegetable — its leaves are the basis of eru soup, a beloved national dish. Harvested entirely from the wild in the Congo Basin rainforest, rising demand has put enormous pressure on natural populations across Central Africa." },

// 🇨🇦 CANADA
{ name:"Sugar Maple", country:"Canada", lat:45.5, lng:-73.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/24701-nature-natural-beauty.jpg/640px-24701-nature-natural-beauty.jpg", description:"Acer saccharum is Canada's national symbol, emblazoned on the flag. Each autumn its leaves turn the most spectacular shades of red, orange and gold. Canada produces 71% of the world's maple syrup — tapping 50+ million trees annually in Quebec's vast maple forests." },
{ name:"Trembling Aspen", country:"Canada", lat:53.5, lng:-113.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Populus_tremuloides_Autumn.jpg/640px-Populus_tremuloides_Autumn.jpg", description:"Populus tremuloides is North America's most widely distributed tree, blanketing Canada from Newfoundland to the Yukon. The Pando clone in Utah — a single trembling aspen organism connected by roots — is considered the world's largest living thing by mass, weighing 6,000 tonnes." },
{ name:"Western Red Cedar", country:"Canada", lat:49.3, lng:-123.1, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Thuja_plicata_tree.jpg/640px-Thuja_plicata_tree.jpg", description:"Thuja plicata is the cornerstone of Pacific Northwest Indigenous cultures. Called the Tree of Life by coastal First Nations, it provided cedar planks for longhouses, bark for clothing and baskets, and wood for the towering totem poles that encode entire genealogies and histories." },
{ name:"Pitcher Plant", country:"Canada", lat:47.5, lng:-52.7, type:"Carnivorous Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/47/Sarracenia_purpurea.jpg/640px-Sarracenia_purpurea.jpg", description:"Sarracenia purpurea, the purple pitcher plant, is Newfoundland and Labrador's provincial flower. Growing in Canada's vast peat bogs, it traps and digests insects in its water-filled pitchers to compensate for the nutrient-poor sphagnum moss environment." },
{ name:"Prairie Crocus", country:"Canada", lat:49.9, lng:-97.1, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Anemone_patens.jpg/640px-Anemone_patens.jpg", description:"Pulsatilla patens, Manitoba's floral emblem, pushes through the last prairie snow each March — often blooming while frost still covers the ground. Its silky purple flowers are covered in fine hairs that trap warm air, creating a microclimate several degrees warmer than the surrounding air." },
// 🇨🇫 CENTRAL AFRICAN REPUBLIC
{ name:"Ayous — African Whitewood", country:"Central African Republic", lat:5.5, lng:18.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Triplochiton_scleroxylon.jpg/640px-Triplochiton_scleroxylon.jpg", description:"Triplochiton scleroxylon is one of the most commercially important trees of the Congo Basin rainforest. Its lightweight pale timber is used for plywood, furniture and musical instruments worldwide. CAR's forests hold some of the last intact old-growth ayous populations in Central Africa." },
{ name:"Moabi", country:"Central African Republic", lat:4.5, lng:18.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Baillonella_toxisperma.jpg/640px-Baillonella_toxisperma.jpg", description:"Baillonella toxisperma fruits are a critical food source for forest elephants and western lowland gorillas in CAR's Dzanga-Sangha reserve. The BaAka pygmy people use moabi oil for cooking, hair care and body protection against insects in the rainforest." },
{ name:"Limba Tree", country:"Central African Republic", lat:6.0, lng:19.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Terminalia_superba.jpg/640px-Terminalia_superba.jpg", description:"Terminalia superba grows throughout CAR's dense rainforests, its distinctive layered horizontal branches creating a pagoda-like silhouette. Its pale timber is exported globally for furniture and veneer, while its bark is used in traditional medicine to treat fever and skin conditions." },
{ name:"African Breadfruit", country:"Central African Republic", lat:5.0, lng:20.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Treculia_africana.jpg/640px-Treculia_africana.jpg", description:"Treculia africana produces enormous cannonball-sized fruits up to 50cm across that fall directly from the trunk. The starchy seeds are ground into flour and cooked as porridge — a vital food security crop for communities in CAR's forest zones during lean seasons." },
{ name:"Boleko Nut", country:"Central African Republic", lat:4.8, lng:17.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ongokea_gore.jpg/640px-Ongokea_gore.jpg", description:"Ongokea gore is found in CAR's southwestern rainforests. Its seeds produce isano oil — a uniquely drying oil historically used as a varnish and wood preservative. The BaAka people use its bark medicinally and its dense wood for tool handles and construction." },

// 🇹🇩 CHAD
{ name:"Desert Rose", country:"Chad", lat:15.5, lng:18.5, type:"Succulent", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Adenium_obesum.jpg/640px-Adenium_obesum.jpg", description:"Adenium obesum grows in Chad's Sahel and Ennedi plateau, producing spectacular pink and white trumpet flowers from its swollen water-storing trunk. Its toxic latex has been used by Chadian hunters to poison arrows for centuries, yet it is increasingly cultivated as an ornamental worldwide." },
{ name:"Doum Palm", country:"Chad", lat:13.5, lng:14.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Hyphaene_thebaica.jpg/640px-Hyphaene_thebaica.jpg", description:"Hyphaene thebaica, the doum palm, is the only palm that branches repeatedly, creating a distinctive forked silhouette across Chad's Saharan oases. Ancient Egyptians revered it and placed its fruits in tombs. Its gingerbread-flavoured fruit and woven leaves sustain communities across the Sahel." },
{ name:"Acacia — Gum Arabic Tree", country:"Chad", lat:12.5, lng:15.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Acacia_senegal_MS_4724.jpg/640px-Acacia_senegal_MS_4724.jpg", description:"Senegalia senegal is the primary source of gum arabic — the world's most important natural gum, used in confectionery, soft drinks, pharmaceuticals and ink. Chad's Sahel sits within the Gum Belt and gum arabic tapping is a critical income source for millions of Chadian families." },
{ name:"Saharan Cypress", country:"Chad", lat:21.8, lng:17.5, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Cupressus_dupreziana.jpg/640px-Cupressus_dupreziana.jpg", description:"Cupressus dupreziana survives in the Tassili n'Ajjer plateau straddling Chad and Algeria — one of the most isolated tree populations on Earth. These ancient cypresses, some over 2,000 years old, are relics of a time when the Sahara was green and well-watered." },
{ name:"Baobab", country:"Chad", lat:11.0, lng:15.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata reaches its northern Saharan limit in Chad, growing in isolated stands along ancient watercourses. In Chadian culture the baobab is a communal tree — meetings are held beneath it, disputes settled under it, and the elderly are sometimes buried within its hollow trunk." },
// 🇨🇱 CHILE
{ name:"Monkey Puzzle Tree", country:"Chile", lat:-38.5, lng:-71.5, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9a/Araucaria_araucana.jpg/640px-Araucaria_araucana.jpg", description:"Araucaria araucana, Chile's national tree, has existed for 200 million years — predating dinosaurs. Its large edible seeds, piñones, are a dietary staple of the Mapuche people harvested each autumn. Threatened by logging and fire, it is now strictly protected in Chilean law." },
{ name:"Copihue — Chilean Bellflower", country:"Chile", lat:-39.8, lng:-73.2, type:"Vine", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Lapageria_rosea.jpg/640px-Lapageria_rosea.jpg", description:"Lapageria rosea is Chile's national flower, producing waxy deep-crimson bell-shaped flowers in the temperate rainforests of southern Chile. Named after Napoleon's wife Joséphine de la Pagerie, it is considered one of the most beautiful flowers in the world." },
{ name:"Alerce", country:"Chile", lat:-41.0, lng:-72.5, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Fitzroya_cupressoides.jpg/640px-Fitzroya_cupressoides.jpg", description:"Fitzroya cupressoides is South America's longest-lived tree — a specimen in Chile's Los Lagos region is 3,640 years old, making it the second-oldest living tree on Earth. Named after Captain FitzRoy of the Beagle, it reaches 60m and its timber was once the most prized in South America." },
{ name:"Yareta", country:"Chile", lat:-22.5, lng:-68.0, type:"Cushion Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Azorella_compacta.jpg/640px-Azorella_compacta.jpg", description:"Azorella compacta forms rock-hard bright green cushions across Chile's Atacama highlands at 3,000–5,000m. Growing less than 1.5cm per year, a cushion 1m across may be over 3,000 years old. Historically burned as fuel — its slow growth means populations are extremely slow to recover." },
{ name:"Puya chilensis", country:"Chile", lat:-33.5, lng:-71.0, type:"Bromeliad", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Puya_chilensis.jpg/640px-Puya_chilensis.jpg", description:"Puya chilensis grows on Chile's coastal hills and produces towering yellow-green flower spikes up to 4m tall after decades of growth. Notoriously, its curved spines trap small animals — sheep, birds and lizards — which slowly decompose and fertilise the plant as nutrients." },

// 🇨🇳 CHINA
{ name:"Dawn Redwood", country:"China", lat:30.0, lng:109.9, type:"Conifer", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Metasequoia_glyptostroboides.jpg/640px-Metasequoia_glyptostroboides.jpg", description:"Metasequoia glyptostroboides was known only from 65-million-year-old fossils until discovered alive in Hubei province in 1944. Fewer than 400 wild trees survive in a single Chinese valley — one of the most astonishing botanical rediscoveries of the 20th century." },
{ name:"Snow Lotus", country:"China", lat:30.0, lng:90.0, type:"Alpine Flower", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Saussurea_involucrata.jpg/640px-Saussurea_involucrata.jpg", description:"Saussurea involucrata grows on Himalayan and Tibetan cliff faces at 3,000–5,400m — one of the highest-growing flowering plants on Earth. Sacred in Tibetan medicine, it takes 3–5 years to bloom and has been harvested to near-extinction in many areas." },
{ name:"Ginkgo", country:"China", lat:31.2, lng:121.5, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Ginkgo_Biloba_Leaves_-_Black_Background.jpg/640px-Ginkgo_Biloba_Leaves_-_Black_Background.jpg", description:"Ginkgo biloba is a living fossil unchanged for 270 million years — its distinctive fan-shaped leaves appear in Jurassic rock. Wild populations exist only in China's Zhejiang province. Some temple ginkgos in China are over 3,000 years old and are designated national living heritage trees." },
{ name:"Dove Tree", country:"China", lat:30.5, lng:103.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Davidia_involucrata_Vilmoriniana.jpg/640px-Davidia_involucrata_Vilmoriniana.jpg", description:"Davidia involucrata, the ghost or dove tree, is endemic to central China. When it blooms in May its large white bracts flutter in the breeze like hundreds of white handkerchiefs or doves — causing Western plant hunters of the 19th century to risk their lives to bring specimens back to Europe." },
{ name:"Tree Peony", country:"China", lat:34.7, lng:112.4, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Paeonia_suffruticosa.jpg/640px-Paeonia_suffruticosa.jpg", description:"Paeonia suffruticosa has been cultivated in China for over 1,500 years and was the imperial flower of the Tang Dynasty. Luoyang holds the world's most celebrated tree peony festival each April. Wild populations in China's Qinling Mountains are now critically threatened by habitat loss." },
// 🇨🇴 COLOMBIA
{ name:"Wax Palm", country:"Colombia", lat:4.6, lng:-75.7, type:"Palm", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ceroxylon_quindiuense.jpg/640px-Ceroxylon_quindiuense.jpg", description:"Ceroxylon quindiuense is Colombia's national tree and the world's tallest palm, reaching 60m in the Andean cloud forests of the Cocora Valley. Its trunk is coated in a waxy substance once harvested for candles. Now endangered, its decline threatens the yellow-eared parrot that nests exclusively in it." },
{ name:"Orchid — Cattleya trianae", country:"Colombia", lat:4.7, lng:-74.1, type:"Orchid", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Cattleya_trianae.jpg/640px-Cattleya_trianae.jpg", description:"Cattleya trianae, the Christmas orchid, is Colombia's national flower. Blooming in December with large lavender and white flowers, it grows epiphytically in Colombia's Andean forests. Colombia is the world's most orchid-diverse country with over 4,000 native species." },
{ name:"Heliconia", country:"Colombia", lat:1.2, lng:-77.3, type:"Tropical Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Heliconia_rostrata.jpg/640px-Heliconia_rostrata.jpg", description:"Colombia has over 100 native Heliconia species — more than any other country. Their dramatic waxy bracts in red, orange and yellow evolved specifically to fit the curved bills of hummingbirds. The lobster claw heliconia has become one of the world's most exported tropical cut flowers." },
{ name:"Espeletia — Frailejón", country:"Colombia", lat:4.5, lng:-74.3, type:"Alpine Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Espeletia_grandiflora.jpg/640px-Espeletia_grandiflora.jpg", description:"Espeletia grandiflora grows exclusively in Colombia's páramo ecosystems above 3,000m. These extraordinary woolly-leaved plants trap moisture from clouds, feeding Bogotá's water supply. Colombia has over 100 frailejón species — 90% found nowhere else on Earth." },
{ name:"Tagua Palm", country:"Colombia", lat:5.5, lng:-77.0, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Phytelephas_aequatorialis.jpg/640px-Phytelephas_aequatorialis.jpg", description:"Phytelephas macrocarpa produces vegetable ivory — seeds so hard they were used as ivory substitutes for buttons and billiard balls before plastics. Colombia's Pacific coast communities harvest tagua sustainably as a rainforest conservation alternative to cattle ranching." },

// 🇰🇲 COMOROS
