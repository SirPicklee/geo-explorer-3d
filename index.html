{ name:"Ylang-Ylang", country:"Comoros", lat:-11.7, lng:43.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cananga_odorata.jpg/640px-Cananga_odorata.jpg", description:"Cananga odorata is the economic backbone of Comoros — the islands supply over 80% of the world's ylang-ylang essential oil, used in Chanel No.5 and hundreds of other perfumes. Its star-shaped yellow flowers are steam-distilled for up to 20 hours to extract the precious oil." },
{ name:"Coelacanth Tree — Takamaka", country:"Comoros", lat:-11.5, lng:43.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Calophyllum_inophyllum.jpg/640px-Calophyllum_inophyllum.jpg", description:"Calophyllum inophyllum, the takamaka, lines Comoros' beaches with a dense canopy of glossy leaves and fragrant white flowers. Its seed oil has been used for centuries as lamp fuel and skin treatment. Comorian fishermen traditionally carved their outrigger canoes from its trunk." },
{ name:"Vanilla", country:"Comoros", lat:-11.8, lng:43.5, type:"Vine", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Vanilla_planifolia.jpg/640px-Vanilla_planifolia.jpg", description:"Vanilla planifolia cultivation in Comoros produces some of the world's finest vanilla. Each flower must be hand-pollinated within 12 hours of opening. The cured pods take 6 months to develop their complex flavour. Comoros vanilla is prized by top pastry chefs worldwide." },
{ name:"Coconut Palm", country:"Comoros", lat:-11.6, lng:43.3, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera defines the Comorian landscape and diet. Coconut oil, coconut milk, and grated coconut are fundamental to Comorian cuisine. The islands' Arab and Swahili trading history spread coconut cultivation across the entire Indian Ocean world." },
{ name:"Breadfruit", country:"Comoros", lat:-11.65, lng:43.35, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis is a staple food tree across Comoros, producing large starchy fruits year-round. Captain Bligh's ill-fated Bounty voyage was carrying breadfruit seedlings from Tahiti to the Caribbean when the famous mutiny occurred — testament to this plant's importance as a colonial food crop." },
// 🇨🇬 CONGO
{ name:"Sapele", country:"Congo", lat:-1.5, lng:15.8, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Entandrophragma_cylindricum.jpg/640px-Entandrophragma_cylindricum.jpg", description:"Entandrophragma cylindricum towers up to 45m in the Congo Basin rainforest. Its interlocked grain produces a shimmering ribbon figure when quarter-sawn, making sapele one of the world's most prized furniture and guitar-making timbers. A single tree can take 200 years to reach harvestable size." },
{ name:"Moabi", country:"Congo", lat:-2.0, lng:16.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Baillonella_toxisperma.jpg/640px-Baillonella_toxisperma.jpg", description:"Baillonella toxisperma is the Congo Basin's most important non-timber forest product tree. Communities harvest its oil-rich seeds for cooking and cosmetics while forest elephants and gorillas depend on its fallen fruits. A keystone species for both people and wildlife." },
{ name:"Mbau — Wenge", country:"Congo", lat:-1.0, lng:17.5, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Millettia_laurentii.jpg/640px-Millettia_laurentii.jpg", description:"Millettia laurentii, wenge, produces one of Africa's most dramatically beautiful timbers — jet black with fine pale streaks. Prized for flooring, furniture and musical instruments, it has been logged to endangered status in Congo's forests over the past three decades." },
{ name:"Raffia Palm", country:"Congo", lat:-2.5, lng:16.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Raffia_farinifera.jpg/640px-Raffia_farinifera.jpg", description:"Raphia palms form dense gallery forests along Congo's river margins. Their fermented sap makes palm wine — a cultural cornerstone of Congolese social life. Raffia fibre woven into cloth was used as currency across the Kingdom of Kongo for centuries before European contact." },
{ name:"Marantaceae — Prayer Plant", country:"Congo", lat:-1.8, lng:15.2, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Marantochloa_leucantha.jpg/640px-Marantochloa_leucantha.jpg", description:"Marantochloa species dominate the understory of Congo's rainforest, their large leaves used universally for wrapping food for cooking and market. The iconic moambe chicken dish is traditionally steamed in marantaceae leaves, which impart a subtle earthy flavour." },

// 🇨🇷 COSTA RICA
{ name:"Guaria Morada — Purple Orchid", country:"Costa Rica", lat:9.9, lng:-84.1, type:"Orchid", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Guarianthe_skinneri.jpg/640px-Guarianthe_skinneri.jpg", description:"Guarianthe skinneri is Costa Rica's national flower, blooming in spectacular purple clusters from February through April. It grows epiphytically on trees throughout the country's forests and was chosen as the national flower in 1939 for its extraordinary beauty and abundance." },
{ name:"Ceiba", country:"Costa Rica", lat:10.3, lng:-84.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra, Costa Rica's national tree, towers up to 70m above the rainforest canopy. Its enormous buttress roots can span 10m and its silky cotton-filled seed pods were used by indigenous peoples to waterproof fabric and stuff pillows and life preservers." },
{ name:"Heliconias", country:"Costa Rica", lat:10.5, lng:-84.0, type:"Tropical Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Heliconia_rostrata.jpg/640px-Heliconia_rostrata.jpg", description:"Costa Rica has over 40 native Heliconia species growing in its rainforests and cloud forests. These dramatic tropical plants are critical food sources for hermit hummingbirds — a relationship so tightly co-evolved that each heliconia species matches the bill curve of a specific hummingbird." },
{ name:"Bougainvillea", country:"Costa Rica", lat:9.8, lng:-83.8, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Bougainvillea_01.jpg/640px-Bougainvillea_01.jpg", description:"Bougainvillea spectabilis cascades over walls and fences across Costa Rica in vivid magenta, orange and white. What appear to be petals are actually modified leaves called bracts — the true flowers are tiny white tubes hidden within. Costa Rica cultivates over 300 varieties." },
{ name:"Strangler Fig", country:"Costa Rica", lat:10.4, lng:-84.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ficus_aurea_strangler_fig.jpg/640px-Ficus_aurea_strangler_fig.jpg", description:"Ficus species are keystone trees in Costa Rica's rainforests — their year-round fruit production feeds more species than any other plant. The strangler fig begins life as an epiphyte, sending roots down to the ground that eventually engulf and outlive the host tree entirely." },
// 🇨🇮 CÔTE D'IVOIRE
{ name:"Iroko Tree", country:"Côte d'Ivoire", lat:5.4, lng:-4.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Milicia_excelsa.jpg/640px-Milicia_excelsa.jpg", description:"Milicia excelsa is Côte d'Ivoire's most important timber export. Its golden-brown durable wood is used globally as a mahogany substitute. In Ivorian tradition the iroko is considered sacred — a spirit lives within it and must be appeased with offerings before any tree is felled." },
{ name:"Cacao Tree", country:"Côte d'Ivoire", lat:6.8, lng:-5.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao defines Côte d'Ivoire's economy — the country produces 40% of the world's cocoa supply, making it the largest producer on Earth. The pods grow directly from the trunk and branches in a process called cauliflory, each containing 20–50 seeds surrounded by sweet white pulp." },
{ name:"African Oil Palm", country:"Côte d'Ivoire", lat:5.6, lng:-4.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Elaeis_guineensis.jpg/640px-Elaeis_guineensis.jpg", description:"Elaeis guineensis is native to West Africa and Côte d'Ivoire is among its primary natural habitats. Palm oil extracted from its bright orange fruit bunches is the world's most consumed vegetable oil — found in half of all supermarket products from biscuits to shampoo." },
{ name:"Kapok Tree", country:"Côte d'Ivoire", lat:7.5, lng:-7.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra towers over Ivorian villages and is deeply sacred in local animist traditions — a home for ancestral spirits. Its seed pods burst open releasing clouds of silky white kapok fibre, historically used to stuff life jackets and mattresses across West Africa." },
{ name:"Kola Tree", country:"Côte d'Ivoire", lat:6.3, lng:-5.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cola_nitida.jpg/640px-Cola_nitida.jpg", description:"Cola nitida is native to Côte d'Ivoire's forests. Kola nuts contain caffeine and theobromine and have been chewed as a stimulant across West Africa for centuries. They gave Coca-Cola its original flavouring and name — and remain central to Ivorian social ceremonies and hospitality." },

// 🇭🇷 CROATIA
{ name:"Dalmatian Sage", country:"Croatia", lat:43.5, lng:16.5, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Salvia_officinalis.jpg/640px-Salvia_officinalis.jpg", description:"Salvia officinalis grows wild across Croatia's Dalmatian coast and islands, carpeting limestone hillsides with silver-grey aromatic foliage. Croatia is one of Europe's largest exporters of wild sage. The name salvia comes from the Latin salvere — to heal — reflecting its centuries of medicinal use." },
{ name:"Olive Tree", country:"Croatia", lat:43.0, lng:17.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"Olea europaea has been cultivated on Croatia's Dalmatian coast and islands for over 2,000 years. The island of Brač hosts a wild olive tree estimated at 1,600 years old. Croatian extra-virgin olive oils from Istria consistently rank among the world's finest." },
{ name:"Croatian Daffodil", country:"Croatia", lat:45.3, lng:14.5, type:"Bulb", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Narcissus_radiiflorus.jpg/640px-Narcissus_radiiflorus.jpg", description:"Narcissus radiiflorus carpets Croatia's Lika plateau and Plitvice Lakes area each spring in sheets of white. The annual daffodil festival at Vršić draws thousands of visitors. Wild daffodil meadows are protected in Croatia's national parks as irreplaceable cultural landscapes." },
{ name:"Degenia", country:"Croatia", lat:44.8, lng:15.2, type:"Alpine Plant", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Degenia_velebitica.jpg/640px-Degenia_velebitica.jpg", description:"Degenia velebitica is endemic to Croatia's Velebit mountain range and grows nowhere else on Earth. Its golden-yellow flower clusters emerge from rock crevices each spring. It is Croatia's most celebrated endemic plant and appears on the Croatian 50 lipa coin." },
{ name:"Slavonian Oak", country:"Croatia", lat:45.5, lng:18.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Quercus_robur_27_09_2011_Ls.jpg/640px-Quercus_robur_27_09_2011_Ls.jpg", description:"Quercus robur forms the magnificent Spačva Basin forest in eastern Croatia — one of Europe's largest lowland oak forests. Slavonian oak timber is world-famous for wine barrel production, prized by French and Italian winemakers for the subtle vanilla and spice notes it imparts." },
// 🇨🇺 CUBA
{ name:"Mariposa — White Ginger Lily", country:"Cuba", lat:22.0, lng:-79.5, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hedychium_coronarium.jpg/640px-Hedychium_coronarium.jpg", description:"Hedychium coronarium is Cuba's national flower, its pure white butterfly-shaped blooms filling the island's forests and riversides with an intoxicating fragrance. Cuban independence fighters wore it hidden in their clothes to carry secret messages during the wars of liberation." },
{ name:"Cuban Royal Palm", country:"Cuba", lat:23.1, lng:-82.4, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Roystonea_regia.jpg/640px-Roystonea_regia.jpg", description:"Roystonea regia is Cuba's national tree, dominating the island's landscape with its smooth grey trunk and brilliant green crown shaft. It appears on the Cuban coat of arms. Its fruits feed pigs and its leaves thatch the iconic bohío houses of the Cuban countryside." },
{ name:"Cuban Mahogany", country:"Cuba", lat:22.5, lng:-80.0, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Swietenia_mahagoni.jpg/640px-Swietenia_mahagoni.jpg", description:"Swietenia mahagoni, the original true mahogany, was first exported from Cuba to Spain in the 16th century and became the most prized furniture timber in European history. Virtually logged out across its Caribbean range, significant wild populations survive only in Cuba's protected areas." },
{ name:"Ceiba", country:"Cuba", lat:21.5, lng:-79.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra is sacred in Cuba's Santería religion as the home of Iroko, an orisha spirit. Every town in Cuba traditionally planted a ceiba in the main square. The ceiba at Havana's Templete marks the spot where the city's first mass and first cabildo were held in 1519." },
{ name:"Cuban Pine", country:"Cuba", lat:22.3, lng:-83.7, type:"Conifer", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_cubensis.jpg/640px-Pinus_cubensis.jpg", description:"Pinus cubensis is endemic to Cuba's eastern mountains, forming the island's only native pine forests in the Sierra Maestra and Sierra de Nipe. Fire-adapted and resin-rich, Cuban pine forests shelter dozens of endemic bird species found nowhere else on Earth." },

// 🇨🇾 CYPRUS
{ name:"Cyprus Cedar", country:"Cyprus", lat:34.9, lng:32.9, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cedrus_brevifolia.jpg/640px-Cedrus_brevifolia.jpg", description:"Cedrus brevifolia is endemic to Cyprus and found only in the Paphos Forest on the Troodos Mountains. With fewer than 7,000 trees remaining, it is one of the world's rarest conifers. Its unusually short needles distinguish it from other cedar species and it is strictly protected by Cypriot law." },
{ name:"Troodos Crocus", country:"Cyprus", lat:34.9, lng:32.9, type:"Bulb", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Crocus_cyprius.jpg/640px-Crocus_cyprius.jpg", description:"Crocus cyprius is endemic to the Troodos Mountains of Cyprus, blooming briefly each February through snow at elevations above 1,500m. Its white flowers with purple feathering emerge directly from the snowmelt. It is one of over 100 plant species endemic exclusively to Cyprus." },
{ name:"Cyprus Tulip", country:"Cyprus", lat:35.1, lng:33.5, type:"Bulb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tulipa_cypria.jpg/640px-Tulipa_cypria.jpg", description:"Tulipa cypria is a rare endemic tulip found only in the Karpaz Peninsula of northern Cyprus. Its crimson flowers with a black and yellow centre bloom in March and April. Threatened by illegal bulb collection and agricultural expansion, it is one of Cyprus's most protected wildflowers." },
{ name:"Golden Oak of Cyprus", country:"Cyprus", lat:34.7, lng:33.1, type:"Tree", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Quercus_alnifolia.jpg/640px-Quercus_alnifolia.jpg", description:"Quercus alnifolia is endemic to Cyprus, its leaves coated in a golden-yellow felt on their undersides — giving it its common name. It forms dense maquis scrubland across the Troodos foothills and its acorns were a staple food source for Bronze Age Cypriots." },
{ name:"Aleppo Pine", country:"Cyprus", lat:35.0, lng:33.3, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Pinus_halepensis_cones.jpg/640px-Pinus_halepensis_cones.jpg", description:"Pinus brutia, the Turkish or Calabrian pine, covers vast areas of Cyprus's mountains and is the island's most dominant tree. Its resin was used in ancient Cyprus to seal amphorae of wine — a practice that survives today in Greek retsina wine production." },

// 🇨🇿 CZECH REPUBLIC
{ name:"Bohemian Primrose", country:"Czech Republic", lat:50.0, lng:14.5, type:"Wildflower", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Primula_bohemica.jpg/640px-Primula_bohemica.jpg", description:"Primula bohemica is endemic to the Czech Republic, found only in limestone ravines in the Bohemian Karst southwest of Prague. This rare primrose grows in just a handful of locations and is one of the Czech Republic's most legally protected plant species." },
{ name:"European Yew", country:"Czech Republic", lat:49.8, lng:18.3, type:"Conifer", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Taxus_baccata_MHNT.BOT.2010.13.5.jpg/640px-Taxus_baccata_MHNT.BOT.2010.13.5.jpg", description:"Taxus baccata forms ancient groves in Czech forests, some trees over 1,000 years old. Virtually every part is toxic except the red berry flesh. Medieval Czech longbows were made from yew. Today, the bark yields taxol — one of the most important cancer-fighting drugs ever discovered." },
{ name:"Moravian Linden", country:"Czech Republic", lat:49.2, lng:16.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tilia_cordata.jpg/640px-Tilia_cordata.jpg", description:"Tilia cordata, the small-leaved linden, is the Czech national tree and a deep symbol of Slavic identity. The word lipa appears in countless Czech place names. Famous ancient linden trees in Moravian villages are protected as living heritage and gathering points for community life." },
{ name:"Pasque Flower", country:"Czech Republic", lat:49.5, lng:17.0, type:"Wildflower", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Anemone_patens.jpg/640px-Anemone_patens.jpg", description:"Pulsatilla grandis pushes through the last snows of Czech meadows each March in vivid violet. Once common across Moravian steppe grasslands, it has declined dramatically with agricultural intensification. Czech botanical societies organise annual counts to monitor its remaining populations." },
{ name:"Bohemian Waxwort", country:"Czech Republic", lat:50.5, lng:13.5, type:"Alpine Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Sibiraea_altaiensis.jpg/640px-Sibiraea_altaiensis.jpg", description:"Sibiraea altaiensis grows in the Krkonoše Giant Mountains of the Czech Republic — an extraordinary disjunct population thousands of kilometres from its main Siberian range. A glacial relict, it represents the last western outpost of this Central Asian plant in Europe." },
// 🇩🇯 DJIBOUTI
{ name:"Dragon Blood Tree", country:"Djibouti", lat:11.8, lng:42.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Dragon_blood_tree_Socotra.jpg/640px-Dragon_blood_tree_Socotra.jpg", description:"Dracaena ombet grows on Djibouti's Day Forest plateau — one of the last remaining highland forests in the Horn of Africa. This ancient umbrella-shaped tree produces deep red resin and is critically threatened by overgrazing, charcoal production and climate change." },
{ name:"Acacia", country:"Djibouti", lat:11.5, lng:42.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Acacia_senegal_MS_4724.jpg/640px-Acacia_senegal_MS_4724.jpg", description:"Acacia tortilis, the umbrella thorn acacia, is the defining tree of Djibouti's arid plains. Its flat-topped canopy provides critical shade for wildlife and livestock in temperatures exceeding 50°C. Its deep roots tap groundwater invisible at the surface and its seed pods are nutritious fodder." },
{ name:"Adenium — Desert Rose", country:"Djibouti", lat:11.3, lng:43.1, type:"Succulent", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4c/Adenium_obesum.jpg/640px-Adenium_obesum.jpg", description:"Adenium obesum grows on Djibouti's volcanic rocky slopes, its swollen water-storing trunk topped with brilliant pink and white flowers. Djibouti has one of the highest concentrations of wild Adenium in the Horn of Africa, growing in conditions of extreme heat and drought." },
{ name:"Doum Palm", country:"Djibouti", lat:11.9, lng:42.7, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Hyphaene_thebaica.jpg/640px-Hyphaene_thebaica.jpg", description:"Hyphaene thebaica grows along Djibouti's wadis and coastal plains, its forked branching trunk unique among palms. Its fibrous fruits taste of gingerbread and its leaves are woven into baskets and mats. For nomadic Afar and Issa communities it provides food, shelter and craft materials." },
{ name:"Euphorbia", country:"Djibouti", lat:11.6, lng:43.0, type:"Succulent Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Euphorbia_candelabrum.jpg/640px-Euphorbia_candelabrum.jpg", description:"Euphorbia species dominate Djibouti's volcanic landscapes, their candelabra forms perfectly adapted to the extreme aridity. Their toxic milky latex deters all herbivores and was used by local communities to stun fish in rock pools. Several Euphorbia species are endemic to the Horn of Africa." },

// 🇩🇲 DOMINICA
{ name:"Bwa Kwaib — Carib Wood", country:"Dominica", lat:15.4, lng:-61.4, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Sabinea_carinalis.jpg/640px-Sabinea_carinalis.jpg", description:"Sabinea carinalis is Dominica's national flower and tree — a small tree endemic to Dominica that erupts in brilliant scarlet flowers in April before any leaves emerge. Found only on Dominica's leeward coast, it is considered one of the Caribbean's most beautiful endemic flowering trees." },
{ name:"Heliconia", country:"Dominica", lat:15.3, lng:-61.3, type:"Tropical Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Heliconia_rostrata.jpg/640px-Heliconia_rostrata.jpg", description:"Dominica's lush rainforests — the island calls itself the Nature Isle of the Caribbean — support spectacular heliconia diversity. These dramatic tropical plants line every forest trail with their waxy red and yellow bracts, providing nectar for Dominica's two endemic hummingbird species." },
{ name:"Tree Fern", country:"Dominica", lat:15.5, lng:-61.4, type:"Fern", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cyathea_arborea.jpg/640px-Cyathea_arborea.jpg", description:"Cyathea arborea, the Caribbean tree fern, creates prehistoric-looking forests across Dominica's volcanic highlands. Growing up to 12m tall, these ancient plant lineages predate flowering plants by 200 million years. Dominica's Morne Trois Pitons National Park hosts extraordinary tree fern concentrations." },
{ name:"Balisier", country:"Dominica", lat:15.35, lng:-61.35, type:"Tropical Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Heliconia_caribaea.jpg/640px-Heliconia_caribaea.jpg", description:"Heliconia caribaea, the balisier, is the symbol of the Caribbean Labour Party and grows wild across Dominica's river valleys. Its enormous paddle-shaped leaves shelter Dominica's Sisserou parrot — the national bird found only on this island. Balisier leaves are used to wrap the traditional dish sancocho." },
{ name:"Mahogany", country:"Dominica", lat:15.45, lng:-61.38, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Swietenia_macrophylla.jpg/640px-Swietenia_macrophylla.jpg", description:"Swietenia macrophylla grows in Dominica's rainforests and was the foundation of Caribbean colonial wealth for 300 years. Dominica's forests escaped the wholesale destruction of neighbouring islands, leaving significant mahogany populations intact. The Carib people carved their ocean-going canoes from mahogany trunks." },

// 🇩🇴 DOMINICAN REPUBLIC
{ name:"Bayahibe Rose", country:"Dominican Republic", lat:18.7, lng:-69.3, type:"Cactus", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pereskia_quisqueyana.jpg/640px-Pereskia_quisqueyana.jpg", description:"Pereskia quisqueyana is the national flower of the Dominican Republic and one of the rarest plants in the world — a flowering cactus producing stunning pink rose-like blooms. Critically endangered with fewer than 1,000 wild plants remaining, it grows only in a tiny area near Bayahibe on the southern coast." },
{ name:"Dominican Mahogany", country:"Dominican Republic", lat:19.0, lng:-70.2, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Swietenia_mahagoni.jpg/640px-Swietenia_mahagoni.jpg", description:"Swietenia mahagoni once covered Dominican Republic's lowlands in vast forests that fuelled centuries of colonial timber trade. Now endangered, remaining trees are protected in national parks. The Dominican Republic is undertaking one of the Caribbean's largest mahogany reforestation programs." },
{ name:"Caoba — Royal Palm", country:"Dominican Republic", lat:18.5, lng:-69.9, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Roystonea_hispaniolana.jpg/640px-Roystonea_hispaniolana.jpg", description:"Roystonea hispaniolana is endemic to Hispaniola and forms spectacular avenues across the Dominican countryside. Its smooth grey trunk and brilliant emerald crown shaft dominate the landscape. Christopher Columbus described these palms as the most beautiful trees he had ever seen when he arrived in 1492." },
{ name:"Palo de Viento", country:"Dominican Republic", lat:19.3, lng:-70.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Didymopanax_tremulus.jpg/640px-Didymopanax_tremulus.jpg", description:"Didymopanax tremulus grows in the Dominican Republic's mountain cloud forests, its leaves trembling in the slightest breeze — giving it the name palo de viento, wind tree. It is a pioneer species that colonises cleared mountain slopes and plays a critical role in cloud forest regeneration." },
{ name:"Cigua Palmera", country:"Dominican Republic", lat:18.8, lng:-70.0, type:"Palm", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Prestoea_montana.jpg/640px-Prestoea_montana.jpg", description:"Prestoea montana, the mountain palm, forms dense forests across the Dominican Republic's Cordillera Central above 600m. It is the exclusive nesting site of the palmchat — the Dominican Republic's national bird. The palm's fruits feed dozens of endemic bird species found only on Hispaniola." },

// 🇩🇰 DENMARK
{ name:"Red Clover", country:"Denmark", lat:56.0, lng:10.0, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Trifolium_pratense_-_Keila.jpg/640px-Trifolium_pratense_-_Keila.jpg", description:"Trifolium pratense is Denmark's national flower, carpeting meadows and roadsides across the country in vivid crimson-pink. Denmark's centuries-old dairy farming tradition depends on red clover as a nitrogen-fixing fodder crop. Its flowers are a critical nectar source for bumblebees in Scandinavian ecosystems." },
{ name:"Common Beech", country:"Denmark", lat:55.5, lng:9.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Fagus_sylvatica_forest.jpg/640px-Fagus_sylvatica_forest.jpg", description:"Fagus sylvatica forms Denmark's most celebrated ancient forests — including Rold Skov and the beech forests of Mon designated as UNESCO World Heritage Sites. In autumn, Danish beech forests turn copper and gold. The smooth grey bark of ancient beeches was carved with runic inscriptions by Vikings." },
{ name:"Sea Buckthorn", country:"Denmark", lat:57.5, lng:9.8, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hippophae_rhamnoides.jpg/640px-Hippophae_rhamnoides.jpg", description:"Hippophae rhamnoides covers Denmark's North Sea coastal dunes in dense orange-berried thickets. Its berries contain 10 times more vitamin C than oranges and are harvested for juices and health products. An essential dune stabiliser, Denmark has planted millions of sea buckthorn plants to combat coastal erosion." },
{ name:"Danish Scurvygrass", country:"Denmark", lat:56.5, lng:8.5, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cochlearia_danica.jpg/640px-Cochlearia_danica.jpg", description:"Cochlearia danica, the Danish scurvygrass, is native to Denmark's coastlines and was consumed by Viking sailors to prevent scurvy on long voyages. Its tiny white flowers appear as early as January — one of the first wildflowers to bloom in Scandinavia each year." },
{ name:"Marsh Gentian", country:"Denmark", lat:55.8, lng:9.2, type:"Wildflower", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gentiana_pneumonanthe.jpg/640px-Gentiana_pneumonanthe.jpg", description:"Gentiana pneumonanthe produces stunning electric-blue trumpet flowers in Denmark's last remaining wet heathlands each August. Once common across Jutland, it has declined by over 90% due to drainage and agricultural intensification. It is now one of Denmark's most protected wildflowers." },

// 🇨🇩 DR CONGO
{ name:"Wenge", country:"DR Congo", lat:-2.5, lng:25.0, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Millettia_laurentii.jpg/640px-Millettia_laurentii.jpg", description:"Millettia laurentii produces one of the world's most dramatic timbers — jet black with fine pale streaks. Endemic to DR Congo's Congo Basin, it has been logged to near-extinction for flooring and furniture. A slow-growing tree taking 50+ years to mature, its recovery will take centuries without strict protection." },
{ name:"Raffia Palm", country:"DR Congo", lat:-4.0, lng:21.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Raffia_farinifera.jpg/640px-Raffia_farinifera.jpg", description:"Raphia palms line DR Congo's vast river systems with the world's largest leaves — up to 25m long. Raffia fibre, wine tapped from the trunk, and edible larvae harvested from decaying trunks make this palm one of the Congo Basin's most important multipurpose plants." },
{ name:"Okapi Food Plant — Celtis", country:"DR Congo", lat:1.5, lng:28.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Celtis_mildbraedii.jpg/640px-Celtis_mildbraedii.jpg", description:"Celtis mildbraedii is the primary food plant of the okapi — DR Congo's iconic forest giraffe found nowhere else on Earth. Growing in the Ituri Rainforest, this tree's leaves and shoots sustain okapi populations in one of Africa's least explored and most biodiverse forest ecosystems." },
{ name:"Canarium — Incense Tree", country:"DR Congo", lat:-3.0, lng:23.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Canarium_schweinfurthii.jpg/640px-Canarium_schweinfurthii.jpg", description:"Canarium schweinfurthii produces edible oily fruits — African elemi — eaten across DR Congo as a snack and used for cooking oil. Its aromatic resin burns as incense and was used by the Congolese as torch fuel before electricity. One of the Congo Basin's most important multipurpose forest trees." },
{ name:"Gilbertiodendron", country:"DR Congo", lat:0.5, lng:24.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Gilbertiodendron_dewevrei.jpg/640px-Gilbertiodendron_dewevrei.jpg", description:"Gilbertiodendron dewevrei forms vast single-species monodominant forests across DR Congo's northern Congo Basin — a phenomenon extremely rare in tropical rainforests. These cathedral-like forests of uniform tall trees cover millions of hectares and store extraordinary amounts of carbon." },
// 🇹🇱 EAST TIMOR (TIMOR-LESTE)
{ name:"Sandalwood", country:"East Timor", lat:-8.8, lng:125.7, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Santalum_album.jpg/640px-Santalum_album.jpg", description:"Santalum album built the entire colonial economy of Timor-Leste. Portuguese traders exported Timorese sandalwood to China and India for centuries for incense, carvings and perfume. So intensively harvested that wild populations nearly collapsed, it remains the island's most culturally significant tree." },
{ name:"Teak", country:"East Timor", lat:-8.5, lng:125.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tectona_grandis.jpg/640px-Tectona_grandis.jpg", description:"Tectona grandis grows in East Timor's northern lowland forests and was extensively planted during Indonesian and Portuguese colonial periods. Its extraordinarily durable oily timber resists rot, termites and marine borers — making it the world's premier shipbuilding and outdoor furniture timber." },
{ name:"Eucalyptus urophylla", country:"East Timor", lat:-8.9, lng:126.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Eucalyptus_urophylla.jpg/640px-Eucalyptus_urophylla.jpg", description:"Eucalyptus urophylla is native to Timor-Leste and a handful of nearby Indonesian islands. One of the world's most widely planted eucalyptus species, it is used in pulp and paper production globally. Its native forests on Timor's volcanic mountains are among the most threatened ecosystems in Southeast Asia." },
{ name:"Ai-Dak — Timorese Canarium", country:"East Timor", lat:-8.7, lng:125.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Canarium_indicum.jpg/640px-Canarium_indicum.jpg", description:"Canarium indicum, called ai-dak in Tetum, produces oily edible nuts that are a traditional food source across East Timor. Its resin is burned as incense in ceremonies and the nuts have been traded across the Pacific for thousands of years — archaeological evidence dates their use back 40,000 years in the region." },
{ name:"Coffee — Timor Hybrid", country:"East Timor", lat:-8.6, lng:125.5, type:"Shrub", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Roasted_coffee_beans.jpg/640px-Roasted_coffee_beans.jpg", description:"The Timor Hybrid is a naturally occurring cross between Coffea arabica and Coffea canephora discovered in East Timor in the 1920s. It is the only known natural arabica-robusta hybrid and has been used in breeding programs worldwide to introduce disease resistance into commercial coffee varieties." },

// 🇪🇨 ECUADOR
{ name:"Orchid — Dracula", country:"Ecuador", lat:-0.2, lng:-78.5, type:"Orchid", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dracula_vampira.jpg/640px-Dracula_vampira.jpg", description:"Dracula vampira is one of Ecuador's most extraordinary orchids, its dark dangling flowers mimicking a mushroom to attract fungus gnats as pollinators. Ecuador has over 4,000 native orchid species — more than any other country on Earth — concentrated in its cloud forest 'orchid hotspot'." },
{ name:"Espeletia — Frailejón", country:"Ecuador", lat:-0.5, lng:-78.4, type:"Alpine Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Espeletia_grandiflora.jpg/640px-Espeletia_grandiflora.jpg", description:"Ecuador's páramo ecosystem above 3,500m is dominated by frailejones — their woolly silver rosettes trapping moisture from Andean clouds. These extraordinary plants are the water towers of Quito and other Ecuadorian cities, feeding rivers and aquifers that millions depend on daily." },
{ name:"Tagua Palm", country:"Ecuador", lat:-1.8, lng:-79.6, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Phytelephas_aequatorialis.jpg/640px-Phytelephas_aequatorialis.jpg", description:"Phytelephas aequatorialis is endemic to Ecuador's Pacific lowlands. Its rock-hard white seeds — vegetable ivory — were Ecuador's second largest export after cacao in the early 20th century, used for buttons worldwide. Today tagua carving is promoted as a sustainable rainforest economy." },
{ name:"Cinchona", country:"Ecuador", lat:-2.9, lng:-79.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/32/Cinchona_officinalis.jpg/640px-Cinchona_officinalis.jpg", description:"Cinchona officinalis is Ecuador's national tree — a cloud forest species whose bark yields quinine, the world's first antimalarial drug. The Countess of Chinchón was cured of malaria by Ecuadorian bark in 1638, introducing it to Europe and changing the course of tropical medicine forever." },
{ name:"Cacao Arriba", country:"Ecuador", lat:-1.0, lng:-79.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Ecuador's Nacional cacao — called Arriba for the upriver regions where it grows — is considered the world's finest chocolate variety. Its complex floral flavour profile is prized by artisan chocolatiers globally. Ecuador is the world's largest producer of fine-flavour cacao, accounting for 63% of global supply." },

// 🇪🇬 EGYPT
{ name:"Papyrus", country:"Egypt", lat:30.1, lng:31.2, type:"Reed", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Papyrus_in_lake_victoria.jpg/640px-Papyrus_in_lake_victoria.jpg", description:"Cyperus papyrus grew in vast Nile Delta marshes and gave humanity its first writing surface. Ancient Egyptians harvested, split and pressed papyrus stems into sheets that preserved 5,000 years of civilisation. The word paper itself derives from papyrus. Wild populations are now almost gone from Egypt." },
{ name:"Sacred Lotus", country:"Egypt", lat:29.5, lng:31.2, type:"Aquatic Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Nelumbo_nucifera_MS_4967.jpg/640px-Nelumbo_nucifera_MS_4967.jpg", description:"Nymphaea lotus, the Egyptian white lotus, was the most sacred plant in ancient Egypt — symbol of creation, rebirth and the sun. It appears in virtually every temple carving. The lotus closes at night and reopens at dawn, representing to Egyptians the daily journey of the sun god Ra." },
{ name:"Date Palm", country:"Egypt", lat:25.0, lng:30.0, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Phoenix_dactylifera_2.jpg/640px-Phoenix_dactylifera_2.jpg", description:"Phoenix dactylifera has been cultivated in Egypt for over 7,000 years — the oldest evidence of date cultivation in the world. Ancient Egyptians used every part: fruit for food and wine, leaves for baskets, trunks for construction. Egypt remains one of the world's top five date producers today." },
{ name:"Acacia — Sunt", country:"Egypt", lat:27.0, lng:33.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Acacia_nilotica.jpg/640px-Acacia_nilotica.jpg", description:"Acacia nilotica, the Nile acacia, lined Egypt's riverbanks and desert wadis for millennia. Ancient Egyptians used its hard timber for boat-building and its tannin-rich pods for leather tanning. The wood of the original Ark of the Covenant was described in Exodus as shittim wood — Acacia nilotica." },
{ name:"Sycamore Fig", country:"Egypt", lat:29.8, lng:31.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ficus_sycomorus.jpg/640px-Ficus_sycomorus.jpg", description:"Ficus sycomorus was one of ancient Egypt's most revered trees — sacred to Hathor, goddess of love. Egyptian coffins were carved from its wood and mummies wrapped in its bark cloth. A living sycamore fig at Matariya in Cairo is traditionally identified as the tree under which the Holy Family rested." },

// 🇸🇻 EL SALVADOR
{ name:"Izote — Yucca", country:"El Salvador", lat:13.7, lng:-89.2, type:"Succulent Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Yucca_elephantipes.jpg/640px-Yucca_elephantipes.jpg", description:"Yucca elephantipes is El Salvador's national flower. Its large clusters of creamy white bell-shaped blooms are eaten in traditional Salvadoran cuisine — fried, in soups and tamales. The izote flower festival is celebrated across El Salvador each spring when the trees burst into bloom." },
{ name:"Balsam Tree", country:"El Salvador", lat:13.5, lng:-89.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Myroxylon_balsamum.jpg/640px-Myroxylon_balsamum.jpg", description:"Myroxylon balsamum var. pereirae produces Balsam of Peru — despite its name, sourced almost exclusively from El Salvador's Bálsamo Coast. This aromatic resin has been used in perfumery, medicine and food flavouring for 400 years and remains an important Salvadoran export." },
{ name:"Ceiba", country:"El Salvador", lat:13.8, lng:-89.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra is El Salvador's national tree, sacred to the Maya Pipil people as the axis of the universe connecting the underworld, earth and sky. Ancient ceibas are preserved in Salvadoran town squares as living monuments — their massive buttressed trunks witnesses to centuries of history." },
{ name:"Cacao", country:"El Salvador", lat:13.4, lng:-88.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao was cultivated by El Salvador's Pipil and Maya peoples for over 3,000 years. Cacao beans served as currency in pre-Columbian markets — 100 beans could buy a turkey. El Salvador is reviving heirloom cacao cultivation as a premium export and rainforest conservation tool." },
{ name:"Maquilishuat", country:"El Salvador", lat:14.0, lng:-89.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tabebuia_rosea.jpg/640px-Tabebuia_rosea.jpg", description:"Tabebuia rosea, the maquilishuat, erupts in clouds of pink blossoms before any leaves appear — transforming El Salvador's dry season landscape each February. One of Central America's most spectacular flowering trees, it lines Salvadoran highways and city streets in breathtaking pink canopies." },

// 🇬🇶 EQUATORIAL GUINEA
{ name:"Bubinga", country:"Equatorial Guinea", lat:1.7, lng:10.3, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Guibourtia_tessmannii.jpg/640px-Guibourtia_tessmannii.jpg", description:"Guibourtia tessmannii, kevazingo or bubinga, produces one of Africa's most beautiful and valuable timbers — its rich red-brown wood with dramatic figuring prized for luxury furniture and musical instruments. Equatorial Guinea's forests hold significant populations but illegal logging threatens its survival." },
{ name:"African Teak — Doussié", country:"Equatorial Guinea", lat:1.5, lng:10.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Afzelia_bipindensis.jpg/640px-Afzelia_bipindensis.jpg", description:"Afzelia bipindensis grows in Equatorial Guinea's dense rainforests on Bioko Island and the mainland. Its extremely durable timber is used for heavy construction and flooring worldwide. Each seed has a bright orange-red aril that makes it one of Africa's most decorative seeds, used in traditional jewellery." },
{ name:"Raffia Palm", country:"Equatorial Guinea", lat:1.8, lng:9.8, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Raffia_farinifera.jpg/640px-Raffia_farinifera.jpg", description:"Raphia palms dominate Equatorial Guinea's coastal swamps and river margins. Palm wine tapped from raffia is central to Fang and Bubi cultural ceremonies. The fibres are woven into the country's traditional ceremonial masks and costumes used in ngil and other ritual performances." },
{ name:"Bioko Violet", country:"Equatorial Guinea", lat:3.5, lng:8.7, type:"Wildflower", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Impatiens_bicolor.jpg/640px-Impatiens_bicolor.jpg", description:"Impatiens bicaudata is endemic to Bioko Island's montane forests on the slopes of Pico Basile — one of West Africa's highest peaks. Bioko's volcanic isolation has produced extraordinary plant endemism. This delicate violet-pink balsam grows only in cloud forest above 2,000m." },
{ name:"Oil Palm", country:"Equatorial Guinea", lat:1.6, lng:10.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Elaeis_guineensis.jpg/640px-Elaeis_guineensis.jpg", description:"Elaeis guineensis is native to the Gulf of Guinea coast and Equatorial Guinea sits within its primary centre of origin. Wild oil palms still grow in the country's forests as they have for millions of years. Palm oil and palm wine remain fundamental to Equatoguinean cuisine and village economies." },
// 🇪🇷 ERITREA
{ name:"Olive Tree", country:"Eritrea", lat:15.3, lng:38.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"Olea europaea grows wild across Eritrea's Kebessa plateau, some trees estimated at over 3,000 years old. Eritrea's ancient highland olive groves predate any cultivation records. Wild Eritrean olives are studied as genetic reservoirs of original olive diversity for global breeding programs." },
{ name:"Dragon Tree", country:"Eritrea", lat:15.0, lng:39.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Dragon_blood_tree_Socotra.jpg/640px-Dragon_blood_tree_Socotra.jpg", description:"Dracaena ombet grows in Eritrea's remote Anseba region on rocky outcrops and escarpments. One of the Horn of Africa's most distinctive trees, its umbrella canopy and red resin make it unmistakable. Eritrea's isolated populations are among the most northerly of any dragon tree species in Africa." },
{ name:"Doum Palm", country:"Eritrea", lat:16.5, lng:38.0, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Hyphaene_thebaica.jpg/640px-Hyphaene_thebaica.jpg", description:"Hyphaene thebaica lines Eritrea's coastal plains and river valleys with its distinctive forked branching. For the Afar and Tigre communities of lowland Eritrea, the doum palm provides food, building material, rope and basket fibre — essentially a complete survival resource in a harsh environment." },
{ name:"Acacia", country:"Eritrea", lat:14.5, lng:39.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Acacia_senegal_MS_4724.jpg/640px-Acacia_senegal_MS_4724.jpg", description:"Acacia etbaica is endemic to the Red Sea hills of Eritrea and Sudan, growing on rocky slopes above 1,000m. Its gum was traded by ancient Aksumite merchants along Red Sea routes. Eritrea's diverse acacia woodland supports one of the highest densities of dry-land bird species in Africa." },
{ name:"Candelabra Euphorbia", country:"Eritrea", lat:15.8, lng:38.5, type:"Succulent Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Euphorbia_candelabrum.jpg/640px-Euphorbia_candelabrum.jpg", description:"Euphorbia candelabrum dominates Eritrea's highland escarpments, its towering candelabra form visible for kilometres. Used as living fences around Eritrean highland villages for centuries, its toxic latex deters livestock and pests. Despite resembling cacti, it is entirely unrelated — a remarkable case of convergent evolution." },

// 🇪🇪 ESTONIA
{ name:"Cornflower", country:"Estonia", lat:59.4, lng:24.7, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Centaurea_cyanus_LC0084.jpg/640px-Centaurea_cyanus_LC0084.jpg", description:"Centaurea cyanus is Estonia's national flower, its vivid blue blooms once carpeting Estonian rye fields each summer. Estonians have worn cornflowers at midsummer festivals for centuries. The flowers appear on Estonian national costumes and the blue of the Estonian flag was inspired by the cornflower." },
{ name:"Silver Birch", country:"Estonia", lat:58.5, lng:25.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Betula_pendula_Moscow.jpg/640px-Betula_pendula_Moscow.jpg", description:"Betula pendula is Estonia's national tree, covering vast areas of the country's forests and bogs. Estonian birch groves hold deep spiritual significance — ancient sacred groves called hiis were birch-dominated. Birch sap collected each spring is drunk as a traditional health tonic across the Baltic states." },
{ name:"Bog Rosemary", country:"Estonia", lat:58.8, lng:26.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Andromeda_polifolia.jpg/640px-Andromeda_polifolia.jpg", description:"Andromeda polifolia grows across Estonia's vast raised peat bogs — some of the largest and best-preserved in Europe. Estonia's Soomaa and Endla bog systems are internationally protected. The delicate pink urn-shaped flowers of bog rosemary are among the first to bloom in Estonian bogs each May." },
{ name:"Common Juniper", country:"Estonia", lat:59.0, lng:23.5, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Juniperus_communis.jpg/640px-Juniperus_communis.jpg", description:"Juniperus communis forms distinctive stands across Estonia's western islands of Saaremaa and Hiiumaa. Estonian juniper alvar meadows — ancient limestone grasslands grazed for millennia — are among Europe's most species-rich habitats. Juniper berries flavour Estonian gin and traditional meat dishes." },
{ name:"Black Alder", country:"Estonia", lat:58.2, lng:27.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Alnus_glutinosa_leaves.jpg/640px-Alnus_glutinosa_leaves.jpg", description:"Alnus glutinosa dominates Estonia's riparian forests and floodplain woodlands. Its waterlogged root system fixes nitrogen and its submerged timber becomes extraordinarily hard — Venice was built on alder piles. Estonian alder swamp forests are ancient ecosystems supporting rare mosses, ferns and breeding waders." },

// 🇸🇿 ESWATINI
{ name:"Swazi Lily", country:"Eswatini", lat:-26.5, lng:31.5, type:"Bulb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cyrtanthus_sanguineus.jpg/640px-Cyrtanthus_sanguineus.jpg", description:"Cyrtanthus sanguineus, the Swazi lily or fire lily, blooms prolifically after bush fires across Eswatini's grasslands. Its brilliant scarlet flowers emerge from blackened ground within days of a fire — a remarkable adaptation that uses smoke chemicals as a germination trigger." },
{ name:"Marula", country:"Eswatini", lat:-26.3, lng:31.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Sclerocarya_birrea.jpg/640px-Sclerocarya_birrea.jpg", description:"Sclerocarya birrea is central to Swazi culture — its fruit fermented into umcwayiba beer consumed at ceremonies. Eswatini's Reed Dance and Incwala ceremonies both incorporate marula. Elephants seek out fermented fallen fruits. The nut's rich oil is used in Amarula liqueur and luxury skincare products." },
{ name:"Natal Fig", country:"Eswatini", lat:-26.8, lng:31.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ficus_natalensis.jpg/640px-Ficus_natalensis.jpg", description:"Ficus natalensis forms massive spreading trees along Eswatini's river banks and rocky hillsides. Its bark is pounded into barkcloth — one of southern Africa's oldest textile traditions. In Swazi traditional medicine, the milky latex treats skin conditions and the roots are used in fertility treatments." },
{ name:"Aloe marlothii", country:"Eswatini", lat:-26.6, lng:31.4, type:"Succulent", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Aloe_marlothii.jpg/640px-Aloe_marlothii.jpg", description:"Aloe marlothii, the mountain aloe, towers over Eswatini's rocky hillsides with its massive rosette of grey-green spine-edged leaves and brilliant orange flower spikes. A critical winter nectar source for sunbirds and weavers, it is heavily used in Swazi traditional medicine for digestive and skin ailments." },
{ name:"Barberton Daisy", country:"Eswatini", lat:-26.0, lng:31.0, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Gerbera_jamesonii.jpg/640px-Gerbera_jamesonii.jpg", description:"Gerbera jamesonii was discovered near Barberton in 1884 on the Swazi-South African border and became one of the world's most commercially important cut flowers. Over 200 million gerbera flowers are sold globally each year — all descendants of this single wildflower found on Eswatini's mountainsides." },

// 🇪🇹 ETHIOPIA
{ name:"Coffee Arabica", country:"Ethiopia", lat:7.5, lng:36.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Roasted_coffee_beans.jpg/640px-Roasted_coffee_beans.jpg", description:"Coffea arabica originated in Ethiopia's Kaffa region — the word coffee itself derives from Kaffa. Wild coffee still grows in Ethiopia's highland forests, representing the world's most important genetic reservoir for coffee breeding. Ethiopian coffee ceremonies lasting hours are a UNESCO-recognised cultural tradition." },
{ name:"Ensete — False Banana", country:"Ethiopia", lat:7.0, lng:37.5, type:"Banana Relative", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ensete_ventricosum.jpg/640px-Ensete_ventricosum.jpg", description:"Ensete ventricosum, the Ethiopian banana, feeds over 20 million people in southern Ethiopia. Unlike true bananas, it is the starchy fermented stem and root that are eaten — not the fruit. A single plant produces enough food to feed a family for months. Scientists call it a neglected crop that could feed the world." },
{ name:"Hagenia abyssinica", country:"Ethiopia", lat:9.0, lng:39.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hagenia_abyssinica.jpg/640px-Hagenia_abyssinica.jpg", description:"Hagenia abyssinica, the East African rosewood, forms Ethiopia's Afromontane forests above 2,400m. Its drooping clusters of pink flowers are among the most beautiful in African highland forests. For centuries, its dried flower heads were the only effective treatment for tapeworm in East Africa." },
{ name:"Giant Lobelia", country:"Ethiopia", lat:9.8, lng:39.7, type:"Alpine Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Lobelia_deckenii.jpg/640px-Lobelia_deckenii.jpg", description:"Lobelia rhynchopetalum grows on Ethiopia's Simien and Bale Mountains above 3,500m, its towering spires reaching 10m. The Simien Mountains — home to the gelada baboon — are carpeted in giant lobelias that create an otherworldly Afroalpine landscape found only on Africa's highest peaks." },
{ name:"Myrrh Tree", country:"Ethiopia", lat:11.5, lng:41.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Commiphora_myrrha.jpg/640px-Commiphora_myrrha.jpg", description:"Commiphora myrrha has been harvested in Ethiopia's Tigray and Afar regions for over 5,000 years. Its resin — myrrh — was one of the ancient world's most valuable commodities, traded along the Incense Route from Ethiopia to Egypt, Arabia and Rome for use in embalming, incense and medicine." },

// 🇫🇯 FIJI
{ name:"Tagimoucia", country:"Fiji", lat:-16.8, lng:179.9, type:"Vine", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Medinilla_waterhousei.jpg/640px-Medinilla_waterhousei.jpg", description:"Medinilla waterhousei is Fiji's national flower, growing only on the rim of Lake Tagimoucia on Taveuni Island above 800m. Its cascading clusters of white flowers with brilliant red centres are among the Pacific's most beautiful. A Fijian legend says the flower grew from the tears of a princess forbidden to marry her love." },
{ name:"Dakua — Fijian Kauri", country:"Fiji", lat:-17.5, lng:178.0, type:"Conifer", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Agathis_macrophylla.jpg/640px-Agathis_macrophylla.jpg", description:"Agathis macrophylla is Fiji's most important native timber tree, its massive straight trunk producing some of the Pacific's finest wood. Fijian chiefs used dakua to build their sacred temples and great war canoes. Heavily logged during the colonial period, significant populations survive only in protected forest reserves." },
{ name:"Vesi — Pacific Rosewood", country:"Fiji", lat:-18.0, lng:178.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Intsia_bijuga.jpg/640px-Intsia_bijuga.jpg", description:"Intsia bijuga is the most culturally significant tree in Fiji. Vesi wood — dense, durable and beautifully figured — was reserved for chiefly canoes, ceremonial bowls and sacred structures. A dying vesi tree is considered a bad omen in Fijian villages and its felling requires traditional ceremony." },
{ name:"Coconut Palm", country:"Fiji", lat:-17.7, lng:177.4, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is inseparable from Fijian life and culture. Coconut cream is the base of virtually every traditional Fijian dish. Copra — dried coconut flesh — was Fiji's primary export for over a century. The coconut's ability to float and germinate after ocean voyages colonised the Pacific's most remote islands." },
{ name:"Ivi — Pacific Chestnut", country:"Fiji", lat:-17.3, lng:178.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Inocarpus_fagifer.jpg/640px-Inocarpus_fagifer.jpg", description:"Inocarpus fagifer, the Tahitian chestnut, is a traditional food tree across Fiji's villages. Its starchy seeds are roasted or boiled as a staple carbohydrate. In times of drought or cyclone when garden crops fail, ivi trees provide critical food security for Fijian communities across all island groups." },

// 🇫🇮 FINLAND
{ name:"Lily of the Valley", country:"Finland", lat:61.5, lng:25.7, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Convallaria_majalis_MS_4272.jpg/640px-Convallaria_majalis_MS_4272.jpg", description:"Convallaria majalis is Finland's national flower, carpeting Finnish forests in delicate white bells each May. Finns call it kielo and it holds deep cultural significance — featured in folk songs, poetry and wedding traditions. Despite its delicate appearance, every part of the plant is highly toxic." },
{ name:"Silver Birch", country:"Finland", lat:62.0, lng:25.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Betula_pendula_Moscow.jpg/640px-Betula_pendula_Moscow.jpg", description:"Betula pendula is Finland's national tree and the most culturally important plant in Finnish life. The sauna whisk — vihta or vasta — made from fresh birch branches is used in every Finnish sauna. Finland has over 4 billion birch trees. Birch sap wine and birch tar have been produced in Finland for 50,000 years." },
{ name:"Cloudberry", country:"Finland", lat:68.0, lng:27.0, type:"Berry", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rubus_chamaemorus.jpg/640px-Rubus_chamaemorus.jpg", description:"Rubus chamaemorus, the cloudberry, is Finland's most prized wild fruit — its amber berries appearing on the Finnish 2 euro coin. Growing only in Arctic and subarctic bogs, it contains four times more vitamin C than oranges. Finns travel hundreds of kilometres to secret cloudberry picking spots each August." },
{ name:"Scots Pine", country:"Finland", lat:64.0, lng:26.0, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_sylvestris_-_Scots_Pine.jpg/640px-Pinus_sylvestris_-_Scots_Pine.jpg", description:"Pinus sylvestris covers 65% of Finland's forests — the country has more pine trees per capita than almost any nation on Earth. Finnish pine has been exported for ship masts and construction timber since the 17th century. The Finnish forest industry built one of the world's highest standards of living." },
{ name:"Arctic Moss — Sphagnum", country:"Finland", lat:65.5, lng:28.0, type:"Moss", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Sphagnum_moss.jpg/640px-Sphagnum_moss.jpg", description:"Sphagnum moss covers over one third of Finland's entire land area in vast peat bogs. A single gram of sphagnum can hold 20 grams of water. Finland's peat bogs store more carbon than all of Europe's forests combined. During World War I, sphagnum was used as wound dressing — more absorbent than cotton." },

// 🇫🇷 FRANCE
{ name:"Lavender", country:"France", lat:43.9, lng:5.4, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Lavandula_angustifolia_J1.jpg/640px-Lavandula_angustifolia_J1.jpg", description:"Lavandula angustifolia transforms Provence's Valensole plateau into a sea of purple each July — one of Europe's most iconic landscapes. France produces 80% of the world's true lavender essential oil. The Grasse region of southern France has been the global centre of perfume production for 500 years." },
{ name:"Edelweiss", country:"France", lat:45.8, lng:6.9, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Leontopodium_alpinum_-_edelweiss.jpg/640px-Leontopodium_alpinum_-_edelweiss.jpg", description:"Leontopodium alpinum grows on France's highest Alpine ridges above 1,800m in the Mont Blanc massif. Strictly protected by French law since 1975, it was once picked to near-extinction by alpine tourists. The French alpine military — Chasseurs Alpins — wear edelweiss on their distinctive berets." },
{ name:"Fleur-de-Lis — Iris", country:"France", lat:47.9, lng:1.9, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Iris_pseudacorus.jpg/640px-Iris_pseudacorus.jpg", description:"Iris pseudacorus, the yellow flag iris, inspired the fleur-de-lis — France's most enduring symbol. Legend holds that Clovis I adopted the iris as his symbol after it showed him a safe crossing at the Rhine. The fleur-de-lis has appeared on the French royal standard for over 1,000 years." },
{ name:"Corsican Pine", country:"France", lat:42.0, lng:9.0, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Pinus_nigra_subsp._nigra.jpg/640px-Pinus_nigra_subsp._nigra.jpg", description:"Pinus nigra ssp. laricio, the Corsican or Lariccio pine, forms magnificent ancient forests across Corsica's mountain interior. Some trees in the Forêt de Vizzavona exceed 500 years old and 50m tall. Napoleon Bonaparte grew up surrounded by these forests and reportedly said he could recognise Corsica by its scent alone." },
{ name:"Gentian — Gentiane", country:"France", lat:45.5, lng:3.1, type:"Alpine Flower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gentiana_lutea.jpg/640px-Gentiana_lutea.jpg", description:"Gentiana lutea, the great yellow gentian, grows across France's Massif Central and Alpine meadows. Its intensely bitter root is the basis of Suze, Salers and dozens of other French aperitifs. Harvesting wild gentian is now regulated by French law to prevent the over-extraction that threatened populations for decades." },

// 🇫🇲 FEDERATED STATES OF MICRONESIA
{ name:"Pohnpei Pepper", country:"Federated States of Micronesia", lat:6.9, lng:158.2, type:"Vine", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Piper_methysticum.jpg/640px-Piper_methysticum.jpg", description:"Piper ponapense is endemic to Pohnpei island and produces one of the world's most prized peppers. Chefs describe its flavour as extraordinarily complex — floral, citrusy and deeply spicy simultaneously. Grown only on Pohnpei's volcanic slopes in tiny quantities, it commands extraordinary prices in global spice markets." },
{ name:"Sakau — Kava", country:"Federated States of Micronesia", lat:6.8, lng:158.3, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Piper_methysticum.jpg/640px-Piper_methysticum.jpg", description:"Piper methysticum, kava, is central to Micronesian social and ceremonial life. Called sakau on Pohnpei, the root is pounded and squeezed to produce a mildly sedating drink consumed at every important gathering. Micronesian sakau ceremonies are among the Pacific's most elaborate and ancient social rituals." },
{ name:"Breadfruit", country:"Federated States of Micronesia", lat:7.4, lng:151.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis has sustained Micronesian populations for thousands of years — a single tree produces hundreds of large starchy fruits annually for decades. Micronesian navigators carried breadfruit seedlings on their extraordinary open-ocean voyages, spreading cultivation across the entire Pacific." },
{ name:"Mangrove", country:"Federated States of Micronesia", lat:7.0, lng:158.1, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Mangrove_trees.jpg/640px-Mangrove_trees.jpg", description:"Rhizophora apiculata forms extensive mangrove forests around Micronesia's volcanic and atoll islands. These ecosystems are nurseries for the reef fish that feed Micronesian communities, protect coastlines from typhoons and store extraordinary amounts of blue carbon in their waterlogged soils." },
{ name:"Ylang-Ylang", country:"Federated States of Micronesia", lat:6.9, lng:158.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cananga_odorata.jpg/640px-Cananga_odorata.jpg", description:"Cananga odorata grows across Micronesia's islands, its intensely fragrant star-shaped yellow flowers used in traditional garlands and hair adornment. Micronesian women have woven ylang-ylang flowers into their hair for ceremonies for centuries — a tradition that persists at festivals and celebrations today." },

// 🇫🇰 FALKLAND ISLANDS
{ name:"Diddle-Dee", country:"Falkland Islands", lat:-51.7, lng:-59.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Empetrum_rubrum.jpg/640px-Empetrum_rubrum.jpg", description:"Empetrum rubrum carpets the Falkland Islands' windswept peat moorlands in dense red-berried mats. Called diddle-dee by islanders, its tart berries are made into jam and wine. It is the dominant plant of the Falklands' unique ecosystem and provides critical ground cover that prevents peat erosion in the fierce South Atlantic winds." },
{ name:"Pale Maiden", country:"Falkland Islands", lat:-51.5, lng:-59.0, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Olsynium_filifolium.jpg/640px-Olsynium_filifolium.jpg", description:"Olsynium filifolium is the Falkland Islands' national flower, producing delicate white cup-shaped blooms across the islands' grasslands each spring. Endemic to the Falklands and southern South America, it is one of the most delicate and beautiful wildflowers of the South Atlantic." },
{ name:"Tussac Grass", country:"Falkland Islands", lat:-52.0, lng:-60.0, type:"Grass", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Poa_flabellata.jpg/640px-Poa_flabellata.jpg", description:"Poa flabellata forms spectacular tussock pedestals up to 2m tall along the Falklands' coastlines. These giant grass clumps create unique microhabitats sheltering penguins, seabirds and small mammals. Once covering vast areas, tussac was severely reduced by sheep grazing and is now the focus of major restoration programs." },
{ name:"Falkland Island Daisy", country:"Falkland Islands", lat:-51.8, lng:-58.5, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Erigeron_incertus.jpg/640px-Erigeron_incertus.jpg", description:"Erigeron incertus is endemic to the Falkland Islands, producing cheerful white daisy flowers across the islands' rocky grasslands. The Falklands have a remarkably high proportion of endemic plant species for their size — a result of their extreme isolation in the South Atlantic Ocean." },
{ name:"Balsam Bog", country:"Falkland Islands", lat:-51.9, lng:-59.2, type:"Cushion Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Bolax_gummifera.jpg/640px-Bolax_gummifera.jpg", description:"Bolax gummifera forms rock-hard golden-green cushions across the Falklands' upland moorlands. Despite looking like moss, it is a flowering plant. So dense and hard are its cushions that early settlers used them as fuel. Its resin was used medicinally by Falkland Islanders as a wound sealant." },

// 🇫🇴 FAROE ISLANDS
{ name:"Faroese Dandelion", country:"Faroe Islands", lat:62.0, lng:-6.8, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Taraxacum_faeroense.jpg/640px-Taraxacum_faeroense.jpg", description:"Taraxacum faeroense is endemic to the Faroe Islands, one of hundreds of microspecies of dandelion that evolved in geographic isolation. The Faroese call it løvetann and its leaves have been eaten as a spring vegetable for centuries by islanders in an archipelago with very limited agricultural diversity." },
{ name:"Crowberry", country:"Faroe Islands", lat:62.1, lng:-6.9, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Empetrum_nigrum.jpg/640px-Empetrum_nigrum.jpg", description:"Empetrum nigrum carpets the Faroe Islands' windswept heather moorlands in glossy black berries each autumn. Crowberries have been a survival food for Faroese islanders for over 1,000 years. Rich in antioxidants, they are used to make krækiberjasulta — crowberry jam — a Faroese speciality." },
{ name:"Sea Plantain", country:"Faroe Islands", lat:61.9, lng:-6.7, type:"Coastal Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Plantago_maritima.jpg/640px-Plantago_maritima.jpg", description:"Plantago maritima grows on every sea cliff and coastal grassland in the Faroe Islands, its fleshy salt-tolerant leaves forming dense mats. Young leaves have been eaten as a salad vegetable and the plant is deeply embedded in Faroese coastal ecology as the primary food plant of cliff-nesting seabirds." },
{ name:"Faroese Angelica", country:"Faroe Islands", lat:62.2, lng:-7.0, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Angelica_archangelica.jpg/640px-Angelica_archangelica.jpg", description:"Angelica archangelica grows in lush stands along Faroese stream banks and village edges. Vikings brought angelica cultivation to the Faroes over 1,000 years ago. Its hollow stems were eaten raw as a vegetable, its roots used medicinally and its seeds flavoured traditional Faroese spirits." },
{ name:"Heather", country:"Faroe Islands", lat:62.0, lng:-6.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Calluna_vulgaris.jpg/640px-Calluna_vulgaris.jpg", description:"Calluna vulgaris turns the Faroe Islands' moorlands purple each August in one of the North Atlantic's most beautiful seasonal transformations. Faroese heather honey is prized for its intense flavour. Heather was historically used to thatch Faroese turf houses and stuff mattresses across the archipelago." },

// 🇵🇫 FRENCH POLYNESIA
{ name:"Tiare — Gardenia", country:"French Polynesia", lat:-17.5, lng:-149.6, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Gardenia_taitensis.jpg/640px-Gardenia_taitensis.jpg", description:"Gardenia taitensis, the tiare flower, is French Polynesia's national flower and the soul of Tahitian culture. Its intensely fragrant white blooms are worn behind the ear — left ear if you are taken, right ear if you are available. Tiare flowers macerated in coconut oil produce monoï — Tahiti's iconic perfumed oil." },
{ name:"Breadfruit — Uru", country:"French Polynesia", lat:-17.6, lng:-149.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis, called uru in Tahitian, has sustained Polynesian civilisation for over 3,000 years. A single tree produces hundreds of nutritious fruits annually for decades. Polynesian navigators carried breadfruit seedlings across the Pacific in their great voyaging canoes, spreading cultivation to every inhabited island." },
{ name:"Vanilla Tahitensis", country:"French Polynesia", lat:-16.8, lng:-151.5, type:"Vine", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Vanilla_planifolia.jpg/640px-Vanilla_planifolia.jpg", description:"Vanilla tahitensis is unique to French Polynesia — a distinct species from Mexican vanilla, with a floral, cherry-like flavour prized by the world's top pastry chefs. Tahitian vanilla must be hand-pollinated flower by flower and each pod takes 9 months to cure. It commands the highest price of any vanilla on Earth." },
{ name:"Tamanu Tree", country:"French Polynesia", lat:-17.8, lng:-149.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Calophyllum_inophyllum.jpg/640px-Calophyllum_inophyllum.jpg", description:"Calophyllum inophyllum, the tamanu tree, produces one of Polynesia's most valuable natural products — tamanu oil. Cold-pressed from its sun-dried nuts, this dark green oil has extraordinary skin-healing properties and has been used in Tahitian medicine for centuries to treat wounds, burns and skin conditions." },
{ name:"Fara — Pandanus", country:"French Polynesia", lat:-17.4, lng:-149.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pandanus_tectorius.jpg/640px-Pandanus_tectorius.jpg", description:"Pandanus tectorius, the screwpine, is one of French Polynesia's most useful plants. Its long leaves are woven into the finest Tahitian hats, mats and baskets. Its fragrant male flowers are used in traditional perfumery and its aerial prop roots stabilise coral island soils against cyclone erosion." },

// 🇬🇫 FRENCH GUIANA
{ name:"Wallaba Tree", country:"French Guiana", lat:4.0, lng:-53.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Eperua_falcata.jpg/640px-Eperua_falcata.jpg", description:"Eperua falcata is one of the most abundant trees in French Guiana's rainforest, forming dense single-species stands called wallaba forests. Its resin-rich timber is extraordinarily durable and termite-resistant. French Guiana's Amazonian forests represent one of the most intact and biodiverse ecosystems on Earth." },
{ name:"Victoria Amazonica", country:"French Guiana", lat:4.5, lng:-52.5, type:"Water Lily", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Victoria_amazonica2.jpg/640px-Victoria_amazonica2.jpg", description:"Victoria amazonica grows in French Guiana's Amazonian river systems, its enormous circular pads reaching 3m across. The undersides of its leaves — a complex grid of air-filled ribs — inspired Joseph Paxton's revolutionary design for the Crystal Palace in 1851, changing the history of architecture." },
{ name:"Cacao", country:"French Guiana", lat:4.2, lng:-52.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Wild Theobroma cacao grows in French Guiana's rainforests as part of its native range. French Guiana hosts extraordinary cacao genetic diversity — populations here are studied by scientists searching for disease resistance and flavour complexity to improve the world's commercial chocolate supply." },
