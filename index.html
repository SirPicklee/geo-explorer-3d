{ name:"Walnut — Juglans regia", country:"Kyrgyzstan", lat:41.0, lng:73.0, type:"Tree", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Juglans_regia.jpg/640px-Juglans_regia.jpg", description:"Kyrgyzstan's Arslanbob forest is the world's largest natural walnut forest — 11,000 hectares of ancient Juglans regia trees. All cultivated walnuts worldwide descend from Central Asian wild trees like these. The Arslanbob walnut festival each autumn has been celebrated for over 2,000 years by local Kyrgyz communities." },
{ name:"Wild Tulip — Tulipa kaufmanniana", country:"Kyrgyzstan", lat:42.5, lng:74.5, type:"Bulb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tulipa_kaufmanniana.jpg/640px-Tulipa_kaufmanniana.jpg", description:"Tulipa kaufmanniana, the waterlily tulip, is native to Kyrgyzstan's Tian Shan mountains. Its low-growing star-shaped flowers carpet mountain slopes in white, yellow and red each spring. Kyrgyzstan is one of the world's primary centres of wild tulip diversity — the mountainous terrain created extraordinary speciation over millions of years." },
{ name:"Tian Shan Spruce", country:"Kyrgyzstan", lat:42.8, lng:75.0, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Picea_schrenkiana.jpg/640px-Picea_schrenkiana.jpg", description:"Picea schrenkiana forms majestic dark forests across Kyrgyzstan's Tian Shan mountains between 1,500 and 3,000m. These spruce forests are the lungs of Central Asia — regulating water flow into the Syr Darya and Amu Darya rivers that feed millions of people across the region. Some trees exceed 300 years of age." },
{ name:"Eremurus — Foxtail Lily", country:"Kyrgyzstan", lat:41.5, lng:72.8, type:"Bulb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Eremurus_robustus.jpg/640px-Eremurus_robustus.jpg", description:"Eremurus robustus sends up extraordinary flower spikes up to 3m tall from Kyrgyzstan's mountain meadows each June. Kyrgyzstan has the world's greatest Eremurus diversity with over 20 species. The starchy roots were eaten by nomadic Kyrgyz communities as emergency food and the leaves used to make a yellow dye." },
{ name:"Ferula — Giant Fennel", country:"Kyrgyzstan", lat:40.5, lng:72.5, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3d/Ferula_assa-foetida.jpg/640px-Ferula_assa-foetida.jpg", description:"Ferula species dominate Kyrgyzstan's dry southern valleys, their giant umbels rising 3m above stony hillsides. Kyrgyz traditional medicine uses ferula resin to treat digestive complaints, rheumatism and respiratory infections. Ancient Silk Road traders carried Kyrgyz ferula resin across Central Asia as a valuable medicinal commodity." },

// 🇱🇦 LAOS
{ name:"Champa — Frangipani", country:"Laos", lat:17.9, lng:102.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Plumeria_rubra.jpg/640px-Plumeria_rubra.jpg", description:"Plumeria alba is Laos's national flower — called dok champa — and the most sacred plant in Lao Buddhist culture. Its white and yellow flowers are offered at every temple and worn in hair at ceremonies. The champa appears on Lao currency and its fragrance defines the sensory experience of Luang Prabang's ancient temple complex." },
{ name:"Teak", country:"Laos", lat:19.0, lng:102.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tectona_grandis.jpg/640px-Tectona_grandis.jpg", description:"Tectona grandis grows in Laos's northern forests and was the foundation of colonial timber trade for centuries. Laos retains some of Southeast Asia's most intact teak forests in its northern provinces. Traditional Lao houses built from teak still stand after 200 years — testament to the wood's extraordinary durability." },
{ name:"Cardamom", country:"Laos", lat:15.5, lng:106.5, type:"Herb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Elettaria_cardamomum.jpg/640px-Elettaria_cardamomum.jpg", description:"Amomum villosum grows wild in Laos's Bolaven Plateau forests. Lao cardamom has been harvested by forest communities for centuries as a non-timber forest product. It is a critical income source for ethnic minority communities in southern Laos who cultivate it under the forest canopy in a sustainable agroforestry system." },
{ name:"Giant Mekong Lily", country:"Laos", lat:15.1, lng:105.8, type:"Aquatic Plant", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Crinum_asiaticum.jpg/640px-Crinum_asiaticum.jpg", description:"Crinum thaianum grows in Laos's Mekong River tributaries — one of the world's most biodiverse river systems. The Mekong's seasonal flooding creates extraordinary aquatic plant habitats. Laos's Don Det and Don Khon islands in the Mekong host unique aquatic plant communities found nowhere else on Earth." },
{ name:"Rosewood — Siamese Rosewood", country:"Laos", lat:16.0, lng:105.0, type:"Tree", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dalbergia_cochinchinensis.jpg/640px-Dalbergia_cochinchinensis.jpg", description:"Dalbergia cochinchinensis is one of the world's most trafficked timbers — its dense fragrant rosewood is prized in China for hongmu luxury furniture. Laos has lost over 90% of its rosewood in just 20 years to illegal logging. Despite CITES protection, criminal networks continue to strip Laos's forests at devastating speed." },

// 🇱🇻 LATVIA
{ name:"Daisy — Pipene", country:"Latvia", lat:56.9, lng:24.1, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Leucanthemum_vulgare.jpg/640px-Leucanthemum_vulgare.jpg", description:"Leucanthemum vulgare is Latvia's national flower — the daisy or pipene — worn in flower crowns at Jāņi, Latvia's midsummer festival. On the night of June 23rd, Latvians weave elaborate flower wreaths from daisies and oak leaves, dance around bonfires and search for the mythical fern flower at midnight." },
{ name:"Silver Birch", country:"Latvia", lat:57.5, lng:25.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Betula_pendula_Moscow.jpg/640px-Betula_pendula_Moscow.jpg", description:"Betula pendula is Latvia's national tree, covering 30% of the country's forests. Birch sap collected each spring is a Latvian national tradition — drunk fresh or fermented into birch wine. The Latvian sauna tradition uses birch whisks to improve circulation. Latvia has more birch trees per person than almost any country on Earth." },
{ name:"Bog Bilberry", country:"Latvia", lat:57.0, lng:26.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Vaccinium_uliginosum.jpg/640px-Vaccinium_uliginosum.jpg", description:"Vaccinium uliginosum grows across Latvia's vast raised peat bogs — some of the largest and best-preserved in Europe. Latvia's Kemeri and Slitere National Parks protect extraordinary bog ecosystems. Bog bilberry picking is a beloved Latvian summer tradition — berries are eaten fresh, made into jam and used in Latvia's distinctive dark rye bread." },
{ name:"Linden — Liepa", country:"Latvia", lat:56.5, lng:24.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tilia_cordata.jpg/640px-Tilia_cordata.jpg", description:"Tilia cordata, the linden, is deeply embedded in Latvian identity — the word Latvija itself may derive from the Lielupe River whose banks were lined with linden trees. Linden blossom tea is Latvia's most traditional herbal remedy. The Latvian midsummer festival Jāņi always features linden flower garlands." },
{ name:"Common Juniper", country:"Latvia", lat:57.2, lng:22.5, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Juniperus_communis.jpg/640px-Juniperus_communis.jpg", description:"Juniperus communis forms distinctive stands across Latvia's coastal meadows and ancient alvar grasslands. Latvian juniper berries are used to flavour game dishes and gin. Traditional Latvian smokehouses use juniper branches to smoke fish and meat, imparting a distinctive resinous flavour prized across the Baltic region." },

// 🇱🇧 LEBANON
{ name:"Cedar of Lebanon", country:"Lebanon", lat:34.2, lng:36.1, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cedrus_libani.jpg/640px-Cedrus_libani.jpg", description:"Cedrus libani is Lebanon's national symbol — it appears on the country's flag, currency and passport. Once covering vast mountain forests, fewer than 17 groves remain. Solomon's Temple in Jerusalem was built from Lebanese cedar. The ancient Bcharre grove contains trees over 3,000 years old — living witnesses to the Phoenician civilisation." },
{ name:"Cyclamen", country:"Lebanon", lat:33.9, lng:35.5, type:"Bulb", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cyclamen_persicum.jpg/640px-Cyclamen_persicum.jpg", description:"Cyclamen persicum carpets Lebanon's mountain forests in delicate pink and white blooms each winter. Lebanon has extraordinary cyclamen diversity with multiple endemic varieties in its cedar groves. The cyclamen is celebrated in Lebanese poetry as a symbol of resilience — blooming defiantly through winter snow on the country's highest peaks." },
{ name:"Judas Tree", country:"Lebanon", lat:33.8, lng:35.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cercis_siliquastrum.jpg/640px-Cercis_siliquastrum.jpg", description:"Cercis siliquastrum explodes in brilliant magenta flowers directly from its branches and trunk each April before any leaves appear — one of the Mediterranean's most spectacular spring displays. Named after Judas Iscariot who supposedly hanged himself from one, it grows wild across Lebanon's limestone mountains and valley slopes." },
{ name:"Wild Orchid", country:"Lebanon", lat:34.0, lng:35.9, type:"Orchid", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ophrys_apifera_flower.jpg/640px-Ophrys_apifera_flower.jpg", description:"Lebanon has over 40 native orchid species growing in its mountain meadows and cedar forests — extraordinary diversity for such a small country. Ophrys species — bee orchids — perform extraordinary mimicry of female insects to achieve pollination. Lebanon's Horsh Ehden Nature Reserve protects the country's richest orchid habitats." },
{ name:"Aleppo Pine", country:"Lebanon", lat:33.7, lng:35.6, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Pinus_halepensis_cones.jpg/640px-Pinus_halepensis_cones.jpg", description:"Pinus halepensis covers Lebanon's coastal mountains in fragrant forests above 500m. Lebanese pine nuts — harvested from stone pine cones — are central to Levantine cuisine, used in kibbeh, fattoush and baklava. Lebanon's Pine Forest of Beirut — the Horsh Beirut — is one of the last urban forests in the Middle East." },

// 🇱🇸 LESOTHO
{ name:"Spiral Aloe", country:"Lesotho", lat:-29.6, lng:28.2, type:"Succulent", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Aloe_polyphylla.jpg/640px-Aloe_polyphylla.jpg", description:"Aloe polyphylla is Lesotho's national plant and one of the world's most mathematically perfect plants — its leaves arranged in a precise Fibonacci spiral of exactly 5 rows. Endemic only to Lesotho's Maluti Mountains above 2,000m, it is strictly protected by Lesotho law and cannot be exported. Attempts to grow it outside its native habitat almost always fail." },
{ name:"Protea", country:"Lesotho", lat:-29.5, lng:28.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Protea_caffra.jpg/640px-Protea_caffra.jpg", description:"Protea caffra, the common sugarbush, grows across Lesotho's highland grasslands producing spectacular pink flower heads that provide critical nectar for sunbirds. Lesotho's Maluti Mountains are part of the Drakensberg alpine zone — a UNESCO World Heritage Site with extraordinary plant endemism." },
{ name:"Berg Bamboo", country:"Lesotho", lat:-29.8, lng:28.8, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Thamnocalamus_tessellatus.jpg/640px-Thamnocalamus_tessellatus.jpg", description:"Thamnocalamus tessellatus, the berg bamboo, forms dense thickets along Lesotho's mountain stream banks above 1,800m. It is the primary food of the bearded vulture — lammergeier — one of Africa's most magnificent birds, which nests on Lesotho's highest basalt cliffs. Basotho people weave its stems into traditional hats and baskets." },
{ name:"Cosmos — Sefako", country:"Lesotho", lat:-29.3, lng:27.5, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cosmos_bipinnatus.jpg/640px-Cosmos_bipinnatus.jpg", description:"Cosmos bipinnatus — introduced from Mexico — has naturalised so completely across Lesotho's highlands that it is considered a cultural icon. Called sefako in Sesotho, it turns roadsides and fields vivid pink and white each autumn. Basotho children make necklaces from cosmos flowers and the plant features in national artwork." },
{ name:"Wild Dagga", country:"Lesotho", lat:-29.7, lng:28.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Leonotis_leonurus.jpg/640px-Leonotis_leonurus.jpg", description:"Leonotis leonurus blazes orange across Lesotho's mountain slopes each autumn, its whorled flower heads visited by sunbirds and bees. Called wild dagga or lion's tail, it is one of southern Africa's most important medicinal plants — used by Basotho traditional healers to treat fever, headaches and skin conditions." },

// 🇱🇷 LIBERIA
{ name:"Pepper Tree — Grains of Paradise", country:"Liberia", lat:6.3, lng:-10.8, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Aframomum_melegueta.jpg/640px-Aframomum_melegueta.jpg", description:"Aframomum melegueta is native to Liberia's coastal wetlands — the original Grain Coast that gave West Africa its first European name. Its peppery aromatic seeds were the most valuable spice from West Africa in medieval Europe. Liberian grains of paradise are still used in local cuisine and traditional medicine across the country." },
{ name:"Liberian Coffee", country:"Liberia", lat:6.5, lng:-9.5, type:"Shrub", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Roasted_coffee_beans.jpg/640px-Roasted_coffee_beans.jpg", description:"Coffea liberica is native to Liberia and one of only three commercially grown coffee species in the world. Larger and more disease-resistant than arabica, it produces a distinctive woody, smoky flavour. Liberia's rainforests contain wild coffee populations of enormous genetic importance for developing climate-resilient coffee varieties." },
{ name:"African Rubber Tree", country:"Liberia", lat:5.5, lng:-9.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/31/Hevea_brasiliensis_tapping.jpg/640px-Hevea_brasiliensis_tapping.jpg", description:"Hevea brasiliensis plantations cover vast areas of Liberia — the country is Africa's largest natural rubber producer. Firestone established the world's largest rubber plantation in Liberia in 1926, covering 400,000 acres. Liberian rubber has been central to global tyre production for nearly a century." },
{ name:"Kola Tree", country:"Liberia", lat:6.8, lng:-10.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cola_nitida.jpg/640px-Cola_nitida.jpg", description:"Cola nitida grows in Liberia's coastal rainforests and kola nuts are central to all Liberian social ceremonies — offered to guests, exchanged at weddings and used in traditional medicine. Liberia's diverse ethnic groups all share the kola nut tradition as a symbol of welcome, respect and good faith." },
{ name:"Sande Bush — Bondo", country:"Liberia", lat:7.0, lng:-9.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dracaena_arborea.jpg/640px-Dracaena_arborea.jpg", description:"Dracaena arborea is sacred in Liberia's Poro and Sande secret societies — the traditional institutions that govern community life across much of the country. Its leaves mark sacred boundaries around initiation forests. Liberia's rich forest culture assigns deep spiritual significance to dozens of native tree species." },

// 🇱🇾 LIBYA
{ name:"Saharan Cypress", country:"Libya", lat:27.0, lng:12.5, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6b/Cupressus_dupreziana.jpg/640px-Cupressus_dupreziana.jpg", description:"Cupressus dupreziana survives in Libya's Akakus Mountains in the central Sahara — one of Earth's most isolated tree populations. These ancient cypresses, some over 2,000 years old, are relics of a time when the Sahara was green. Libya's rock art in the Akakus depicts elephants, hippos and giraffes in a once-verdant landscape." },
{ name:"Date Palm", country:"Libya", lat:27.5, lng:14.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Phoenix_dactylifera_2.jpg/640px-Phoenix_dactylifera_2.jpg", description:"Phoenix dactylifera has been cultivated in Libya's oases for over 5,000 years. The Fezzan oases of Sabha, Murzuq and Ghat are ancient date palm gardens that sustained trans-Saharan caravan routes for millennia. Libyan Medjool and Deglet Nour dates are among the finest in the world." },
{ name:"Olive Tree", country:"Libya", lat:32.5, lng:13.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"Olea europaea has been cultivated along Libya's Mediterranean coast since Phoenician times 3,000 years ago. Ancient Roman Libya — one of the empire's most productive provinces — exported vast quantities of olive oil to Rome. Libya's Cyrenaica region still contains ancient olive groves planted during the Greek colonial period." },
{ name:"Esparto Grass", country:"Libya", lat:31.5, lng:15.0, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Stipa_tenacissima.jpg/640px-Stipa_tenacissima.jpg", description:"Stipa tenacissima covers vast areas of Libya's semi-arid steppe in dense tussocks. Its extraordinarily tough fibres were used by ancient Carthaginians and Romans to make rope, baskets and sandals. Libya exported esparto grass to Britain in the 19th century as a key raw material for high-quality paper production." },
{ name:"Acacia — Gum Arabic", country:"Libya", lat:25.0, lng:14.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Acacia_senegal_MS_4724.jpg/640px-Acacia_senegal_MS_4724.jpg", description:"Acacia species survive in Libya's southern Saharan wadis where underground water persists. Tuareg nomads of the Fezzan harvest acacia gum as a food supplement and use acacia thorns as needles. These scattered desert acacias are critical water and shade resources for both wildlife and the nomadic peoples of the Libyan Sahara." },

// 🇱🇮 LIECHTENSTEIN
{ name:"Edelweiss", country:"Liechtenstein", lat:47.1, lng:9.5, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Leontopodium_alpinum_-_edelweiss.jpg/640px-Leontopodium_alpinum_-_edelweiss.jpg", description:"Leontopodium alpinum grows on Liechtenstein's Rätikon mountain ridges above 1,800m. Strictly protected by Liechtenstein law, it is the unofficial symbol of this tiny Alpine principality. Liechtenstein's entire eastern border runs along mountain ridges where edelweiss blooms each July above the clouds." },
{ name:"Alpine Rose — Alpenrose", country:"Liechtenstein", lat:47.0, lng:9.6, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rhododendron_ferrugineum.jpg/640px-Rhododendron_ferrugineum.jpg", description:"Rhododendron ferrugineum carpets Liechtenstein's subalpine slopes in brilliant crimson each June. Called alpenrose, its toxic leaves were historically used to repel insects and treat rheumatism in Alpine folk medicine. Liechtenstein's Malbun ski resort sits surrounded by alpenrose heathland — one of the Alps' most spectacular wildflower habitats." },
{ name:"Gentian", country:"Liechtenstein", lat:47.05, lng:9.52, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gentiana_acaulis.jpg/640px-Gentiana_acaulis.jpg", description:"Gentiana acaulis blazes electric blue across Liechtenstein's alpine meadows each spring. Protected by Liechtenstein's strict nature conservation laws, wild gentian cannot be picked or dug. Its intensely bitter root was used to make Enzian schnapps — still produced legally from cultivated plants in neighbouring Austria." },
{ name:"Arnica", country:"Liechtenstein", lat:47.08, lng:9.55, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Arnica_montana_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-168.jpg/640px-Arnica_montana_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-168.jpg", description:"Arnica montana grows across Liechtenstein's mountain meadows and has been used in Alpine medicine for 500 years. Its bright yellow daisy-like flowers produce anti-inflammatory compounds used in creams and gels to treat bruises. Liechtenstein's pharmaceutical industry — one of the world's most advanced per capita — researches arnica compounds." },
{ name:"Swiss Pine — Arve", country:"Liechtenstein", lat:47.12, lng:9.58, type:"Conifer", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_cembra.jpg/640px-Pinus_cembra.jpg", description:"Pinus cembra grows on Liechtenstein's highest ridges in twisted wind-sculpted forms. Called arve in the local Alemannic dialect, its fragrant wood is carved into the elaborate decorated furniture and clocks of Alpine folk art tradition. Its large seeds — arolla pine nuts — are harvested by nutcrackers and stored in thousands of hidden caches." },

// 🇱🇹 LITHUANIA
{ name:"Rue — Rūta", country:"Lithuania", lat:54.7, lng:25.3, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ruta_graveolens.jpg/640px-Ruta_graveolens.jpg", description:"Ruta graveolens is Lithuania's national flower — the rue or rūta. Lithuanian girls traditionally wore rue crowns at midsummer and wedding ceremonies, removing the crown as a symbol of lost maidenhood. The rue appears in countless Lithuanian folk songs called dainos. Lithuania is one of the last European nations where this ancient plant symbolism remains actively practiced." },
{ name:"Silver Birch", country:"Lithuania", lat:55.5, lng:24.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Betula_pendula_Moscow.jpg/640px-Betula_pendula_Moscow.jpg", description:"Betula pendula is Lithuania's national tree, covering vast areas of the country's forests and bogs. Birch sap — beržų sula — is collected each spring and drunk as a traditional tonic across Lithuania. The Lithuanian midsummer festival Rasos features birch branch decorations and birch wreath floating on rivers as divination." },
{ name:"Oak — Ąžuolas", country:"Lithuania", lat:54.5, lng:24.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Quercus_robur_27_09_2011_Ls.jpg/640px-Quercus_robur_27_09_2011_Ls.jpg", description:"Quercus robur is sacred in Lithuanian mythology — the oak was the tree of Perkūnas, the thunder god. Lithuania was the last country in Europe to convert to Christianity in 1387, and pagan sacred oak groves — romuva — were the centres of Baltic spiritual life for millennia. The Stelmužė oak is over 1,500 years old." },
{ name:"Lily of the Valley", country:"Lithuania", lat:55.0, lng:24.8, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Convallaria_majalis_MS_4272.jpg/640px-Convallaria_majalis_MS_4272.jpg", description:"Convallaria majalis carpets Lithuania's ancient forest floors in delicate white bells each May. Called pakalnutė in Lithuanian, it is one of the most beloved wildflowers of the Baltic states. Lithuanian folk medicine used lily of the valley to treat heart conditions — a use validated by modern pharmacology through its cardiac glycoside compounds." },
{ name:"Juniper", country:"Lithuania", lat:55.8, lng:21.5, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Juniperus_communis.jpg/640px-Juniperus_communis.jpg", description:"Juniperus communis forms distinctive stands across Lithuania's Curonian Spit — a UNESCO World Heritage Site of extraordinary sand dunes and coastal forest. Lithuanian juniper berries flavour traditional smoked meats and spirits. In Lithuanian folk belief juniper was a protective plant — branches were hung above doorways to ward off evil spirits." },

// 🇱🇺 LUXEMBOURG
{ name:"Rose of Luxembourg", country:"Luxembourg", lat:49.6, lng:6.1, type:"Shrub", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_damascena.jpg/640px-Rosa_damascena.jpg", description:"Rosa species have been cultivated in Luxembourg's Moselle valley for centuries. The city of Luxembourg is nicknamed the Green Heart of Europe for its extraordinary parks and gardens. Luxembourg's national flower festival each spring fills the capital's boulevards with elaborate rose displays celebrating the Grand Duchy's horticultural heritage." },
{ name:"Moselle Riesling Vine", country:"Luxembourg", lat:49.7, lng:6.4, type:"Vine", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Vitis_vinifera_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-277.jpg/640px-Vitis_vinifera_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-277.jpg", description:"Vitis vinifera Riesling has been cultivated on Luxembourg's Moselle valley slopes since Roman times. Luxembourg's 42km wine route produces crisp mineral Rieslings and sparkling Crémant de Luxembourg. Despite being one of Europe's smallest wine regions, Luxembourg consumes more wine per capita than almost any other nation on Earth." },
{ name:"European Beech", country:"Luxembourg", lat:49.8, lng:6.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Fagus_sylvatica_forest.jpg/640px-Fagus_sylvatica_forest.jpg", description:"Fagus sylvatica dominates Luxembourg's Ardennes forests in the north — a landscape of ancient beech woodland, deep ravines and rushing streams. Luxembourg's Mullerthal region, known as Little Switzerland, is covered in beech forests growing over extraordinary sandstone rock formations. Beech mast years feed Luxembourg's wild boar populations." },
{ name:"Lily of the Valley", country:"Luxembourg", lat:49.5, lng:6.3, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/43/Convallaria_majalis_MS_4272.jpg/640px-Convallaria_majalis_MS_4272.jpg", description:"Convallaria majalis is Luxembourg's national flower, carpeting the Grand Duchy's beech forests in delicate white bells each May. On May 1st — Labour Day — Luxembourg has a tradition of gifting lily of the valley as a symbol of spring and good luck. Luxembourg's flower markets overflow with the plant on this day each year." },
{ name:"Wild Garlic — Bärlauch", country:"Luxembourg", lat:49.75, lng:6.1, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Allium_ursinum.jpg/640px-Allium_ursinum.jpg", description:"Allium ursinum carpets Luxembourg's Mullerthal and Moselle valley forests in white each April, filling the air with a pungent garlic scent. Wild garlic foraging is enormously popular in Luxembourg — restaurants across the Grand Duchy feature seasonal bärlauch menus in spring. Its broad leaves are used in soups, pestos and salads." },


// 🇲🇴 MACAU
{ name:"Lotus Flower", country:"Macau", lat:22.2, lng:113.5, type:"Aquatic Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Nelumbo_nucifera_MS_4967.jpg/640px-Nelumbo_nucifera_MS_4967.jpg", description:"Nelumbo nucifera is Macau's official emblem flower, appearing on the regional flag and coat of arms. The lotus symbolises Macau's transformation from a quiet fishing village to one of the world's most dynamic cities. Lotus ponds in Macau's Lou Lim Ieoc Garden have been cultivated since the 19th century Qing Dynasty era." },
{ name:"Banyan Tree", country:"Macau", lat:22.19, lng:113.54, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Banyan_tree.jpg/640px-Banyan_tree.jpg", description:"Ficus microcarpa, the Chinese banyan, lines Macau's historic streets and squares with its aerial roots and dense canopy. The famous banyan trees of Senado Square have witnessed 400 years of Portuguese colonial history. Macau's ancient banyans are protected monuments — their removal requires government approval." },
{ name:"Camellia", country:"Macau", lat:22.21, lng:113.55, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Camellia_sinensis.jpg/640px-Camellia_sinensis.jpg", description:"Camellia sinensis, the tea plant, was traded through Macau's port for centuries — Macau was the primary entry point for Chinese tea into Europe from the 16th century. The English word tea derives from the Amoy dialect te, traded through Macau's Portuguese merchants to the world." },
{ name:"Dragon Tree", country:"Macau", lat:22.18, lng:113.53, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Dragon_blood_tree_Socotra.jpg/640px-Dragon_blood_tree_Socotra.jpg", description:"Dracaena species are cultivated throughout Macau's gardens and temple courtyards. In Chinese culture the dragon tree symbolises good fortune and longevity. Macau's Kun Iam Temple — where the first US-China treaty was signed in 1844 — has ancient dragon trees in its garden considered guardians of the sacred site." },
{ name:"Osmanthus", country:"Macau", lat:22.20, lng:113.56, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Osmanthus_fragrans.jpg/640px-Osmanthus_fragrans.jpg", description:"Osmanthus fragrans fills Macau's autumn air with its extraordinary apricot-honey fragrance. Called guihua in Chinese, its tiny flowers are used to flavour mooncakes, teas and wines. Macau's Mid-Autumn Festival — one of the city's most important celebrations — is inseparable from the scent of osmanthus blooming in temple gardens." },

// 🇲🇬 MADAGASCAR
{ name:"Baobab — Avenue of Baobabs", country:"Madagascar", lat:-20.0, lng:47.0, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Baobabs_near_Morondava%2C_Madagascar.jpg/640px-Baobabs_near_Morondava%2C_Madagascar.jpg", description:"Madagascar has six endemic baobab species — more than any other country. The Avenue of Baobabs near Morondava features trees up to 800 years old and 30m tall. These magnificent trees store thousands of litres of water in their swollen trunks. Madagascar's baobabs are increasingly threatened by climate change and agricultural expansion." },
{ name:"Traveller's Palm", country:"Madagascar", lat:-18.9, lng:47.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ravenala_madagascariensis.jpg/640px-Ravenala_madagascariensis.jpg", description:"Ravenala madagascariensis is Madagascar's national plant — its fan of enormous paddle-shaped leaves arranged in a perfect east-west plane, allegedly helping lost travellers find direction. Its leaf bases collect rainwater — up to 1 litre per leaf — giving thirsty travellers an emergency water source in the dry season." },
{ name:"Rosy Periwinkle", country:"Madagascar", lat:-19.5, lng:47.1, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Catharanthus_roseus.jpg/640px-Catharanthus_roseus.jpg", description:"Catharanthus roseus is endemic to Madagascar and has saved millions of lives worldwide. Its alkaloids vincristine and vinblastine revolutionised childhood leukaemia treatment — survival rates rose from 10% to 90%. Madagascar received no royalties from this discovery, sparking a global debate about biodiversity rights and benefit sharing." },
{ name:"Pachypodium — Madagascar Palm", country:"Madagascar", lat:-23.0, lng:44.0, type:"Succulent", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pachypodium_lamerei.jpg/640px-Pachypodium_lamerei.jpg", description:"Pachypodium lamerei is endemic to Madagascar's spiny desert — one of Earth's most unique ecosystems. Its swollen spine-covered trunk stores water through Madagascar's brutal dry seasons. The spiny forest of southern Madagascar contains hundreds of endemic plant species found nowhere else on Earth." },
{ name:"Black Lemur Food — Traveller's Tree", country:"Madagascar", lat:-15.0, lng:49.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ravenala_madagascariensis.jpg/640px-Ravenala_madagascariensis.jpg", description:"Helicteres isora grows in Madagascar's eastern rainforests providing critical food for lemurs and chameleons. Madagascar has lost over 90% of its original forest cover — the remaining fragments shelter over 12,000 plant species of which 83% are found nowhere else on Earth, making it the world's highest plant endemism hotspot." },

// 🇲🇼 MALAWI
{ name:"Mulanje Cedar", country:"Malawi", lat:-15.9, lng:35.6, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Widdringtonia_whytei.jpg/640px-Widdringtonia_whytei.jpg", description:"Widdringtonia whytei is endemic to Malawi's Mount Mulanje — the highest mountain in central Africa. Once covering the massif in dense cedar forest, it has been reduced to scattered remnant populations by illegal logging and fire. Its fragrant durable timber was used for colonial railway sleepers across central Africa." },
{ name:"African Violet", country:"Malawi", lat:-13.9, lng:33.8, type:"Wildflower", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Saintpaulia_ionantha.jpg/640px-Saintpaulia_ionantha.jpg", description:"Streptocarpus species grow on Malawi's misty mountain escarpments in the Nyika Plateau and Mulanje Massif. Malawi's highland forests contain extraordinary Streptocarpus diversity — relatives of the African violet that have evolved in the cool, moist ravines of the African Rift Valley over millions of years." },
{ name:"Baobab", country:"Malawi", lat:-13.0, lng:34.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata grows across Malawi's lakeshore lowlands along the shores of Lake Malawi — one of Africa's Great Rift Valley lakes. Ancient baobabs mark the sites of traditional chiefs' villages along the lakeshore. Their fruit pulp mixed with water makes a refreshing drink that Malawians call malambe." },
{ name:"Brachystegia — Miombo", country:"Malawi", lat:-14.5, lng:34.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Brachystegia_spiciformis.jpg/640px-Brachystegia_spiciformis.jpg", description:"Brachystegia species dominate Malawi's miombo woodland — the world's most extensive dry woodland ecosystem covering 2.7 million km² of Africa. Malawi's miombo produces spectacular copper-red new leaves each September before the rains — a phenomenon called the false spring that turns entire hillsides brilliant red." },
{ name:"Chamgwa — Wild Loquat", country:"Malawi", lat:-15.5, lng:35.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Uapaca_kirkiana.jpg/640px-Uapaca_kirkiana.jpg", description:"Uapaca kirkiana, the wild loquat or mahobohobo, produces sweet orange fruits eaten across Malawi. It is one of the most important wild food trees in southern Africa. Malawian children collect its fruits from the forest floor each November and the fruit is fermented into traditional wine consumed at ceremonies." },

// 🇲🇾 MALAYSIA
{ name:"Rafflesia", country:"Malaysia", lat:4.2, lng:117.8, type:"Holoparasite", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rafflesia_arnoldii.jpg/640px-Rafflesia_arnoldii.jpg", description:"Rafflesia keithii grows in Sabah's Kinabalu Park — the world's most biodiverse UNESCO site. Malaysia has the highest Rafflesia diversity after Indonesia with over 10 species. Each flower takes 9 months to develop underground before bursting open for just 5–7 days. Sabah's rafflesia blooming events attract botanists from around the world." },
{ name:"Pitcher Plant — Nepenthes", country:"Malaysia", lat:6.0, lng:116.5, type:"Carnivorous Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Nepenthes_rajah1.jpg/640px-Nepenthes_rajah1.jpg", description:"Malaysia's Borneo hosts the world's greatest Nepenthes diversity — over 40 species on Mount Kinabalu alone. Nepenthes rajah produces the world's largest pitchers, capable of holding 3.5 litres of digestive fluid. The relationship between these pitchers and small mammals that use them as toilets — providing nutrients — is one of nature's most extraordinary partnerships." },
{ name:"Meranti — Shorea", country:"Malaysia", lat:3.1, lng:113.0, type:"Tree", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Shorea_robusta.jpg/640px-Shorea_robusta.jpg", description:"Shorea species — dipterocarp giants — once dominated Malaysia's rainforests in trees reaching 80m. Malaysia's Taman Negara protects some of the world's oldest rainforest — 130 million years old, predating the Amazon. Meranti timber built colonial Singapore and Kuala Lumpur and continues to be one of Asia's most valuable exports." },
{ name:"Hibiscus — Bunga Raya", country:"Malaysia", lat:3.1, lng:101.7, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hibiscus_rosa-sinensis.jpg/640px-Hibiscus_rosa-sinensis.jpg", description:"Hibiscus rosa-sinensis is Malaysia's national flower — bunga raya meaning great flower. Its five petals represent the five principles of the Rukunegara national philosophy. The crimson hibiscus appears on Malaysian currency, stamps and official documents. Over 300 varieties are cultivated in Malaysia's tropical gardens." },
{ name:"Durian", country:"Malaysia", lat:4.0, lng:108.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Durian_DSCN0870_crop.jpg/640px-Durian_DSCN0870_crop.jpg", description:"Durio zibethinus — the king of fruits — is central to Malaysian culture. Malaysia's Musang King variety commands extraordinary prices globally for its rich bitter-sweet custard flesh. Wild durian species in Malaysian Borneo are pollinated exclusively by cave nectar bats flying enormous distances each night. Durian season is a national event." },

// 🇲🇻 MALDIVES
{ name:"Coconut Palm", country:"Maldives", lat:3.2, lng:73.2, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is the national tree of Maldives — appearing on the national emblem. On low-lying coral atolls with minimal soil, the coconut palm provides food, drink, building material, rope and fuel. As the world's most climate-threatened nation, Maldives is planting coconut palms on newly raised islands as sea levels rise." },
{ name:"Pandanus — Fani", country:"Maldives", lat:3.5, lng:72.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pandanus_tectorius.jpg/640px-Pandanus_tectorius.jpg", description:"Pandanus tectorius is essential to Maldivian life — its leaves woven into the traditional mats called kunaa that cover every floor, bed and prayer space in the islands. Maldivian pandanus weaving is a UNESCO-recognised craft tradition. Its prop roots stabilise the sandy atoll soils that the islands are entirely composed of." },
{ name:"Mangrove", country:"Maldives", lat:4.2, lng:73.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Mangrove_trees.jpg/640px-Mangrove_trees.jpg", description:"Rhizophora mucronata forms critical mangrove forests on Maldives' larger atolls. As the world's lowest-lying country — average elevation 1.5m above sea level — Maldives' mangroves are its last natural coastal defence. Maldivian mangroves store extraordinary amounts of blue carbon and serve as nurseries for the reef fish that feed the nation." },
{ name:"Sea Lettuce — Ulva", country:"Maldives", lat:3.0, lng:72.5, type:"Marine Algae", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ulva_lactuca.jpg/640px-Ulva_lactuca.jpg", description:"Marine algae including Ulva and Sargassum species form the foundation of Maldives' extraordinary coral reef ecosystems — the most biodiverse marine habitats on Earth. Maldivian reefs support over 1,000 fish species and 200 coral species. Rising ocean temperatures are causing catastrophic coral bleaching events that threaten the entire ecosystem." },
{ name:"Breadfruit", country:"Maldives", lat:3.3, lng:73.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis has been cultivated in Maldives for over 2,000 years, providing essential carbohydrates on atolls with minimal agricultural land. Maldivian breadfruit — bambukeyo — is eaten boiled, fried and as chips. As climate change threatens crop production on low-lying atolls, breadfruit's drought tolerance makes it increasingly vital." },

// 🇲🇱 MALI
{ name:"Baobab", country:"Mali", lat:12.7, lng:-8.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata is Mali's most iconic tree — ancient baobabs mark the sites of legendary Mali Empire trading towns along the Niger River. The famous baobab of Ségou witnessed the rise and fall of the Mali Empire, Songhai Empire and French colonial rule. Its fruit pulp mixed with millet makes Mali's most nutritious porridge." },
{ name:"Acacia — Gum Arabic", country:"Mali", lat:15.0, lng:-2.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Acacia_senegal_MS_4724.jpg/640px-Acacia_senegal_MS_4724.jpg", description:"Senegalia senegal is Mali's most economically important wild tree. Mali sits within the Sahel Gum Belt and gum arabic tapping provides income for millions of families. The Great Green Wall initiative — planting 8,000km of trees across the Sahel — uses acacia as its primary species to combat Mali's advancing desertification." },
{ name:"Shea Tree", country:"Mali", lat:12.0, lng:-5.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Vitellaria_paradoxa.jpg/640px-Vitellaria_paradoxa.jpg", description:"Vitellaria paradoxa dominates Mali's Sudanian savanna and is exclusively managed by Malian women. Shea butter is fundamental to Malian cooking — used to fry the street food sold across Bamako's markets. Mali's shea trees are under enormous pressure from agricultural expansion and charcoal production." },
{ name:"Néré", country:"Mali", lat:13.5, lng:-6.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Parkia_biglobosa.jpg/640px-Parkia_biglobosa.jpg", description:"Parkia biglobosa produces soumbala — Mali's most important condiment. Fermented néré seeds are the backbone of Malian cuisine, adding a deep umami flavour to sauces and soups. The tree's red pompom flowers are pollinated exclusively by bats each night. A single néré tree can feed an entire Malian household for months." },
{ name:"Desert Date — Gao", country:"Mali", lat:16.5, lng:-3.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Balanites_aegyptiaca.jpg/640px-Balanites_aegyptiaca.jpg", description:"Balanites aegyptiaca, called gao in Mali, is the most drought-resistant tree in the Sahel. Its edible fruits, leaves and bark provide food and medicine during famines. The city of Gao — the great Songhai Empire capital — takes its name from this tree. Ancient Malians extracted oil from its seeds for cooking and lamp fuel." },

// 🇲🇹 MALTA
{ name:"Maltese Rock Centaury", country:"Malta", lat:35.9, lng:14.4, type:"Wildflower", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cheirolophus_crassifolius.jpg/640px-Cheirolophus_crassifolius.jpg", description:"Cheirolophus crassifolius is Malta's national plant — a pink-flowered centaury endemic only to Malta's limestone cliffs and garigue. Found nowhere else on Earth, it clings to the sheer sea cliffs of Dingli and the Blue Grotto. Malta's extraordinary endemic plant diversity — 24 endemic species on 316km² — reflects millions of years of Mediterranean island isolation." },
{ name:"Maltese Spurge", country:"Malta", lat:35.8, lng:14.5, type:"Shrub", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Euphorbia_melitensis.jpg/640px-Euphorbia_melitensis.jpg", description:"Euphorbia melitensis is endemic to Malta and Gozo, growing on the islands' rocky limestone garigue. Its yellow-green flowers bloom in spring across Malta's ancient agricultural terraces. The Knights of St John who ruled Malta for 268 years documented this plant in their extensive botanical gardens in Valletta." },
{ name:"Carob Tree", country:"Malta", lat:35.9, lng:14.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ceratonia_siliqua.jpg/640px-Ceratonia_siliqua.jpg", description:"Ceratonia siliqua has been cultivated in Malta for over 4,000 years — its sweet dark pods were Malta's most important export for centuries. Maltese carob was loaded onto tall ships in Valletta's Grand Harbour and sold across Europe as animal fodder and human food. The carat — the unit of gemstone weight — derives from the carob seed." },
{ name:"Maltese Mushroom", country:"Malta", lat:36.0, lng:14.2, type:"Parasite", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cynomorium_coccineum.jpg/640px-Cynomorium_coccineum.jpg", description:"Cynomorium coccineum erupts from Malta's coastal soils as dark red fleshy clubs — a holoparasitic plant with no chlorophyll that attaches to sea purslane roots. Called the Maltese mushroom, it was one of the most expensive medicines in medieval Europe — sold by the Knights of St John across the continent as a cure-all." },
{ name:"Olive Tree", country:"Malta", lat:35.85, lng:14.42, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"Olea europaea has been cultivated in Malta since the Bronze Age 4,000 years ago. Malta's ancient olive trees — some estimated at over 1,000 years old — still produce olives in the island's traditional rdum terraces. Maltese olive oil, pressed from the Bidni and Maltija native varieties, is among the Mediterranean's most distinctive." },

// 🇲🇭 MARSHALL ISLANDS
{ name:"Coconut Palm — Ni", country:"Marshall Islands", lat:7.1, lng:171.4, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is the foundation of Marshallese civilisation — providing food, drink, building material and rope on atolls where almost nothing else grows. Copra — dried coconut flesh — was the Marshall Islands' primary export for over a century. Rising sea levels threaten to contaminate the freshwater lens that coconut palms depend on." },
{ name:"Pandanus — Bob", country:"Marshall Islands", lat:7.0, lng:171.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pandanus_tectorius.jpg/640px-Pandanus_tectorius.jpg", description:"Pandanus tectorius is called bob in Marshallese and is one of the most culturally important plants in the islands. Its leaves are woven into the finest Marshallese mats, baskets and the traditional woven navigation charts — rebbelib — used to map Pacific ocean swells. Its starchy fruit is a critical food during times of drought." },
{ name:"Breadfruit — Mā", country:"Marshall Islands", lat:7.2, lng:171.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis, called mā in Marshallese, has sustained the islands' population for over 2,000 years. Marshallese navigators carried breadfruit seedlings on their extraordinary open-ocean voyages. US nuclear testing at Bikini Atoll in the 1950s destroyed breadfruit plantations across multiple atolls whose communities have never fully recovered." },
{ name:"Mangrove", country:"Marshall Islands", lat:6.9, lng:171.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Mangrove_trees.jpg/640px-Mangrove_trees.jpg", description:"Rhizophora species form small but critical mangrove stands on the Marshall Islands' larger atolls. With a maximum elevation of just 2m above sea level, the Marshall Islands are among Earth's most climate-vulnerable nations. Mangroves are the last natural barrier between Marshallese communities and rising Pacific Ocean storm surges." },
{ name:"Beach Morning Glory — Kio", country:"Marshall Islands", lat:7.1, lng:171.3, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ipomoea_pes-caprae.jpg/640px-Ipomoea_pes-caprae.jpg", description:"Ipomoea pes-caprae, the beach morning glory, carpets Marshall Islands' sandy beaches and reef flats in trailing vines with vivid pink flowers. Its deep root system stabilises atoll sands against wave erosion. Marshallese traditional medicine uses its leaves to treat jellyfish stings and its seeds as a laxative." },

// 🇲🇶 MARTINIQUE
{ name:"Balisier — Heliconia", country:"Martinique", lat:14.6, lng:-61.0, type:"Tropical Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Heliconia_caribaea.jpg/640px-Heliconia_caribaea.jpg", description:"Heliconia caribaea is Martinique's national flower — called balisier. Its dramatic red and yellow bracts appear on the emblem of the PPM political party that led Martinique's cultural renaissance. Aimé Césaire — Martinique's greatest poet and father of the Négritude movement — used the balisier as a symbol of Caribbean identity and pride." },
{ name:"Mahogany", country:"Martinique", lat:14.7, lng:-61.1, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Swietenia_mahagoni.jpg/640px-Swietenia_mahagoni.jpg", description:"Swietenia mahagoni once covered Martinique's volcanic interior in magnificent forest. French colonial mahogany logging stripped the island bare by the 18th century. Martinique's Parc Naturel Régional now protects the remaining rainforest on the slopes of Mount Pelée — the volcano that destroyed Saint-Pierre in 1902." },
{ name:"Sugarcane", country:"Martinique", lat:14.5, lng:-61.0, type:"Grass", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Saccharum_officinarum.jpg/640px-Saccharum_officinarum.jpg", description:"Saccharum officinarum transformed Martinique — the island's entire history, economy and population structure was shaped by sugar plantation slavery. Martinique's rhum agricole — made directly from fresh sugarcane juice rather than molasses — is recognised as the world's finest rum with AOC protection. The sugarcane fields of the Lamentin plain still define the island's landscape." },
{ name:"Tree Fern — Fougère Arborescente", country:"Martinique", lat:14.72, lng:-61.15, type:"Fern", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cyathea_arborea.jpg/640px-Cyathea_arborea.jpg", description:"Cyathea arborea forms spectacular prehistoric-looking forests in Martinique's cloud forest above 600m on the slopes of Mount Pelée. These ancient tree ferns create one of the Caribbean's most extraordinary landscapes — their 5m trunks topped with spreading fronds unchanged since the age of dinosaurs." },
{ name:"Immortelle Tree", country:"Martinique", lat:14.65, lng:-61.05, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Erythrina_poeppigiana.jpg/640px-Erythrina_poeppigiana.jpg", description:"Erythrina poeppigiana blazes orange-red across Martinique's hillsides each February in one of the Caribbean's most spectacular seasonal displays. Traditionally planted as shade trees over Martinique's famous cacao and banana plantations, immortelle trees simultaneously protect crops, fix nitrogen and provide nectar for hummingbirds." },

// 🇲🇷 MAURITANIA
{ name:"Acacia — Gum Arabic", country:"Mauritania", lat:18.0, lng:-15.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Acacia_senegal_MS_4724.jpg/640px-Acacia_senegal_MS_4724.jpg", description:"Senegalia senegal is Mauritania's most economically important wild tree, growing along the southern Sahel strip. Mauritania sits on the northern edge of the Gum Belt and gum arabic tapping provides critical income for nomadic Moorish communities. Desertification is pushing the Sahara southward at alarming speed, threatening Mauritania's last acacia forests." },
{ name:"Date Palm", country:"Mauritania", lat:20.5, lng:-13.0, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Phoenix_dactylifera_2.jpg/640px-Phoenix_dactylifera_2.jpg", description:"Phoenix dactylifera has sustained Mauritania's oasis civilisations for over 4,000 years. The ancient caravan cities of Chinguetti, Ouadane and Tichitt — UNESCO World Heritage Sites — were built in the shade of date palms. Mauritanian Tidjikja dates are considered among the finest in the Sahara and traded across the Maghreb." },
{ name:"Doum Palm", country:"Mauritania", lat:17.5, lng:-13.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Hyphaene_thebaica.jpg/640px-Hyphaene_thebaica.jpg", description:"Hyphaene thebaica lines Mauritania's Senegal River valley with its distinctive forked trunk. For the Pulaar and Soninke communities of southern Mauritania, the doum palm provides food, rope fibre, building material and traditional medicine. Its gingerbread-flavoured fruit is eaten fresh and ground into flour." },
{ name:"Euphorbia — Feuille", country:"Mauritania", lat:16.5, lng:-14.5, type:"Succulent Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7a/Euphorbia_candelabrum.jpg/640px-Euphorbia_candelabrum.jpg", description:"Euphorbia balsamifera grows across Mauritania's arid coastal zone — one of the most drought-tolerant plants in West Africa. Its milky latex was used as a fish poison by Mauritanian coastal communities. Candelabra euphorbias mark the transition between Mauritania's Atlantic coastal desert and its Saharan interior." },
{ name:"Tamarind", country:"Mauritania", lat:15.5, lng:-12.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tamarindus_indica.jpg/640px-Tamarindus_indica.jpg", description:"Tamarindus indica grows along Mauritania's southern Senegal River border — ancient trees marking the sites of medieval Almoravid trading posts. Its sour fruit pulp is dissolved in water to make the refreshing drink jus de tamarin — the most popular roadside beverage in southern Mauritania. Its shade provides crucial relief in temperatures exceeding 50°C." },

// 🇲🇺 MAURITIUS
{ name:"Trochetia — Boucle d'Oreille", country:"Mauritius", lat:-20.2, lng:57.5, type:"Shrub", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Trochetia_boutoniana.jpg/640px-Trochetia_boutoniana.jpg", description:"Trochetia boutoniana is Mauritius's national flower — endemic to a single mountain, Le Pouce, near Port Louis. Its brilliant scarlet and white flowers dangle like earrings — giving its Creole name boucle d'oreille meaning earring flower. Fewer than 100 wild plants remain, making it one of the world's rarest flowering plants." },
{ name:"Ebony — Bois d'Ebène", country:"Mauritius", lat:-20.4, lng:57.7, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Diospyros_tessellaria.jpg/640px-Diospyros_tessellaria.jpg", description:"Diospyros tessellaria is endemic to Mauritius and was once the island's most valuable timber — its jet-black heartwood prized across Europe for luxury furniture. Dutch colonists stripped Mauritius bare of ebony in the 17th century. The Mauritian Wildlife Foundation is now leading one of the world's most successful tropical forest restoration programs." },
{ name:"Dodo Tree — Tambalacoque", country:"Mauritius", lat:-20.3, lng:57.6, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Sideroxylon_grandiflorum.jpg/640px-Sideroxylon_grandiflorum.jpg", description:"Sideroxylon grandiflorum — the tambalacoque or dodo tree — was believed to only germinate after passing through the digestive system of the dodo. When the dodo went extinct in 1681, no new tambalacoque trees grew for 300 years. The theory proved partially incorrect but the dodo's extinction did devastate Mauritius's entire forest ecosystem." },
{ name:"Mauritius Hemp — Vakoa", country:"Mauritius", lat:-20.35, lng:57.55, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pandanus_utilis.jpg/640px-Pandanus_utilis.jpg", description:"Pandanus utilis, the screw pine, lines Mauritius's coastal roads and provides the fibre for traditional Mauritian basket weaving. Mauritian vakoa baskets are a UNESCO-recognised craft. The plant was introduced from Madagascar by French colonists but has become completely integrated into Mauritian landscape and cultural identity." },
{ name:"Flamboyant — Royal Poinciana", country:"Mauritius", lat:-20.15, lng:57.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Delonix_regia.jpg/640px-Delonix_regia.jpg", description:"Delonix regia is native to Madagascar but was introduced to Mauritius where it has become the most beloved ornamental tree. Its explosive scarlet canopy in November turns Mauritius's roads into tunnels of fire. Called flamboyant for its spectacular blooming, it lines the Grand Allée of historic colonial estates across the island." },

// 🇾🇹 MAYOTTE
{ name:"Ylang-Ylang", country:"Mayotte", lat:-12.8, lng:45.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cananga_odorata.jpg/640px-Cananga_odorata.jpg", description:"Cananga odorata is Mayotte's most important crop — the island is the world's largest producer of ylang-ylang essential oil after the Comoros. Its intensely fragrant star-shaped yellow flowers are distilled into an oil used in Chanel No.5 and dozens of luxury perfumes. Ylang-ylang trees cover Mayotte's volcanic hillsides in fragrant groves." },
{ name:"Breadfruit — Mré", country:"Mayotte", lat:-12.9, lng:45.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis is a dietary staple across Mayotte's villages, its starchy fruits eaten boiled, fried and roasted. Mayotte's Mahorais culture — a unique blend of African, Arab and French influences — has cultivated breadfruit for centuries in the island's fertile volcanic soil alongside banana, mango and jackfruit." },
{ name:"Mangrove", country:"Mayotte", lat:-12.85, lng:45.15, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Mangrove_trees.jpg/640px-Mangrove_trees.jpg", description:"Mayotte has the largest mangrove forest of any French territory — over 7,000 hectares lining its extraordinary double barrier reef lagoon. Mayotte's lagoon is considered the most biodiverse in the Indian Ocean. Its mangroves are nurseries for the hawksbill turtles, dugongs and whale sharks that make Mayotte a world-class marine destination." },
{ name:"Coconut Palm", country:"Mayotte", lat:-12.82, lng:45.18, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera lines Mayotte's volcanic coastline and is central to Mahorais daily life and cuisine. Coconut milk is the base of mtsapere — Mayotte's most beloved dish of slow-cooked meat in coconut and spice sauce. Copra production was Mayotte's primary export before the island voted to become a French department in 2011." },
{ name:"Vanilla", country:"Mayotte", lat:-12.78, lng:45.22, type:"Vine", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Vanilla_planifolia.jpg/640px-Vanilla_planifolia.jpg", description:"Vanilla planifolia is cultivated in Mayotte's northern forests, hand-pollinated flower by flower each morning. Mayotte's vanilla — though produced in small quantities — benefits from the island's extraordinary volcanic soil and humid climate. As a French department, Mayotte's vanilla producers have access to European quality certification systems." },

// 🇲🇽 MEXICO
{ name:"Dahlia", country:"Mexico", lat:19.4, lng:-99.1, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dahlia_pinnata.jpg/640px-Dahlia_pinnata.jpg", description:"Dahlia pinnata is Mexico's national flower, endemic to the volcanic highlands of central Mexico. The Aztecs cultivated dahlias for food, medicine and ceremony — its tubers eaten as vegetables and its hollow stems used as water pipes. Over 42 wild dahlia species grow in Mexico and all 57,000 cultivated garden varieties worldwide descend from these." },
{ name:"Agave", country:"Mexico", lat:20.0, lng:-103.3, type:"Succulent", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Agave_tequilana.jpg/640px-Agave_tequilana.jpg", description:"Agave tequilana, the blue agave, grows only in Jalisco's red volcanic soil. Mexico's tequila industry produces 300 million litres annually from this single plant. Each blue agave takes 8 years to mature and blooms only once before dying. Ancient Aztecs considered agave sacred — 400 divine rabbits were said to live in its fermented sap." },
{ name:"Cacao", country:"Mexico", lat:17.0, lng:-92.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao was first cultivated by the Maya and Olmec of Mexico over 3,500 years ago. The word chocolate derives from the Nahuatl xocolātl. Oaxaca's Zapotec communities still produce traditional stone-ground chocolate using pre-Columbian techniques. Mexico's wild cacao forests in Chiapas are the world's most important genetic reservoir for chocolate." },
{ name:"Copal Tree", country:"Mexico", lat:17.5, lng:-96.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Bursera_copallifera.jpg/640px-Bursera_copallifera.jpg", description:"Bursera copallifera produces copal resin — the sacred incense of every Mesoamerican civilisation from the Olmec to the Aztec. Burned in temples from Teotihuacan to Chichén Itzá for 3,000 years, copal smoke was believed to carry prayers to the gods. Oaxacan Zapotec communities still burn copal at every ceremony and celebration today." },
{ name:"Nopal — Prickly Pear", country:"Mexico", lat:23.6, lng:-102.5, type:"Cactus", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Opuntia_ficus-indica.jpg/640px-Opuntia_ficus-indica.jpg", description:"Opuntia ficus-indica is Mexico's most culturally important cactus — an eagle perched on a nopal appears on the Mexican flag, commemorating the Aztec founding of Tenochtitlan. The nopal's pads and fruits are eaten daily across Mexico. Mexico is the world's largest producer and consumer of nopal, with 3 million tonnes harvested annually." },

// 🇲🇩 MOLDOVA
{ name:"Grape Vine — Fetească Neagră", country:"Moldova", lat:47.0, lng:28.9, type:"Vine", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Vitis_vinifera_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-277.jpg/640px-Vitis_vinifera_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-277.jpg", description:"Vitis vinifera has been cultivated in Moldova for over 5,000 years — Moldova has the highest density of vineyards per capita of any country on Earth. The Mileștii Mici wine cellar holds 1.5 million bottles — the world's largest wine collection by the Guinness World Records. Moldova's indigenous Fetească Neagră grape produces wines of extraordinary depth." },
{ name:"Sunflower", country:"Moldova", lat:47.5, lng:28.5, type:"Annual Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/41/Sunflower_from_Silesia2.jpg/640px-Sunflower_from_Silesia2.jpg", description:"Helianthus annuus covers vast areas of Moldova's black earth steppe each summer in a sea of gold. Moldova is one of the world's top sunflower oil producers — sunflower oil is the primary cooking fat across the country. The Moldovan countryside in August, with endless sunflower fields stretching to the horizon, is one of Europe's most spectacular agricultural landscapes." },
{ name:"Linden — Tei", country:"Moldova", lat:47.2, lng:28.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tilia_cordata.jpg/640px-Tilia_cordata.jpg", description:"Tilia cordata is Moldova's most beloved tree — its midsummer blossom filling Chișinău's streets with honey fragrance. Linden flower tea — ceai de tei — is Moldova's most consumed herbal drink. Moldova's poet Mihai Eminescu wrote his most famous poem Luceafărul beneath a linden tree in Ipotești — the tree still stands as a national monument." },
{ name:"Wild Rose — Măceș", country:"Moldova", lat:46.8, lng:29.2, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_canina.jpg/640px-Rosa_canina.jpg", description:"Rosa canina grows across Moldova's hedgerows and forest edges in pink blooms each June. Its brilliant red rose hips — măceșe — are harvested each autumn and made into syrup, jam and tea. Moldovan rose hip syrup is given to children as a vitamin C supplement and its preparation is a beloved autumn tradition across rural Moldova." },
{ name:"Corn — Porumb", country:"Moldova", lat:47.3, lng:29.0, type:"Annual Plant", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Zea_mays.jpg/640px-Zea_mays.jpg", description:"Zea mays is Moldova's most important crop — covering 30% of all agricultural land. Moldovan mămăligă — polenta made from stone-ground corn — is the national dish, eaten daily across the country. Moldova's diverse corn landraces adapted to its black earth climate over 300 years represent an important genetic resource for European maize breeding." },

// 🇲🇨 MONACO
{ name:"Carob Tree", country:"Monaco", lat:43.73, lng:7.41, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ceratonia_siliqua.jpg/640px-Ceratonia_siliqua.jpg", description:"Ceratonia siliqua grows on Monaco's rocky Mediterranean slopes above the Principality's famous harbour. Ancient carob trees survive on the Tête de Chien cliff above Monaco — witnesses to the Grimaldi family's 700-year reign. Monaco's Mediterranean microclimate — the warmest in continental Europe — allows carob to thrive on its limestone outcrops." },
{ name:"Maritime Pine", country:"Monaco", lat:43.74, lng:7.40, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1c/Pinus_halepensis_cones.jpg/640px-Pinus_halepensis_cones.jpg", description:"Pinus pinaster grows on Monaco's Exotic Garden cliff face — one of Europe's most dramatic botanical gardens, carved into a vertical limestone cliff 100m above the Mediterranean. Monaco's Jardin Exotique, founded in 1933, contains over 7,000 succulent species alongside native Mediterranean pines." },
{ name:"Agave — Century Plant", country:"Monaco", lat:43.73, lng:7.42, type:"Succulent", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Agave_americana.jpg/640px-Agave_americana.jpg", description:"Agave americana naturalised on Monaco's rocky cliff faces and Exotic Garden slopes after introduction from Mexico in the 16th century. Its enormous flower spike — reaching 8m — blooms once after 10–30 years then dies. Monaco's Exotic Garden features specimens collected from Prince Albert I's scientific expeditions across the Americas." },
{ name:"Lavender", country:"Monaco", lat:43.74, lng:7.41, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Lavandula_angustifolia_J1.jpg/640px-Lavandula_angustifolia_J1.jpg", description:"Lavandula angustifolia grows wild on Monaco's upper hillsides and is cultivated extensively in the Principality's famous palace gardens. Monaco's botanical heritage is extraordinary for its tiny size — Prince Albert I established Monaco as a world centre of oceanographic and botanical science in the early 20th century." },
{ name:"Olive Tree", country:"Monaco", lat:43.72, lng:7.41, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"Olea europaea has grown on Monaco's rocky Mediterranean slopes since antiquity — some ancient specimens survive in the Principality's private gardens. Monaco's palace grounds contain olive trees believed to be several hundred years old. The olive harvest from Monaco's gardens each autumn is pressed into a limited edition princely olive oil." },

// 🇲🇳 MONGOLIA
{ name:"Mongolian Sagebrush", country:"Mongolia", lat:47.9, lng:106.9, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Artemisia_mongolica.jpg/640px-Artemisia_mongolica.jpg", description:"Artemisia species dominate Mongolia's vast steppe covering over 80% of the country. The pungent silver-grey sagebrush is inseparable from Mongolian nomadic life — burned as incense in ger ceremonies, used medicinally by shamans and providing the distinctive fragrance that Mongolians associate with home. Mongolia has the world's largest intact temperate grassland ecosystem." },
{ name:"Siberian Larch", country:"Mongolia", lat:49.5, lng:100.0, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Larix_sibirica.jpg/640px-Larix_sibirica.jpg", description:"Larix sibirica forms Mongolia's taiga forests in the north — the southernmost extension of the great Siberian boreal forest. Mongolia's larch forests are the primary habitat of the Siberian ibex, snow leopard and argali wild sheep. Mongolian shamans consider ancient larch groves sacred — sites of ancestor spirits and spiritual power." },
{ name:"Wild Onion — Mongol Songino", country:"Mongolia", lat:47.0, lng:103.0, type:"Bulb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Allium_mongolicum.jpg/640px-Allium_mongolicum.jpg", description:"Allium mongolicum is endemic to Mongolia's Gobi Desert margins and dry steppe. Mongolian nomads have eaten wild onions raw and cooked for millennia — flavouring the dried meat and dairy products that sustain life on the steppe. Mongolia has extraordinary wild Allium diversity with over 60 species native to its varied landscapes." },
{ name:"Feather Grass — Kherelzgene", country:"Mongolia", lat:46.5, lng:104.0, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Stipa_pennata.jpg/640px-Stipa_pennata.jpg", description:"Stipa grandis and related species create Mongolia's iconic silver-waving steppe landscape. The Mongolian steppe is one of Earth's last great grassland ecosystems — home to the last truly wild horses, Przewalski's horse. Mongolian nomads read the health of their pastureland by the condition of its feather grass — a living indicator of ecological balance." },
{ name:"Saxaul Tree", country:"Mongolia", lat:43.5, lng:103.5, type:"Tree", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Haloxylon_ammodendron.jpg/640px-Haloxylon_ammodendron.jpg", description:"Haloxylon ammodendron is the primary tree of Mongolia's Gobi Desert — its twisted leafless branches storing water in green photosynthesising bark. Mongolian saxaul forests stabilise Gobi sand dunes that threaten to engulf cities. China and Mongolia have planted billions of saxaul trees in the world's largest reforestation program to halt the advancing desert." },

// 🇲🇪 MONTENEGRO
{ name:"Olive Tree — Stara Maslina", country:"Montenegro", lat:42.4, lng:18.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"The Old Olive Tree of Bar — Stara Maslina — is Montenegro's most famous natural monument, estimated at over 2,000 years old and still producing olives. It is one of the oldest olive trees in the world. Montenegro's Bar municipality has over 100,000 olive trees — the northernmost significant olive cultivation in the Adriatic." },
{ name:"Black Pine — Crni Bor", country:"Montenegro", lat:43.1, lng:19.1, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Pinus_nigra_subsp._nigra.jpg/640px-Pinus_nigra_subsp._nigra.jpg", description:"Pinus nigra ssp. dalmatica forms Montenegro's Biogradska Gora — one of Europe's last primeval rainforests with trees over 500 years old. Montenegro means Black Mountain — named for its dark pine-covered peaks. Biogradska Gora National Park protects a completely untouched forest that has never been logged in recorded history." },
{ name:"Balkan Lily", country:"Montenegro", lat:42.7, lng:19.3, type:"Bulb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Lilium_cattaniae.jpg/640px-Lilium_cattaniae.jpg", description:"Lilium cattaniae is endemic to the western Balkans, growing on Montenegro's limestone mountain meadows in brilliant scarlet blooms. Montenegro's Durmitor National Park — a UNESCO World Heritage Site — hosts extraordinary Balkan endemic plant diversity including several lily species found only in the Dinaric Alps." },
{ name:"Gentian", country:"Montenegro", lat:43.2, lng:19.0, type:"Alpine Flower", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gentiana_acaulis.jpg/640px-Gentiana_acaulis.jpg", description:"Gentiana species blaze electric blue across Montenegro's Prokletije and Durmitor mountain meadows each spring. Montenegro's extraordinary karst landscape creates unique microhabitats supporting dozens of Balkan endemic plants. The Tara River canyon — Europe's deepest — is flanked by gentian-studded meadows and ancient black pine forests." },
{ name:"Wild Pomegranate", country:"Montenegro", lat:42.1, lng:19.1, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Pomegranate_fruit.jpg/640px-Pomegranate_fruit.jpg", description:"Punica granatum grows wild on Montenegro's Adriatic coast near Ulcinj and Bar — one of the northernmost natural pomegranate populations in Europe. Montenegro's warm Adriatic microclimate allows Mediterranean species to thrive alongside alpine plants — creating extraordinary botanical diversity in a tiny country of just 14,000km²." },

// 🇲🇸 MONTSERRAT
{ name:"Heliconia — Lobster Claw", country:"Montserrat", lat:16.7, lng:-62.2, type:"Tropical Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Heliconia_caribaea.jpg/640px-Heliconia_caribaea.jpg", description:"Heliconia caribaea grows wild across Montserrat's Centre Hills — the island's forested volcanic interior. Montserrat's 1995 Soufrière Hills volcanic eruption destroyed the southern half of the island including its capital Plymouth — now buried under ash. The Centre Hills forest, home to the endemic Montserrat oriole, survived and is now strictly protected." },
{ name:"Tree Fern", country:"Montserrat", lat:16.75, lng:-62.18, type:"Fern", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cyathea_arborea.jpg/640px-Cyathea_arborea.jpg", description:"Cyathea arborea forms prehistoric-looking groves in Montserrat's cloud forest above 500m. The island's volcanic soil produces extraordinarily lush vegetation. Montserrat's Centre Hills are home to the highest density of endemic Caribbean species on any island — a biodiversity hotspot now protected by the Montserrat National Trust." },
{ name:"Bois Blanc", country:"Montserrat", lat:16.72, lng:-62.22, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Simarouba_amara.jpg/640px-Simarouba_amara.jpg", description:"Simarouba amara grows in Montserrat's remaining forest and is one of the Caribbean's most promising biofuel trees — its seeds contain 60% oil. Montserrat is rebuilding its economy and ecosystem simultaneously after volcanic devastation. International conservation funding has helped restore native forest that shelters the critically endangered Montserrat oriole." },
