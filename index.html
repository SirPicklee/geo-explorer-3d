{ name:"Silver Birch", country:"Poland", lat:52.0, lng:19.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Betula_pendula_Moscow.jpg/640px-Betula_pendula_Moscow.jpg", description:"Betula pendula is Poland's most beloved tree — its white trunks lining country roads across the Polish plains. Birch sap is collected each spring as a traditional Polish health tonic. Polish Easter decorations feature birch branches. The birch's delicate spring leaves are a symbol of Polish pastoral poetry from Kochanowski to Miłosz." },
{ name:"Tatra Edelweiss", country:"Poland", lat:49.2, lng:20.0, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Leontopodium_alpinum_-_edelweiss.jpg/640px-Leontopodium_alpinum_-_edelweiss.jpg", description:"Leontopodium alpinum grows on Poland's Tatra Mountains — the only true alpine range in Poland. Strictly protected by Polish law since 1869 — making it one of the first plants given legal protection in Europe. Young men once risked their lives climbing Tatra cliffs to pick edelweiss for their sweethearts — a tradition immortalised in Tatra folk songs." },
{ name:"Common Oak — Dąb", country:"Poland", lat:51.0, lng:17.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Quercus_robur_27_09_2011_Ls.jpg/640px-Quercus_robur_27_09_2011_Ls.jpg", description:"Quercus robur is sacred in Polish Slavic tradition — the ancient oak was the tree of Perun, the thunder god. Poland's Rogalin nature reserve contains the largest concentration of ancient oaks in Europe — over 1,000 specimens exceeding 200 years old, including Lech, Czech and Rus — three oaks over 700 years old named after the legendary founders of the Slavic nations." },

// 🇵🇹 PORTUGAL
{ name:"Cork Oak — Sobreiro", country:"Portugal", lat:38.7, lng:-9.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Quercus_suber.jpg/640px-Quercus_suber.jpg", description:"Quercus suber is Portugal's national tree — Portugal produces over 50% of the world's cork. The Montado — Portugal's cork oak savanna — is one of Europe's most biodiverse ecosystems, sheltering Iberian lynx and imperial eagle. Cork is harvested every 9 years without killing the tree — the world's most sustainable forest industry, unchanged for 300 years." },
{ name:"Arbutus — Medronho", country:"Portugal", lat:37.1, lng:-7.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Arbutus_unedo.jpg/640px-Arbutus_unedo.jpg", description:"Arbutus unedo covers Portugal's Algarve and Alentejo hillsides in strawberry-like red fruits each autumn. Medronho — the potent brandy distilled from arbutus berries — is Portugal's most traditional spirit, produced in copper pot stills by Algarvian farmers for centuries. Portugal's National Animal — the Iberian lynx — uses arbutus thickets as denning habitat." },
{ name:"Lavender — Alfazema", country:"Portugal", lat:39.5, lng:-7.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Lavandula_angustifolia_J1.jpg/640px-Lavandula_angustifolia_J1.jpg", description:"Lavandula luisieri — Portuguese lavender — is endemic to the Iberian Peninsula and carpets Portugal's Alentejo plateau in silvery-blue fragrance each June. Portuguese lavender essential oil is distilled for the perfume industry. Portugal's Trás-os-Montes region produces extraordinary wild lavender honey — one of Europe's most aromatic and complex honeys." },
{ name:"Olive Tree", country:"Portugal", lat:38.5, lng:-7.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"Olea europaea has been cultivated in Portugal for over 3,000 years. Portugal's Alentejo contains some of the oldest continuous olive cultivation in the world — trees over 2,000 years old still productive. Portugal is now the world's third largest olive oil producer. The Galega variety — Portugal's indigenous olive — produces oil of distinctive herbaceous character." },
{ name:"Azalea — Azálea do Gerês", country:"Portugal", lat:41.8, lng:-8.2, type:"Shrub", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rhododendron_ponticum.jpg/640px-Rhododendron_ponticum.jpg", description:"Rhododendron ponticum grows wild in Portugal's Gerês Mountains — one of its last natural European populations. Portugal's Peneda-Gerês National Park hosts plant communities of extraordinary Atlantic relict diversity. The May blooming of wild rhododendrons in Gerês transforms the ancient oak forests into a cathedral of purple and pink." },

// 🇵🇷 PUERTO RICO
{ name:"Flamboyán — Royal Poinciana", country:"Puerto Rico", lat:18.2, lng:-66.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Delonix_regia.jpg/640px-Delonix_regia.jpg", description:"Delonix regia is Puerto Rico's most beloved tree — its explosion of scarlet blooms each June is inseparable from Puerto Rican identity. Called flamboyán, it lines the roads of San Juan and Ponce in a canopy of fire. Puerto Rican poets from Julia de Burgos to Luis Palés Matos wrote of the flamboyán as a symbol of Caribbean passion and beauty." },
{ name:"Ceiba — Silk Cotton Tree", country:"Puerto Rico", lat:18.4, lng:-66.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra is sacred to Puerto Rico's Taíno indigenous people — the cosmic tree connecting the three worlds. The ancient ceiba of Ponce's city centre is over 500 years old. Puerto Rico's Taíno carved their ceremonial duhos and zemís from ceiba wood. The tree's cotton-like seed fibre was used to stuff mattresses and life preservers." },
{ name:"Maga — Puerto Rican Hibiscus", country:"Puerto Rico", lat:18.1, lng:-66.9, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Thespesia_grandiflora.jpg/640px-Thespesia_grandiflora.jpg", description:"Thespesia grandiflora is Puerto Rico's national flower — an endemic tree hibiscus producing spectacular crimson blooms. Found only in Puerto Rico's remaining forest fragments, it has been reduced by habitat loss to scattered populations. Puerto Rico has lost over 99% of its original forest cover — the maga survives mainly in El Yunque National Rainforest." },
{ name:"Coquí Plant — Bromeliad", country:"Puerto Rico", lat:18.3, lng:-65.8, type:"Epiphyte", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Guzmania_lingulata.jpg/640px-Guzmania_lingulata.jpg", description:"Guzmania berteroniana is endemic to Puerto Rico's El Yunque cloud forest — its scarlet bracts holding pools of water that are the exclusive breeding habitat of the coquí tree frog, Puerto Rico's most beloved symbol. Puerto Rico has extraordinary bromeliad diversity with dozens of endemic species covering the forest canopy of its remaining mountain forests." },
{ name:"Guayacán — Lignum Vitae", country:"Puerto Rico", lat:17.9, lng:-66.1, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Guaiacum_officinale.jpg/640px-Guaiacum_officinale.jpg", description:"Guaiacum officinale produces Puerto Rico's most spectacular wildflower display — entire hillsides turning lavender-blue when guayacán trees bloom simultaneously each spring in the island's dry southwestern forest. Puerto Rico's Guánica Dry Forest — a UNESCO Biosphere Reserve — protects the finest remaining dry tropical forest in the Caribbean, dominated by this extraordinary tree." },

// 🇶🇦 QATAR
{ name:"Arfaj — Rhanterium", country:"Qatar", lat:25.3, lng:51.2, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rhanterium_epapposum.jpg/640px-Rhanterium_epapposum.jpg", description:"Rhanterium epapposum is Qatar's national plant — its yellow daisy-like flowers transforming the desert each spring into a brief carpet of gold. Qataris celebrate the arfaj season with desert picnics and family gatherings. Its aromatic branches are used in traditional Bedouin camel saddle padding and as a natural insect repellent in desert camps." },
{ name:"Date Palm — Nakhl", country:"Qatar", lat:25.5, lng:51.4, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Phoenix_dactylifera_2.jpg/640px-Phoenix_dactylifera_2.jpg", description:"Phoenix dactylifera has been cultivated in Qatar's oases for over 5,000 years. Dates and coffee — qahwa — are offered to every guest as the fundamental expression of Qatari hospitality. Qatar's Al Khor and Al Wakrah date gardens are ancient oases that sustained Bedouin and pearling communities before oil transformed the peninsula." },
{ name:"Ghaf Tree", country:"Qatar", lat:25.1, lng:51.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Prosopis_cineraria.jpg/640px-Prosopis_cineraria.jpg", description:"Prosopis cineraria survives Qatar's extreme desert heat and salt-laden soils by sending roots down 30m to reach groundwater. Sacred across the Arabian Peninsula, the ghaf provides critical shade and fodder for camels. Qatar is reintroducing ghaf trees across its desert landscape as part of ambitious greening programs ahead of and following the 2022 FIFA World Cup." },
{ name:"Sodom Apple — Ushar", country:"Qatar", lat:25.4, lng:51.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/63/Calotropis_procera_flowers.jpg/640px-Calotropis_procera_flowers.jpg", description:"Calotropis procera is one of Qatar's most resilient desert plants — its inflated apple-like fruits and waxy purple flowers visible across barren coastal sabkha flats. Its toxic latex deters all grazing animals. Bedouin communities used its stem fibre to make rope and its bark as a fish poison in Qatar's historic coastal fishing communities." },
{ name:"Sea Rocket — Rocket of the Sea", country:"Qatar", lat:25.6, lng:51.5, type:"Coastal Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cakile_arabica.jpg/640px-Cakile_arabica.jpg", description:"Cakile arabica grows on Qatar's sandy beaches and coastal dunes — one of the few plants that can colonise the shifting sands of the Arabian Gulf shoreline. Its fleshy salt-tolerant leaves were eaten as a salad vegetable by Qatar's coastal communities for centuries. Qatar's extraordinary mangrove restoration at Al Thakira protects the largest natural mangrove stand on the peninsula." },

// 🇷🇴 ROMANIA
{ name:"Dog Rose — Măceș", country:"Romania", lat:44.4, lng:26.1, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_canina.jpg/640px-Rosa_canina.jpg", description:"Rosa canina is Romania's most beloved wildflower — its pink blooms covering Carpathian hillsides each June and its brilliant red hips harvested each autumn for syrup, jam and tea. Romanian măceș syrup is given to children as a vitamin C supplement. The wild rose appears in Romanian folk embroidery and is celebrated in dozens of traditional songs." },
{ name:"Romanian Oak — Stejar", country:"Romania", lat:45.5, lng:25.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/Quercus_robur_27_09_2011_Ls.jpg/640px-Quercus_robur_27_09_2011_Ls.jpg", description:"Quercus robur forms Romania's magnificent Carpathian and Transylvanian forests — some of the last great primeval forests in Europe. Romania has the largest old-growth forest in the EU. The ancient oaks of Codrul Secular Slătioara — some over 400 years old — witnessed the rise and fall of the Dacian, Roman and Ottoman empires in this extraordinary landscape." },
{ name:"Edelweiss — Floare de Colț", country:"Romania", lat:45.4, lng:24.6, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Leontopodium_alpinum_-_edelweiss.jpg/640px-Leontopodium_alpinum_-_edelweiss.jpg", description:"Leontopodium alpinum grows on Romania's Bucegi and Retezat mountain ridges above 1,800m. Called floare de colț — flower of the edge — it is Romania's most iconic alpine plant. Strictly protected by Romanian law. Young Romanian men once risked their lives climbing Carpathian cliffs to pick edelweiss for their sweethearts — a tradition immortalised in Romanian folk songs." },
{ name:"Saffron Crocus — Brândușă", country:"Romania", lat:46.8, lng:24.0, type:"Bulb", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Crocus_heuffelianus.jpg/640px-Crocus_heuffelianus.jpg", description:"Crocus heuffelianus carpets Romania's Transylvanian alpine meadows in purple each March — one of the first flowers to push through melting snow. Called brândușă, it announces spring's arrival in the Carpathians. Romania's Apuseni Mountains host one of the densest crocus populations in Europe — entire meadows turning violet in the first warm days of the year." },
{ name:"Silver Linden — Tei", country:"Romania", lat:44.2, lng:28.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tilia_tomentosa.jpg/640px-Tilia_tomentosa.jpg", description:"Tilia tomentosa fills Romanian cities with honey fragrance each July — Bucharest's boulevards are lined with ancient silver lindens. Romanian poet Mihai Eminescu wrote his most celebrated verses beneath linden trees. Linden flower tea — ceai de tei — is Romania's most consumed herbal drink, drunk for relaxation and as a cold remedy across the country." },

// 🇷🇺 RUSSIA
{ name:"Siberian Cedar Pine", country:"Russia", lat:58.0, lng:68.0, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_sibirica.jpg/640px-Pinus_sibirica.jpg", description:"Pinus sibirica dominates Russia's vast Siberian taiga — the world's largest terrestrial ecosystem covering 13 million km². Its large edible seeds — Siberian pine nuts — are harvested by indigenous communities across Siberia. Russia's taiga stores more carbon than all tropical rainforests combined. The Siberian cedar is the sacred tree of Russia's indigenous Khanty and Mansi peoples." },
{ name:"Birch — Beryoza", country:"Russia", lat:55.8, lng:37.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Betula_pendula_Moscow.jpg/640px-Betula_pendula_Moscow.jpg", description:"Betula pendula is Russia's national tree and the most emotionally resonant symbol in Russian culture. Russian folk songs, poetry and painting centre on the white birch. Birch sap — beryozovy sok — is sold in every Russian supermarket. The Russian banya sauna tradition uses birch whisks. Tolstoy, Chekhov and Pasternak all wrote of birch groves as the soul of Russia." },
{ name:"Lotus — Nelumbo", country:"Russia", lat:46.5, lng:48.5, type:"Aquatic Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Nelumbo_nucifera_MS_4967.jpg/640px-Nelumbo_nucifera_MS_4967.jpg", description:"Nelumbo caspica blooms in Russia's Volga Delta near Astrakhan — the world's northernmost natural lotus population, a relic of warmer ancient climates. Each July the Volga Delta transforms into a sea of pink lotus blooms stretching to the horizon — one of Russia's most extraordinary natural spectacles, visited by thousands of tourists each summer." },
{ name:"Rhodiola — Golden Root", country:"Russia", lat:52.0, lng:93.0, type:"Alpine Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rhodiola_rosea.jpg/640px-Rhodiola_rosea.jpg", description:"Rhodiola rosea grows on Russia's Altai Mountains and Siberian alpine zones. Soviet scientists researched it extensively as an adaptogen — a plant that increases the body's resistance to stress. Russian cosmonauts and special forces were given rhodiola extract to improve performance. It has been used in Siberian traditional medicine for over 3,000 years." },
{ name:"Arctic Cotton Grass", country:"Russia", lat:72.0, lng:102.0, type:"Sedge", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Eriophorum_vaginatum.jpg/640px-Eriophorum_vaginatum.jpg", description:"Eriophorum vaginatum covers Russia's vast Arctic tundra in white cotton tufts — one of Earth's most extensive plant communities. Russia's permafrost stores twice as much carbon as the atmosphere — and cotton grass is the primary plant of these frozen peat bogs. As permafrost thaws under climate change, Russia's tundra ecosystems are transforming at unprecedented speed." },

// 🇷🇼 RWANDA
{ name:"Hagenia — Umutagara", country:"Rwanda", lat:-1.9, lng:29.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hagenia_abyssinica.jpg/640px-Hagenia_abyssinica.jpg", description:"Hagenia abyssinica forms the magnificent montane forests of Rwanda's Virunga and Nyungwe ranges above 2,400m. Rwanda's Nyungwe National Park — one of Africa's largest montane rainforests — is dominated by ancient hagenia trees draped in moss and lichen. These forests are the water tower of Rwanda, feeding the Nile River system." },
{ name:"Giant Lobelia", country:"Rwanda", lat:-1.5, lng:29.5, type:"Alpine Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Lobelia_deckenii.jpg/640px-Lobelia_deckenii.jpg", description:"Lobelia wollastonii grows on Rwanda's Virunga volcanoes above 3,500m alongside mountain gorillas. Rwanda's mountain gorilla population — now recovered to over 1,000 individuals — depends on the afroalpine vegetation of the Virungas for food and shelter. Giant lobelias and giant senecios create the otherworldly landscape that surrounds these extraordinary primates." },
{ name:"Impatiens — Uburabyo", country:"Rwanda", lat:-2.1, lng:29.7, type:"Wildflower", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Impatiens_niamniamensis.jpg/640px-Impatiens_niamniamensis.jpg", description:"Rwanda has extraordinary Impatiens diversity — over 40 species found in its montane forests. Nyungwe Forest's Impatiens are indicators of forest health monitored by conservation scientists. Rwanda's extraordinary post-genocide ecological and economic recovery has included significant investment in protecting Nyungwe's unique plant communities." },
{ name:"Bamboo — Umugende", country:"Rwanda", lat:-1.4, lng:29.6, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Arundinaria_alpina.jpg/640px-Arundinaria_alpina.jpg", description:"Arundinaria alpina — African mountain bamboo — covers vast areas of Rwanda's Volcanoes National Park forming the primary habitat of Rwanda's golden monkeys. Mountain gorillas also eat bamboo shoots as a dietary supplement. Rwanda's bamboo forests form a critical buffer zone between the gorilla habitat and surrounding agricultural communities." },
{ name:"Tea — Icyayi", country:"Rwanda", lat:-2.3, lng:29.4, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Camellia_sinensis.jpg/640px-Camellia_sinensis.jpg", description:"Camellia sinensis covers Rwanda's western highlands in emerald green tea terraces — one of Africa's most beautiful agricultural landscapes. Rwanda produces some of Africa's finest specialty tea, winning international awards for its bright, brisk flavour. Tea is Rwanda's most important export after tourism and coffee, employing over half a million smallholder farmers." },

// 🇷🇪 RÉUNION
{ name:"Takamaka Tree", country:"Réunion", lat:-21.1, lng:55.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Calophyllum_inophyllum.jpg/640px-Calophyllum_inophyllum.jpg", description:"Calophyllum tacamahaca is endemic to Réunion and the Mascarene Islands — its fragrant resin called takamaka used in traditional Réunionnaise medicine for centuries. Réunion's extraordinary volcanic landscape — Piton de la Fournaise is one of the world's most active volcanoes — creates unique plant habitats found nowhere else on Earth." },
{ name:"Fleur Jaune — Mahot Bâtard", country:"Réunion", lat:-21.3, lng:55.6, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dombeya_populnea.jpg/640px-Dombeya_populnea.jpg", description:"Dombeya species are endemic to Réunion and the Mascarene Islands — their white and pink flower clusters covering mountain forests each winter. Réunion has extraordinary plant endemism — over 235 endemic plant species on a single volcanic island. The Réunion National Park — covering 40% of the island — is a UNESCO World Heritage Site." },
{ name:"Vacoa — Pandanus", country:"Réunion", lat:-21.0, lng:55.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pandanus_tectorius.jpg/640px-Pandanus_tectorius.jpg", description:"Pandanus utilis was introduced from Madagascar and has become completely integrated into Réunionnaise culture. Its leaves are woven into traditional baskets and hats — vacoa weaving is a recognised Réunionnaise craft. The vacoa's distinctive prop roots and spiral leaf arrangement make it one of the most recognisable trees in Réunion's coastal landscape." },
{ name:"Géranium Bourbon", country:"Réunion", lat:-21.2, lng:55.5, type:"Shrub", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pelargonium_graveolens.jpg/640px-Pelargonium_graveolens.jpg", description:"Pelargonium graveolens — Bourbon geranium — is Réunion's most important crop. Réunion produces the world's finest geranium essential oil — used in luxury perfumery by Chanel, Dior and Guerlain. The Bourbon variety developed on Réunion has a rose-like fragrance of extraordinary complexity. Réunion's volcanic soil and climate produce oil of unmatched quality." },
{ name:"Letchis — Lychee", country:"Réunion", lat:-20.9, lng:55.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Litchi_chinensis.jpg/640px-Litchi_chinensis.jpg", description:"Litchi chinensis was introduced from China and has become Réunion's most beloved fruit — the Christmas season is inseparable from lychee in Réunionnaise culture. Réunion's lychees ripen just before Christmas, filling markets with fragrant clusters of red-skinned fruit. The letchis festival in Saint-Benoît each December celebrates the harvest with music, dance and gastronomy." },

// 🇰🇳 SAINT KITTS AND NEVIS
{ name:"Poinciana — Flamboyant", country:"Saint Kitts and Nevis", lat:17.3, lng:-62.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Delonix_regia.jpg/640px-Delonix_regia.jpg", description:"Delonix regia blazes scarlet across Saint Kitts and Nevis each summer — its canopy of fire visible from arriving ships. The volcanic peaks of both islands are ringed with flamboyant trees. Saint Kitts's Southeast Peninsula — a protected nature reserve — has extraordinary dry forest dominated by flamboyant and acacia where green vervet monkeys forage daily." },
{ name:"Sugarcane", country:"Saint Kitts and Nevis", lat:17.3, lng:-62.7, type:"Grass", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Saccharum_officinarum.jpg/640px-Saccharum_officinarum.jpg", description:"Saccharum officinarum shaped every aspect of Saint Kitts and Nevis — the islands were the most valuable sugar colonies in the British Empire per acre in the 18th century. The last sugar cane was harvested in 2005 ending 350 years of continuous cultivation. Abandoned cane fields are slowly reverting to tropical forest in what ecologists call one of the Caribbean's most remarkable rewilding stories." },
{ name:"Breadfruit", country:"Saint Kitts and Nevis", lat:17.35, lng:-62.75, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis was brought to Saint Kitts by Captain Bligh in 1793 as cheap food for enslaved workers — the same voyage that brought breadfruit to the Caribbean after the famous Mutiny on the Bounty. Ironically, enslaved Kittitians initially refused to eat it. Today breadfruit is a beloved staple roasted, fried and boiled across both islands." },
{ name:"Sea Island Cotton", country:"Saint Kitts and Nevis", lat:17.15, lng:-62.62, type:"Shrub", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Gossypium_barbadense.jpg/640px-Gossypium_barbadense.jpg", description:"Gossypium barbadense — Sea Island cotton — was cultivated on Nevis producing the world's finest long-staple cotton fibre. Nevis cotton was so valuable it was nicknamed white gold. Alexander Hamilton was born on Nevis in 1755 surrounded by cotton fields. Small-scale Sea Island cotton production is being revived on Nevis as a heritage craft product." },
{ name:"Manchineel — Death Apple", country:"Saint Kitts and Nevis", lat:17.2, lng:-62.65, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hippomane_mancinella.jpg/640px-Hippomane_mancinella.jpg", description:"Hippomane mancinella grows on Saint Kitts's beaches and is considered the world's most dangerous tree — its sap causes severe chemical burns, its fruit is fatally toxic and even standing beneath it in rain causes blistering. Spanish explorers called it the little apple of death. Despite its toxicity, its wood was used to make furniture after careful drying." },

// 🇱🇨 SAINT LUCIA
{ name:"Ixora — Wob Dwiyet", country:"Saint Lucia", lat:13.9, lng:-60.9, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ixora_coccinea.jpg/640px-Ixora_coccinea.jpg", description:"Ixora coccinea is Saint Lucia's national flower — clusters of brilliant red tubular blooms covering hedges and gardens across the island year-round. Called wob dwiyet in Saint Lucian Creole, it is one of the most recognisable plants of the island. Saint Lucia's extraordinary biodiversity — including its endemic Saint Lucia parrot — depends on the island's intact forest interior." },
{ name:"Gommier — Canoe Tree", country:"Saint Lucia", lat:13.9, lng:-61.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dacryodes_excelsa.jpg/640px-Dacryodes_excelsa.jpg", description:"Dacryodes excelsa is Saint Lucia's national tree — the gommier whose enormous straight trunk was hollowed by the Arawak and Carib people to make their great seafaring canoes. Saint Lucia's Qualibou caldera — one of the world's few drive-in volcanoes — is surrounded by gommier forest. Its fragrant resin was burned as incense and used to caulk canoes." },
{ name:"Heliconia — Balisier", country:"Saint Lucia", lat:14.0, lng:-60.95, type:"Tropical Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Heliconia_caribaea.jpg/640px-Heliconia_caribaea.jpg", description:"Heliconia caribaea grows wild throughout Saint Lucia's Piton rainforest — its dramatic red and yellow bracts providing nectar for the endemic Saint Lucia hummingbird. The Pitons — Saint Lucia's iconic twin volcanic spires — are surrounded by heliconia-filled rainforest. The Pitons UNESCO World Heritage Site protects this extraordinary landscape." },
{ name:"Cacao", country:"Saint Lucia", lat:13.85, lng:-61.05, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao has been cultivated on Saint Lucia's volcanic slopes since the 18th century. Saint Lucia's Rabot Estate — now a luxury hotel — produces award-winning single-origin chocolate from heritage Trinitario cacao trees. The island's fertile volcanic soil and high rainfall create ideal conditions for producing some of the Caribbean's most complex chocolate." },
{ name:"Bamboo — Banbou", country:"Saint Lucia", lat:14.05, lng:-60.98, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Bamboo_garden.jpg/640px-Bamboo_garden.jpg", description:"Bambusa vulgaris lines Saint Lucia's river valleys in towering groves — its hollow stems used traditionally to make flutes, water pipes and furniture. Saint Lucian craftspeople weave bamboo into baskets and furniture sold at the Castries market. The island's rainforest rivers — critical freshwater sources — are protected by bamboo riparian corridors." },

// 🇻🇨 SAINT VINCENT AND THE GRENADINES
{ name:"Soufrière Tree Fern", country:"Saint Vincent and the Grenadines", lat:13.2, lng:-61.2, type:"Tree Fern", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cyathea_arborea.jpg/640px-Cyathea_arborea.jpg", description:"Cyathea arborea forms prehistoric-looking forests on Saint Vincent's La Soufrière volcano above 600m. The 2021 eruption of La Soufrière devastated the northern third of the island — destroying forests that had been undisturbed for centuries. Saint Vincent's recovery includes replanting tree fern groves that shelter the critically endangered Saint Vincent parrot." },
{ name:"Black Stick — Arrowroot", country:"Saint Vincent and the Grenadines", lat:13.1, lng:-61.1, type:"Root Crop", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Maranta_arundinacea.jpg/640px-Maranta_arundinacea.jpg", description:"Maranta arundinacea made Saint Vincent famous — the island was once the world's largest arrowroot producer, supplying the starch used in computer paper and baby food globally. Arrowroot was traditionally used by Caribbean indigenous people to treat wounds from poisoned arrows. Saint Vincent's arrowroot industry is being revived as a specialty food product." },
{ name:"Breadfruit", country:"Saint Vincent and the Grenadines", lat:13.15, lng:-61.18, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis was first brought to Saint Vincent by Captain Bligh in 1793 — making it the first Caribbean island to receive breadfruit. The original breadfruit trees from Bligh's voyage still grow at Saint Vincent's Botanic Gardens — the oldest botanic gardens in the Western Hemisphere, established in 1765." },
{ name:"Sea Grape — Raisinier", country:"Saint Vincent and the Grenadines", lat:12.6, lng:-61.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Coccoloba_uvifera.jpg/640px-Coccoloba_uvifera.jpg", description:"Coccoloba uvifera lines the Grenadines' famous white sand beaches in dense coastal thickets. Its clusters of purple-red fruits — resembling grapes — are eaten fresh and made into jelly. Sea grape's spreading branches provide critical shade on Tobago Cays — one of the Caribbean's most pristine marine parks and a nesting site for hawksbill turtles." },
{ name:"Immortelle Tree", country:"Saint Vincent and the Grenadines", lat:13.22, lng:-61.22, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Erythrina_poeppigiana.jpg/640px-Erythrina_poeppigiana.jpg", description:"Erythrina poeppigiana blazes orange-red across Saint Vincent's hillsides each February. Traditionally planted as shade trees over the island's cacao and nutmeg plantations, immortelle trees fix nitrogen in the soil and provide nectar for hummingbirds. Following the 2021 La Soufrière eruption, immortelle trees were among the first to recolonise ash-covered hillsides." },

// 🇼🇸 SAMOA
{ name:"Teuila — Red Ginger", country:"Samoa", lat:-13.8, lng:-172.1, type:"Tropical Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Alpinia_purpurata.jpg/640px-Alpinia_purpurata.jpg", description:"Alpinia purpurata — teuila — is Samoa's national flower, its brilliant red flower spikes worn in hair and used in garlands at every ceremony. The annual Teuila Festival in Apia is Samoa's largest cultural event. The teuila's vibrant red symbolises Samoan pride and the fa'asamoa — the Samoan way of life that has endured for over 3,000 years." },
{ name:"Coconut Palm — Niu", country:"Samoa", lat:-13.9, lng:-171.9, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is the foundation of Samoan civilisation — its Samoan name niu appears in the oldest oral traditions. Coconut cream — niu popo — is the base of virtually every traditional Samoan dish. Copra was Samoa's primary export for over a century. Samoan oral tradition credits the coconut with the ability to provide everything a person needs to survive." },
{ name:"Breadfruit — Ulu", country:"Samoa", lat:-13.75, lng:-172.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis — ulu — has sustained Samoa for over 3,000 years. The Samoan proverb 'o le ulu e tasi ae tele lā' — one breadfruit but many uses — reflects the tree's extraordinary versatility. Samoan navigators carried ulu seedlings across the Pacific. Samoa maintains over 40 traditional breadfruit varieties in its national plant genetic resources collection." },
{ name:"Pua — Frangipani", country:"Samoa", lat:-13.85, lng:-172.05, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Plumeria_rubra.jpg/640px-Plumeria_rubra.jpg", description:"Plumeria obtusa is sacred in Samoan culture — its white fragrant flowers worn behind the ear and woven into ula necklaces presented at every important ceremony. Samoan faleaitu spirit houses are shaded by frangipani trees. The pua's fragrance at dusk fills Samoan villages with a scent that every Samoan living abroad associates instantly with home." },
{ name:"Tava — Pacific Cabbage Tree", country:"Samoa", lat:-13.95, lng:-171.85, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pisonia_grandis.jpg/640px-Pisonia_grandis.jpg", description:"Pisonia grandis forms dense forest in Samoa's interior — its enormous soft leaves used as traditional food wrapping for umu earth oven cooking. Samoa's rainforests are among the most intact in Polynesia — the country has protected over 20% of its land area. Traditional Samoan forest management — customary land tenure — has preserved biodiversity that commercial forestry would have destroyed." },

// 🇸🇲 SAN MARINO
{ name:"Holm Oak — Leccio", country:"San Marino", lat:43.9, lng:12.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Quercus_ilex.jpg/640px-Quercus_ilex.jpg", description:"Quercus ilex forms the evergreen oak forests on the slopes of Mount Titano — the rocky peak on which San Marino, the world's oldest republic, has stood since 301 AD. San Marino's ancient holm oak woods have been protected within the republic's walls for over 1,700 years. The three towers of San Marino look out over holm oak forests unchanged for centuries." },
{ name:"Cyclamen", country:"San Marino", lat:43.94, lng:12.45, type:"Bulb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cyclamen_hederifolium.jpg/640px-Cyclamen_hederifolium.jpg", description:"Cyclamen hederifolium carpets San Marino's wooded hillsides in pink blooms each autumn — one of the most beautiful wildflowers of the Italian peninsula. San Marino's tiny territory — just 61km² — contains remarkable botanical diversity including over 1,200 plant species. The republic's strict environmental laws have preserved its natural heritage for seven centuries." },
{ name:"Olive Tree", country:"San Marino", lat:43.92, lng:12.46, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"Olea europaea has been cultivated on San Marino's terraced hillsides since Roman times. San Marino's olive oil — pressed from ancient trees on the slopes of Mount Titano — is produced in tiny quantities but of exceptional quality. The republic's olive harvest each October is a community celebration maintained continuously since the medieval period." },
{ name:"Downy Oak — Roverella", country:"San Marino", lat:43.93, lng:12.47, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Quercus_pubescens.jpg/640px-Quercus_pubescens.jpg", description:"Quercus pubescens dominates San Marino's open hillside woodland — its gnarled drought-resistant form perfectly suited to the Apennine foothills. San Marino's ancient oaks were used to build the timber framework of the republic's historic towers and city walls. The republic's forest is protected under some of Europe's oldest continuously enforced conservation laws." },
{ name:"Lavender", country:"San Marino", lat:43.94, lng:12.44, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Lavandula_angustifolia_J1.jpg/640px-Lavandula_angustifolia_J1.jpg", description:"Lavandula angustifolia grows on San Marino's rocky limestone slopes and is cultivated in the republic's gardens and smallholdings. San Marino's artisan producers make lavender honey, essential oil and herbal products sold to the millions of tourists who visit the mountaintop republic each year. San Marino's micro-economy supports an extraordinary density of artisan craft producers." },

// 🇸🇹 SÃO TOMÉ AND PRÍNCIPE
{ name:"Obá — São Tomé Giant Begonia", country:"São Tomé and Príncipe", lat:0.2, lng:6.6, type:"Shrub", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Begonia_baccata.jpg/640px-Begonia_baccata.jpg", description:"Begonia baccata is endemic to São Tomé — one of Africa's most biodiverse islands despite its tiny size. São Tomé and Príncipe has over 900 endemic plant species — an extraordinary concentration of biodiversity on two small volcanic islands in the Gulf of Guinea. The island's ancient rainforests climbing the flanks of Pico de São Tomé are among the most intact in Central Africa." },
{ name:"Cacao", country:"São Tomé and Príncipe", lat:0.3, lng:6.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao transformed São Tomé — by 1900 it was the world's largest cacao producer. The Amelonado variety cultivated on São Tomé's volcanic soil produces chocolate of extraordinary flavour. São Tomé's single-origin chocolate from heritage roças — colonial plantation estates — is now among the world's most sought-after by artisan chocolatiers." },
{ name:"Cola de São Tomé", country:"São Tomé and Príncipe", lat:0.15, lng:6.55, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cola_lizae.jpg/640px-Cola_lizae.jpg", description:"Cola lizae is endemic to São Tomé's ancient rainforest — one of over 100 endemic tree species on this tiny island. São Tomé's Obô Natural Park protects the island's extraordinary endemic biodiversity including dozens of bird species found nowhere else. The island's volcanic origins and equatorial isolation created a remarkable laboratory of evolution." },
{ name:"African Tulip Tree", country:"São Tomé and Príncipe", lat:0.25, lng:6.65, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Spathodea_campanulata.jpg/640px-Spathodea_campanulata.jpg", description:"Spathodea campanulata blazes orange-red across São Tomé's roadsides and forest edges. Its spectacular tulip-shaped flowers hold water in their buds — local children use them as water pistols. The African tulip tree arrived from mainland Africa and has naturalised completely into São Tomé's landscape, providing critical nectar for the island's endemic sunbirds." },
{ name:"Coconut Palm", country:"São Tomé and Príncipe", lat:0.32, lng:6.72, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera lines São Tomé's black volcanic sand beaches and was introduced by Portuguese colonists in the 15th century. Coconut palm toddy fermented into local palm wine called matata is drunk at every São Toméan celebration. The island's extraordinary mix of African, Portuguese and Creole cultures has created one of the world's most distinctive island cuisines, coconut at its heart." },

// 🇸🇦 SAUDI ARABIA
{ name:"Date Palm — Nakhl", country:"Saudi Arabia", lat:24.7, lng:46.7, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Phoenix_dactylifera_2.jpg/640px-Phoenix_dactylifera_2.jpg", description:"Phoenix dactylifera is the most sacred plant in Islam — the Prophet Muhammad broke his fast with dates and water. Saudi Arabia has over 400 date varieties and produces 1.5 million tonnes annually. Al-Ahsa oasis in eastern Saudi Arabia — a UNESCO World Heritage Site — contains the world's largest date palm grove with 3 million trees." },
{ name:"Arfaj — Rhanterium", country:"Saudi Arabia", lat:24.0, lng:45.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rhanterium_epapposum.jpg/640px-Rhanterium_epapposum.jpg", description:"Rhanterium epapposum is Saudi Arabia's national plant — its golden yellow flowers transforming the Nejd desert into a carpet of colour each spring. Saudis celebrate the arfaj season with desert camping and family gatherings. Its aromatic branches have been used in Bedouin camel saddle padding and as a natural insect repellent for millennia." },
{ name:"Ghaf Tree", country:"Saudi Arabia", lat:22.0, lng:47.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Prosopis_cineraria.jpg/640px-Prosopis_cineraria.jpg", description:"Prosopis cineraria survives Saudi Arabia's extreme desert by sending roots down 30m to groundwater. Ancient ghaf trees mark the sites of traditional Bedouin wells and encampments across the Empty Quarter. Saudi Arabia's Vision 2030 includes planting 10 billion trees — ghaf is the primary species for desert reforestation across the Arabian Peninsula." },
{ name:"Frankincense — Luban", country:"Saudi Arabia", lat:18.2, lng:42.5, type:"Tree", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Boswellia_sacra.jpg/640px-Boswellia_sacra.jpg", description:"Boswellia sacra grows in Saudi Arabia's Asir Mountains and Tihama coastal plain. Saudi frankincense was traded along the ancient Incense Route for 5,000 years. The Hejaz region of western Saudi Arabia was the crossroads of the global incense trade — Mecca's wealth before Islam was built on frankincense commerce passing through the peninsula." },
{ name:"Juniper — Arar", country:"Saudi Arabia", lat:18.5, lng:42.3, type:"Conifer", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Juniperus_procera.jpg/640px-Juniperus_procera.jpg", description:"Juniperus procera forms Arabia's highest forests in Saudi Arabia's Asir Mountains above 2,000m — the most extensive juniper woodland in the Arabian Peninsula. These ancient forests receive winter mist and summer monsoon moisture from the Indian Ocean. Saudi Arabia's Asir National Park protects extraordinary biodiversity including endemic plants found nowhere else in Arabia." },

// 🇸🇳 SENEGAL
{ name:"Baobab — Bouy", country:"Senegal", lat:14.7, lng:-17.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata is the soul of Senegal — its distinctive silhouette defines the West African landscape and its fruit is woven into every aspect of Senegalese life. Baobab fruit powder — bouy — is Senegal's most important superfood, added to the national drink thiakry. Dakar's famous wrestling arenas are traditionally held beneath ancient baobabs." },
{ name:"Acacia — Gum Arabic", country:"Senegal", lat:15.0, lng:-14.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Acacia_senegal_MS_4724.jpg/640px-Acacia_senegal_MS_4724.jpg", description:"Senegalia senegal takes its species name from Senegal — where it was first scientifically described. Senegal's gum arabic production supports millions of rural families in the Sahel. The Great Green Wall — Africa's most ambitious ecological project — uses Senegalese acacia as its primary species to halt desertification advancing from the Sahara." },
{ name:"Fromager — Kapok", country:"Senegal", lat:14.3, lng:-16.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra is sacred across Senegal — in Wolof, Serer and Mandinka spiritual traditions the kapok tree is home to ancestors and nature spirits. Senegal's famous sacred forests — forêts sacrées — are dominated by ancient kapok trees protecting biodiversity and traditional knowledge simultaneously. Dakar's oldest neighbourhoods are named after kapok trees that once marked their boundaries." },
{ name:"Néré — Locust Bean", country:"Senegal", lat:13.5, lng:-15.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Parkia_biglobosa.jpg/640px-Parkia_biglobosa.jpg", description:"Parkia biglobosa produces soumbala — fermented locust beans — Senegal's most fundamental condiment. Added to thiéboudienne — Senegal's national dish and UNESCO-recognised cultural heritage — soumbala provides the deep umami base that makes Senegalese cuisine distinctive. Senegalese women process locust beans in cooperative groups maintaining traditions unchanged for centuries." },
{ name:"Mangrove — Palétuvier", country:"Senegal", lat:12.5, lng:-16.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Mangrove_trees.jpg/640px-Mangrove_trees.jpg", description:"Senegal's Casamance and Sine-Saloum delta systems contain West Africa's most important mangrove ecosystems — UNESCO World Heritage Sites sheltering manatees, hippos and spectacular bird communities. Senegalese women's oyster cooperatives harvest from mangrove roots. Community-led mangrove restoration in Senegal has become a global model replicated across West Africa." },

// 🇷🇸 SERBIA
{ name:"Serbian Spruce — Omorika", country:"Serbia", lat:43.9, lng:19.3, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Picea_omorika.jpg/640px-Picea_omorika.jpg", description:"Picea omorika is endemic to a tiny area of western Serbia's Tara Mountain — one of the world's rarest conifers, surviving in just a few populations on limestone cliffs above the Drina River. A Tertiary relict that survived the Ice Ages in this single refuge, it has become the world's most planted ornamental spruce — in gardens from Oslo to Tokyo while nearly extinct in its native Serbia." },
{ name:"Serbian Wild Plum — Šljiva", country:"Serbia", lat:44.0, lng:21.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Prunus_domestica.jpg/640px-Prunus_domestica.jpg", description:"Prunus domestica is Serbia's most culturally important fruit tree — Serbia is the world's largest plum producer and second largest plum exporter. Serbian šljivovica — plum brandy — is the national drink, given to every newborn, drunk at every celebration and poured on graves. The plum is so fundamental to Serbian identity that šljivovica was briefly proposed as the national symbol." },
{ name:"Ramonda — Resurrection Plant", country:"Serbia", lat:43.3, lng:22.0, type:"Alpine Flower", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ramonda_serbica.jpg/640px-Ramonda_serbica.jpg", description:"Ramonda serbica is Serbia's national flower — endemic to the Balkans, growing on shaded limestone cliffs in the Nišava gorge. Called the resurrection plant because it can completely desiccate and come back to life when rehydrated. Serbia uses it as a symbol of national resilience — the plant that cannot be killed, no matter how harsh the conditions." },
{ name:"Linden — Lipa", country:"Serbia", lat:44.8, lng:20.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tilia_cordata.jpg/640px-Tilia_cordata.jpg", description:"Tilia cordata is Serbia's most beloved tree — village lindens called lipa were the centres of community life for centuries. Serbian medieval assemblies were held beneath ancient lindens. The word lipa — linden — appears in countless Serbian place names and folk songs. Serbian linden honey from the Tara and Zlatibor mountains is considered among Europe's finest." },
{ name:"Gentian — Lincura", country:"Serbia", lat:43.2, lng:20.8, type:"Alpine Flower", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gentiana_lutea.jpg/640px-Gentiana_lutea.jpg", description:"Gentiana lutea grows on Serbia's Kopaonik and Zlatibor mountains — its bitter root harvested for centuries to make lincura — Serbian herbal spirit. Serbia's mountain meadows host extraordinary Balkan endemic plant diversity. Kopaonik National Park protects one of the richest wildflower meadow ecosystems in southeastern Europe." },

// 🇸🇨 SEYCHELLES
{ name:"Coco de Mer", country:"Seychelles", lat:-4.3, lng:55.7, type:"Palm", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Lodoicea_maldivica.jpg/640px-Lodoicea_maldivica.jpg", description:"Lodoicea maldivica produces the world's largest seed — up to 25kg — and is found only on Praslin and Curieuse islands in Seychelles. The Vallée de Mai on Praslin is a UNESCO World Heritage Site — an ancient primeval palm forest unchanged for millions of years. The coco de mer's suggestive double-lobed nut inspired legends of a mythical underwater tree in the Indian Ocean." },
{ name:"Jellyfish Tree — Medusagyne", country:"Seychelles", lat:-4.6, lng:55.5, type:"Tree", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Medusagyne_oppositifolia.jpg/640px-Medusagyne_oppositifolia.jpg", description:"Medusagyne oppositifolia grows only on Mahé island and is so unique it constitutes its own plant family — one of only a handful of such plants on Earth. Fewer than 86 wild trees are known. Its extraordinary seed capsules open like jellyfish tentacles. The Seychelles Islands Foundation conducts intensive propagation programs to save this irreplaceable evolutionary relic." },
{ name:"Pitcher Plant — Nepenthes pervillei", country:"Seychelles", lat:-4.5, lng:55.5, type:"Carnivorous Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Nepenthes_rajah1.jpg/640px-Nepenthes_rajah1.jpg", description:"Nepenthes pervillei is endemic to Seychelles — growing on granite boulders and rocky outcrops on Mahé and Silhouette islands. One of only two Nepenthes species in the Indian Ocean islands, it evolved in complete isolation from Asian pitcher plants. Seychelles' extraordinary endemic biodiversity reflects 65 million years of evolution since the islands separated from India." },
{ name:"Seychelles Vanilla", country:"Seychelles", lat:-4.35, lng:55.65, type:"Vine", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Vanilla_planifolia.jpg/640px-Vanilla_planifolia.jpg", description:"Vanilla planifolia was introduced to Seychelles in the 19th century and is cultivated on Mahé's forested slopes. Seychelles vanilla — hand-pollinated and sun-cured for months — is among the world's finest. The islands' extraordinary humidity and volcanic soil create ideal conditions. Seychelles vanilla producers supply luxury food brands globally." },
{ name:"Takamaka Tree", country:"Seychelles", lat:-4.4, lng:55.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Calophyllum_inophyllum.jpg/640px-Calophyllum_inophyllum.jpg", description:"Calophyllum inophyllum lines Seychelles' famous beaches in dense shade-giving canopies. The takamaka is one of the most iconic trees of the Seychelles — its spreading branches over white coral sand beaches and turquoise water create the quintessential Seychellois landscape. Its fragrant resin is used in traditional Creole medicine to treat skin conditions and joint pain." },

// 🇸🇱 SIERRA LEONE
{ name:"Cottonwood — Ceiba", country:"Sierra Leone", lat:8.5, lng:-13.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Ceiba_pentandra_in_Tenerife.jpg/640px-Ceiba_pentandra_in_Tenerife.jpg", description:"Ceiba pentandra is Sierra Leone's most sacred tree — the Cotton Tree of Freetown is a 500-year-old ceiba that stands at the heart of the capital. Freed slaves who arrived in Freetown in 1792 gathered beneath this tree to give thanks for their freedom. The Cotton Tree is Sierra Leone's most powerful national symbol — its potential removal sparked national protests in 2023." },
{ name:"Kola Tree", country:"Sierra Leone", lat:8.8, lng:-12.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cola_nitida.jpg/640px-Cola_nitida.jpg", description:"Cola nitida grows in Sierra Leone's coastal rainforests — kola nuts are offered at every ceremony, wedding and important meeting across all of Sierra Leone's ethnic groups. Sierra Leone's Temne and Mende people use kola nuts in divination rituals. The bitter caffeine-rich nut sustained trans-Saharan traders and was the original flavouring ingredient of Coca-Cola." },
{ name:"African Rosewood — Camwood", country:"Sierra Leone", lat:8.2, lng:-12.8, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pterocarpus_osun.jpg/640px-Pterocarpus_osun.jpg", description:"Pterocarpus osun — camwood — is sacred across Sierra Leone. Its brilliant red heartwood is ground into powder and mixed with palm oil to make the body paint used in Poro and Sande initiation ceremonies. Sierra Leone's sacred forest societies have managed camwood groves sustainably for centuries as living pharmacies and ceremonial resources." },
{ name:"Raphia Palm", country:"Sierra Leone", lat:7.8, lng:-13.0, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Raffia_farinifera.jpg/640px-Raffia_farinifera.jpg", description:"Raphia hookeri lines Sierra Leone's river systems — its palm wine tapped fresh and drunk within hours or fermented into a stronger brew consumed at every celebration. Sierra Leone's Freetown Peninsula rainforest — one of West Africa's most important biodiversity hotspots — contains ancient raphia groves in its river valleys sheltering chimpanzees and pygmy hippos." },
{ name:"Guinea Pepper — Grains of Paradise", country:"Sierra Leone", lat:7.5, lng:-12.5, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Aframomum_melegueta.jpg/640px-Aframomum_melegueta.jpg", description:"Aframomum melegueta grows in Sierra Leone's coastal wetlands — the original Grain Coast. Its peppery aromatic seeds were the most valuable West African spice in medieval Europe — Portuguese sailors called Sierra Leone's coast the Grain Coast because of them. Sierra Leonean grains of paradise flavour traditional palm butter and groundnut stew." },

// 🇸🇬 SINGAPORE
{ name:"Vanda Miss Joaquim", country:"Singapore", lat:1.3, lng:103.8, type:"Orchid", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Vanda_Miss_Joaquim.jpg/640px-Vanda_Miss_Joaquim.jpg", description:"Vanda Miss Joaquim is Singapore's national flower — a hybrid orchid discovered in Agnes Joaquim's garden in 1893. Singapore chose it as the national flower in 1981 for its resilience and year-round blooming. Singapore's National Orchid Garden in the Botanic Gardens — a UNESCO World Heritage Site — displays over 1,000 orchid species and 2,000 hybrids." },
{ name:"Tembusu", country:"Singapore", lat:1.3, lng:103.8, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Fagraea_fragrans.jpg/640px-Fagraea_fragrans.jpg", description:"Fagraea fragrans is Singapore's most beloved heritage tree — its image appears on the Singapore five-dollar note. The ancient tembusu in Singapore Botanic Gardens is over 150 years old and survived the Japanese occupation. Singapore's Heritage Tree Scheme protects 262 remarkable trees — Singapore treats its trees as living monuments of equal importance to its built heritage." },
{ name:"Sea Apple — Jambu Laut", country:"Singapore", lat:1.28, lng:103.82, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Syzygium_grande.jpg/640px-Syzygium_grande.jpg", description:"Syzygium grande is Singapore's most iconic roadside tree — its massive spreading canopy lines Orchard Road and the Civic District in cooling shade. A city-state that has lost over 95% of its original forest, Singapore has compensated with extraordinary urban tree planting — now one of the world's greenest cities with 30% tree canopy cover." },
{ name:"Saraca — Asoka Tree", country:"Singapore", lat:1.32, lng:103.86, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Saraca_asoca.jpg/640px-Saraca_asoca.jpg", description:"Saraca cauliflora grows in Singapore's Bukit Timah Nature Reserve — one of the world's smallest but most biodiverse primary rainforest fragments. Singapore's 164 hectares of primary forest contain more tree species than the entire North American continent. The asoka tree's brilliant orange-red flower clusters bloom directly from the trunk in the dense shade of Singapore's surviving forest." },
{ name:"Nipah Palm — Attap", country:"Singapore", lat:1.25, lng:103.75, type:"Palm", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Nypa_fruticans.jpg/640px-Nypa_fruticans.jpg", description:"Nypa fruticans once lined Singapore's entire coastline in dense mangrove swamps — the attap palm's leaves thatched the kampung houses of early Singapore. The word attap appears in over 100 Singapore place names. Virtually all of Singapore's mangroves were reclaimed for development — tiny remnants survive at Sungei Buloh Wetland Reserve as windows into the original landscape." },

// 🇸🇰 SLOVAKIA
{ name:"Small-leaved Linden — Lipa", country:"Slovakia", lat:48.7, lng:19.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tilia_cordata.jpg/640px-Tilia_cordata.jpg", description:"Tilia cordata is Slovakia's national tree — the lipa — its midsummer blossom filling Slovak villages with honey fragrance. The linden is the most sacred tree in Slavic mythology — a symbol of peace, love and justice. Village assemblies were held beneath ancient lindens across Slovakia for centuries. Slovak folk embroidery features linden leaves as one of its most important motifs." },
{ name:"Edelweiss — Plesnivec", country:"Slovakia", lat:49.2, lng:20.0, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Leontopodium_alpinum_-_edelweiss.jpg/640px-Leontopodium_alpinum_-_edelweiss.jpg", description:"Leontopodium alpinum grows on Slovakia's High Tatras — the highest mountain range in the Carpathians — above 1,800m. Strictly protected by Slovak law. The High Tatras — called the smallest great mountains in the world — contain over 1,300 plant species in an area of just 750km². Slovak mountaineers consider edelweiss the ultimate symbol of alpine achievement." },
{ name:"Gentian — Horec", country:"Slovakia", lat:49.0, lng:19.5, type:"Alpine Flower", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gentiana_acaulis.jpg/640px-Gentiana_acaulis.jpg", description:"Gentiana acaulis blazes electric blue across Slovakia's Tatra and Fatra mountain meadows each spring. Slovakia's extraordinary alpine biodiversity reflects the Carpathians' role as a refugium for species during the Ice Ages. Slovak traditional medicine uses gentian root to treat digestive complaints — a use documented in Slovak herbal manuscripts since the 15th century." },
{ name:"Yew — Tis", country:"Slovakia", lat:48.5, lng:19.8, type:"Conifer", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Taxus_baccata.jpg/640px-Taxus_baccata.jpg", description:"Taxus baccata grows in Slovakia's primeval forests of the Poloniny National Park — part of the UNESCO East Carpathian Biosphere Reserve containing some of Europe's last untouched beech and fir forest. Slovak yews can live for thousands of years. The compound taxol derived from yew bark revolutionised cancer treatment and is still used in chemotherapy globally." },
{ name:"Cornflower — Nevädza", country:"Slovakia", lat:48.3, lng:18.5, type:"Wildflower", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Centaurea_cyanus_LC0084.jpg/640px-Centaurea_cyanus_LC0084.jpg", description:"Centaurea cyanus once carpeted Slovakia's grain fields in vivid blue each June. Now rare due to herbicide use, it remains a powerful symbol of Slovak rural heritage. Slovak folk songs celebrate the nevädza as a symbol of love and faithfulness. Slovakia has launched wildflower corridor programs to restore cornflower populations along field margins." },

// 🇸🇮 SLOVENIA
{ name:"Carnation — Nagel", country:"Slovenia", lat:46.1, lng:14.8, type:"Alpine Flower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dianthus_alpinus.jpg/640px-Dianthus_alpinus.jpg", description:"Dianthus alpinus grows on Slovenia's Julian Alps — its vivid pink flowers carpeting limestone meadows above 1,500m. Slovenia — one of Europe's greenest countries with 60% forest cover — has extraordinary alpine plant diversity. The Julian Alps are part of the Triglav National Park — named after Slovenia's three-headed mountain god — a UNESCO Biosphere Reserve." },
{ name:"Linden — Lipa", country:"Slovenia", lat:46.4, lng:15.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tilia_cordata.jpg/640px-Tilia_cordata.jpg", description:"Tilia cordata is Slovenia's national tree — the lipa. The famous Najevnik linden at Nazarje is over 700 years old and its hollow trunk can shelter 100 people. Slovenian village life centred on the linden tree — dances, markets and community gatherings held in its shade. Slovenia's national poet France Prešeren wrote of the lipa as the symbol of Slovenian identity." },
{ name:"Black Pine — Črni Bor", country:"Slovenia", lat:45.8, lng:14.0, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/19/Pinus_nigra_subsp._nigra.jpg/640px-Pinus_nigra_subsp._nigra.jpg", description:"Pinus nigra forms Slovenia's Kras — the world's original karst landscape that gave geology the word karst. The Kras plateau's rocky limestone terrain supports extraordinary endemic flora including black pine forests adapted to shallow skeletal soils. Slovenia's Škocjan Caves UNESCO World Heritage Site lies beneath black pine forest on the Kras plateau." },
{ name:"Gentian — Gornik", country:"Slovenia", lat:46.4, lng:13.8, type:"Alpine Flower", status:"Protected", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Gentiana_acaulis.jpg/640px-Gentiana_acaulis.jpg", description:"Gentiana clusii blazes electric blue across Slovenia's Triglav National Park meadows each spring. Slovenia's Alps harbour one of the richest concentrations of endemic Balkan and Alpine plants in Europe. Slovenian traditional medicine has used gentian root for centuries — a practice documented in the writings of Ljubljana's 16th century botanist Carolus Clusius who first described many Alpine species." },
{ name:"Hops — Hmelj", country:"Slovenia", lat:46.2, lng:15.3, type:"Vine", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Humulus_lupulus.jpg/640px-Humulus_lupulus.jpg", description:"Humulus lupulus has been cultivated in Slovenia's Savinja Valley since the 12th century — one of the world's oldest hop-growing regions. Slovenian Styrian Golding hops are among the most prized in global craft brewing for their delicate floral aroma. The Žalec hop region has a unique hop fountain — a public drinking fountain dispensing fresh beer — the world's first." },

// 🇸🇧 SOLOMON ISLANDS
{ name:"Canarium Nut — Ngali", country:"Solomon Islands", lat:-9.4, lng:160.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Canarium_indicum.jpg/640px-Canarium_indicum.jpg", description:"Canarium indicum — the ngali nut — is the most important traditional food tree in the Solomon Islands. Its rich oily nuts have sustained Solomon Islanders for over 30,000 years — the longest continuous human occupation of any Pacific island. Ngali nuts are traded between islands, given as bride price and consumed at every important ceremony across all nine provinces." },
{ name:"Coconut Palm", country:"Solomon Islands", lat:-9.5, lng:160.0, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is fundamental to Solomon Islands life — copra was the primary export for over a century. Solomon Islands' extraordinary WWII history — Guadalcanal, the Coral Sea — unfolded beneath coconut palms. The islands' remarkable cultural diversity — over 70 distinct languages — is unified by the universal importance of the coconut palm in daily life." },
{ name:"Kauri — Dakua", country:"Solomon Islands", lat:-8.5, lng:159.5, type:"Conifer", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Agathis_macrophylla.jpg/640px-Agathis_macrophylla.jpg", description:"Agathis macrophylla forms magnificent forests on the Solomon Islands' largest islands. Its straight massive timber was used to build the great war canoes — tomoko — of the Solomon Islands headhunting culture. Illegal logging of kauri for export to Asia has devastated Solomon Islands forests — one of the Pacific's most severe deforestation crises." },
{ name:"Breadfruit — Ifi", country:"Solomon Islands", lat:-9.3, lng:160.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis has been cultivated in the Solomon Islands for over 3,000 years. The Solomon Islands maintains extraordinary breadfruit diversity — over 60 traditional varieties carefully selected by generations of farmers. During WWII, Solomon Islanders fed Allied troops using traditional breadfruit cultivation systems that had sustained island populations for millennia." },
{ name:"Parinari — Kerosene Wood", country:"Solomon Islands", lat:-9.6, lng:160.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/wikipedia/commons/thumb/4/4e/Parinari_glaberrima.jpg/640px-Parinari_glaberrima.jpg", description:"Parinari species form part of Solomon Islands' extraordinary lowland rainforest — among the most biodiverse in the Pacific. The Solomon Islands archipelago's geological complexity — volcanic, raised coral and ancient continental fragments — creates extraordinary habitat diversity. New tree species are still being described from unexplored Solomon Islands valleys each decade." },

// 🇸🇴 SOMALIA
{ name:"Frankincense Tree", country:"Somalia", lat:10.5, lng:49.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Boswellia_sacra.jpg/640px-Boswellia_sacra.jpg", description:"Boswellia carterii grows on Somalia's northern Somaliland escarpment — one of the world's primary frankincense sources. Somali frankincense has been traded for over 5,000 years — ancient Egyptian hieroglyphics record frankincense expeditions to the Land of Punt believed to be Somalia. Over-tapping is killing Somalia's frankincense trees faster than they can regenerate." },
{ name:"Myrrh Tree", country:"Somalia", lat:10.0, lng:49.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Commiphora_myrrha.jpg/640px-Commiphora_myrrha.jpg", description:"Commiphora myrrha grows in Somalia's Ogaden and Somaliland regions — Somalia is the world's primary myrrh source. Myrrh resin from Somali trees was traded to ancient Egypt, Greece and Rome for embalming, incense and medicine. Myrrh was one of the gifts the Magi brought to Bethlehem — almost certainly sourced from Somali traders on the ancient incense route." },
{ name:"Doum Palm", country:"Somalia", lat:11.5, lng:43.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Hyphaene_thebaica.jpg/640px-Hyphaene_thebaica.jpg", description:"Hyphaene thebaica lines Somalia's Jubba and Shabelle river valleys — its distinctive forked trunk visible for kilometres across the flat Somali plain. Somali nomadic communities weave doum palm leaves into the beautifully decorated dheri mats and containers that are essential household items across the country. Its gingerbread-flavoured fruit is sold in Mogadishu's markets." },
{ name:"Acacia — Galool", country:"Somalia", lat:9.5, lng:46.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Acacia_senegal_MS_4724.jpg/640px-Acacia_senegal_MS_4724.jpg", description:"Acacia bussei — galool — is the most important tree of Somalia's central plateau. Somali nomads have used galool charcoal for cooking for centuries — but decades of charcoal production for export has devastated Somalia's acacia woodlands. Somalia exports millions of sacks of charcoal annually despite international bans, driving catastrophic deforestation across the country." },
{ name:"Desert Rose — Adenium", country:"Somalia", lat:11.0, lng:49.5, type:"Succulent", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Adenium_obesum.jpg/640px-Adenium_obesum.jpg", description:"Adenium somalense is endemic to Somalia and northern Kenya — its massive swollen trunk and brilliant pink flowers making it one of the most spectacular plants of the Horn of Africa. Somalia's extraordinary succulent flora — including dozens of endemic aloe and euphorbia species — reflects millions of years of arid evolution on the Horn's ancient rocky plateau." },

// 🇿🇦 SOUTH AFRICA
{ name:"King Protea", country:"South Africa", lat:-33.9, lng:18.4, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Protea_cynaroides.jpg/640px-Protea_cynaroides.jpg", description:"Protea cynaroides is South Africa's national flower — its enormous flower head up to 30cm across makes it the largest of all 330 protea species. The Cape Floristic Region around Cape Town is the world's smallest but richest floral kingdom — 9,600 plant species in an area smaller than Portugal, 70% found nowhere else on Earth. South Africa's Fynbos biome is a UNESCO World Heritage Site." },
{ name:"Baobab", country:"South Africa", lat:-23.5, lng:30.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata reaches its southern limit in South Africa's Limpopo province — the famous Sunland Baobab had a hollow trunk large enough to contain a pub serving 15 people. South Africa's baobabs are dying at an unprecedented rate — 9 of the 13 oldest and largest baobabs in the country died between 2005 and 2017, believed to be caused by climate change." },
{ name:"Aloe ferox — Bitter Aloe", country:"South Africa", lat:-31.0, lng:26.0, type:"Succulent", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Aloe_ferox.jpg/640px-Aloe_ferox.jpg", description:"Aloe ferox is South Africa's most commercially important aloe — harvested across the Karoo and Eastern Cape for its bitter juice used in laxatives and its gel used in cosmetics. South Africa produces over 90% of the world's aloe ferox. The Khoikhoi people have used bitter aloe medicinally for over 5,000 years and it remains a key ingredient in Cape Malay traditional medicine." },
{ name:"Rooibos", country:"South Africa", lat:-32.5, lng:19.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Aspalathus_linearis.jpg/640px-Aspalathus_linearis.jpg", description:"Aspalathus linearis is endemic to the Cederberg Mountains of South Africa's Western Cape — the only place on Earth where rooibos grows wild. The Khoikhoi people used rooibos tea for centuries before Dutch settlers discovered it in the 18th century. South Africa exports over 15,000 tonnes of rooibos annually — it is the country's most valuable herbal export." },
{ name:"Buchu", country:"South Africa", lat:-33.5, lng:19.5, type:"Shrub", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Agathosma_betulina.jpg/640px-Agathosma_betulina.jpg", description:"Agathosma betulina is endemic to South Africa's Western Cape Fynbos and has been used medicinally by the Khoikhoi and San people for thousands of years. Its distinctive blackcurrant-like fragrance comes from diosphenol oil in its leaves. Buchu is now one of South Africa's most valuable botanical exports — used in flavouring, traditional medicine and increasingly in craft spirits." },

// 🇸🇸 SOUTH SUDAN
{ name:"Nile Papyrus", country:"South Sudan", lat:7.0, lng:30.5, type:"Aquatic Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cyperus_papyrus.jpg/640px-Cyperus_papyrus.jpg", description:"Cyperus papyrus forms vast floating islands in South Sudan's Sudd — the world's largest tropical wetland and one of Earth's most important freshwater ecosystems. The Sudd's 57,000km² of papyrus swamp regulate the entire Nile's flow. South Sudan's Nuer and Dinka communities have navigated, fished and grazed their cattle in the papyrus Sudd for thousands of years." },
{ name:"Shea Tree", country:"South Sudan", lat:5.5, lng:30.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Vitellaria_paradoxa.jpg/640px-Vitellaria_paradoxa.jpg", description:"Vitellaria paradoxa covers South Sudan's Equatoria region — shea butter processed by South Sudanese women provides critical income and nutrition. South Sudan's decades of civil conflict have paradoxically preserved its biodiversity by limiting agricultural expansion. The country's vast intact savanna and forest ecosystems represent one of Africa's last great wilderness frontiers." },
{ name:"Mahogany", country:"South Sudan", lat:4.5, lng:31.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Swietenia_macrophylla.jpg/640px-Swietenia_macrophylla.jpg", description:"Khaya species grow in South Sudan's Equatoria forests — some of the largest remaining African mahogany trees on the continent. South Sudan's Western and Central Equatoria forests contain extraordinary biodiversity including mountain gorillas, forest elephants and giant forest hogs. These forests survived decades of civil war but now face logging pressure as peace stabilises the region." },
{ name:"Tamarind", country:"South Sudan", lat:6.0, lng:31.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tamarindus_indica.jpg/640px-Tamarindus_indica.jpg", description:"Tamarindus indica grows across South Sudan's savanna — ancient trees marking the sites of traditional Dinka, Nuer and Zande settlements. Its sour fruit pulp dissolved in water makes a refreshing drink consumed across South Sudan. Tamarind seeds are eaten during famine and its leaves added to soups as a souring agent across all of South Sudan's diverse communities." },
{ name:"Combretum — Kindir", country:"South Sudan", lat:6.5, lng:29.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Combretum_collinum.jpg/640px-Combretum_collinum.jpg", description:"Combretum species dominate South Sudan's vast savanna woodland — their four-winged seeds spinning like helicopter blades in the wind. South Sudan's Boma National Park hosts one of Africa's last great wildlife migrations — over 1.2 million white-eared kob antelope moving through combretum woodland in a spectacle rivalling the Serengeti. This landscape remains one of Africa's last truly wild places." },

// 🇪🇸 SPAIN
{ name:"Olive Tree", country:"Spain", lat:37.9, lng:-4.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"Spain is the world's largest olive oil producer — Jaén province in Andalucía alone produces more olive oil than the entire country of Greece. Spain has over 300 million olive trees. Some ancient olives in the Valencia region exceed 2,000 years. The Spanish Arbequina, Picual and Hojiblanca varieties are the world's most planted olive cultivars." },
{ name:"Cork Oak — Alcornoque", country:"Spain", lat:37.5, lng:-6.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Quercus_suber.jpg/640px-Quercus_suber.jpg", description:"Quercus suber forms Spain's dehesa — a unique savanna-woodland ecosystem covering 3.5 million hectares in Extremadura and Andalucía. The dehesa shelters the Iberian lynx, black stork and Spanish imperial eagle. Spain produces 30% of the world's cork. Black Iberian pigs fattened on acorns beneath cork oaks produce jamón ibérico — the world's most expensive cured meat." },
