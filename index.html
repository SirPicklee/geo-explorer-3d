{ name:"Mammee Apple", country:"Montserrat", lat:16.73, lng:-62.19, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mammea_americana.jpg/640px-Mammea_americana.jpg", description:"Mammea americana has been cultivated in Montserrat since pre-Columbian Arawak times. Its large orange-fleshed fruits are eaten fresh and made into jam. The seeds yield an oil used in traditional medicine. Montserrat's surviving agricultural communities in the north of the island maintain mammee apple trees as part of their traditional home gardens." },
{ name:"Guava", country:"Montserrat", lat:16.74, lng:-62.20, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Psidium_guajava.jpg/640px-Psidium_guajava.jpg", description:"Psidium guajava grows wild and cultivated across Montserrat's northern hills. Guava jam and guava cheese are traditional Montserratian preserves made each harvest season. The plant has colonised abandoned farmland in Montserrat's volcanic exclusion zone — one of the first plants to return to ash-covered landscapes after the 1995 eruption." },

// 🇲🇦 MOROCCO
{ name:"Argan Tree", country:"Morocco", lat:30.4, lng:-8.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Argania_spinosa.jpg/640px-Argania_spinosa.jpg", description:"Argania spinosa is endemic to Morocco's Souss Valley — the only place on Earth where it grows wild. Its nut oil is the world's most expensive edible oil — 30kg of nuts hand-cracked by Berber women to produce 1 litre. Morocco's argan forest is a UNESCO Biosphere Reserve. Goats famously climb argan trees to eat their fruits." },
{ name:"Rose of Dadès", country:"Morocco", lat:31.4, lng:-6.1, type:"Shrub", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_damascena.jpg/640px-Rosa_damascena.jpg", description:"Rosa damascena is cultivated in Morocco's Valley of Roses near Kelaat M'Gouna in the High Atlas. Morocco is the world's largest producer of rose water and rose absolute — essential to luxury perfumery. The annual Rose Festival in M'Gouna each May celebrates the harvest of 4,000 tonnes of rose petals picked before dawn by Berber women." },
{ name:"Atlas Cedar", country:"Morocco", lat:31.8, lng:-5.6, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cedrus_atlantica.jpg/640px-Cedrus_atlantica.jpg", description:"Cedrus atlantica is endemic to Morocco's Middle and High Atlas mountains, forming magnificent forests above 1,400m. Morocco's Azrou cedar forest shelters the world's last wild Barbary macaques — the only wild primates in Africa north of the Sahara. Climate change-driven drought is killing Morocco's ancient cedar forests at an accelerating rate." },
{ name:"Thuya — Moroccan Cypress", country:"Morocco", lat:33.5, lng:-5.0, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tetraclinis_articulata.jpg/640px-Tetraclinis_articulata.jpg", description:"Tetraclinis articulata produces Morocco's most prized timber — its dense burl wood with intricate flame patterns has been carved by Essaouira's master craftsmen for centuries. Moroccan thuya woodwork — inlaid boxes, tables and musical instruments — is sold across the world. The tree's aromatic resin was used as incense in ancient Carthage." },
{ name:"Barbary Fig — Cactus Pear", country:"Morocco", lat:32.0, lng:-7.0, type:"Cactus", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Opuntia_ficus-indica.jpg/640px-Opuntia_ficus-indica.jpg", description:"Opuntia ficus-indica covers Morocco's hillsides in impenetrable green walls of prickly pear. Introduced from Mexico by Spanish traders in the 16th century, it now defines the Moroccan rural landscape. Morocco is the world's largest producer of prickly pear seed oil — extracted laboriously from the tiny seeds and used in luxury skincare." },

// 🇲🇿 MOZAMBIQUE
{ name:"Mozambique Ebony", country:"Mozambique", lat:-15.0, lng:40.7, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dalbergia_melanoxylon.jpg/640px-Dalbergia_melanoxylon.jpg", description:"Dalbergia melanoxylon — African blackwood — produces the world's densest and most acoustically perfect timber. Every professional clarinet and oboe reed in the world is made from Mozambican blackwood. Illegal logging for the Chinese musical instrument market has devastated Mozambique's populations. A single log can be worth thousands of dollars on black markets." },
{ name:"Baobab", country:"Mozambique", lat:-18.0, lng:35.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata grows across Mozambique's Zambezi Valley in ancient groves, some trees over 2,000 years old. Mozambique's Gorongosa National Park — devastated by civil war but now spectacularly restored — contains magnificent baobab woodland. Mozambican communities extract baobab cream from the fruit pulp as a cosmetic and nutritional supplement." },
{ name:"Coconut Palm", country:"Mozambique", lat:-19.8, lng:34.9, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera lines over 2,500km of Mozambique's Indian Ocean coastline. Mozambique was once Africa's largest coconut producer — copra exports funded Portuguese colonial infrastructure. Coconut-based piri piri prawns from Mozambique's Ilha de Moçambique are considered one of the Indian Ocean's finest dishes." },
{ name:"Mangrove", country:"Mozambique", lat:-21.5, lng:35.3, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Mangrove_trees.jpg/640px-Mangrove_trees.jpg", description:"Mozambique has Africa's third largest mangrove forest — over 400,000 hectares lining its extraordinary coastline. The Quirimbas and Bazaruto archipelagos contain mangrove systems of global importance, sheltering dugongs, whale sharks and nesting sea turtles. Mozambique's mangroves store enormous quantities of blue carbon critical to global climate regulation." },
{ name:"Pau Rosa — Rosewood", country:"Mozambique", lat:-16.5, lng:39.0, type:"Tree", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dalbergia_melanoxylon.jpg/640px-Dalbergia_melanoxylon.jpg", description:"Dalbergia species native to Mozambique's northern forests have been devastated by illegal logging for the Chinese hongmu luxury furniture market. Mozambique lost over $100 million worth of rosewood to criminal networks between 2010 and 2018. Despite CITES protection and government bans, trafficking continues through corrupt border crossings into Tanzania." },

// 🇲🇲 MYANMAR
{ name:"Padauk — Pterocarpus", country:"Myanmar", lat:16.9, lng:96.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pterocarpus_indicus.jpg/640px-Pterocarpus_indicus.jpg", description:"Pterocarpus macrocarpus is Myanmar's national flower tree — its brilliant golden flowers blooming for just one day each April at Thingyan, the Water Festival New Year. The streets of Yangon and Mandalay are carpeted in fallen padauk flowers during the festival. Its reddish-brown timber is one of Southeast Asia's most prized cabinet woods." },
{ name:"Teak", country:"Myanmar", lat:18.0, lng:96.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tectona_grandis.jpg/640px-Tectona_grandis.jpg", description:"Tectona grandis made Myanmar famous — the country holds the world's largest remaining natural teak forests. Myanmar supplied teak for the British Royal Navy for over 200 years. Mandalay's Royal Palace was built entirely from teak. Myanmar's military government controls teak exports as a strategic state resource worth billions annually." },
{ name:"Orchid — Bulbophyllum", country:"Myanmar", lat:21.0, lng:97.0, type:"Orchid", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Bulbophyllum_rothschildianum.jpg/640px-Bulbophyllum_rothschildianum.jpg", description:"Myanmar has extraordinary orchid diversity — over 800 native species including dozens of spectacular Bulbophyllum and Dendrobium species found nowhere else. Myanmar's Kachin State cloud forests are a global centre of orchid endemism. Illegal orchid collection for international trade has devastated wild populations across Myanmar's northern highlands." },
{ name:"Thanaka Tree", country:"Myanmar", lat:21.9, lng:96.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Limonia_acidissima.jpg/640px-Limonia_acidissima.jpg", description:"Hesperethusa crenulata produces thanaka — the yellow paste worn on the faces of Myanmar's women and children for over 2,000 years as sunscreen, cosmetic and skin treatment. Thanaka bark is ground on a stone with water to produce the paste. Myanmar without thanaka is unimaginable — it is the most visible daily expression of Burmese cultural identity." },
{ name:"Dragon's Blood Rattan", country:"Myanmar", lat:17.5, lng:97.5, type:"Palm Vine", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Calamus_rotang.jpg/640px-Calamus_rotang.jpg", description:"Calamus species — rattans — form vast climbing thickets in Myanmar's Tenasserim forests. Myanmar is the world's largest rattan exporter. Rattan furniture, baskets and traditional Myanmar crafts are made entirely from forest-harvested rattan. Myanmar's Karen and Kayah communities have managed rattan forests sustainably for centuries using traditional rotational harvesting systems." },

// 🇳🇦 NAMIBIA
{ name:"Welwitschia", country:"Namibia", lat:-22.0, lng:14.5, type:"Living Fossil", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Welwitschia_mirabilis.jpg/640px-Welwitschia_mirabilis.jpg", description:"Welwitschia mirabilis is Namibia's most extraordinary plant — a living fossil that produces only two leaves in its entire lifetime, growing continuously for up to 2,000 years. Endemic to the Namib Desert, it survives entirely on fog moisture. Darwin called it the platypus of the plant kingdom. Some specimens were alive during the Roman Empire." },
{ name:"Quiver Tree — Kokerboom", country:"Namibia", lat:-27.5, lng:18.0, type:"Aloe Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Aloe_dichotoma.jpg/640px-Aloe_dichotoma.jpg", description:"Aloe dichotoma forms Namibia's iconic quiver tree forests near Keetmanshoop — one of Africa's most surreal landscapes. San Bushmen hollowed its spongy branches to make quivers for their arrows. Climate change is pushing quiver trees southward — Namibia's northern populations are dying as temperatures rise beyond their tolerance." },
{ name:"Devil's Claw", country:"Namibia", lat:-20.0, lng:18.5, type:"Herb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Harpagophytum_procumbens.jpg/640px-Harpagophytum_procumbens.jpg", description:"Harpagophytum procumbens grows across Namibia's Kalahari sandveld — its extraordinary hooked fruits grabbing the legs of passing animals for dispersal. Its root is one of the world's most important medicinal plants — anti-inflammatory compounds make it a global remedy for arthritis and back pain worth millions in export revenue annually." },
{ name:"Namibian Bottle Tree", country:"Namibia", lat:-21.5, lng:15.0, type:"Succulent Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pachypodium_lealii.jpg/640px-Pachypodium_lealii.jpg", description:"Pachypodium lealii, the bottle tree, grows on Namibia's rocky Kaokoveld hillsides — its massive swollen silver trunk storing water through years of drought. Endemic to northwestern Namibia and Angola, it produces spectacular white flowers at the tips of its stubby spiny branches. The Himba people use its latex as a wound sealant." },
{ name:"Namibian Myrrh — Corkwood", country:"Namibia", lat:-19.5, lng:13.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Commiphora_wildii.jpg/640px-Commiphora_wildii.jpg", description:"Commiphora wildii is endemic to Namibia's Kaokoveld — its peeling papery bark in shades of green, yellow and purple making it one of the world's most strikingly beautiful desert trees. The Himba use its aromatic resin mixed with butterfat to create otjize — the red paste they apply to their bodies and hair daily." },

// 🇳🇷 NAURU
{ name:"Coconut Palm", country:"Nauru", lat:-0.5, lng:166.9, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is the foundation of Nauruan life — on a raised coral island just 21km² with no rivers and minimal soil, the coconut palm provides food, drink and building material. Nauru's phosphate mining — which made it briefly the world's wealthiest nation per capita in the 1970s — destroyed over 80% of the island's vegetation." },
{ name:"Pandanus", country:"Nauru", lat:-0.53, lng:166.93, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pandanus_tectorius.jpg/640px-Pandanus_tectorius.jpg", description:"Pandanus tectorius grows along Nauru's coastal rim — one of the few plants that thrives in the island's shallow phosphate-rich soils. Its leaves are woven into traditional Nauruan mats and baskets. As phosphate mining winds down and Nauru attempts to restore its devastated interior, pandanus is one of the first plants reintroduced to mined land." },
{ name:"Breadfruit", country:"Nauru", lat:-0.52, lng:166.91, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis has been cultivated in Nauru for over 2,000 years. On an island with extremely limited agricultural land, breadfruit provides critical carbohydrates. Nauru faces an existential food security crisis — phosphate mining destroyed most arable land and rising sea levels threaten the freshwater lens the remaining trees depend on." },
{ name:"Beach Hibiscus — Hau", country:"Nauru", lat:-0.51, lng:166.92, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hibiscus_tiliaceus.jpg/640px-Hibiscus_tiliaceus.jpg", description:"Hibiscus tiliaceus lines Nauru's coastal fringe in dense thickets. Its flowers open yellow each morning and turn deep red by evening. Nauruan fishermen traditionally used its flexible branches to make fish traps. Its inner bark produces strong fibre used for rope and its lightweight timber for outrigger canoe components." },
{ name:"Mangrove", country:"Nauru", lat:-0.52, lng:166.90, type:"Tree", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Mangrove_trees.jpg/640px-Mangrove_trees.jpg", description:"Nauru once had small mangrove stands around Buada Lagoon — its only inland lake. Phosphate mining and development have eliminated virtually all mangrove vegetation. Nauru's government is now attempting to restore coastal vegetation as part of a broader effort to rehabilitate an island whose interior landscape was almost entirely destroyed by mining." },

// 🇳🇵 NEPAL
{ name:"Rhododendron — Lali Gurans", country:"Nepal", lat:27.7, lng:85.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Rhododendron_arboreum_flowers.jpg/640px-Rhododendron_arboreum_flowers.jpg", description:"Rhododendron arboreum is Nepal's national flower — lali gurans — blazing crimson across Himalayan hillsides from 1,500 to 3,600m each spring. Nepal has the world's greatest rhododendron diversity with 32 species. The flowers are eaten in salads and made into juice. A Himalayan spring without rhododendrons is unimaginable to Nepali people." },
{ name:"Himalayan Blue Poppy", country:"Nepal", lat:28.5, lng:83.9, type:"Alpine Flower", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Meconopsis_betonicifolia.jpg/640px-Meconopsis_betonicifolia.jpg", description:"Meconopsis grandis grows on Nepal's high Himalayan slopes above 3,500m in extraordinary sky-blue flowers. Called the Himalayan blue poppy, it was one of the most sensational botanical discoveries of the 20th century when brought to Britain in 1924. Nepal's Langtang and Annapurna regions are its primary habitat." },
{ name:"Yarsagumba — Caterpillar Fungus", country:"Nepal", lat:29.0, lng:83.5, type:"Parasitic Fungus", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ophiocordyceps_sinensis.jpg/640px-Ophiocordyceps_sinensis.jpg", description:"Ophiocordyceps sinensis grows above 3,500m in Nepal's Himalayan pastures — a parasitic fungus that kills ghost moth caterpillars and sprouts a mushroom from their head. Worth more than gold by weight in Chinese medicine, yarsagumba generates over $300 million annually for Nepal's mountain communities who harvest it each June." },
{ name:"Sal Tree", country:"Nepal", lat:27.5, lng:84.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Shorea_robusta_at_Pindari_Glacier_trek_route.jpg/640px-Shorea_robusta_at_Pindari_Glacier_trek_route.jpg", description:"Shorea robusta forms Nepal's Terai lowland forests — the Buddha was born beneath a sal tree at Lumbini. Nepal's Chitwan National Park protects magnificent sal forests sheltering Bengal tigers, one-horned rhinos and gharial crocodiles. Sal resin is burned as incense in Hindu and Buddhist temples across Nepal." },
{ name:"Himalayan Cedar — Deodar", country:"Nepal", lat:28.2, lng:84.5, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cedrus_deodara.jpg/640px-Cedrus_deodara.jpg", description:"Cedrus deodara — whose name means timber of the gods in Sanskrit — forms magnificent forests in Nepal's Mustang and Dolpo regions. Sacred in both Hinduism and Buddhism, ancient deodar groves surround Nepal's most important mountain temples. Its aromatic timber has been used for temple construction across the Himalayas for 3,000 years." },

// 🇳🇱 NETHERLANDS
{ name:"Tulip", country:"Netherlands", lat:52.3, lng:4.6, type:"Bulb", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tulipa_gesneriana.jpg/640px-Tulipa_gesneriana.jpg", description:"Tulipa gesneriana transformed the Netherlands — Tulipmania in 1637 was history's first recorded speculative financial bubble, with single bulbs selling for the price of a canal house. The Netherlands produces 3 billion tulip bulbs annually — 80% of the world's supply. Keukenhof near Lisse displays 7 million flowering bulbs each spring." },
{ name:"Flax", country:"Netherlands", lat:52.8, lng:5.5, type:"Annual Plant", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Linum_usitatissimum.jpg/640px-Linum_usitatissimum.jpg", description:"Linum usitatissimum was the foundation of the Dutch Golden Age — Dutch linen woven from flax was the finest in Europe and funded the VOC trading empire. Dutch Master painters painted on linen canvas. The Netherlands' linen industry financed Rembrandt, Vermeer and the greatest artistic flowering of the 17th century." },
{ name:"Hyacinth", country:"Netherlands", lat:52.2, lng:4.5, type:"Bulb", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hyacinthus_orientalis.jpg/640px-Hyacinthus_orientalis.jpg", description:"Hyacinthus orientalis is the Netherlands' most fragrant bulb crop — the Bollenstreek flower strip between Haarlem and Leiden turns purple, pink and white each April. The Dutch bulb industry generates over €1.5 billion annually. Dutch hyacinth breeders have created over 2,000 varieties since the first bulbs arrived from Ottoman Turkey in the 16th century." },
{ name:"Daffodil — Narcissus", country:"Netherlands", lat:52.5, lng:4.8, type:"Bulb", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Narcissus_pseudonarcissus.jpg/640px-Narcissus_pseudonarcissus.jpg", description:"Narcissus pseudonarcissus is cultivated across the Netherlands' famous bulb fields alongside tulips and hyacinths. Dutch breeders have created over 27,000 registered daffodil varieties — more than any other bulb. The Netherlands exports daffodil bulbs to over 100 countries, making Dutch floriculture the most sophisticated in the world." },
{ name:"Peat Moss — Veenmos", country:"Netherlands", lat:52.9, lng:6.0, type:"Moss", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Sphagnum_moss.jpg/640px-Sphagnum_moss.jpg", description:"Sphagnum moss built the Netherlands' raised bogs — once covering vast areas of Drenthe and Groningen. Dutch peat was cut for fuel for centuries, shaping the entire landscape. Ancient bog bodies — perfectly preserved humans sacrificed 2,000 years ago — are found in Dutch sphagnum bogs. Restoration of Dutch bogs is now a major conservation priority." },

// 🇳🇨 NEW CALEDONIA
{ name:"Araucaria — Colonnaire", country:"New Caledonia", lat:-21.5, lng:165.5, type:"Conifer", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Araucaria_columnaris.jpg/640px-Araucaria_columnaris.jpg", description:"Araucaria columnaris is New Caledonia's most iconic tree — its perfectly straight columnar form visible from ships far out at sea. Captain Cook used the columns of araucarias as navigation landmarks in 1774. New Caledonia has 13 endemic Araucaria species — more than any other place on Earth — relics of the ancient Gondwana supercontinent." },
{ name:"Amborella", country:"New Caledonia", lat:-21.0, lng:165.3, type:"Shrub", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Amborella_trichopoda.jpg/640px-Amborella_trichopoda.jpg", description:"Amborella trichopoda is the most scientifically important plant on Earth — the sole living representative of the most ancient lineage of flowering plants. New Caledonia's forests are a living laboratory of plant evolution. Understanding Amborella helps scientists reconstruct how all 300,000 flowering plant species on Earth evolved over 130 million years." },
{ name:"Niaouli", country:"New Caledonia", lat:-21.3, lng:165.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Melaleuca_quinquenervia.jpg/640px-Melaleuca_quinquenervia.jpg", description:"Melaleuca quinquenervia covers New Caledonia's western plains in papery-barked forests adapted to fire and flooding. Its essential oil — niaouli oil — has been used in French pharmaceutical preparations for over a century. New Caledonian healers use niaouli steam inhalation to treat respiratory infections — a practice validated by modern research." },
{ name:"Gombo — New Caledonian Palm", country:"New Caledonia", lat:-20.8, lng:164.9, type:"Palm", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pritchardia_pacifica.jpg/640px-Pritchardia_pacifica.jpg", description:"Burretiokentia hapala is endemic to New Caledonia's ultramafic soils — extraordinarily toxic nickel-rich substrates that most plants cannot survive. New Caledonia's ultramafic flora has evolved unique biochemical adaptations over millions of years. The island contains 25% of the world's nickel reserves and its endemic plants hyperaccumulate heavy metals in their tissues." },
{ name:"Sandalwood — Santal", country:"New Caledonia", lat:-21.8, lng:166.0, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Santalum_austrocaledonicum.jpg/640px-Santalum_austrocaledonicum.jpg", description:"Santalum austrocaledonicum produced New Caledonia's first major export boom — sandalwood traders stripped the islands bare between 1840 and 1865. New Caledonian sandalwood brought the first European contact and devastated Kanak society through disease and violence. Reforestation programs are slowly restoring sandalwood to New Caledonia's degraded hillsides." },

// 🇳🇿 NEW ZEALAND
{ name:"Silver Fern — Ponga", country:"New Zealand", lat:-41.3, lng:174.8, type:"Tree Fern", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cyathea_dealbata.jpg/640px-Cyathea_dealbata.jpg", description:"Cyathea dealbata is New Zealand's most powerful national symbol — the silver underside of its fronds was used by Māori to mark forest trails at night. The silver fern appears on the New Zealand All Blacks rugby jersey and is used as a symbol of national identity worldwide. Māori navigators used ponga fronds to mark the path home." },
{ name:"Kauri", country:"New Zealand", lat:-36.2, lng:174.3, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/wikipedia/commons/thumb/4/4e/Agathis_australis.jpg/640px-Agathis_australis.jpg", description:"Agathis australis is New Zealand's largest and most ancient native tree — Tāne Mahuta in Waipoua Forest is 2,000 years old and 51m tall. Kauri gum buried in swamps for 40,000 years is mined as copal. A microscopic water mould — Phytophthora agathidicida — now threatens to destroy all remaining kauri forests and has no known cure." },
{ name:"Pohutukawa — Christmas Tree", country:"New Zealand", lat:-36.5, lng:174.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Metrosideros_excelsa.jpg/640px-Metrosideros_excelsa.jpg", description:"Metrosideros excelsa blazes crimson along New Zealand's northern coastlines each December — earning it the name Christmas tree. In Māori tradition, pohutukawa roots reach down to the underworld — dying warriors descend to the spirit world via the roots of a pohutukawa at Cape Reinga, New Zealand's most sacred place." },
{ name:"Kōwhai", country:"New Zealand", lat:-43.5, lng:172.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Sophora_microphylla.jpg/640px-Sophora_microphylla.jpg", description:"Sophora microphylla is New Zealand's unofficial national flower — its cascading golden blooms each spring attracting tūī birds whose curved beaks are perfectly adapted to their shape. Māori used kōwhai bark medicinally and its wood for tools and weapons. The kōwhai and tūī together represent one of New Zealand's most iconic ecological partnerships." },
{ name:"Harakeke — Flax", country:"New Zealand", lat:-40.0, lng:175.6, type:"Flax", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Phormium_tenax.jpg/640px-Phormium_tenax.jpg", description:"Phormium tenax is the most culturally important plant in Māori culture — its leaves woven into kete baskets, kākahu cloaks and korowai ceremonial garments. Māori say the harakeke plant represents the family — the central shoot is the child, surrounded and protected by parent and grandparent leaves. New Zealand flax fibre was exported globally in the 19th century." },

// 🇳🇮 NICARAGUA
{ name:"Sacuanjoche — Frangipani", country:"Nicaragua", lat:12.1, lng:-86.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Plumeria_rubra.jpg/640px-Plumeria_rubra.jpg", description:"Plumeria rubra is Nicaragua's national flower — sacuanjoche — its white and yellow blooms filling Nicaraguan cities with fragrance each evening. The pre-Columbian Chorotega people considered it sacred. Nicaragua's poet Rubén Darío — the father of Spanish-language modernism — wrote of sacuanjoche in verses that shaped all Latin American poetry." },
{ name:"Madroño", country:"Nicaragua", lat:12.5, lng:-86.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Calycophyllum_candidissimum.jpg/640px-Calycophyllum_candidissimum.jpg", description:"Calycophyllum candidissimum is Nicaragua's national tree — madroño — its white flower-covered canopy making it look snow-dusted each December. Nicaraguans decorate their homes with madroño branches for the Purísima festival celebrating the Virgin Mary. Its extremely hard timber is used for tool handles and traditional Nicaraguan furniture." },
{ name:"Cacao", country:"Nicaragua", lat:13.0, lng:-85.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao has been cultivated in Nicaragua since pre-Columbian times. Nicaragua's Waslala region produces extraordinary organic cacao now sought by artisan chocolatiers globally. The Miskito and Rama communities of Nicaragua's Caribbean coast maintain wild cacao groves as part of traditional forest gardens unchanged for centuries." },
{ name:"Guanacaste", country:"Nicaragua", lat:12.8, lng:-87.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Enterolobium_cyclocarpum.jpg/640px-Enterolobium_cyclocarpum.jpg", description:"Enterolobium cyclocarpum produces Nicaragua's Pacific dry forest landscape. Its ear-shaped seed pods and massive spreading canopy define the Nicaraguan countryside. Lake Nicaragua — the largest lake in Central America — is fringed with ancient guanacaste trees whose canopies shelter great green macaws and white-fronted parrots." },
{ name:"Rosewood — Granadillo", country:"Nicaragua", lat:13.5, lng:-84.8, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dalbergia_retusa.jpg/640px-Dalbergia_retusa.jpg", description:"Dalbergia retusa, the Nicaraguan rosewood or granadillo, produces one of Central America's most beautiful timbers — used for marimba keys, guitar backs and luxury furniture. Nicaragua has lost over 70% of its granadillo trees to illegal logging. CITES Appendix II protection has slowed but not stopped trafficking of this spectacular wood." },

// 🇳🇪 NIGER
{ name:"Acacia — Gao", country:"Niger", lat:13.5, lng:2.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Acacia_senegal_MS_4724.jpg/640px-Acacia_senegal_MS_4724.jpg", description:"Faidherbia albida is Niger's most important tree — uniquely it drops its leaves in the rainy season and leafs out in the dry season, providing shade and fodder precisely when crops and livestock need it most. Niger pioneered farmer-managed natural regeneration of acacia — a silent revolution that has restored 5 million hectares of degraded Sahelian land." },
{ name:"Baobab", country:"Niger", lat:13.8, lng:2.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata grows across Niger's southern Sahel strip — ancient trees marking the sites of pre-Islamic Hausa and Zarma villages. Niger's baobab leaves are dried and ground into kuka powder — added to soups as a nutritional supplement. In a country facing chronic food insecurity baobab leaves provide critical vitamins and minerals." },
{ name:"Desert Rose — Adenium", country:"Niger", lat:16.0, lng:8.0, type:"Succulent", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Adenium_obesum.jpg/640px-Adenium_obesum.jpg", description:"Adenium obesum grows on Niger's Air Massif rocky outcrops — its swollen bottle-shaped trunk storing water through years of drought. Its brilliant pink flowers bloom after rare rains, transforming barren rocky hillsides. Tuareg people of the Air use its toxic latex on arrow tips for hunting. Niger's Air and Ténéré is a UNESCO World Heritage Site." },
{ name:"Date Palm", country:"Niger", lat:17.5, lng:13.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Phoenix_dactylifera_2.jpg/640px-Phoenix_dactylifera_2.jpg", description:"Phoenix dactylifera sustains Niger's oasis cities of Agadez, Bilma and Dirkou — ancient Tuareg caravan stops on the trans-Saharan route. Niger's Bilma salt pans and date palms have supplied caravans crossing the Sahara for over 1,000 years. Bilma dates and salt bars were the currency of the great Saharan trade network for centuries." },
{ name:"Moringa", country:"Niger", lat:13.3, lng:2.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Moringa_oleifera_Blanco1.jpg/640px-Moringa_oleifera_Blanco1.jpg", description:"Moringa oleifera is Niger's most important nutritional intervention tree. Called the miracle tree, its leaves contain more protein than eggs, more calcium than milk and more vitamin C than oranges. Niger's government distributes moringa seedlings to combat chronic childhood malnutrition — a condition affecting over 50% of children in this landlocked Sahelian nation." },

// 🇳🇬 NIGERIA
{ name:"Iroko", country:"Nigeria", lat:6.5, lng:3.4, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Milicia_excelsa.jpg/640px-Milicia_excelsa.jpg", description:"Milicia excelsa is Nigeria's most sacred and valuable timber tree. The Yoruba consider iroko inhabited by powerful spirits — cutting one requires elaborate propitiation ceremonies. Its golden interlocked grain timber has been used for centuries in Nigerian royal palace construction. Nigeria's Niger Delta forests once contained iroko trees of extraordinary size." },
{ name:"Oil Palm", country:"Nigeria", lat:5.5, lng:5.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Elaeis_guineensis.jpg/640px-Elaeis_guineensis.jpg", description:"Elaeis guineensis is native to Nigeria's Niger Delta and defines Nigerian cuisine and culture. Palm oil colours and flavours every Nigerian dish from jollof rice to egusi soup. Nigeria was once the world's largest palm oil producer before Malaysia overtook it. The Igbo, Yoruba and Ijaw peoples all have ancient palm oil traditions stretching back millennia." },
{ name:"Locust Bean — Iru", country:"Nigeria", lat:9.0, lng:7.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Parkia_biglobosa.jpg/640px-Parkia_biglobosa.jpg", description:"Parkia biglobosa produces iru — fermented locust beans — Nigeria's most important condiment. Called the African MSG, iru adds deep umami flavour to soups across all of Nigeria's 250 ethnic groups. Nigerian women have processed locust beans for over 3,000 years. The tree's red pompom flowers are pollinated exclusively by bats each night." },
{ name:"Shea Tree", country:"Nigeria", lat:11.5, lng:8.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3a/Vitellaria_paradoxa.jpg/640px-Vitellaria_paradoxa.jpg", description:"Vitellaria paradoxa covers northern Nigeria's savanna and is exclusively managed by Hausa women. Nigeria is the world's largest shea producer. Shea butter is used in Nigerian cooking, skin care and as a cocoa butter substitute in European chocolate. Northern Nigerian shea cooperatives have connected millions of rural women to global cosmetic markets." },
{ name:"Raffia Palm", country:"Nigeria", lat:5.0, lng:6.0, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Raffia_farinifera.jpg/640px-Raffia_farinifera.jpg", description:"Raphia hookeri produces palm wine central to all Nigerian ceremonies — the Igbo say no important event can happen without it. Nigerian palm wine is tapped fresh and drunk within hours or fermented into a stronger drink. The raffia palm's leaves produce the world's longest leaf — up to 25m — and its fibre is woven into the famous raffia cloth of southeastern Nigeria." },

// 🇳🇺 NIUE
{ name:"Coconut Palm", country:"Niue", lat:-19.0, lng:-169.9, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is the foundation of Niuean life on this remote raised coral island — one of the world's largest coral islands. Niue's extraordinary dark honey — produced by bees foraging on coconut and wild forest flowers — is considered among the Pacific's finest. Niue has been declared the world's first Dark Sky Nation, its coconut groves silhouetted against spectacular starry skies." },
{ name:"Tava — Pacific Cabbage Tree", country:"Niue", lat:-19.05, lng:-169.92, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pisonia_grandis.jpg/640px-Pisonia_grandis.jpg", description:"Pisonia grandis forms dense forest in Niue's island interior — its enormous soft leaves providing nesting material for seabirds. Niue's rainforest is extraordinarily intact for a Pacific island — over 60% of the island remains forested. The Niuean government has declared the entire island a UNESCO Biosphere Reserve." },
{ name:"Candlenut — Lama", country:"Niue", lat:-19.03, lng:-169.88, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Aleurites_moluccanus.jpg/640px-Aleurites_moluccanus.jpg", description:"Aleurites moluccanus is one of Niue's most useful traditional trees. Its oily nuts were burned as candles strung on palm midribs — providing light before electricity. Niuean healers use candlenut oil to treat skin conditions and the roasted nuts to flavour traditional earth oven dishes. Its large leaves are used to wrap food for cooking in the umu." },
{ name:"Frangipani — Pua", country:"Niue", lat:-19.02, lng:-169.91, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Plumeria_rubra.jpg/640px-Plumeria_rubra.jpg", description:"Plumeria obtusa grows across Niue's villages and coastal cliffs, its white fragrant flowers worn in hair and woven into leis for ceremonies. Niuean flower garlands — hiapo — are presented to honoured guests. Niue's tiny population of just 1,500 people maintains one of the Pacific's most intact traditional plant knowledge systems." },
{ name:"Wild Yam — Ufi", country:"Niue", lat:-19.04, lng:-169.93, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dioscorea_alata.jpg/640px-Dioscorea_alata.jpg", description:"Dioscorea alata has been the dietary cornerstone of Niue for over 2,000 years. Niuean yam cultivation is an ancient art — over 20 varieties were traditionally grown. The annual yam harvest festival — Tāoga Niue — is a celebration of Niuean identity and food sovereignty. Niuean giant yams can reach 50kg — some of the largest in the Pacific." },

// 🇰🇵 NORTH KOREA
{ name:"Magnolia — Mokran", country:"North Korea", lat:39.0, lng:125.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Magnolia_sieboldii.jpg/640px-Magnolia_sieboldii.jpg", description:"Magnolia sieboldii is North Korea's national flower — mokran — blooming white across Korean hillsides each May. Kim Il-sung decreed it the national flower in 1964. North Korea's Mount Paektu — the sacred birthplace of Korean civilisation — is surrounded by ancient magnolia forests. The mokran represents purity and the Korean people's indomitable spirit." },
{ name:"Korean Pine", country:"North Korea", lat:40.5, lng:128.0, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_koraiensis.jpg/640px-Pinus_koraiensis.jpg", description:"Pinus koraiensis forms magnificent forests across North Korea's northern mountains — its large edible seeds collected as pine nuts. Mount Paektu's ancient Korean pine forests are considered sacred in North Korean mythology. Korean pine seeds — among the largest of any pine — are a critical food source for bears, deer and red squirrels." },
{ name:"Korean Fir", country:"North Korea", lat:41.0, lng:128.5, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Abies_koreana.jpg/640px-Abies_koreana.jpg", description:"Abies koreana is endemic to the Korean Peninsula, growing on North Korea's highest peaks in the Diamond Mountains — Kumgang-san. Its distinctive upward-pointing blue-purple cones make it one of the world's most beautiful firs. North Korea's Kumgang Mountains were briefly open to South Korean tourists — botanists described extraordinary intact forest ecosystems." },
{ name:"Ginseng — Insam", country:"North Korea", lat:38.5, lng:127.0, type:"Herb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Panax_ginseng.jpg/640px-Panax_ginseng.jpg", description:"Panax ginseng has been cultivated in Korea for over 2,000 years and wild ginseng from North Korea's mountains commands extraordinary prices in Asian medicine markets. North Korean ginseng — cultivated in Kaesong and the Taedong River valley — is considered the world's finest. A single wild root can sell for thousands of dollars in traditional medicine markets." },
{ name:"Korean Arborvitae", country:"North Korea", lat:38.8, lng:125.5, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Thuja_koraiensis.jpg/640px-Thuja_koraiensis.jpg", description:"Thuja koraiensis is endemic to the Korean Peninsula, growing in North Korea's remote northern mountain forests. Its aromatic wood has been used in Korean temple construction for centuries. North Korea's inaccessibility to outside researchers means many of its endemic plant populations remain poorly documented and potentially threatened by deforestation." },

// 🇲🇰 NORTH MACEDONIA
{ name:"Macedonian Pine — Molika", country:"North Macedonia", lat:41.4, lng:20.8, type:"Conifer", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_peuce.jpg/640px-Pinus_peuce.jpg", description:"Pinus peuce is endemic to the Balkans and named the Macedonian pine — North Macedonia's most distinctive native tree. It forms ancient forests on Mount Pelister — one of North Macedonia's three national parks. Some molika trees in Pelister exceed 500 years old and the forest is listed as one of Europe's most important ancient woodland ecosystems." },
{ name:"Ohrid Lake Reed", country:"North Macedonia", lat:41.1, lng:20.8, type:"Aquatic Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Phragmites_australis.jpg/640px-Phragmites_australis.jpg", description:"Phragmites australis lines Lake Ohrid — one of Europe's oldest and deepest lakes at over 3 million years old. Lake Ohrid's unique ecosystem contains dozens of endemic species found nowhere else on Earth. Reed beds around Ohrid have been harvested for thatching and basket weaving by Macedonian lakeside villages for millennia." },
{ name:"Balkan Peony", country:"North Macedonia", lat:41.6, lng:21.7, type:"Wildflower", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Paeonia_officinalis.jpg/640px-Paeonia_officinalis.jpg", description:"Paeonia peregrina grows on North Macedonia's Jakupica mountain meadows in brilliant crimson blooms each May. North Macedonia's Šar Planina — straddling the Kosovo border — hosts extraordinary Balkan endemic plant diversity. Macedonian traditional medicine uses peony root to treat epilepsy — a use documented in Byzantine medical texts for 1,500 years." },
{ name:"Cornelian Cherry — Drjan", country:"North Macedonia", lat:41.9, lng:21.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cornus_mas.jpg/640px-Cornus_mas.jpg", description:"Cornus mas blooms brilliant yellow across North Macedonia's hillsides in February — the first tree to flower each year. Its tart red fruits are made into drjan jam and rakija brandy across Macedonia. In Macedonian folk tradition the cornelian cherry announces the end of winter. Its wood is the hardest in the Balkan forest — used for tool handles and walking sticks." },
{ name:"Wild Tulip — Tulipa macedonica", country:"North Macedonia", lat:41.7, lng:22.5, type:"Bulb", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tulipa_macedonica.jpg/640px-Tulipa_macedonica.jpg", description:"Tulipa macedonica is endemic to North Macedonia and neighbouring Bulgaria — a delicate yellow tulip found only on a handful of limestone hillsides in the Strumica valley. One of Europe's rarest endemic plants, its tiny population is threatened by agricultural expansion. North Macedonia has passed strict protection laws but enforcement remains challenging." },

// 🇲🇵 NORTHERN MARIANA ISLANDS
{ name:"Flame Tree — Trongkon Guafi", country:"Northern Mariana Islands", lat:15.2, lng:145.7, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Delonix_regia.jpg/640px-Delonix_regia.jpg", description:"Delonix regia blazes scarlet across Saipan and Tinian each spring — one of the tropical Pacific's most spectacular flowering events. Introduced from Madagascar, it has become completely integrated into Chamorro cultural identity. The flame tree festival on Saipan each April celebrates the blooming with parades, music and traditional Chamorro dance." },
{ name:"Betel Nut — Pugua", country:"Northern Mariana Islands", lat:15.1, lng:145.7, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Areca_catechu.jpg/640px-Areca_catechu.jpg", description:"Areca catechu — the betel nut palm — is central to Chamorro cultural identity across the Mariana Islands. Chewing betel nut wrapped in pepper leaf with lime is a social ritual practiced for over 3,000 years. Offering pugua to guests is a fundamental expression of Chamorro hospitality and respect. Its red-staining juice colours the teeth of regular users." },
{ name:"Coconut Palm — Niyok", country:"Northern Mariana Islands", lat:15.3, lng:145.8, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is inseparable from Chamorro life — its Chamorro name niyok appears in the oldest oral traditions of the Mariana Islands. Coconut cream is the base of Chamorro kelaguen and other traditional dishes. The Northern Mariana Islands' extraordinary WWII history — Tinian was the base for the Enola Gay — unfolded beneath coconut palms." },
{ name:"Cycad — Fadang", country:"Northern Mariana Islands", lat:15.18, lng:145.72, type:"Cycad", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cycas_circinalis.jpg/640px-Cycas_circinalis.jpg", description:"Cycas micronesica is endemic to the Mariana Islands — a living fossil unchanged for 200 million years. Its seeds — fadang — were ground into flour by ancient Chamorros as an emergency food. A devastating invasive scale insect has killed over 90% of Guam's cycads. The Northern Mariana Islands' populations are among the last healthy cycad forests in Micronesia." },
{ name:"Tangan-Tangan — Lead Tree", country:"Northern Mariana Islands", lat:15.15, lng:145.75, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Leucaena_leucocephala.jpg/640px-Leucaena_leucocephala.jpg", description:"Leucaena leucocephala was airdropped across Saipan and Tinian by the US military after WWII to prevent erosion on bombed and cleared land. It took over so completely it now covers most of the islands' lowlands. Despite being invasive, Chamorros have incorporated it into daily life — using its seeds as beads and its wood for fuel." },

// 🇳🇴 NORWAY
{ name:"Mountain Heather — Røsslyng", country:"Norway", lat:60.5, lng:8.5, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Calluna_vulgaris.jpg/640px-Calluna_vulgaris.jpg", description:"Calluna vulgaris turns Norway's vast coastal heathlands purple each August — one of Europe's most spectacular seasonal landscapes. Norway's Jæren and Lista heathlands are ancient cultural landscapes shaped by Viking-age burning and grazing. Norwegian heather honey is prized for its intense gelatinous character. Heather beer brewed from its flowers is one of the world's oldest beverages." },
{ name:"Downy Birch — Bjørk", country:"Norway", lat:63.0, lng:14.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Betula_pendula_Moscow.jpg/640px-Betula_pendula_Moscow.jpg", description:"Betula pubescens is Norway's most common tree — the tree of the Norwegian fjord landscape, its white trunks reflected in still dark water. Norwegian birch sap — bjørkesaft — is collected each spring and drunk as a tonic. Viking longhouses were roofed with birch bark tiles. Norway's birch forests are moving rapidly uphill as the climate warms." },
{ name:"Cloudberry — Multe", country:"Norway", lat:70.0, lng:25.0, type:"Berry", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rubus_chamaemorus.jpg/640px-Rubus_chamaemorus.jpg", description:"Rubus chamaemorus is Norway's most treasured wild fruit — its amber berries appearing on the Norwegian 50-øre coin before it was discontinued. Cloudberry picking spots in Norwegian mountains are family secrets passed down for generations. Norwegian law grants every person the right to pick cloudberries — a fundamental freedom called allemannsretten." },
{ name:"Norway Spruce — Gran", country:"Norway", lat:61.0, lng:9.0, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Picea_abies.jpg/640px-Picea_abies.jpg", description:"Picea abies is Norway's most important timber tree — Norwegian spruce built the stave churches of the Viking age, the world's oldest wooden buildings. Norway donates a spruce to London's Trafalgar Square every Christmas — a tradition since 1947 thanking Britain for WWII support. Old Tjikko in Sweden, a Norway spruce, is the world's oldest living tree at 9,550 years." },
{ name:"Arctic Poppy — Svalbardvalmue", country:"Norway", lat:78.0, lng:15.0, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Papaver_dahlianum.jpg/640px-Papaver_dahlianum.jpg", description:"Papaver dahlianum is endemic to Svalbard — Norway's Arctic archipelago — blooming in vivid yellow and white on the world's most northerly flowering plant communities. Svalbard's Global Seed Vault, buried in permafrost, stores 1.3 million seed samples from every country on Earth — the ultimate insurance policy for global food security located among arctic poppies." },

// 🇴🇲 OMAN
{ name:"Frankincense Tree — Luban", country:"Oman", lat:17.0, lng:54.0, type:"Tree", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Boswellia_sacra.jpg/640px-Boswellia_sacra.jpg", description:"Boswellia sacra is Oman's most iconic plant — the Dhofar region of southern Oman is the world's primary source of the finest frankincense. Traded for over 5,000 years along the ancient Incense Route, Omani luban was burned in Egyptian temples, Roman basilicas and Chinese imperial courts. The Dhofar frankincense landscape is a UNESCO World Heritage Site." },
{ name:"Date Palm — Nakhl", country:"Oman", lat:23.6, lng:58.6, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Phoenix_dactylifera_2.jpg/640px-Phoenix_dactylifera_2.jpg", description:"Phoenix dactylifera has been cultivated in Oman for over 5,000 years — Oman's ancient falaj irrigation systems, a UNESCO World Heritage Site, were built specifically to water date palm plantations. Oman has over 250 named date varieties. The Omani fardh date is considered among the finest in the Arabian Peninsula and is gifted to foreign dignitaries." },
{ name:"Dragon Blood Tree", country:"Oman", lat:17.5, lng:54.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Dragon_blood_tree_Socotra.jpg/640px-Dragon_blood_tree_Socotra.jpg", description:"Dracaena serrulata grows on Oman's Dhofar mountains — one of the Arabian Peninsula's most extraordinary plant species. Its red resin — dragon's blood — has been used in Omani traditional medicine and as a varnish for centuries. Oman's Dhofar region receives monsoon rains from the Indian Ocean, creating a unique green landscape in an otherwise arid peninsula." },
{ name:"Ghaf Tree", country:"Oman", lat:23.0, lng:57.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Prosopis_cineraria.jpg/640px-Prosopis_cineraria.jpg", description:"Prosopis cineraria survives Oman's harshest desert conditions by sending roots down 30m to reach groundwater. Bedouin communities of Oman's interior have relied on ghaf pods to feed their camels and goats through summer droughts for millennia. Ancient ghaf trees mark the sites of traditional Bedouin encampments across Oman's vast gravel plains." },
{ name:"Wild Rose of Jebel Akhdar", country:"Oman", lat:23.1, lng:57.7, type:"Shrub", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_damascena.jpg/640px-Rosa_damascena.jpg", description:"Rosa damascena has been cultivated on Oman's Jebel Akhdar — Green Mountain — at 2,000m altitude for centuries. Omani rose water distilled each spring is the finest in Arabia — used in Omani halwa sweets, coffee and perfume. The Jebel Akhdar rose harvest each March draws visitors from across the Gulf to watch the predawn picking of millions of pink blooms." },

// 🇵🇰 PAKISTAN
{ name:"Chilghoza Pine", country:"Pakistan", lat:36.0, lng:71.5, type:"Conifer", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_gerardiana.jpg/640px-Pinus_gerardiana.jpg", description:"Pinus gerardiana grows in Pakistan's Hindu Kush and Sulaiman mountains — its large edible seeds the most prized pine nuts in the world. Chilghoza pine nuts are harvested by Pashtun and Baloch communities who have managed these forests for centuries. A single productive tree can earn a family more than a month's wages in a single harvest season." },
{ name:"Deodar Cedar", country:"Pakistan", lat:35.5, lng:72.3, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cedrus_deodara.jpg/640px-Cedrus_deodara.jpg", description:"Cedrus deodara forms magnificent forests across Pakistan's Kaghan, Swat and Chitral valleys. Pakistan's Kalash people — the last pagan community of the Hindu Kush — consider ancient deodar groves sacred sites of their gods. Pakistan's deodar forests are among the most important timber resources in South Asia." },
{ name:"Jasmine — Chambeli", country:"Pakistan", lat:30.2, lng:67.0, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Jasminum_officinale.jpg/640px-Jasminum_officinale.jpg", description:"Jasminum officinale is Pakistan's national flower — chambeli — its white star-shaped flowers woven into garlands presented to honoured guests across the country. Pakistani women wear jasmine garlands in their hair at weddings and festivals. Pakistan's Peshawar valley produces some of the finest jasmine absolute used in global perfumery." },
{ name:"Lotus — Kanwal", country:"Pakistan", lat:30.5, lng:72.5, type:"Aquatic Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Nelumbo_nucifera_MS_4967.jpg/640px-Nelumbo_nucifera_MS_4967.jpg", description:"Nelumbo nucifera blooms in Pakistan's Punjab wetlands and Indus River floodplains. The lotus has been sacred in the Indus Valley civilisation for over 5,000 years — appearing on ancient seals from Mohenjo-daro. Pakistan's Keenjhar and Manchhar lakes host spectacular lotus beds visited by millions of migratory birds each winter." },
{ name:"Siran Valley Walnut", country:"Pakistan", lat:34.6, lng:73.1, type:"Tree", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Juglans_regia.jpg/640px-Juglans_regia.jpg", description:"Juglans regia forms ancient walnut forests in Pakistan's Siran Valley and Kaghan. Pakistani mountain walnut communities have harvested wild walnuts for over 2,000 years using traditional management systems. Pakistan's Hindukush walnut populations are genetically distinct from Central Asian varieties and represent an important breeding resource." },

// 🇵🇼 PALAU
{ name:"Taro — Dait", country:"Palau", lat:7.5, lng:134.6, type:"Root Crop", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Colocasia_esculenta.jpg/640px-Colocasia_esculenta.jpg", description:"Colocasia esculenta has been the dietary cornerstone of Palauan civilisation for over 3,000 years. Palauan taro paddies — dait — are sophisticated engineered wetlands maintained by women's clans. Palau has over 40 traditional taro varieties. The Palauan taro system is a UNESCO-recognised traditional agricultural heritage of extraordinary sophistication." },
{ name:"Mangrove", country:"Palau", lat:7.3, lng:134.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Mangrove_trees.jpg/640px-Mangrove_trees.jpg", description:"Palau's Rock Islands are surrounded by one of the world's most spectacular mangrove ecosystems — its roots sheltering the extraordinary marine biodiversity that makes Palau one of the world's top dive destinations. Palau's mangroves connect to jellyfish lakes, coral gardens and dugong feeding grounds in an integrated coastal ecosystem of global significance." },
{ name:"Coconut Palm", country:"Palau", lat:7.5, lng:134.6, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is fundamental to Palauan life — coconut cream flavours virtually every traditional dish and coconut toddy is tapped and fermented across the islands. Palau's ancient stone money — rai — was carved on Yap using tools made from coconut shell. Palauan oral traditions credit the coconut palm as the first tree planted by the creator god Uchelianged." },
{ name:"Betel Nut — Buuch", country:"Palau", lat:7.4, lng:134.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Areca_catechu.jpg/640px-Areca_catechu.jpg", description:"Areca catechu is central to Palauan social life — chewing betel nut with pepper leaf and lime is practiced at every gathering, ceremony and meeting. Offering buuch is the primary Palauan expression of hospitality and respect. The distinctive red-stained teeth of regular betel chewers have been a feature of Palauan society for over 3,000 years." },
{ name:"Breadfruit — Meduu", country:"Palau", lat:7.35, lng:134.55, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis has sustained Palauan populations for over 2,000 years. Palauan breadfruit is fermented in pits — a preservation technique allowing communities to store food for years against drought and typhoon. Palau's extraordinary marine protected areas — covering 80% of its waters — ensure the reef fish that complement breadfruit as a dietary staple are preserved for future generations." },

// 🇵🇸 PALESTINE
{ name:"Olive Tree", country:"Palestine", lat:31.9, lng:35.2, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg/640px-Olea_europaea_subsp._europaea_var._europea_MHNT.BOT.2007.40.246.jpg", description:"Olea europaea is the most powerful symbol of Palestinian identity and resistance. Palestine has over 10 million olive trees — some over 3,000 years old on the terraced hillsides of Nablus and Ramallah. Palestinian olive oil is among the world's finest. The olive harvest each October is the most important event in Palestinian agricultural and cultural life." },
{ name:"Palestinian Sunbird Plant — Qaysum", country:"Palestine", lat:31.5, lng:35.1, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Sternbergia_clusiana.jpg/640px-Sternbergia_clusiana.jpg", description:"Sternbergia clusiana blooms across Palestine's hillsides in brilliant yellow each autumn — one of the Holy Land's most beautiful wildflowers. Palestine's Mediterranean flora contains extraordinary diversity — the region was a refuge for plants during Ice Age glaciations. Palestinian botanists have documented over 2,700 plant species in one of the world's smallest territories." },
{ name:"Wild Cyclamen — Raqqad", country:"Palestine", lat:32.0, lng:35.3, type:"Bulb", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cyclamen_persicum.jpg/640px-Cyclamen_persicum.jpg", description:"Cyclamen persicum carpets Palestine's West Bank hills and Gaza coastal plain in pink and white blooms each winter. The cyclamen is a beloved Palestinian wildflower — its image appears in Palestinian embroidery and artwork as a symbol of the land. Palestine's tatreez embroidery tradition encodes landscape plants including cyclamen into geometric patterns." },
{ name:"Sage — Maramiyya", country:"Palestine", lat:31.8, lng:35.2, type:"Herb", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Salvia_officinalis.jpg/640px-Salvia_officinalis.jpg", description:"Salvia officinalis grows wild across Palestine's limestone hills and is the most important medicinal herb in Palestinian traditional medicine. Maramiyya tea is drunk daily across Palestine for digestion, relaxation and respiratory health. Palestinian herb markets in Jerusalem's Old City have sold wild-harvested sage from the surrounding hills for over 1,000 years." },
{ name:"Carob — Kharrub", country:"Palestine", lat:31.7, lng:35.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ceratonia_siliqua.jpg/640px-Ceratonia_siliqua.jpg", description:"Ceratonia siliqua has grown on Palestine's hills since Biblical times — the pods of the carob are believed to be the locusts eaten by John the Baptist. Ancient carob trees mark abandoned Palestinian villages. The carat — the unit of gemstone weight — derives from the extraordinary consistency of the carob seed weight, used by Palestinian jewellers for centuries." },

// 🇵🇦 PANAMA
{ name:"Panama Tree — Cuipo", country:"Panama", lat:8.9, lng:-79.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cavanillesia_platanifolia.jpg/640px-Cavanillesia_platanifolia.jpg", description:"Cavanillesia platanifolia is Panama's national tree — its enormous bare trunk rising 50m above the forest canopy. Panama's Darién Gap — one of Earth's last great wilderness areas — shelters extraordinary biodiversity. The cuipo's hollow trunk was used by indigenous Emberá people as a drum and its bark to make traditional clothing." },
{ name:"Orchid — Flor del Espíritu Santo", country:"Panama", lat:8.9, lng:-79.5, type:"Orchid", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Peristeria_elata.jpg/640px-Peristeria_elata.jpg", description:"Peristeria elata is Panama's national flower — the holy ghost orchid — its white waxy flower containing a tiny dove-shaped structure in its centre. Found in Panama's cloud forests and lowland savannas, it has been collected almost to extinction. Panama celebrates Orchid Festival each year and has strict laws protecting this magnificent flower." },
{ name:"Cacao", country:"Panama", lat:9.1, lng:-79.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao has been cultivated by Panama's Ngäbe-Buglé and Kuna indigenous communities for thousands of years. Panama's Bocas del Toro produces extraordinary organic cacao now sought by the world's finest chocolatiers. The Kuna people of the San Blas islands drink chicha de cacao — a fermented cacao beverage — at every important ceremony." },
{ name:"Golden Frog Plant — Heliconia", country:"Panama", lat:8.5, lng:-80.0, type:"Tropical Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Heliconia_wagneriana.jpg/640px-Heliconia_wagneriana.jpg", description:"Heliconia species line Panama's forest trails in spectacular red, yellow and orange bracts — their water-filled flower bases the exclusive breeding habitat of the critically endangered Panamanian golden frog. Panama's extraordinary biodiversity — where North and South American species meet — makes it one of the world's most important biological corridors." },
{ name:"Balsa", country:"Panama", lat:8.0, lng:-80.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ochroma_pyramidale.jpg/640px-Ochroma_pyramidale.jpg", description:"Ochroma pyramidale is the world's lightest commercial timber — balsa wood from Panama was used to build Thor Heyerdahl's Kon-Tiki raft that crossed the Pacific in 1947. Panama's indigenous communities have used balsa to make rafts, floats and traditional masks for centuries. Its extraordinary fast growth — 30m in 10 years — makes it a vital pioneer species in regenerating tropical forest." },

// 🇵🇬 PAPUA NEW GUINEA
{ name:"Bird of Paradise Flower", country:"Papua New Guinea", lat:-9.4, lng:147.2, type:"Tropical Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Strelitzia_reginae.jpg/640px-Strelitzia_reginae.jpg", description:"Papua New Guinea takes its name from the bird of paradise — and its forests shelter 38 of the world's 42 bird of paradise species. The plants that feed them — wild figs, fruiting trees and forest flowers — are the most biodiverse assemblage in the Pacific. PNG's Highlands contain plant communities undescribed by science, with new species discovered every year." },
{ name:"Betel Nut — Buai", country:"Papua New Guinea", lat:-9.5, lng:147.1, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Areca_catechu.jpg/640px-Areca_catechu.jpg", description:"Areca catechu — buai — is Papua New Guinea's most universal social plant. Chewing betel nut with mustard stick and lime is practiced by over 80% of the population across all 800+ language groups. The buai market is PNG's largest informal economy. Port Moresby's streets are permanently stained red from the ubiquitous betel nut spitting." },
{ name:"Pandanus — Karuka", country:"Papua New Guinea", lat:-5.5, lng:144.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pandanus_jiulianettii.jpg/640px-Pandanus_jiulianettii.jpg", description:"Pandanus jiulianettii — karuka — is the Highland Papuans' most important traditional food tree. Its large oily seeds are the primary protein source for Highland communities during karuka season. PNG Highlanders travel for days to harvest karuka in mountain forests above 2,000m. The karuka season determines the rhythm of Highland Papuan social and ceremonial life." },
{ name:"Black Palm — Palmwood", country:"Papua New Guinea", lat:-6.0, lng:145.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Caryota_urens.jpg/640px-Caryota_urens.jpg", description:"Caryota rumphiana, the black palm, produces one of the world's hardest natural materials — its jet-black outer shell harder than most metals. PNG warriors made their traditional bows and spears from black palm. Its starchy pith — sago — is the dietary staple of millions of people in PNG's lowland swamp areas and provides more calories per hectare than any other crop." },
{ name:"Orchid — Dendrobium", country:"Papua New Guinea", lat:-8.0, lng:146.0, type:"Orchid", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dendrobium_phalaenopsis.jpg/640px-Dendrobium_phalaenopsis.jpg", description:"Papua New Guinea has the world's greatest orchid diversity — over 3,000 species including hundreds found nowhere else. Dendrobium phalaenopsis — the PNG national flower — produces cascading sprays of pink and purple blooms. PNG's orchid forests on the Kokoda Track are among the most biodiverse plant communities on Earth. New orchid species are still discovered in PNG's remote mountain forests each year." },

// 🇵🇾 PARAGUAY
{ name:"Lapacho — Tajy", country:"Paraguay", lat:-25.3, lng:-57.6, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Handroanthus_heptaphyllus.jpg/640px-Handroanthus_heptaphyllus.jpg", description:"Handroanthus heptaphyllus is Paraguay's national tree — tajy — its spectacular pink flowers bursting from bare branches each August before any leaves appear. Entire Paraguayan hillsides turn pink in the tajy flowering season. Its extremely hard timber — called Paraguay rosewood — is used for fine furniture and flooring across South America." },
{ name:"Mburucuyá — Passion Flower", country:"Paraguay", lat:-25.0, lng:-57.0, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Passiflora_caerulea.jpg/640px-Passiflora_caerulea.jpg", description:"Passiflora caerulea is Paraguay's national flower — mburucuyá — its extraordinary complex blooms combining blue, white and purple in a flower that Spanish missionaries believed depicted the instruments of Christ's Passion. Paraguay has extraordinary passion flower diversity with over 50 native species. Passion fruit juice — mburucuyá — is Paraguay's most beloved drink." },
{ name:"Yerba Mate", country:"Paraguay", lat:-25.5, lng:-55.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Ilex_paraguariensis.jpg/640px-Ilex_paraguariensis.jpg", description:"Ilex paraguariensis is native to Paraguay's Atlantic Forest — the Guaraní people have drunk tereré and mate from this plant for over 2,000 years. Paraguay consumes more yerba mate per capita than any country on Earth. The Guaraní word for this plant — ka'a — means simply herb, reflecting how fundamental it is to indigenous identity." },
{ name:"Ceibo", country:"Paraguay", lat:-27.0, lng:-56.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Erythrina_crista-galli.jpg/640px-Erythrina_crista-galli.jpg", description:"Erythrina crista-galli blazes crimson along Paraguay's Río Paraguay riverbanks — its spectacular flowers reflected in the dark water. Also the national flower of Argentina and Uruguay, the ceibo tree unites the Río de la Plata region culturally. Guaraní communities use its bark medicinally and its wood to make traditional musical instruments." },
{ name:"Palo Borracho — Toborochi", country:"Paraguay", lat:-23.0, lng:-58.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Chorisia_speciosa.jpg/640px-Chorisia_speciosa.jpg", description:"Ceiba speciosa — the toborochi or drunk tree — grows across Paraguay's Chaco in spectacular bottle-shaped trunks covered in pink flowers. Guaraní legend says a goddess hid her daughter inside a toborochi trunk to protect her from harm — hence its name meaning shelter in Guaraní. Its seed fibre was used to stuff mattresses and its trunk stores water through the Chaco's brutal dry season." },

// 🇵🇪 PERU
{ name:"Cinchona — Quina", country:"Peru", lat:-13.5, lng:-71.9, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cinchona_pubescens.jpg/640px-Cinchona_pubescens.jpg", description:"Cinchona officinalis is Peru's national tree — the source of quinine that cured malaria and enabled European colonisation of the tropics. Peru's national coat of arms features the cinchona tree. The bark of this Andean cloud forest tree saved more lives than any other plant in history — billions of people were treated with quinine before synthetic alternatives existed." },
{ name:"Cantuta — Flor del Inca", country:"Peru", lat:-13.5, lng:-72.0, type:"Shrub", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cantua_buxifolia.jpg/640px-Cantua_buxifolia.jpg", description:"Cantua buxifolia is Peru's national flower — the sacred flower of the Inca. Its cascading tubular flowers in red, white and yellow were woven into garlands for Inca ceremonies at Machu Picchu and Cusco. Growing only in Andean cloud forests between 2,500 and 3,800m, it was considered a direct link between the human and divine worlds." },
{ name:"Potato — Papa", country:"Peru", lat:-13.0, lng:-74.0, type:"Root Crop", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Potato_and_cross_section.jpg/640px-Potato_and_cross_section.jpg", description:"Solanum tuberosum was domesticated in Peru's Andes over 8,000 years ago — the most important food crop in human history after wheat and rice. Peru has over 4,000 potato varieties — more than the rest of the world combined. The International Potato Center in Lima maintains the world's largest potato gene bank. Without the Peruvian potato, European history would have been unrecognisable." },
{ name:"Victoria Amazonica", country:"Peru", lat:-3.7, lng:-73.2, type:"Water Lily", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Victoria_amazonica2.jpg/640px-Victoria_amazonica2.jpg", description:"Victoria amazonica grows in Peru's Amazon basin — its circular pads reaching 3m across. Peru contains over 60% of the Amazon rainforest — the world's greatest repository of plant diversity with an estimated 50,000 plant species. Peru's Manu National Park is the world's most biodiverse protected area — a single hectare can contain more tree species than all of Europe." },
{ name:"Cat's Claw — Uña de Gato", country:"Peru", lat:-10.0, lng:-75.0, type:"Vine", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Uncaria_tomentosa.jpg/640px-Uncaria_tomentosa.jpg", description:"Uncaria tomentosa climbs through Peru's Amazon rainforest — its hook-shaped thorns resembling cat's claws. Used by Amazonian indigenous peoples for over 2,000 years to treat inflammation, arthritis and immune disorders, it became one of the world's most commercially important medicinal plants in the 1990s. Peru is the world's primary exporter of cat's claw bark." },

// 🇵🇭 PHILIPPINES
{ name:"Sampaguita — Arabian Jasmine", country:"Philippines", lat:14.6, lng:121.0, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Jasminum_sambac.jpg/640px-Jasminum_sambac.jpg", description:"Jasminum sambac is the Philippines' national flower — sampaguita — its tiny white intensely fragrant flowers strung into garlands presented to honoured guests, worn by students at graduation and placed on religious images. Filipino street vendors sell sampaguita garlands at intersections across Manila. Its fragrance is inseparable from Filipino identity." },
{ name:"Narra", country:"Philippines", lat:10.0, lng:123.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pterocarpus_indicus.jpg/640px-Pterocarpus_indicus.jpg", description:"Pterocarpus indicus is the Philippines' national tree — its golden yellow flowers carpeting streets each spring. Narra's reddish fragrant timber is the most prized in the Philippines, used for the finest furniture and traditional bahay na bato houses. The Philippines banned narra export in 1992 but illegal logging continues to threaten old-growth forests." },
{ name:"Waling-Waling Orchid", country:"Philippines", lat:6.1, lng:125.1, type:"Orchid", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Vanda_sanderiana.jpg/640px-Vanda_sanderiana.jpg", description:"Vanda sanderiana — waling-waling — is the queen of Philippine orchids, endemic to Mindanao's Mount Apo. Its spectacular blooms in pink, white and dark red are considered the most beautiful orchid in Asia. The Bagobo people of Mindanao consider it sacred. Over-collection for international orchid trade has made wild plants virtually extinct outside protected areas." },
{ name:"Abacá — Manila Hemp", country:"Philippines", lat:13.0, lng:124.0, type:"Banana Relative", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Musa_textilis.jpg/640px-Musa_textilis.jpg", description:"Musa textilis is endemic to the Philippines and produces the world's strongest natural fibre — abacá or Manila hemp. US paper currency, tea bags and speciality filters are made from Philippine abacá. The Philippines produces 85% of the world's abacá supply. Traditional Filipino weaving using abacá creates extraordinary textiles recognised by UNESCO as intangible cultural heritage." },
{ name:"Rafflesia — Corpse Flower", country:"Philippines", lat:7.8, lng:124.3, type:"Holoparasite", status:"Critically Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Rafflesia_speciosa.jpg/640px-Rafflesia_speciosa.jpg", description:"The Philippines has the world's second highest Rafflesia diversity after Indonesia with over 13 endemic species found nowhere else. Rafflesia speciosa grows only in the forests of Panay island. Each bloom takes 9 months to develop and lasts just 5–7 days. Philippines Rafflesia populations are critically threatened by forest loss and collection by curious visitors." },

// 🇵🇱 POLAND
{ name:"Corn Poppy — Mak", country:"Poland", lat:52.2, lng:21.0, type:"Wildflower", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Papaver_rhoeas.jpg/640px-Papaver_rhoeas.jpg", description:"Papaver rhoeas blazes red across Polish grain fields each June — an iconic image of the Polish countryside. Polish poppy seed — mak — is fundamental to Polish baking, filling the traditional makowiec poppy seed roll eaten at Christmas. Poland consumes more poppy seeds per capita than any country in Europe. The poppy has deep symbolic resonance in Polish remembrance traditions." },
{ name:"European Bison Grass — Żubrówka", country:"Poland", lat:52.7, lng:23.8, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hierochloe_odorata.jpg/640px-Hierochloe_odorata.jpg", description:"Hierochloe odorata grows in Poland's Białowieża Forest — the last primeval forest in Europe and home of the European bison. A single blade of this grass placed in every bottle gives Żubrówka vodka its distinctive vanilla-hay flavour. Poland's Białowieża is a UNESCO World Heritage Site — its ancient oaks and hornbeams have never been logged." },
