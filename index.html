{ name:"Tulip — Lola", country:"Uzbekistan", lat:41.0, lng:71.7, type:"Bulb", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tulipa_kaufmanniana.jpg/640px-Tulipa_kaufmanniana.jpg", description:"Uzbekistan is one of the world's primary centres of wild tulip diversity — the Fergana and Chatkal mountains host dozens of wild species carpeting hillsides each spring. The tulip — lola — is Uzbekistan's national flower, its image woven into every suzani embroidery and carved into every Timurid architectural masterpiece. Uzbek wild tulips are the ancestors of all garden tulips worldwide." },

// 🇻🇺 VANUATU
{ name:"Kava — Nalnal", country:"Vanuatu", lat:-17.7, lng:168.3, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Piper_methysticum.jpg/640px-Piper_methysticum.jpg", description:"Piper methysticum is the sacred centre of Vanuatu's culture — Vanuatu has the greatest kava diversity on Earth with over 80 named varieties. Vanuatu kava is the world's strongest and most ceremonially significant. Every village on every island has a nakamal — kava drinking house — where men gather each evening. Vanuatu is widely regarded as the birthplace of kava culture, from which it spread across the Pacific." },
{ name:"Breadfruit — Uru", country:"Vanuatu", lat:-17.8, lng:168.4, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis has sustained Vanuatu's 83 inhabited islands for over 3,000 years. Vanuatu maintains extraordinary breadfruit diversity — over 50 traditional varieties carefully preserved by ni-Vanuatu farmers. Preserved fermented breadfruit — masi — stored underground in leaf-lined pits sustains communities through cyclone seasons. Vanuatu experiences more cyclones per year than any other country on Earth." },
{ name:"Cycad — Tree Fern", country:"Vanuatu", lat:-16.5, lng:167.5, type:"Tree Fern", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cyathea_arborea.jpg/640px-Cyathea_arborea.jpg", description:"Cyathea species form prehistoric forests on Vanuatu's volcanic islands. Vanuatu sits on the Pacific Ring of Fire — its islands are among the most volcanically active on Earth. Ambae, Tanna and Ambrym volcanoes create unique plant habitats found nowhere else. Vanuatu's extraordinary biodiversity across 83 islands — each with distinct languages and ecosystems — makes it one of the world's most remarkable archipelagos." },
{ name:"Sandalwood — Ahi", country:"Vanuatu", lat:-15.4, lng:167.2, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Santalum_album.jpg/640px-Santalum_album.jpg", description:"Santalum austrocaledonicum was harvested to near extinction in Vanuatu during the 19th century sandalwood rush — traders exchanged sandalwood for firearms that fuelled devastating inter-island warfare. Vanuatu sandalwood was the fragrant heartwood that built the Pacific trade economy. Small-scale sustainable sandalwood cultivation is being revived on Erromango island as a community forestry enterprise." },
{ name:"Coconut Palm", country:"Vanuatu", lat:-17.75, lng:168.32, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is fundamental to every aspect of Vanuatu life — copra was the nation's primary export for over a century. The extraordinary Vanuatu land dive ceremony — the origin of bungee jumping — takes place on Pentecost Island each April when men leap from 30m towers with vines tied to their ankles to ensure a good yam harvest. The ceremony is performed in coconut-palm forest." },

// 🇻🇦 VATICAN CITY
{ name:"Stone Pine — Pino Domestico", country:"Vatican City", lat:41.9, lng:12.45, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_pinea.jpg/640px-Pinus_pinea.jpg", description:"Pinus pinea lines the Vatican Gardens' magnificent allées — its distinctive umbrella-shaped canopy defining the Roman skyline for over 2,000 years. The Vatican Gardens covering 23 hectares contain some of Rome's finest stone pines planted by Renaissance popes. Stone pine kernels — pinoli — are the essential ingredient in Italian pesto and countless Roman dishes." },
{ name:"Roman Cypress", country:"Vatican City", lat:41.9, lng:12.46, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cupressus_sempervirens.jpg/640px-Cupressus_sempervirens.jpg", description:"Cupressus sempervirens punctuates the Vatican Gardens in soaring dark columns — the most enduring symbol of Italian landscape design. Roman cypresses have grown in the Vatican since the earliest Christian centuries. Their association with eternity and resurrection made them the sacred tree of Christian burial grounds across the Mediterranean. The Vatican's ancient cypresses are tended by a dedicated team of gardeners." },
{ name:"Bay Laurel — Alloro", country:"Vatican City", lat:41.902, lng:12.453, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Laurus_nobilis.jpg/640px-Laurus_nobilis.jpg", description:"Laurus nobilis grows throughout the Vatican Gardens — its leaves woven into crowns for Roman emperors and Christian saints alike. Bay laurel hedges border the Vatican's formal garden parterre laid out under Pope Paul III. Bay leaves from the Vatican Gardens are used in the Papal kitchens. The laurel's dual symbolism — Roman triumph and Christian martyrdom — makes it the perfect plant for the world's smallest state." },
{ name:"Holm Oak — Leccio", country:"Vatican City", lat:41.903, lng:12.451, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Quercus_ilex.jpg/640px-Quercus_ilex.jpg", description:"Quercus ilex forms the Vatican Gardens' ancient evergreen woodland — some trees dating to the Renaissance. The Vatican's holm oak grove shelters rare birds migrating through Rome. The Gardens have been cultivated continuously since the 13th century — making them among the world's longest continuously maintained gardens. Over 3,000 plant species grow within the Vatican's 0.44km²." },
{ name:"Rose — Rosa", country:"Vatican City", lat:41.901, lng:12.452, type:"Shrub", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Rosa_damascena.jpg/640px-Rosa_damascena.jpg", description:"Rosa species fill the Vatican Gardens' formal rose garden established by Pope John XXIII. The rose is the most sacred flower in Catholic tradition — associated with the Virgin Mary for over 1,500 years. The word rosary derives from rosarium — rose garden. The Vatican maintains rare heritage rose varieties including medieval monastery roses whose cultivation has been unbroken since the 9th century." },

// 🇻🇪 VENEZUELA
{ name:"Cattleya Orchid — Flor de Mayo", country:"Venezuela", lat:8.0, lng:-66.0, type:"Orchid", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cattleya_mossiae.jpg/640px-Cattleya_mossiae.jpg", description:"Cattleya mossiae is Venezuela's national flower — flor de mayo — its spectacular lavender and white blooms opening each May. Venezuela has over 1,500 native orchid species — one of the highest diversities in South America. The tepuis of Venezuela's Gran Sabana — ancient flat-topped sandstone mountains rising 3,000m above the jungle — host hundreds of endemic orchid species found nowhere else on Earth." },
{ name:"Moriche Palm — Ité", country:"Venezuela", lat:7.5, lng:-62.5, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Mauritia_flexuosa.jpg/640px-Mauritia_flexuosa.jpg", description:"Mauritia flexuosa forms vast palm swamps — morichales — across Venezuela's Llanos. The Warao people of the Orinoco Delta call the moriche the tree of life — it provides food, fibre, building material and the starchy larvae that are a protein staple. Venezuela's Llanos — the world's greatest wildlife spectacle outside Africa — is dominated by moriche palms stretching to the horizon." },
{ name:"Victoria amazonica — Giant Water Lily", country:"Venezuela", lat:7.0, lng:-65.0, type:"Water Lily", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8c/Victoria_amazonica2.jpg/640px-Victoria_amazonica2.jpg", description:"Victoria amazonica grows in Venezuela's Orinoco floodplain — its enormous leaves up to 3m across can support the weight of a child. The discovery of this plant by European botanists in 1837 caused a sensation — its structural engineering of ribbed floating pads inspired Joseph Paxton's design for London's Crystal Palace in 1851. Venezuela's Orinoco Delta is one of the world's great wetland wildernesses." },
{ name:"Araguaney — Yellow Poui", country:"Venezuela", lat:10.5, lng:-66.9, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tabebuia_chrysantha.jpg/640px-Tabebuia_chrysantha.jpg", description:"Tabebuia chrysantha is Venezuela's national tree — the araguaney — its brilliant golden canopy transforming Venezuela's dry forests each April. Rómulo Gallegos wrote that Venezuela turns to gold each spring when the araguaneys bloom. The araguaney blooms precisely once a year for exactly one week — Venezuelans say you can set your calendar by the araguaney's golden explosion." },
{ name:"Cacao", country:"Venezuela", lat:10.2, lng:-65.3, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/e/eb/Cacao-pod-k4637-14.jpg/640px-Cacao-pod-k4637-14.jpg", description:"Theobroma cacao — the Criollo variety — originated in Venezuela. Venezuelan Criollo cacao is the world's rarest and most prized chocolate — producing complex flavour notes of nuts, tobacco and dried fruit. Chuao village on Venezuela's Aragua coast has cultivated the same Criollo variety for over 400 years without genetic modification. A single bar of Chuao chocolate sells for over $20 in European luxury shops." },

// 🇻🇳 VIETNAM
{ name:"Lotus — Sen", country:"Vietnam", lat:21.0, lng:105.8, type:"Aquatic Plant", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b3/Nelumbo_nucifera_MS_4967.jpg/640px-Nelumbo_nucifera_MS_4967.jpg", description:"Nelumbo nucifera is Vietnam's national flower — the lotus rising from mud to bloom in perfect purity is the central metaphor of Vietnamese Buddhist philosophy. Hà Nội's Hồ Tây lake turns pink with lotus blooms each July. Vietnam's lotus tea — made by stuffing green tea inside lotus flowers overnight — is the country's most exquisite luxury product, sold for hundreds of dollars per kilogram." },
{ name:"Bamboo — Tre", country:"Vietnam", lat:16.0, lng:108.0, type:"Grass", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b2/Bamboo_garden.jpg/640px-Bamboo_garden.jpg", description:"Bambusa species cover over 1.5 million hectares of Vietnam — bamboo is woven into every aspect of Vietnamese life. Vietnamese folk legend describes bamboo as the symbol of resilience and community — its roots binding the nation together. Vietnamese soldiers used bamboo punji stakes against French and American forces. Vietnam's ancient bamboo craft traditions — baskets, furniture, musical instruments — are UNESCO-recognised heritage." },
{ name:"Dragon Blood Tree — Dragonwood", country:"Vietnam", lat:12.0, lng:109.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dracaena_cambodiana.jpg/640px-Dracaena_cambodiana.jpg", description:"Dracaena cambodiana grows in Vietnam's central highlands and coastal limestone karst. Vietnam's extraordinary limestone karst landscapes — Hạ Long Bay, Phong Nha, Ninh Bình — shelter extraordinary endemic plant communities in isolated ecological pockets. New plant species are still being discovered in Vietnam's unexplored karst caves and highland forests at a remarkable rate." },
{ name:"Cinnamon — Quế", country:"Vietnam", lat:15.4, lng:108.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cinnamomum_loureiroi.jpg/640px-Cinnamomum_loureiroi.jpg", description:"Cinnamomum loureiroi — Vietnamese cinnamon — is the world's most intensely flavoured cinnamon, with the highest essential oil content of any cinnamon species. Quảng Nam province has cultivated Vietnamese cinnamon for over 800 years. Its intensely spicy sweet bark flavours phở — Vietnam's national soup — and is a key ingredient in the spice blend that defines the country's most beloved dish." },
{ name:"Star Anise — Hồi", country:"Vietnam", lat:22.0, lng:106.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Illicium_verum.jpg/640px-Illicium_verum.jpg", description:"Illicium verum grows in Vietnam's Lạng Sơn province — Vietnam produces over 90% of the world's star anise. Its eight-pointed star pods contain the essential oil anethole — used to produce Tamiflu antiviral medication. Star anise is the dominant flavour of phở broth and a key ingredient in Vietnam's five spice blend. The star anise forests of Lạng Sơn have been cultivated for over 1,000 years." },

// 🇼🇫 WALLIS AND FUTUNA
{ name:"Coconut Palm — Niu", country:"Wallis and Futuna", lat:-13.3, lng:-176.2, type:"Palm", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Coconut_palm_tree.jpg/640px-Coconut_palm_tree.jpg", description:"Cocos nucifera is the foundation of life on Wallis and Futuna — three tiny volcanic islands in the central Pacific. Copra was the islands' only significant export for over a century. Wallis and Futuna is one of France's most remote territories — its 11,000 inhabitants maintain Polynesian traditions largely unchanged by modernity. Coconut palm groves cover virtually every habitable hectare of both island groups." },
{ name:"Breadfruit — Mei", country:"Wallis and Futuna", lat:-13.28, lng:-176.18, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Artocarpus_altilis.jpg/640px-Artocarpus_altilis.jpg", description:"Artocarpus altilis has sustained Wallis and Futuna for over 2,500 years. The islands' traditional chiefs — the kings of Uvea and the two Futuna kingdoms — preside over breadfruit harvest ceremonies that have continued unbroken for centuries. Wallis and Futuna is one of the last places in the Pacific where traditional Polynesian kingship remains genuinely politically significant." },
{ name:"Kava — Ava", country:"Wallis and Futuna", lat:-14.3, lng:-178.1, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Piper_methysticum.jpg/640px-Piper_methysticum.jpg", description:"Piper methysticum is central to every ceremony on Wallis and Futuna — no chiefly gathering, wedding or important event occurs without kava. The Futuna islands' kava ceremonies are among the most elaborate in all of Polynesia. Wallis and Futuna's isolation has preserved kava preparation and ceremony traditions unchanged for centuries — making it one of the world's most important living repositories of Pacific cultural heritage." },
{ name:"Pandanus — Fala", country:"Wallis and Futuna", lat:-13.32, lng:-176.22, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pandanus_tectorius.jpg/640px-Pandanus_tectorius.jpg", description:"Pandanus tectorius leaves are woven into the fine sleeping mats and baskets that are the most important objects exchanged at ceremonies on Wallis and Futuna. Wallisian and Futunan weaving traditions are maintained by women's cooperative groups. The pandanus mat — kie — is the fundamental unit of ceremonial exchange and social obligation across both island groups." },
{ name:"Taro — Talo", country:"Wallis and Futuna", lat:-14.32, lng:-178.12, type:"Root Crop", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Colocasia_esculenta.jpg/640px-Colocasia_esculenta.jpg", description:"Colocasia esculenta is the prestige food crop of Wallis and Futuna — taro cultivation defines the islands' agricultural landscape. Futuna's extraordinary taro diversity — over 50 named varieties — represents 3,000 years of selective cultivation by Futunan farmers. The annual taro harvest presented to Futuna's kings is one of the Pacific's most important living agricultural ceremonies." },

// 🇾🇪 YEMEN
{ name:"Frankincense — Luban", country:"Yemen", lat:15.5, lng:48.5, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Boswellia_sacra.jpg/640px-Boswellia_sacra.jpg", description:"Boswellia sacra grows on Yemen's Dhofar escarpment and Hadramawt plateau — Yemen was the ancient world's primary frankincense source. The Queen of Sheba's legendary wealth was built on Yemeni frankincense. The ancient incense road carried Yemeni luban to Egypt, Rome and India for over 3,000 years. Yemen's ongoing civil war has devastated frankincense harvesting communities across Hadramawt." },
{ name:"Dragon Blood Tree", country:"Yemen", lat:12.5, lng:54.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Dragon_blood_tree_Socotra.jpg/640px-Dragon_blood_tree_Socotra.jpg", description:"Dracaena cinnabari grows only on Yemen's Socotra archipelago — one of the world's most extraordinary islands. Called the Galápagos of the Indian Ocean, Socotra has 825 endemic plant species — 37% of its flora found nowhere else on Earth. The dragon blood tree's extraordinary umbrella canopy collects ocean mist. UNESCO lists Socotra as a World Heritage Site of outstanding universal value." },
{ name:"Desert Rose — Adenium", country:"Yemen", lat:12.6, lng:54.1, type:"Succulent", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Adenium_obesum.jpg/640px-Adenium_obesum.jpg", description:"Adenium obesum socotranum is endemic to Socotra — its massively swollen trunk stores water through the harsh dry season. Socotra's Adenium grows to tree size, its pink blooms spectacular against the island's dramatic rocky landscape. Yemen's Socotra Island was cut off from the world for months during the civil war — scientists feared irreplaceable endemic species were being lost with no documentation." },
{ name:"Cucumber Tree — Socotra", country:"Yemen", lat:12.52, lng:54.02, type:"Tree", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Dendrosicyos_socotrana.jpg/640px-Dendrosicyos_socotrana.jpg", description:"Dendrosicyos socotrana is the world's only tree-sized cucumber — endemic to Socotra and found nowhere else on Earth. Its swollen bottle-shaped trunk stores water and its yellow cucumber-like fruits are eaten by the island's feral goats. Socotra's extraordinary endemic flora evolved over 20 million years of isolation in the Arabian Sea — creating a living museum of ancient plant evolution." },
{ name:"Coffee — Qahwa", country:"Yemen", lat:15.3, lng:43.8, type:"Shrub", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Roasted_coffee_beans.jpg/640px-Roasted_coffee_beans.jpg", description:"Coffea arabica was first cultivated commercially in Yemen — the port of Mocha gave the world the word mocha. Yemeni coffee has been grown in the terraced mountain gardens of the Haraz and Bani Matar highlands for over 600 years. Yemen's ancient coffee varieties — Jaadi, Dawairi, Tufahi — are genetically distinct from all other commercial coffees and produce extraordinary complex flavours." },

// 🇿🇲 ZAMBIA
{ name:"Mukwa — Zambezi Teak", country:"Zambia", lat:-13.1, lng:28.3, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pterocarpus_angolensis.jpg/640px-Pterocarpus_angolensis.jpg", description:"Pterocarpus angolensis — mukwa — is Zambia's most culturally important timber tree. Its blood-red sap is used in traditional medicine and as a body paint by Zambia's Luvale and Chokwe peoples. Zambia's Miombo woodland — the world's largest tropical dry forest covering 60% of the country — is dominated by mukwa and related Brachystegia species sheltering elephants, lions and wild dogs." },
{ name:"Baobab", country:"Zambia", lat:-13.5, lng:27.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata grows across Zambia's Zambezi valley and Luangwa basin. Ancient baobabs mark the sites of Zambia's traditional chiefs' courts — some trees in the Luangwa Valley are estimated at over 2,000 years old. Zambia's Luangwa Valley — called the valley of the baobabs — is one of Africa's greatest wildlife sanctuaries, its game walks beneath ancient baobabs pioneered here by Norman Carr in the 1950s." },
{ name:"Wild Mango — Mobola Plum", country:"Zambia", lat:-14.5, lng:28.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Parinari_curatellifolia.jpg/640px-Parinari_curatellifolia.jpg", description:"Parinari curatellifolia is one of Zambia's most important wild fruit trees — its sweet plum-like fruits harvested by communities across the Miombo woodland. Zambia's extraordinary wild fruit diversity — over 200 edible wild plant species — provides critical nutrition for rural communities during hunger seasons. Traditional Zambian knowledge of wild forest foods is increasingly valued by food security researchers." },
{ name:"Mopane Tree", country:"Zambia", lat:-16.0, lng:28.0, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Colophospermum_mopane.jpg/640px-Colophospermum_mopane.jpg", description:"Colophospermum mopane dominates Zambia's Zambezi and Luangwa valleys — its butterfly-shaped leaves folding at midday to reduce water loss. Mopane worms — the fat caterpillars of the Emperor moth feeding on mopane leaves — are Zambia's most important source of wild protein. Dried mopane worms are sold in every Zambian market and represent a critical food security resource worth millions annually." },
{ name:"African Ebony — Msasa", country:"Zambia", lat:-15.5, lng:27.8, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Brachystegia_spiciformis.jpg/640px-Brachystegia_spiciformis.jpg", description:"Brachystegia spiciformis — msasa — is the dominant tree of Zambia's Miombo woodland, its new leaves emerging brilliant copper-red and bronze in August creating one of Africa's most spectacular seasonal landscapes. Zambia's dry season woodland turns flame-coloured as msasa flushes new leaves — a natural phenomenon as dramatic as any autumn colour display in the northern hemisphere." },

// 🇿🇼 ZIMBABWE
{ name:"Flame Lily — Gloriosa", country:"Zimbabwe", lat:-19.0, lng:29.8, type:"Climbing Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Gloriosa_superba.jpg/640px-Gloriosa_superba.jpg", description:"Gloriosa superba is Zimbabwe's national flower — its extraordinary flame-coloured reflexed petals curling back to reveal golden stamens. Zimbabwe is the only country to have a climbing lily as its national flower. The flame lily appears on Zimbabwe's coat of arms and banknotes. Despite being Zimbabwe's national symbol, gloriosa is fatally toxic — all parts contain colchicine and accidental poisonings occur annually." },
{ name:"Msasa Tree", country:"Zimbabwe", lat:-17.8, lng:31.1, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Brachystegia_spiciformis.jpg/640px-Brachystegia_spiciformis.jpg", description:"Brachystegia spiciformis is Zimbabwe's most beloved tree — its copper and bronze spring leaves emerging each August transform the Highveld into a landscape of extraordinary colour. Zimbabweans call the msasa season their spring — the flame-coloured new leaves burst before the rains arrive each October. Harare — the city of flowers — is built within msasa woodland that gives the capital its distinctive character." },
{ name:"Baobab", country:"Zimbabwe", lat:-16.5, lng:29.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/71/Adansonia_digitata.jpg/640px-Adansonia_digitata.jpg", description:"Adansonia digitata grows across Zimbabwe's Zambezi valley in magnificent ancient specimens. The Chirinda Forest baobabs in Zimbabwe's Eastern Highlands are among Africa's most studied. Zimbabwe's Mana Pools National Park — a UNESCO World Heritage Site — contains extraordinary ancient baobabs that elephants have carved hollow by eating the water-storing bark during dry seasons." },
{ name:"Zimbabwe Teak — Mukwa", country:"Zimbabwe", lat:-18.5, lng:26.0, type:"Tree", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Baikiaea_plurijuga.jpg/640px-Baikiaea_plurijuga.jpg", description:"Baikiaea plurijuga forms the magnificent teak forests of Zimbabwe's Hwange region — one of Africa's finest dry hardwood forests. Zimbabwe teak produces timber of extraordinary hardness used to make the railway sleepers that built southern Africa's rail network. Hwange National Park — Zimbabwe's largest wildlife reserve — shelters the world's largest elephant population within these ancient teak forests." },
{ name:"Wild Hibiscus — Pfuko", country:"Zimbabwe", lat:-20.2, lng:28.6, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hibiscus_calyphyllus.jpg/640px-Hibiscus_calyphyllus.jpg", description:"Hibiscus species grow across Zimbabwe's communal lands and Great Zimbabwe's ancient stone ruins. The dried calyces of wild hibiscus make the deep crimson drink called mahewu in Zimbabwe — drunk at every gathering. Zimbabwe's extraordinary Great Zimbabwe ruins — the largest stone structure in sub-Saharan Africa — are surrounded by msasa and wild hibiscus woodland unchanged since the Rozvi Empire's peak 600 years ago." },

// 🌍 EAST TURKISTAN 
{ name:"Grape — Üzüm", country:"East Turkistan", lat:42.8, lng:89.2, type:"Vine", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Vitis_vinifera_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-277.jpg/640px-Vitis_vinifera_-_K%C3%B6hler%E2%80%93s_Medizinal-Pflanzen-277.jpg", description:"Vitis vinifera has been cultivated in the Turfan Basin for over 2,000 years — the ancient Silk Road city of Turfan sits in a depression 154m below sea level where summer heat and dry desert air produce the world's most intensely sweet raisins. Uyghur grape cultivation is one of the oldest continuous viticultural traditions on Earth. The famous Turfan green raisin — kишмиш — is still traded across Central Asia as it was along the ancient Silk Road." },
{ name:"Muskmelon — Qoghuun", country:"East Turkistan", lat:39.5, lng:76.0, type:"Annual Plant", status:"Cultivated", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Cucumis_melo.jpg/640px-Cucumis_melo.jpg", description:"Cucumis melo has been cultivated by Uyghur farmers in the Kashgar and Kucha oases for over 3,000 years. Uyghur muskmelons — among the world's sweetest — were sent as tribute to Tang Dynasty emperors. Kashgar's melon bazaar each August is one of Central Asia's most extraordinary sensory experiences — hundreds of varieties piled in golden and green mountains. Uyghur traditional melon cultivation represents one of humanity's oldest and most refined horticultural traditions." },
{ name:"Pomegranate — Anar", country:"East Turkistan", lat:39.5, lng:75.9, type:"Fruit Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/9/9e/Pomegranate_fruit.jpg/640px-Pomegranate_fruit.jpg", description:"Punica granatum has been cultivated in the Yarkand and Hotan oases for over 3,000 years. East Turkistan's Uyghur pomegranates — grown in the shadow of the Kunlun and Pamir ranges — are among the largest and most richly flavoured in Central Asia. The pomegranate is sacred in Uyghur culture — its hundreds of seeds symbolise abundance and family. Ancient Uyghur pomegranate varieties are now threatened by monoculture agriculture." },
{ name:"Walnut — Yénghaq", country:"East Turkistan", lat:37.1, lng:79.9, type:"Tree", status:"Near Threatened", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Juglans_regia.jpg/640px-Juglans_regia.jpg", description:"Juglans regia forms ancient walnut groves in East Turkistan's Hotan and Aksu regions — some trees over 1,000 years old. The Uyghur village of Arslanbob-type walnut forests in the Fergana-adjacent ranges contain genetic diversity of global importance. Uyghur woodcarvers have used walnut for centuries to produce the elaborate carved furniture and musical instrument bodies that define Uyghur decorative arts. Wild walnut forests here represent a critical genetic reservoir for world food security." },
{ name:"Tamarisk — Yulghun", country:"East Turkistan", lat:40.0, lng:84.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Tamarix_ramosissima.jpg/640px-Tamarix_ramosissima.jpg", description:"Tamarix ramosissima lines the river banks of the Tarim, Hotan and Yarkand rivers — the lifelines crossing the Taklamakan Desert, one of the world's largest and most forbidding sand deserts. Uyghur communities have used tamarisk branches to build windbreaks protecting their oasis farmland from advancing sand dunes for millennia. Tamarisk forests along the Tarim River form Central Asia's longest desert riparian ecosystem — sheltering the critically endangered Tarim tiger and Bactrian deer." },

// 🇰🇷 SOUTH KOREA
{ name:"Hibiscus — Mugunghwa", country:"South Korea", lat:37.5, lng:127.0, type:"Shrub", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Hibiscus_syriacus.jpg/640px-Hibiscus_syriacus.jpg", description:"Hibiscus syriacus is South Korea's national flower — mugunghwa — meaning the eternal flower that never fades. It blooms continuously from July to October, a new flower opening each morning. The mugunghwa appears in Korea's national anthem, coat of arms and countless cultural symbols. It represents the Korean people's resilience and perseverance through centuries of invasion and hardship — a flower that cannot be extinguished." },
{ name:"Korean Pine — Jat-namu", country:"South Korea", lat:37.8, lng:128.5, type:"Conifer", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Pinus_koraiensis.jpg/640px-Pinus_koraiensis.jpg", description:"Pinus koraiensis forms magnificent forests across Korea's Taebaek and Sobaek mountain ranges. Korean pine nuts — jat — are among the world's most prized, used in the royal court cuisine of the Joseon Dynasty for 500 years. South Korea's Seoraksan and Jirisan national parks protect ancient Korean pine forests sheltering Amur leopard cats and black bears. Korean pine is considered the tree of longevity in traditional Korean culture." },
{ name:"Cherry Blossom — Beotkkot", country:"South Korea", lat:33.5, lng:126.5, type:"Tree", status:"Least Concern", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Prunus_serrulata.jpg/640px-Prunus_serrulata.jpg", description:"Prunus serrulata transforms South Korea each April in one of the world's most spectacular natural displays. Korea's cherry blossom festivals — from Jeju Island to Seoul's Yeouido — draw millions of visitors annually. The Jeju wild cherry — King Cherry — is endemic to Korea's Jeju Island and considered the most beautiful of all cherry species. Korean cherry blossom viewing — beotkkot-nori — is one of East Asia's most beloved spring traditions." },
{ name:"Ginseng — Insam", country:"South Korea", lat:36.5, lng:127.5, type:"Root Plant", status:"Vulnerable", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Panax_ginseng.jpg/640px-Panax_ginseng.jpg", description:"Panax ginseng is native to Korea's forested mountains — Korean red ginseng is the world's most prized medicinal plant, cultivated for over 2,000 years. The Goryeo Dynasty's ginseng trade built Korea's medieval economy. South Korea's Geumsan region produces 70% of the world's finest ginseng. A single ancient wild mountain ginseng root — sansam — can sell for over $100,000 at Korean auction." },
{ name:"Korean Fir — Gureonamu", country:"South Korea", lat:33.36, lng:126.53, type:"Conifer", status:"Endangered", img:"https://upload.wikimedia.org/wikipedia/commons/thumb/4/4e/Abies_koreana.jpg/640px-Abies_koreana.jpg", description:"Abies koreana is endemic to South Korea's Jeju Island and southern mountain peaks — one of the world's most beloved ornamental conifers whose upward-pointing purple cones appear even on young saplings. Climate change is pushing its habitat upward on Korea's highest peaks — Hallasan, Jirisan and Deoksosan — shrinking its range with every passing decade. The Korean fir is a living barometer of climate change on the Korean Peninsula." },

const W = window.innerWidth, H = window.innerHeight;
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(42, W / H, 0.1, 1000);
camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x04040f, 1);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// ─── LIGHTS ───
scene.add(new THREE.AmbientLight(0x223355, 0.9));
const sun = new THREE.DirectionalLight(0xfff0dd, 1.3);
sun.position.set(5, 3, 5);
scene.add(sun);
const rim = new THREE.DirectionalLight(0x224466, 0.5);
rim.position.set(-5, -2, -3);
scene.add(rim);

// ─── STARS ───
(function () {
  const N = 5000, pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2 * Math.random() - 1);
    const r  = 100 + Math.random() * 250;
    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
    pos[i*3+1] = r * Math.sin(ph) * Math.sin(th);
    pos[i*3+2] = r * Math.cos(ph);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.14, sizeAttenuation: true, transparent: true, opacity: 0.7 })));
})();

// ─── GLOBE ───
const R = 2;
const earthGroup = new THREE.Group();
scene.add(earthGroup);

const earthGeo = new THREE.SphereGeometry(R, 64, 64);
const earthMat = new THREE.MeshPhongMaterial({ color: 0x2255aa, emissive: 0x001133, specular: 0x2244aa, shininess: 30 });
const earthMesh = new THREE.Mesh(earthGeo, earthMat);
earthGroup.add(earthMesh);

// Load blue marble texture
new THREE.TextureLoader().load(
  'https://unpkg.com/three-globe@2.33.0/example/img/earth-blue-marble.jpg',
  tex => { earthMat.map = tex; earthMat.color.set(0xffffff); earthMat.needsUpdate = true; },
  null,
  () => {
    // Fallback procedural texture
    const c = document.createElement('canvas'); c.width = 1024; c.height = 512;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 0, 512);
    g.addColorStop(0,   '#071428'); g.addColorStop(0.15, '#0a1e3d');
    g.addColorStop(0.5, '#0d2d6b'); g.addColorStop(0.85,'#0a1e3d');
    g.addColorStop(1,   '#071428');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 1024, 512);
    earthMat.map = new THREE.CanvasTexture(c);
    earthMat.color.set(0xffffff); earthMat.needsUpdate = true;
  }
);

// Atmosphere — Fresnel shader
const atmVert = `
  varying vec3 vNormal;
  void main(){
    vNormal = normalize(normalMatrix * normal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
  }`;
const atmFrag = `
  varying vec3 vNormal;
  void main(){
    float i = pow(0.65 - dot(vNormal, vec3(0,0,1)), 2.5);
    gl_FragColor = vec4(0.25, 0.55, 1.0, 1.0) * i;
  }`;
const atmMesh = new THREE.Mesh(
  new THREE.SphereGeometry(R * 1.055, 64, 64),
  new THREE.ShaderMaterial({ vertexShader:atmVert, fragmentShader:atmFrag, blending:THREE.AdditiveBlending, side:THREE.BackSide, transparent:true })
);
earthGroup.add(atmMesh);

// Subtle grid lines
const gridMat = new THREE.LineBasicMaterial({ color: 0x1a3a6a, transparent: true, opacity: 0.25 });
for (let lat = -75; lat <= 75; lat += 15) {
  const pts = [];
  for (let lng = 0; lng <= 360; lng += 3) {
    const phi = (90 - lat) * Math.PI / 180;
    const th  = lng * Math.PI / 180;
    pts.push(new THREE.Vector3(-(R*1.001)*Math.sin(phi)*Math.cos(th), (R*1.001)*Math.cos(phi), (R*1.001)*Math.sin(phi)*Math.sin(th)));
  }
  earthGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
}
for (let lng = 0; lng < 360; lng += 15) {
  const pts = [];
  for (let lat = -90; lat <= 90; lat += 3) {
    const phi = (90 - lat) * Math.PI / 180;
    const th  = lng * Math.PI / 180;
    pts.push(new THREE.Vector3(-(R*1.001)*Math.sin(phi)*Math.cos(th), (R*1.001)*Math.cos(phi), (R*1.001)*Math.sin(phi)*Math.sin(th)));
  }
  earthGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
}

// ─── MARKERS ───
const COLS  = { plants:0x22c55e, volcanoes:0xef4444, tsunamis:0x3b82f6 };
const GCOLS = { plants:0x4ade80, volcanoes:0xf87171, tsunamis:0x60a5fa };

const markerGroups = {
  plants:    new THREE.Group(),
  volcanoes: new THREE.Group(),
  tsunamis:  new THREE.Group(),
};
Object.values(markerGroups).forEach(g => earthGroup.add(g));

const allMarkers = []; // { mesh, ring, data, category }

function ll2v(lat, lng, r) {
  const phi = (90 - lat) * Math.PI / 180;
  const th  = (lng + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -(r * Math.sin(phi) * Math.cos(th)),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(th)
  );
}

function addMarker(item, category) {
  const pos = ll2v(item.lat, item.lng, R);

  // Core dot
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.033, 10, 10),
    new THREE.MeshPhongMaterial({ color:COLS[category], emissive:COLS[category], emissiveIntensity:0.7, shininess:80 })
  );
  mesh.position.copy(pos);

  // Glow ring (billboard toward globe center)
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.04, 0.058, 20),
    new THREE.MeshBasicMaterial({ color:GCOLS[category], transparent:true, opacity:0.45, side:THREE.DoubleSide })
  );
  ring.position.copy(pos);
  ring.lookAt(0, 0, 0);

  markerGroups[category].add(mesh);
  markerGroups[category].add(ring);
  allMarkers.push({ mesh, ring, data:item, category });
}

Object.entries(DATA).forEach(([cat, items]) => {
  if (cat === 'plants') {
    // Her ülke için sadece 1 marker
    const seen = {};
    items.forEach(item => {
      if (!seen[item.country]) {
        seen[item.country] = true;
        addMarker(item, cat);
      }
    });
  } else {
    items.forEach(item => addMarker(item, cat));
  }
});

// ─── ORBIT CONTROLS ───
let dragging = false, mdPos = {x:0,y:0}, prevMouse = {x:0,y:0};
let tRot = {x:0.3, y:0}, cRot = {x:0.3, y:0};
let tZoom = 6, cZoom = 6;

const canvas = renderer.domElement;

canvas.addEventListener('mousedown', e => {
  dragging = true;
  mdPos = prevMouse = { x:e.clientX, y:e.clientY };
});
window.addEventListener('mouseup', () => { dragging = false; });

window.addEventListener('mousemove', e => {
  if (dragging) {
    tRot.x += (e.clientY - prevMouse.y) * 0.004;
    tRot.y += (e.clientX - prevMouse.x) * 0.004;
    tRot.x = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, tRot.x));
    prevMouse = { x:e.clientX, y:e.clientY };
  }
  doHover(e);
});

canvas.addEventListener('wheel', e => {
  tZoom = Math.max(3, Math.min(10, tZoom + e.deltaY * 0.008));
}, { passive: true });

// ─── RAYCASTING ───
const rc = new THREE.Raycaster();
const tt = document.getElementById('tt');
let hoveredMesh = null;

function ndcMouse(e) {
  return new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );
}

function visibleMeshes() {
  return allMarkers.filter(m => markerGroups[m.category].visible).map(m => m.mesh);
}

function doHover(e) {
  if (dragging) { tt.style.display = 'none'; return; }
  rc.setFromCamera(ndcMouse(e), camera);
  const hits = rc.intersectObjects(visibleMeshes());
  if (hits.length) {
    const found = allMarkers.find(m => m.mesh === hits[0].object);
    if (found) {
      canvas.style.cursor = 'pointer';
      tt.style.cssText = `display:block;left:${e.clientX+15}px;top:${e.clientY-12}px`;
      tt.textContent = `${found.data.name}  ·  ${found.data.country}`;
      hoveredMesh = found.mesh;
      return;
    }
  }
  canvas.style.cursor = 'default';
  tt.style.display = 'none';
  hoveredMesh = null;
}

canvas.addEventListener('click', e => {
  const dx = e.clientX - mdPos.x, dy = e.clientY - mdPos.y;
  if (Math.sqrt(dx*dx+dy*dy) > 4) return;

  hideCountryPopup();

  rc.setFromCamera(ndcMouse(e), camera);
  const hits = rc.intersectObjects(visibleMeshes());
  if (hits.length) {
    const found = allMarkers.find(m => m.mesh === hits[0].object);
    if (found) {
      if (found.category === 'plants') {
        // Aynı ülkedeki tüm bitkileri bul
        const countryItems = DATA.plants.filter(item => 
  item.country === found.data.country
);
const countryMarkers = countryItems.map(item => ({ data: item, category: 'plants' }));
        if (countryMarkers.length > 1) {
          showCountryPopup(e, countryMarkers);
        } else {
          openPanel(found);
        }
      } else {
        openPanel(found);
      }
      return;
    }
  }
  closePanel();
});

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });

// ─── PANEL ───
const LABELS = { plants:'Endemic Plant', volcanoes:'Volcano', tsunamis:'Tsunami Event' };

function showCountryPopup(e, countryMarkers) {
  const popup = document.getElementById('country-popup');
  const title = document.getElementById('country-popup-title');
  const list  = document.getElementById('country-popup-list');

  title.textContent = countryMarkers[0].data.country + ' — Plants';
  list.innerHTML = '';

  countryMarkers.forEach(m => {
    const btn = document.createElement('button');
    btn.textContent = m.data.name;
    btn.style.cssText = 'background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.25);color:#4ade80;padding:8px 12px;border-radius:7px;font-family:inherit;font-size:11px;cursor:pointer;text-align:left;transition:background 0.15s;';
    btn.onmouseover = () => btn.style.background = 'rgba(34,197,94,0.18)';
    btn.onmouseout  = () => btn.style.background = 'rgba(34,197,94,0.08)';
    btn.onclick = () => { hideCountryPopup(); openPanel(m); };
    list.appendChild(btn);
  });

  popup.style.display = 'block';
  popup.style.left = Math.min(e.clientX + 15, window.innerWidth - 240) + 'px';
  popup.style.top  = Math.min(e.clientY - 10, window.innerHeight - 300) + 'px';
}

function hideCountryPopup() {
  document.getElementById('country-popup').style.display = 'none';
}
function openPanel({ data, category }) {
  document.getElementById('p-cat').textContent     = LABELS[category];
  document.getElementById('p-cat').className       = `p-cat ${category}`;
  document.getElementById('p-name').textContent    = data.name;
  document.getElementById('p-country').textContent = data.country;
  document.getElementById('p-desc').textContent    = data.description;

  let meta = '';
  if (category === 'volcanoes') {
    meta = `
      <div class="meta-card"><div class="meta-lbl">Elevation</div><div class="meta-val">${data.elevation.toLocaleString()} m</div></div>
      <div class="meta-card"><div class="meta-lbl">Last Eruption</div><div class="meta-val">${data.lastEruption}</div></div>
      <div class="meta-card"><div class="meta-lbl">Volcano Type</div><div class="meta-val">${data.type}</div></div>
    `;
  } else if (category === 'tsunamis') {
    meta = `
      <div class="meta-card"><div class="meta-lbl">Year</div><div class="meta-val">${data.year}</div></div>
      <div class="meta-card"><div class="meta-lbl">Estimated Deaths</div><div class="meta-val">${data.deaths}</div></div>
      ${data.magnitude ? `<div class="meta-card"><div class="meta-lbl">Magnitude</div><div class="meta-val">${data.magnitude} Mw</div></div>` : '<div class="meta-card"><div class="meta-lbl">Trigger</div><div class="meta-val">Volcanic / Landslide</div></div>'}
    `;
  } else {
    meta = `
      <div class="meta-card"><div class="meta-lbl">Plant Type</div><div class="meta-val">${data.type}</div></div>
      <div class="meta-card"><div class="meta-lbl">IUCN Status</div><div class="meta-val">${data.status}</div></div>
    `;
  }
  document.getElementById('p-meta').innerHTML = meta;

  const latStr = data.lat >= 0 ? `${data.lat.toFixed(2)}° N` : `${Math.abs(data.lat).toFixed(2)}° S`;
  const lngStr = data.lng >= 0 ? `${data.lng.toFixed(2)}° E` : `${Math.abs(data.lng).toFixed(2)}° W`;
  document.getElementById('p-coords').innerHTML = `<span>LAT &nbsp;${latStr}</span><span>LNG &nbsp;${lngStr}</span>`;

  const imgEl = document.getElementById('p-img');
const imgWrap = document.getElementById('p-img-wrap');
const imgLoad = document.getElementById('p-img-load');
if (data.img) {
  imgWrap.style.display = 'block';
  imgLoad.style.display = 'flex';
  imgEl.style.display = 'none';
  // DOĞRU 
imgEl.src = ""; // önce temizle
imgEl.src = "https://corsproxy.io/?" + encodeURIComponent(data.img);
} else {
  imgWrap.style.display = 'none';
}
  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  hideCountryPopup();  
  document.getElementById('panel').classList.remove('open');
}

// ─── FILTERS ───
const filterState = { plants:true, volcanoes:true, tsunamis:true };

function toggleFilter(cat) {
  filterState[cat] = !filterState[cat];
  markerGroups[cat].visible = filterState[cat];
  const btn = document.querySelector(`.f-btn.${cat}`);
  btn.classList.toggle('on', filterState[cat]);
  const total = Object.entries(filterState).reduce((s,[c,v]) => v ? s + DATA[c].length : s, 0);
  document.getElementById('stat-total').textContent = total;
}

// ─── ANIMATION ───
const clock = new THREE.Clock();
let autoRotate = true;

canvas.addEventListener('mousedown', () => { autoRotate = false; });

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (autoRotate) tRot.y += 0.0012;

  cRot.x += (tRot.x - cRot.x) * 0.07;
  cRot.y += (tRot.y - cRot.y) * 0.07;
  earthGroup.rotation.x = cRot.x;
  earthGroup.rotation.y = cRot.y;

  cZoom += (tZoom - cZoom) * 0.08;
  camera.position.z = cZoom;

  // Pulse markers
  allMarkers.forEach(({ mesh, ring, category }, i) => {
    const p = 0.82 + Math.sin(t * 2.2 + i * 0.7) * 0.18;
    mesh.scale.setScalar(p);
    mesh.material.emissiveIntensity = 0.4 + Math.sin(t * 2.2 + i * 0.7) * 0.35;
    ring.material.opacity = mesh === hoveredMesh ? 0.85 : (0.3 + Math.sin(t * 2.2 + i * 0.7) * 0.15);
    if (mesh === hoveredMesh) mesh.scale.setScalar(1.35);
  });

  renderer.render(scene, camera);
}

animate();

// ─── RESIZE ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── HIDE LOADER ───
window.addEventListener('load', () => {
  setTimeout(() => {
    const l = document.getElementById('loading');
    l.classList.add('fade');
    setTimeout(() => l.remove(), 700);
    autoRotate = true;
  }, 1400);
});
</script>
